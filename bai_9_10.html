let current = 0;
let answered = new Array(questions.length).fill(null);
const letters = ["A","B","C","D"];

const questionText = document.getElementById('questionText');
const optionsBox = document.getElementById('optionsBox');
const feedback = document.getElementById('feedback');
const progress = document.getElementById('progress');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const quizCard = document.getElementById('quizCard');
const resultBox = document.getElementById('result');
const scoreEl = document.getElementById('score');
const jumpSelect = document.getElementById('jumpSelect');

questions.forEach((q,i)=>{
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = `Câu ${i+1}`;
  jumpSelect.appendChild(opt);
});

function render(){
  const item = questions[current];
  progress.textContent = `Câu ${current+1} / ${questions.length}`;
  questionText.textContent = item.q;
  optionsBox.innerHTML = "";
  feedback.textContent = "";
  feedback.className = "feedback";
  jumpSelect.value = current;

  item.opts.forEach((opt,i)=>{
    const div = document.createElement('div');
    div.className = "option";
    div.textContent = letters[i] + ". " + opt;
    div.onclick = () => selectAnswer(i);
    if(answered[current] !== null){
      div.classList.add('disabled');
      if(i === item.ans) div.classList.add('correct');
      if(i === answered[current] && i !== item.ans) div.classList.add('wrong');
    }
    optionsBox.appendChild(div);
  });

  if(answered[current] !== null){
    if(answered[current] === item.ans){
      feedback.textContent = "✔ Chính xác!";
      feedback.classList.add('correct');
    } else {
      feedback.textContent = "✘ Sai rồi. Đáp án đúng là " + letters[item.ans] + ".";
      feedback.classList.add('wrong');
    }
  }

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === questions.length-1 ? "Xem kết quả" : "Câu tiếp →";
}

function selectAnswer(i){
  if(answered[current] !== null) return;
  answered[current] = i;
  render();
}

prevBtn.onclick = () => { if(current>0){current--; render();} };
nextBtn.onclick = () => {
  if(current === questions.length-1){
    showResult();
  } else {
    current++;
    render();
  }
};

jumpSelect.onchange = () => {
  current = parseInt(jumpSelect.value);
  render();
};

function showResult(){
  quizCard.style.display = "none";
  progress.style.display = "none";
  document.getElementById('jumpBox').style.display = "none";
  let score = 0;
  answered.forEach((a,i)=>{ if(a===questions[i].ans) score++; });
  resultBox.style.display = "block";
  scoreEl.textContent = `Bạn trả lời đúng ${score} / ${questions.length} câu`;
}

document.getElementById('restart').onclick = () => {
  answered = new Array(questions.length).fill(null);
  current = 0;
  quizCard.style.display = "block";
  progress.style.display = "block";
  document.getElementById('jumpBox').style.display = "block";
  resultBox.style.display = "none";
  render();
};

render();
</script>
</body>
</html>
