<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tin Mừng theo Thánh Mát-thêu – Dẫn Nhập Bài 1-3</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: linear-gradient(160deg,#fdf6ec 0%,#f0e0c0 100%); display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px 48px; font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; }
  #app { width: 100%; max-width: 640px; }
  .header { text-align: center; margin-bottom: 28px; }
  .header-eyebrow { font-size: 13px; letter-spacing: 3px; color: #b5855a; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
  .header h1 { font-size: 24px; font-weight: 800; color: #3a2a14; line-height: 1.3; }
  .header p { font-size: 13.5px; color: #9a7a50; margin-top: 6px; }
  .card { background: #fff; border-radius: 18px; padding: 28px 28px 24px; box-shadow: 0 8px 40px rgba(140,90,30,0.10), 0 2px 8px rgba(140,90,30,0.06); }

  /* Menu */
  .menu-item { display: flex; align-items: center; gap: 16px; padding: 18px 20px; background: linear-gradient(135deg,#fdf6ec 0%,#f9eedc 100%); border: 1.5px solid #e2c99a; border-radius: 14px; margin-bottom: 14px; cursor: pointer; transition: all 0.18s ease; text-align: left; width: 100%; font-family: inherit; }
  .menu-item:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(160,110,50,0.14); border-color: #d4a76a; }
  .menu-num { min-width: 46px; height: 46px; border-radius: 12px; background: linear-gradient(135deg,#c8944a,#d4a76a); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; flex-shrink: 0; }
  .menu-text { flex: 1; }
  .menu-title { font-size: 15.5px; font-weight: 700; color: #3a2a14; margin-bottom: 2px; }
  .menu-sub { font-size: 12.5px; color: #9a7a50; }
  .menu-arrow { font-size: 20px; color: #c8944a; }

  /* Progress */
  .progress-meta { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; color: #7a6a55; }
  .progress-track { height: 7px; background: #e8dece; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#b5855a,#d4a76a); border-radius: 4px; transition: width 0.4s ease; }

  /* Question */
  .question-box { background: linear-gradient(135deg,#fdf6ec 0%,#f9eedc 100%); border: 1.5px solid #e2c99a; border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(160,110,50,0.08); }
  .question-eyebrow { font-size: 11px; letter-spacing: 2px; color: #b5855a; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
  .question-text { font-size: 25px; line-height: 1.7; color: #3a2a14; font-weight: 500; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn { display: flex; align-items: center; gap: 14px; padding: 13px 18px; background: #fff; border: 1.5px solid #ddd; border-radius: 10px; cursor: pointer; color: #3a2a14; font-family: inherit; font-size: 22px; line-height: 1.5; text-align: left; transition: all 0.18s ease; width: 100%; }
  .opt-btn:hover:not(:disabled) { background: #fdf0dc; }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { background: #eaf7ec; border: 2px solid #4caf7d; color: #1a6b3a; }
  .opt-btn.wrong   { background: #fdecea; border: 2px solid #e06060; color: #8b1c1c; }
  .opt-btn.selected-pending { background: #fef3e2; border: 2px solid #d4a76a; color: #7a4a10; }
  .opt-label { min-width: 30px; height: 30px; border-radius: 50%; background: #f0e8d8; color: #9a7a50; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; transition: all 0.18s; }
  .opt-btn.correct   .opt-label { background: #4caf7d; color: #fff; }
  .opt-btn.wrong     .opt-label { background: #e06060; color: #fff; }
  .opt-btn.selected-pending .opt-label { background: #d4a76a; color: #fff; }
  .opt-icon { margin-left: auto; font-size: 18px; }

  /* Feedback */
  .feedback { margin-top: 20px; text-align: right; animation: fadeIn 0.25s ease; }
  .feedback-badge { display: inline-block; padding: 7px 14px; border-radius: 8px; font-size: 13.5px; font-weight: 600; margin-bottom: 12px; margin-right: 8px; }
  .feedback-badge.ok  { background: #eaf7ec; color: #1a6b3a; }
  .feedback-badge.err { background: #fdecea; color: #8b1c1c; }

  /* Buttons */
  .btn-primary { background: linear-gradient(135deg,#c8944a,#d4a76a); color: #fff; border: none; padding: 11px 28px; border-radius: 9px; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 700; box-shadow: 0 3px 12px rgba(180,120,50,0.22); transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-outline { background: none; border: 1.5px solid #d4a76a; color: #b5855a; padding: 9px 20px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600; margin-bottom: 16px; margin-right: 10px; transition: background 0.15s; }
  .btn-outline:hover { background: #fdf0dc; }
  .btn-restart { background: linear-gradient(135deg,#c8944a,#d4a76a); color: #fff; border: none; padding: 13px 36px; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 16px; font-weight: 700; box-shadow: 0 4px 16px rgba(180,120,50,0.25); }
  .btn-back-row { text-align: left; margin-bottom: 16px; }
  .btn-back { background: none; border: none; color: #b5855a; font-family: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer; padding: 4px 0; }
  .btn-back:hover { color: #8a6a40; text-decoration: underline; }

  /* Result */
  .result { text-align: center; }
  .result-medal { font-size: 64px; margin-bottom: 12px; }
  .result h2 { font-size: 26px; color: #3a2a14; margin-bottom: 6px; }
  .result-msg { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
  .result-score-box { background: linear-gradient(135deg,#fdf6ec,#f5e8cc); border: 1.5px solid #e2c99a; border-radius: 16px; padding: 28px 24px; margin-bottom: 24px; box-shadow: 0 2px 14px rgba(160,110,50,0.1); }
  .result-number { font-size: 52px; font-weight: 800; color: #b5855a; }
  .result-total { font-size: 22px; color: #9a7a50; }
  .result-label { font-size: 15px; color: #7a6a55; margin-top: 4px; }
  .result-bar-track { height: 10px; background: #e8dece; border-radius: 5px; margin-top: 16px; overflow: hidden; }
  .result-bar-fill { height: 100%; background: linear-gradient(90deg,#b5855a,#d4a76a); border-radius: 5px; }
  .result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  /* Wrong review */
  #wrong-list { text-align: left; margin-bottom: 20px; }
  .wrong-item { background: #fdf4f4; border: 1.5px solid #f0c8c8; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .wrong-item-num { font-size: 12px; color: #b5855a; font-weight: 700; margin-bottom: 4px; }
  .wrong-item-q { font-size: 13.5px; color: #3a2a14; line-height: 1.6; margin-bottom: 8px; }
  .wrong-item-yours { font-size: 13px; color: #c0392b; }
  .wrong-item-ans   { font-size: 13px; color: #27ae60; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn 0.35s ease; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-eyebrow">Bộ câu hỏi trắc nghiệm</div>
    <h1>Tin Mừng theo Thánh Mát-thêu - Dẫn Nhập Bài 1-3</h1>
    <p id="subheader">Chọn bài để bắt đầu</p>
  </div>
  <div class="card" id="main-card"></div>
</div>

<script>
const LABELS = ["A","B","C","D"];

const QUIZ_SETS = {
  bai1: {
    title: "Bài 1: Dẫn Nhập",
    sub: "19 câu hỏi",
    questions: [
      {q:"Theo truyền thống Ki-tô giáo sơ khai, ai được coi là tác giả Tin Mừng thứ nhất?",opts:["Thánh Gioan Tông đồ","Thánh Mát-thêu","Thánh Phêrô","Thánh Phaolô"],ans:"B"},
      {q:"Theo Mt 10,3, thánh Mát-thêu được gọi là gì?",opts:["Người thu thuế","Người đánh cá","Kinh sư","Biệt phái"],ans:"A"},
      {q:"Đặc điểm nào cho thấy Tin Mừng thứ nhất (Mát-thêu) mang màu sắc Do Thái?",opts:["Được viết bằng tiếng Latinh","Nhấn mạnh văn hóa Hy Lạp","Thấm đượm ngôn ngữ và văn phong Do Thái","Không trích dẫn Cựu Ước"],ans:"C"},
      {q:"Tin Mừng Mát-thêu được viết bằng ngôn ngữ nào?",opts:["Aram","Latinh","Do Thái cổ","Hy Lạp"],ans:"D"},
      {q:"Tin Mừng Mát-thêu có thể được biên soạn ở đâu?",opts:["Thành An-ti-ô-khi-a, miền Xy-ri","Thành Rô-ma, thủ đô Đế quốc","Thành Giê-ru-sa-lem, trung tâm Do Thái giáo","Thành A-lê-xan-ri-a, Ai Cập"],ans:"A"},
      {q:"Độc giả chính của Tin Mừng Mát-thêu là ai?",opts:["Các Kitô hữu gốc Hy Lạp sống tại Athens","Các Kitô hữu gốc Do Thái sống trong môi trường văn hóa Hy Lạp","Các Kitô hữu gốc Rôma tại Ý","Các Kitô hữu gốc Ai Cập tại Alexandria"],ans:"B"},
      {q:"Về thời gian biên soạn, các học giả có những quan điểm nào?",opts:["Chỉ trước năm 70","Chỉ sau năm 70","Trước hoặc sau năm 70","Khoảng năm 50"],ans:"C"},
      {q:"Ba khía cạnh thần học chính trong Tin Mừng Mát-thêu là gì?",opts:["Đức Giêsu – Luật Môsê – Đền Thờ","Đức Giêsu – Hội Thánh – Các môn đệ","Hội Thánh – Dân ngoại – Đền Thờ","Nước Trời – Luật cũ – Biệt phái"],ans:"B"},
      {q:"Theo Mát-thêu, Đức Giêsu được trình bày là ai?",opts:["Một ngôn sứ lớn","Một rabbi Do Thái","Messiah và Con Thiên Chúa","Một nhà cải cách tôn giáo"],ans:"C"},
      {q:"Đức Giêsu được mô tả như Môsê mới với vai trò gì?",opts:["Bãi bỏ Luật cũ","Giải thích sai Luật cũ","Kiện toàn lề luật","Thay thế hoàn toàn Cựu Ước"],ans:"C"},
      {q:"Theo Mát-thêu, người môn đệ là người?",opts:["Chỉ nghe giảng","Từ bỏ tất cả để theo Đức Giêsu","Giữ luật Môsê cách máy móc","Sống tách biệt khỏi Hội Thánh"],ans:"B"},
      {q:"Tin Mừng Mát-thêu có bao nhiêu chương?",opts:["24","27","28","30"],ans:"C"},
      {q:"Bài Giảng Trên Núi nằm ở chương nào?",opts:["Mt 3–4","Mt 5–7","Mt 8–10","Mt 11–13"],ans:"B"},
      {q:"Bài giảng về thời cánh chung nằm ở phần nào?",opts:["Mt 18","Mt 20","Mt 24–25","Mt 26–28"],ans:"C"},
      {q:"Yếu tố nào KHÔNG được nêu như bằng chứng xác nhận Đức Giêsu là Con Thiên Chúa?",opts:["Mạc khải của Chúa Cha","Biến cố Hiển Dung","Lời tuyên xưng của người khác","Sự kiện Đức Giêsu chịu phép rửa"],ans:"D"},
      {q:"Theo phần \"Cần đọc Tin Mừng Mát-thêu với tâm thế nào?\", việc thực hành Lời Chúa nhằm mục đích gì?",opts:["Loan báo Tin Mừng","Thảo luận thần học","Hiểu biết học thuật","Bảo vệ Luật cũ"],ans:"A"},
      {q:"Thánh Mát-thêu được Đức Giêsu gọi khi đang ở đâu?",opts:["Trong Đền Thờ","Trên thuyền","Ở hội đường","Ở trạm thu thuế"],ans:"D"},
      {q:"Phần \"Thương Khó và Phục Sinh\" nằm ở đâu?",opts:["Mt 19–23","Mt 26–28","Mt 20–23","Mt 14–18"],ans:"B"},
      {q:"Đức Giêsu là \"Môsê mới\" vì Ngài:",opts:["Bãi bỏ Luật cũ","Kiện toàn lề luật","Chống Do Thái giáo","Không trích Cựu Ước"],ans:"B"},
    ]
  },
  bai2: {
    title: "Bài 2: Gia phả Đức Giêsu",
    sub: "15 câu hỏi",
    questions: [
      {q:"Mt 1,1-17 nói về điều gì?",opts:["Thời thơ ấu Đức Giêsu","Gia phả Đức Giêsu","Biến cố Truyền Tin","Các tổ phụ Israel"],ans:"B"},
      {q:"Gia phả Đức Giêsu nhằm kể về điều gì nơi Đức Giêsu?",opts:["Thần tính của Ngài","Sứ vụ công khai","Nguồn gốc nhân tính","Phép lạ đầu tiên"],ans:"C"},
      {q:"Gia phả được chia thành bao nhiêu giai đoạn chính?",opts:["3","4","5","6"],ans:"A"},
      {q:"Giai đoạn thứ nhất kéo dài từ:",opts:["Ápraham đến Đavít","Đavít đến lưu đày","Lưu đày đến Đức Kitô","Môsê đến Đavít"],ans:"A"},
      {q:"Giai đoạn thứ hai kết thúc bằng biến cố nào?",opts:["Xuất Hành","Lên ngôi Đavít","Xây Đền Thờ","Lưu đày Babylon"],ans:"D"},
      {q:"Từ thời lưu đày đến Đức Kitô là bao nhiêu đời?",opts:["7","10","12","14"],ans:"D"},
      {q:"Con số 14 được cho là xuất phát từ tên ai?",opts:["Ápraham","Đavít","Giuse","Môsê"],ans:"B"},
      {q:"Người phụ nữ được nhắc đến gián tiếp qua cụm \"vợ của ông Urigia\" là ai?",opts:["Tama","Rakháp","Bátseva","Rút"],ans:"C"},
      {q:"Trong bản gia phả, có bao nhiêu phụ nữ được nhắc tới?",opts:["4","5","6","7"],ans:"B"},
      {q:"Đức Maria thuộc dòng Đavít qua ai?",opts:["Chính huyết thống của Mẹ","Tổ phụ Ápraham","Ông Giuse","Vua Đavít"],ans:"C"},
      {q:"Tên Ápraham gợi nhớ lời hứa nào?",opts:["Vương quyền trường tồn","Mọi dân tộc được chúc phúc","Xây Đền Thờ","Đất hứa Canaan"],ans:"B"},
      {q:"Việc Đấng Messiah xuất hiện sau thời lưu đày cho thấy:",opts:["Sự thất bại Israel","Hy vọng hồi sinh sau tan vỡ","Kết thúc lịch sử","Sự thay thế Israel"],ans:"B"},
      {q:"Trong 5 người phụ nữ, ai là người thuộc dân ngoại người Mô-áp?",opts:["Rút","Tama","Ra-kháp","Bátseva"],ans:"A"},
      {q:"Trong 5 người phụ nữ, ai là gái điếm?",opts:["Rút","Tama","Ra-kháp","Bátseva"],ans:"C"},
      {q:"Trong 5 người phụ nữ, ai đóng vai gái điếm để lập mưu kế có con với bố chồng?",opts:["Rút","Tama","Ra-kháp","Bátseva"],ans:"B"},
    ]
  },
  bai3: {
    title: "Bài 3: Truyền Tin cho Giuse",
    sub: "14 câu hỏi",
    questions: [
      {q:"Mt 1,18-25 thuật lại biến cố nào?",opts:["Truyền tin cho Đức Maria","Truyền tin cho ông Giuse","Đức Giêsu chịu phép rửa","Đức Giêsu sinh ra tại Bêlem"],ans:"B"},
      {q:"Khi phát hiện Maria có thai, ông Giuse đã định làm gì?",opts:["Tố giác Maria trước pháp luật","Công khai hủy hôn","Bỏ Maria cách kín đáo","Đưa Maria về nhà ngay"],ans:"C"},
      {q:"Hài nhi trong lòng Đức Maria được thụ thai do:",opts:["Quyền năng của Thiên Chúa Cha","Quyền năng Chúa Thánh Thần","Lời cầu nguyện của Giuse","Một phép lạ không xác định"],ans:"B"},
      {q:"Thiên thần truyền cho Giuse đặt tên con trẻ là gì?",opts:["Emmanuel","Đavít","Giacóp","Giêsu"],ans:"D"},
      {q:"Theo luật Do Thái, sau đính hôn khoảng bao lâu người nữ mới về nhà chồng?",opts:["6 tháng","3 tháng","1 năm","2 năm"],ans:"C"},
      {q:"Theo luật Do Thái, khi đã đính hôn thì hai người đã chính thức là vợ chồng. Đúng hay sai?",opts:["Đúng","Sai"],ans:"A"},
      {q:"Mt 1,16 khẳng định Đức Giêsu là con của ai?",opts:["Giuse","Maria","Đavít","Ápraham"],ans:"B"},
      {q:"Thiên thần gọi Đức Giêsu là \"Con Thiên Chúa\". Đúng hay sai?",opts:["Đúng","Sai"],ans:"B"},
      {q:"Theo bản văn Mt 1,18-25, Đức Giêsu là con của Giuse theo?",opts:["Huyết thống","Pháp luật","Dòng Lêvi","Truyền thống gia tộc"],ans:"B"},
      {q:"Dân Do Thái trông chờ một vị Kitô xuất thân từ nhà nào?",opts:["Ápraham","Môsê","Đavít","Salômôn"],ans:"C"},
      {q:"Tên \"Giêsu\" có nghĩa là gì?",opts:["Thiên Chúa ở cùng chúng ta","Đấng Cứu Độ","Con vua Đavít","Đấng được xức dầu"],ans:"B"},
      {q:"Ai là người đặt tên cho con trẻ là Giêsu?",opts:["Maria","Thiên thần","Các tư tế","Giuse"],ans:"D"},
      {q:"Mát-thêu mở đầu câu chuyện bằng cụm từ \"Sau đây là gốc tích Đức Giêsu\" nhằm mục đích gì?",opts:["Giới thiệu phép lạ đầu tiên của Đức Giêsu","Kể về nguồn gốc và căn tính của Đức Giêsu","Tường thuật lịch sử dân Israel","Giải thích phong tục Do Thái"],ans:"B"},
      {q:"Đoạn Mt 1,18-25 nói về nhân tính của Đức Giêsu. Đúng hay sai?",opts:["Đúng","Sai"],ans:"A"},
    ]
  }
};

let view = "menu"; // menu | quiz | result
let currentSet = null;
let current=0, selected=null, revealed=false, answers=[], showWrong=false;
const card = document.getElementById('main-card');
const subheader = document.getElementById('subheader');

function render(){
  if(view==="menu") renderMenu();
  else if(view==="quiz") renderQuiz();
  else renderResult();
}

function renderMenu(){
  subheader.textContent = "Chọn bài để bắt đầu";
  card.innerHTML = Object.entries(QUIZ_SETS).map(([key,set],i)=>`
    <button class="menu-item" onclick="startQuiz('${key}')">
      <div class="menu-num">${i+1}</div>
      <div class="menu-text">
        <div class="menu-title">${esc(set.title)}</div>
        <div class="menu-sub">${esc(set.sub)}</div>
      </div>
      <div class="menu-arrow">→</div>
    </button>
  `).join('');
}

function startQuiz(key){
  currentSet = key;
  current=0; selected=null; revealed=false; answers=[]; showWrong=false;
  view="quiz";
  subheader.textContent = QUIZ_SETS[key].title;
  render();
}

function renderQuiz(){
  const set = QUIZ_SETS[currentSet];
  const q = set.questions[current];
  const pct=Math.round((current/set.questions.length)*100);
  const optsHTML=q.opts.map((opt,i)=>{
    const label=LABELS[i];
    let cls='opt-btn', icon='';
    if(revealed){
      if(label===q.ans){cls+=' correct';icon='<span class="opt-icon">✓</span>';}
      else if(label===selected){cls+=' wrong';icon='<span class="opt-icon">✗</span>';}
    } else if(label===selected){ cls+=' selected-pending'; }
    return `<button class="${cls}" ${revealed?'disabled':''} onclick="handleAnswer('${label}')">
      <span class="opt-label">${label}</span><span>${esc(opt)}</span>${icon}
    </button>`;
  }).join('');

  const feedHTML=revealed?`<div class="feedback">
    <span class="feedback-badge ${selected===q.ans?'ok':'err'}">${selected===q.ans?'✓ Chính xác!':'✗ Đáp án đúng: '+q.ans}</span>
    <button class="btn-primary" onclick="handleNext()">${current+1<set.questions.length?'Câu tiếp theo →':'Xem kết quả'}</button>
  </div>`:'';

  card.innerHTML=`<div class="fade-in">
    <div class="btn-back-row"><button class="btn-back" onclick="goMenu()">← Chọn bài khác</button></div>
    <div class="progress-meta"><span>Câu ${current+1} / ${set.questions.length}</span><span>${pct}%</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-box">
      <div class="question-eyebrow">Câu hỏi ${current+1}</div>
      <p class="question-text">${esc(q.q)}</p>
    </div>
    <div class="options">${optsHTML}</div>
    ${feedHTML}
  </div>`;
}

function renderResult(){
  const set = QUIZ_SETS[currentSet];
  const score=answers.filter(a=>a.selected===a.ans).length;
  const pct=Math.round((score/set.questions.length)*100);
  const wrong=answers.filter(a=>a.selected!==a.ans);
  let medal='🥉',msg='Cần cố gắng thêm!',msgColor='#c0392b';
  if(pct>=90){medal='🏆';msg='Xuất sắc!';msgColor='#c9860c';}
  else if(pct>=70){medal='🥇';msg='Làm tốt lắm!';msgColor='#27ae60';}
  else if(pct>=50){medal='🥈';msg='Khá tốt!';msgColor='#2980b9';}

  const wBtn=wrong.length>0?`<button class="btn-outline" onclick="toggleWrong()">${showWrong?'Ẩn câu sai':'Xem '+wrong.length+' câu sai'}</button>`:'';
  const wList=showWrong?`<div id="wrong-list">`+wrong.map(w=>{
    const yi=LABELS.indexOf(w.selected),ai=LABELS.indexOf(w.ans);
    return `<div class="wrong-item">
      <div class="wrong-item-num">Câu ${w.idx}</div>
      <p class="wrong-item-q">${esc(w.q)}</p>
      <div class="wrong-item-yours">Bạn chọn: <b>${w.selected}</b> — ${esc(w.opts[yi])}</div>
      <div class="wrong-item-ans">Đáp án: <b>${w.ans}</b> — ${esc(w.opts[ai])}</div>
    </div>`;
  }).join('')+`</div>`:'';

  card.innerHTML=`<div class="result fade-in">
    <div class="result-medal">${medal}</div>
    <h2>Kết quả</h2>
    <p class="result-msg" style="color:${msgColor}">${msg}</p>
    <div class="result-score-box">
      <div><span class="result-number">${score}</span><span class="result-total">/${set.questions.length}</span></div>
      <div class="result-label">Trả lời đúng — ${pct}%</div>
      <div class="result-bar-track"><div class="result-bar-fill" style="width:${pct}%"></div></div>
    </div>
    ${wBtn}${wList}
    <div class="result-actions">
      <button class="btn-restart" onclick="startQuiz('${currentSet}')">Làm lại bài này</button>
      <button class="btn-restart" style="background:linear-gradient(135deg,#9a7a50,#b5855a)" onclick="goMenu()">Chọn bài khác</button>
    </div>
  </div>`;
}

function goMenu(){ view="menu"; render(); }

function handleAnswer(label){ if(revealed)return; selected=label; revealed=true; render(); }
function handleNext(){
  const set = QUIZ_SETS[currentSet];
  const q=set.questions[current];
  answers.push({idx:current+1,q:q.q,opts:q.opts,ans:q.ans,selected});
  if(current+1>=set.questions.length){ view="result"; subheader.textContent = set.title; }
  else{ current++; selected=null; revealed=false; }
  render();
}
function toggleWrong(){ showWrong=!showWrong; renderResult(); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

render();
</script>
</body>
</html>
