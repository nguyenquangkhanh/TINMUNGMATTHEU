đi","c":"Mà ném vào lửa","d":"Rồi lấy lửa đốt đi","ans":"B"},{"n":350,"q":"“Vậy, như người ta nhặt cỏ lùng … thế nào, thì đến ngày tận thế cũng sẽ xảy ra như vậy”. (Mt 13,40)","a":"Rồi quăng vào lửa","b":"Rồi ném vào lửa","c":"Mà vứt vào lửa","d":"Rồi lấy lửa đốt đi","ans":"D"},{"n":351,"q":"“Con Người sẽ sai các thiên thần của Người tập trung mọi kẻ làm gương mù gương xấu và mọi kẻ làm điều gian ác, mà…, rồi quăng chúng vào lò lửa; ở đó, chúng sẽ phải khóc lóc nghiến răng”. (Mt 13,41-42)","a":"Tống ra ngoài","b":"Trói lại","c":"Tống ra khỏi Nước của Người","d":"Tra tấn, đánh đập","ans":"C"},{"n":352,"q":"“Nước Trời giống như chuyện kho báu chôn giấu trong ruộng. Có người kia gặp được thì liền chôn giấu lại, rồi vui mừng… mà mua thửa ruộng ấy”. (Mt 13,44)","a":"Bán hết tài sản của mình","b":"Đi bán tất cả những gì mình có","c":"Đem bán tất cả tài sản","d":"Đem bán tất cả gia tài","ans":"B"},{"n":353,"q":"“Nước Trời lại cũng giống như chuyện một thương gia đi tìm ngọc đẹp. Tìm được một viên ngọc quý, ông ta ra đi, … mà mua viên ngọc ấy”. (Mt 13,45-46)","a":"Bán hết tài sản của mình","b":"Bán tất cả những gì mình có","c":"Đem bán tất cả tài sản","d":"Đem bán tất cả gia tài","ans":"B"},{"n":354,"q":"“Nước Trời lại còn giống như chuyện chiếc lưới thả xuống biển, gom được đủ thứ cá. Khi lưới đầy, người ta kéo lên bãi, rồi ngồi nhặt… cho vào giỏ, còn cá xấu thì vứt ra ngoài”. (Mt 13,47-48)","a":"Cá tốt","b":"Cá lớn","c":"Con nào tốt","d":"Con cá nào tốt","ans":"A"},{"n":355,"q":"“Các thiên thần sẽ xuất hiện và tách biệt kẻ xấu ra khỏi hàng ngũ…, rồi quăng chúng vào lò lửa. Ở đó, chúng sẽ phải khóc lóc nghiến răng”. (Mt 13,49-50)","a":"Các Thánh","b":"Người lành","c":"Người công chính","d":"Người tốt","ans":"C"},{"n":356,"q":"“Bởi vậy, bất cứ kinh sư nào đã được học hỏi về Nước Trời, thì cũng giống như chủ nhà kia lấy ra từ trong… cả cái mới lẫn cái cũ.” (Mt 13,52)","a":"Ngân hàng của mình","b":"Kho tàng của mình","c":"Kho của nhà mình","d":"Kho lẫm của mình","ans":"B"},{"n":357,"q":"“Ngôn sứ có bị rẻ rúng, thì cũng chỉ là ở… và trong gia đình mình mà thôi.” (Mt 13,57)","a":"Quê hương","b":"Chính quê hương mình","c":"Ngay chính quê hương","d":"Ngay tại quê hương mình","ans":"B"},{"n":358,"q":"“Người không làm nhiều phép lạ tại đó, vì…”. (Mt 13,58)","a":"Họ không có lòng tin","b":"Chẳng có tin","c":"Họ phản đối Người","d":"Họ không tin","ans":"D"},{"n":359,"q":"“Đức Giê-su bảo: “Họ không cần phải đi đâu cả,… hãy cho họ ăn.” (Mt 14,16)","a":"Anh em","b":"Các con","c":"Chính anh em","d":"Chính các con","ans":"C"},{"n":360,"q":"“Người cầm lấy năm cái bánh và hai con cá, ngước mắt lên trời, …, và bẻ ra, trao cho môn đệ. Và môn đệ trao cho dân chúng”. (Mt 14,19)","a":"Tạ ơn","b":"Dâng lời chúc tụng","c":"Dâng lời tạ ơn","d":"Tạ ơn Thiên Chúa","ans":"B"},{"n":361,"q":"“Khi thầy trò đã lên thuyền, thì gió lặng ngay. Những kẻ ở trong thuyền bái lạy Người và nói: “Quả thật Ngài là …!” (Mt 14,32-33)","a":"Con Thiên Chúa","b":"Đấng Thánh","c":"Con Đấng Tối Cao","d":"Thiên Chúa","ans":"A"},{"n":362,"q":"“Họ nài xin Người cho họ chỉ … thôi, và ai đã sờ vào thì đều được khỏi”. (Mt 14,36)","a":"Chạm vào Người","b":"Sờ vào Người","c":"Đến gần sờ vào Người","d":"Sờ vào tua áo của Người","ans":"D"},{"n":363,"q":"“Quả thế, Thiên Chúa dạy: Ngươi hãy thờ cha kính mẹ; kẻ nào nguyền rủa cha mẹ, thì…”. (Mt 15,4)","a":"Sẽ phải chết","b":"Sẽ bị án phạt đời đời","c":"Phải bị xử tử","d":"Thiên Chúa giáng phạt","ans":"C"},{"n":364,"q":"“Dân này tôn kính Ta bằng môi bằng miệng, còn… thì lại xa Ta”. (Mt 15,8)","a":"Lòng dạ","b":"Lòng chúng","c":"Lòng dạ của chúng","d":"Tâm hồn chúng","ans":"B"},{"n":365,"q":"“Chúng có thờ phượng Ta thì cũng vô ích, vì giáo lý chúng giảng dạy chỉ là...” (Mt 15,9)","a":"Giới luật phàm nhân","b":"Giáo huấn của người phàm","c":"Giáo huấn của phàm nhân","d":"Lời lẽ phàm nhân","ans":"A"},{"n":366,"q":"“Không phải cái vào miệng làm cho con người ra ô uế, nhưng…, cái đó mới làm cho con người ra ô uế.” (Mt 15,11)","a":"Cái từ lòng xuất ra","b":"Thứ từ lòng người xuất ra","c":"Cái từ miệng xuất ra","d":"Cái từ trong lòng","ans":"C"},{"n":367,"q":"“Đức Giê-su gọi các môn đệ lại mà nói: “Thầy … đám đông, vì họ ở luôn với Thầy đã ba ngày rồi và họ không có gì ăn”. (Mt 15,32)","a":"Thương","b":"Cảm thấy thương","c":"Lo cho","d":"Chạnh lòng thương","ans":"D"},{"n":368,"q":"“Đức Giê-su lại hỏi: “Còn anh em, anh em bảo Thầy là ai?” Ông Si-môn Phê-rô thưa: “Thầy là Đấng Ki-tô,...” (Mt 16,15-16)","a":"Con Thiên Chúa","b":"Con Thiên Chúa hằng sống","c":"Của Thiên Chúa","d":"Con Thiên Chúa tối cao","ans":"B"},{"n":369,"q":"“Này anh Si-môn con ông Giô-na, anh thật là người có phúc, vì không phải phàm nhân mặc khải cho anh điều ấy, nhưng là…, Đấng ngự trên trời”. (Mt 16,17)","a":"Cha của Thầy","b":"Cha Thầy","c":"Thiên Chúa Cha","d":"Thiên Chúa","ans":"A"},{"n":370,"q":"“Còn Thầy, Thầy bảo cho anh biết: anh là Phê-rô, nghĩa là Tảng Đá, trên tảng đá này, Thầy sẽ xây Hội Thánh của Thầy, và… sẽ không thắng nổi”. (Mt 16,18)","a":"Cửa hỏa ngục","b":"Quyền lực Âm Phủ","c":"Quyền lực tử thần","d":"Sức mạnh của tử thần","ans":"C"},{"n":371,"q":"“Thầy sẽ trao cho anh…: dưới đất, anh cầm buộc điều gì, trên trời cũng sẽ cầm buộc như vậy; dưới đất, anh tháo cởi điều gì, trên trời cũng sẽ tháo cởi như vậy.” (Mt 16,19)","a":"Chìa khoá Nước Trời","b":"Quyền trên các thần ô uế","c":"Mọi quyền năng","d":"Chìa khóa cửa trời","ans":"A"},{"n":372,"q":"“Từ lúc đó, Đức Giê-su Ki-tô bắt đầu tỏ cho các môn đệ biết: Người phải đi Giê-ru-sa-lem, phải chịu nhiều đau khổ do các kỳ mục, các thượng tế và kinh sư gây ra, rồi bị giết chết, và…”. (Mt 16,21)","a":"Ba ngày sau sẽ sống lại","b":"Đủ ba ngày sẽ sống lại","c":"Ngày thứ ba sẽ sống lại","d":"Khỏi ba ngày, sẽ sống lại","ans":"C"},{"n":373,"q":"“Xa-tan, lui lại đằng sau Thầy! …, vì tư tưởng của anh không phải là tư tưởng của Thiên Chúa, mà là của loài người.” (Mt 16,23)","a":"Anh cản lối Thầy","b":"Đừng cản Thầy","c":"Đừng phản đối Thầy","d":"Sao lại cản lối Thầy","ans":"A"},{"n":374,"q":"“Rồi Đức Giê-su nói với các môn đệ: “Ai muốn theo Thầy, …, vác thập giá mình mà theo”. (Mt 16,24)","a":"Hãy bỏ mình","b":"Hãy từ bỏ mình","c":"Phải từ bỏ mình","d":"Phải từ bỏ chính mình","ans":"D"},{"n":375,"q":"“Quả vậy, ai muốn cứu mạng sống mình, thì sẽ mất; … mạng sống mình vì Thầy, thì sẽ tìm được mạng sống ấy”. (Mt 16,25)","a":"Ai đành mất","b":"Còn ai liều mất","c":"Ai chấp nhận mất","d":"Còn ai chịu mất","ans":"B"},{"n":376,"q":"“Vì nếu người ta được cả thế giới mà phải thiệt mất mạng sống, thì…? Hoặc người ta sẽ lấy gì mà đổi mạng sống mình?” (Mt 16,26)","a":"Nào được ích gì","b":"Được ích gì","c":"Đâu có được ích gì","d":"Nào có lợi gì","ans":"D"},{"n":377,"q":"“Vì Con Người sẽ ngự đến trong vinh quang của Cha Người, cùng với các thiên thần của Người, và bấy giờ, Người sẽ thưởng phạt ai nấy…”. (Mt 16,27)","a":"Xứng việc họ làm","b":"Tùy theo việc họ làm","c":"Tùy việc họ làm","d":"Xứng với việc họ làm","ans":"A"},{"n":378,"q":"“Đây là Con yêu dấu của Ta, Ta hài lòng về Người. Các ngươi hãy…!” (Mt 17,5)","a":"Nghe lời Người","b":"Vâng lời Người","c":"Vâng nghe lời Người","d":"Tuân lệnh Người","ans":"C"},{"n":379,"q":"“Con Người sắp bị nộp vào tay người đời, họ sẽ giết chết Người, và ngày thứ ba...” (Mt 17,22-23)","a":"Sẽ sống lại","b":"Người sẽ trỗi dậy","c":"Sẽ trỗi dậy","d":"Người sẽ sống lại","ans":"B"},{"n":380,"q":"“Thầy bảo thật anh em: nếu anh em không trở lại mà…, thì sẽ chẳng được vào Nước Trời”. (Mt 18,3)","a":"Thay đổi đời sống","b":"Ăn năn thống hối","c":"Nên như trẻ nhỏ","d":"Ăn chay khóc lóc","ans":"C"},{"n":381,"q":"“Vậy ai tự hạ, coi mình như em nhỏ này, người ấy sẽ là…”. (Mt 18,4)","a":"Người lớn nhất Nước Trời","b":"Người cao trọng trong Nước Trời","c":"Người lớn trong Nước Trời","d":"Người lớn nhất","ans":"A"},{"n":382,"q":"“Nhưng ai làm cớ cho một trong những kẻ bé mọn đang tin Thầy đây phải sa ngã, thì thà treo cối đá lớn vào cổ nó mà… còn hơn”. (Mt 18,6)","a":"Ném xuống biển","b":"Xô xuống đáy biển","c":"Đẩy xuống biển","d":"Xô cho chìm xuống đáy biển","ans":"D"},{"n":383,"q":"“Nếu tay hoặc chân anh làm cớ cho anh sa ngã, thì hãy chặt mà ném đi; thà cụt tay cụt chân mà…, còn hơn là có đủ hai tay hai chân mà bị ném vào lửa đời đời”. (Mt 18,8)","a":"Được vào Nước Trời","b":"Được vào thiên đàng","c":"Được vào cõi sống","d":"Được vào Nước Thiên Chúa","ans":"C"},{"n":384,"q":"“Nếu mắt anh làm cớ cho anh sa ngã, thì hãy móc mà ném đi; thà chột mắt mà …, còn hơn là có đủ hai mắt mà bị ném vào lửa hoả ngục”. (Mt 18,9)","a":"Được vào Nước Trời","b":"Được vào thiên đàng","c":"Được vào cõi sống","d":"Được vào Nước Thiên Chúa","ans":"C"},{"n":385,"q":"“Anh em hãy coi chừng, …trong những kẻ bé mọn này; quả thật, Thầy nói cho anh em biết: các thiên thần của họ ở trên trời không ngừng chiêm ngưỡng nhan Cha Thầy, Đấng ngự trên trời”. (Mt 18,10)","a":"Chớ khinh một ai","b":"Đừng ức hiếp một ai","c":"Chớ bát nạt một ai","d":"Đừng coi thường một ai","ans":"A"},{"n":386,"q":"“Cũng vậy, Cha của anh em, Đấng ngự trên trời, không muốn cho một ai trong những kẻ bé mọn này…”. (Mt 18,14)","a":"Phải tiêu vong","b":"Bị diệt vong","c":"Phải hư mất","d":"Phải bị diệt vong","ans":"C"},{"n":387,"q":"“Thầy bảo thật anh em: Dưới đất, anh em cầm buộc những điều gì, trên trời cũng…; dưới đất, anh em tháo cởi những điều gì, trên trời cũng tháo cởi như vậy”. (Mt 18,18)","a":"Cầm buộc","b":"Cầm buộc thể ấy","c":"Cầm buộc như thế","d":"Cầm buộc như vậy","ans":"D"},{"n":388,"q":"“Thầy còn bảo thật anh em: Nếu ở dưới đất, hai người trong anh em… bất cứ điều gì, thì Cha Thầy, Đấng ngự trên trời, sẽ ban cho”. (Mt 18,19)","a":"Cùng xin","b":"Hợp lời cầu xin","c":"Cầu xin","d":"Cùng cầu xin","ans":"B"},{"n":389,"q":"“Vì ở đâu có hai ba người họp lại…, thì có Thầy ở đấy, giữa họ.” (Mt 18,20)","a":"Nhân danh Cha Thầy","b":"Nhân danh Cha của Thầy","c":"Nhân danh Thầy","d":"Nhân danh Chúa Cha","ans":"C"},{"n":390,"q":"‘Tên đầy tớ độc ác kia, ta đã tha hết số nợ ấy cho ngươi, vì ngươi đã van xin ta, thì đến lượt ngươi, ngươi không phải thương xót đồng bạn, như… ngươi sao?’ (Mt 18,32-33)","a":"Ta đã thương xót","b":"Chính ta đã thương xót","c":"Chúng ta đã thương xót","d":"Đồng bạn đã thương xót","ans":"B"},{"n":391,"q":"“Ấy vậy, Cha của Thầy ở trên trời cũng sẽ đối xử với anh em như thế, nếu mỗi người trong anh em không… cho anh em mình.” (Mt 18,35)","a":"Hết lòng tha thứ","b":"Tha thứ","c":"Chấp nhận tha thứ","d":"Bằng lòng tha thứ","ans":"A"},{"n":392,"q":"‘Thuở ban đầu, Đấng Tạo Hoá đã làm ra con người có nam có nữ’, và Người đã phán: ‘Vì thế, người ta sẽ lìa cha mẹ mà gắn bó với vợ mình, và cả hai sẽ thành...’ (Mt 19,4-5)","a":"Một gia đình","b":"Một xương một thịt","c":"Một cặp vợ chồng","d":"Một đôi vợ chồng","ans":"B"},{"n":393,"q":"Vậy, sự gì Thiên Chúa đã phối hợp, loài người...” (Mt 19,6)","a":"Không được phép phân ly","b":"Không tự ý phân ly","c":"Không được phân ly","d":"Không được chia lìa","ans":"C"},{"n":394,"q":"“Vì các ông lòng chai dạ đá, nên ông Mô-sê đã cho phép các ông rẫy vợ, chứ thuở ban đầu,…”. (Mt 19,8)","a":"Không có thế đâu","b":"Không như vậy","c":"Không được phân ly","d":"Không được phép","ans":"A"},{"n":395,"q":"“Tôi nói cho các ông biết: Ngoại trừ trường hợp hôn nhân bất hợp pháp, ai rẫy vợ mà cưới vợ khác là...” (Mt 19,9)","a":"Kẻ ngoại tình","b":"Mắc tội ngoại tình","c":"Đi ngoại tình","d":"Phạm tội ngoại tình","ans":"D"},{"n":396,"q":"“Cứ để trẻ em đến với Thầy, …, vì Nước Trời là của những ai giống như chúng.” (Mt 19,14)","a":"Đừng ngăn cấm chúng","b":"Đừng cản chúng","c":"Đừng xua đuổi chúng","d":"Đừng đe dọa chúng","ans":"A"},{"n":397,"q":"“Thưa Thầy, tôi… để được hưởng sự sống đời đời?” (Mt 19,16)","a":"Phải làm gì","b":"Phải làm điều gì tốt","c":"Sẽ làm gì","d":"Nên làm gì","ans":"B"},{"n":398,"q":"“Nếu anh muốn nên hoàn thiện, thì hãy đi bán tài sản của anh và đem cho người nghèo, anh sẽ được... Rồi hãy đến theo tôi.” (Mt 19,21)","a":"Thảnh thơi","b":"Thanh thỏa","c":"Một kho tàng trên trời","d":"Yên hàn","ans":"C"},{"n":399,"q":"“Thầy còn nói cho anh em biết: con lạc đà chui qua lỗ kim còn dễ hơn …vào Nước Thiên Chúa.” (Mt 19,24)","a":"Kẻ giàu có","b":"Kẻ lắm của","c":"Người giàu có","d":"Người giàu","ans":"D"},{"n":400,"q":"“Và phàm ai bỏ nhà cửa, anh em, chị em, cha mẹ, con cái hay ruộng đất, vì danh Thầy, thì sẽ được gấp bội và còn được… làm gia nghiệp”. (Mt 19,29)","a":"Sự sống đời đời","b":"Sự sống vĩnh cửu","c":"Sự sống đời sau","d":"Nước Trời","ans":"B"},{"n":401,"q":"“Nhiều kẻ đứng đầu sẽ phải xuống hàng chót, và… sẽ được lên hàng đầu.” (Mt 19,30)","a":"Nhiều kẻ đứng chót","b":"Kẻ đứng chót","c":"Kẻ sau hết","d":"Kẻ đứng rốt hết","ans":"A"},{"n":402,"q":"“Thế là những kẻ đứng chót sẽ được…, còn những kẻ đứng đầu sẽ phải xuống hàng chót”. (Mt 20,16)","a":"Đứng hàng đầu","b":"Ngồi lên hàng đầu","c":"Đứng lên hàng đầu","d":"Lên hàng đầu","ans":"D"},{"n":403,"q":"“Anh em biết: thủ lãnh các dân thì dùng uy mà…, những người làm lớn thì lấy quyền mà cai quản dân”. (Mt 20,25)","a":"Thống trị dân","b":"Cai quản dân","c":"Cai trị dân","d":"Đe dọa dân","ans":"A"},{"n":404,"q":"“Giữa anh em thì không được như vậy: Ai muốn làm lớn giữa anh em, thì phải… anh em”. (Mt 20,26)","a":"Phục vụ","b":"Hầu hạ","c":"Làm người phục vụ","d":"Trở nên người hầu hạ","ans":"C"},{"n":405,"q":"“Và ai muốn làm đầu anh em thì phải… anh em”. (Mt 20,27)","a":"Trở nên người phục vụ","b":"Làm đầy tớ","c":"Phục vụ","d":"Hầu hạ","ans":"B"},{"n":406,"q":"“Cũng như Con Người đến không phải để được người ta phục vụ, nhưng là để phục vụ và… làm giá chuộc muôn người.” (Mt 20,28)","a":"Hy sinh","b":"Hiến dâng thân mình","c":"Hy sinh thân mình","d":"Hiến dâng mạng sống","ans":"D"},{"n":407,"q":"“Lạy Ngài, lạy Con vua Đa-vít,… chúng tôi !” (Mt 20,31)","a":"Xin thương xót","b":"Xin rủ lòng thương","c":"Hãy rủ lòng thương","d":"Xin thương","ans":"B"},{"n":408,"q":"“Họ thưa: “Lạy Ngài, xin cho mắt chúng tôi…!” (x. Mt 20,33)","a":"Được thấy","b":"Thấy được","c":"Được mở ra","d":"Được nhìn thấy","ans":"C"},{"n":409,"q":"“Hãy bảo thiếu nữ Xi-on: Kìa… đang đến với ngươi hiền hậu ngồi trên lưng lừa, lưng lừa con, là con của một con vật chở đồ”. (Mt 21,5)","a":"Đức Vua của ngươi","b":"Đức vua dân Do-thái","c":"Vua dân Do-thái","d":"Vua của ngươi","ans":"A"},{"n":410,"q":"“Dân chúng, người đi trước, kẻ theo sau, reo hò vang dậy: Hoan hô Con vua Đa-vít! Chúc tụng…! Hoan hô trên các tầng trời”. (Mt 21,9)","a":"Vua Ít-ra-en","b":"Đấng nhân danh Chúa mà đến","c":"Đấng ngự đến nhân danh Đức Chúa","d":"Đức vua của Ít-ra-en","ans":"C"},{"n":411,"q":"“Dân chúng trả lời: “…, người Na-da-rét, xứ Ga-li-lê đấy.” (Mt 21,11)","a":"Ngôn sứ Giê-su","b":"Ông Giê-su","c":"Chính ông Giê-su","d":"Đức Giê-su","ans":"A"},{"n":412,"q":"“Đã có lời chép rằng:… sẽ được gọi là nhà cầu nguyện, thế mà các ngươi lại biến thành sào huyệt của bọn cướp.” (Mt 21,13)","a":"Nhà Ta","b":"Nhà Cha Ta","c":"Nhà của Ta","d":"Nhà của Cha Ta","ans":"A"},{"n":413,"q":"“Ngài sẽ cho miệng con thơ trẻ nhỏ…” (Mt 21,16)","a":"Cất tiếng ngợi khen Ngài","b":"Vang tiếng ngợi khen Ngài","c":"Ca hát ngợi khen Ngài","d":"Cất tiếng ngợi khen","ans":"D"},{"n":414,"q":"“Thầy bảo thật anh em, nếu anh em tin và…, thì chẳng những anh em làm được điều Thầy vừa làm cho cây vả, mà hơn nữa” (Mt 21,21)","a":"Chẳng chút nghi nan","b":"Xác tín như vậy","c":"Không chút nghi nan","d":"Không chút nghi ngờ","ans":"C"},{"n":415,"q":"“Tất cả những gì anh em… khi cầu nguyện, thì anh em sẽ được.” (Mt 21,22)","a":"Tha thiết vài nài","b":"Lấy lòng tin mà xin","c":"Làm vì lòng tin","d":"Tha thiết nài xin","ans":"B"},{"n":416,"q":"“Kinh Thánh có câu: Tảng đá thợ xây nhà loại bỏ lại trở nên... Đó chính là công trình của Chúa, công trình kỳ diệu trước mắt chúng ta”. (Mt 21,42)","a":"Viên đá góc tường","b":"Tảng đá góc tường","c":"Đá tảng góc tường","d":"Viên đá góc","ans":"C"},{"n":417,"q":"“Bởi đó, tôi nói cho các ông hay: Nước Thiên Chúa, Thiên Chúa sẽ lấy đi không cho các ông nữa, mà ban cho một dân biết làm cho Nước ấy…”. (Mt 21,43)","a":"Sinh hoa kết trái","b":"Ngày càng thịnh vượng","c":"Sinh nhiều hoa trái","d":"Sinh hoa lợi","ans":"D"},{"n":418,"q":"“Ai ngã xuống đá này, kẻ ấy sẽ tan xương; đá này…, sẽ làm người ấy nát thịt.” (Mt 21,44)","a":"Rơi trúng ai","b":"Rơi xuống ai","c":"Rơi vào ai","d":"Rơi phải người nào","ans":"A"},{"n":419,"q":"“Quả thế, trong ngày sống lại, người ta chẳng lấy vợ lấy chồng, nhưng sẽ giống như… trên trời”. (Mt 22,30)","a":"Các phẩm thiên thần","b":"Các thiên thần","c":"Thiên thần","d":"Các thần thánh","ans":"B"},{"n":420,"q":"“Người phán: Ta là Thiên Chúa của Áp-ra-ham, Thiên Chúa của I-xa-ác và Thiên Chúa của Gia-cóp. Người không phải là Thiên Chúa của kẻ chết, nhưng là...” (Mt 22,32)","a":"Đấng Hằng Sống","b":"Thiên Chúa của kẻ sống","c":"Của kẻ sống","d":"Chủ của sự sống","ans":"C"},{"n":421,"q":"“Đức Giê-su đáp: “Ngươi phải yêu mến Đức Chúa, Thiên Chúa của ngươi, hết lòng, hết linh hồn và hết trí khôn ngươi. Đó là điều răn quan trọng nhất và…”. (Mt 22,37-38)","a":"Là điều răn đứng đầu","b":"Là điều răn hàng đầu","c":"Ý nghĩa nhất","d":"Điều răn thứ nhất","ans":"D"},{"n":422,"q":"“Còn điều răn thứ hai, cũng giống điều răn ấy, là: ngươi phải… như chính mình”. (Mt 22,39)","a":"Yêu tha nhân","b":"Yêu người thân cận","c":"Yêu anh em","d":"Yêu hết mọi người","ans":"B"},{"n":423,"q":"“Đức Chúa phán cùng Chúa Thượng tôi: bên hữu Cha đây, Con lên ngự trị, để rồi bao địch thù, Cha sẽ…?” (Mt 22,44)","a":"Làm bệ dưới chân Con","b":"Đặt làm bệ dưới chân Con","c":"Bắt quy phục dưới chân Con","d":"Đặt dưới chân Con","ans":"D"},{"n":424,"q":"“Vậy, tất cả những gì họ nói, anh em hãy làm, hãy giữ, còn những việc họ làm, thì…, vì họ nói mà không làm”. (Mt 23,3)","a":"Chớ có làm theo","b":"Đừng có làm theo","c":"Đừng làm theo họ","d":"Chớ làm theo","ans":"B"},{"n":425,"q":"“Họ bó những gánh nặng mà chất lên vai người ta, nhưng chính họ thì lại không buồn…”. (Mt 23,4)","a":"Đếm xỉa tới","b":"Đụng tới","c":"Chạm tay vào","d":"Động ngón tay vào","ans":"D"},{"n":426,"q":"“Phần anh em, thì đừng để ai gọi mình là ‘ráp-bi’, nghĩa là thầy, vì anh em chỉ có một Thầy; còn tất cả anh em đều là…”. (Mt 23,8)","a":"Con cùng một Cha","b":"Con của Cha trên trời","c":"Anh em với nhau","d":"Anh em cùng một Cha","ans":"C"},{"n":427,"q":"“Anh em cũng đừng gọi ai dưới đất này là cha của anh em, vì anh em chỉ có một Cha là…”. (Mt 23,9)","a":"Cha trên trời","b":"Đấng ngự trên trời","c":"Chúa tể trời đất","d":"Thiên Chúa","ans":"A"},{"n":428,"q":"“Anh em cũng đừng để ai gọi mình là người lãnh đạo, vì anh em chỉ có một vị lãnh đạo, là…”. (Mt 23,10)","a":"Đấng tạo thành","b":"Đức Ki-tô","c":"Thiên Chúa Cha","d":"Cha của Thầy","ans":"B"},{"n":429,"q":"“Trong anh em, người làm lớn hơn cả, phải làm người…”. (Mt 23,11)","a":"Phục vụ anh em","b":"Đầy tớ của anh em","c":"Nhỏ nhất trong anh em","d":"Hầu hạ anh em","ans":"A"},{"n":430,"q":"“Ai tôn mình lên, sẽ bị hạ xuống; còn ai…, sẽ được tôn lên”. (Mt 23,12)","a":"Tự hạ mình xuống","b":"Khiêm nhường","c":"Hạ mình xuống","d":"Khiêm tốn","ans":"C"},{"n":431,"q":"“Các người nộp thuế thập phân về bạc hà, thì là, rau húng, mà bỏ những điều quan trọng nhất trong Lề Luật là công lý, lòng nhân và…”. (Mt 23,23)","a":"Sự thành tín","b":"Lòng thành tín","c":"Sự chân thành","d":"Thành tín","ans":"D"},{"n":432,"q":"“Quân dẫn đường mù quáng! Các người lọc con muỗi, nhưng lại…”. (Mt 23,24)","a":"Nuốt chửng con lạc đà","b":"Nuốt con lạc đà","c":"Bỏ qua con lạc đà","d":"Ăn thịt con lạc đà","ans":"B"},{"n":433,"q":"“Các người rửa sạch bên ngoài chén đĩa, nhưng bên trong thì đầy những chuyện cướp bóc và…”. (Mt 23,25)","a":"Ăn chơi vô độ","b":"Ăn chơi trác táng","c":"Lối sống vô luân","d":"Chè chén say sưa","ans":"A"},{"n":434,"q":"“Các người cũng vậy, bên ngoài thì có vẻ công chính trước mặt thiên hạ, nhưng bên trong toàn là… và gian ác!” (Mt 23,28)","a":"Thối tha","b":"Giả hình","c":"Xấu xa","d":"Những việc xấu xa","ans":"B"},{"n":435,"q":"“Đã bao lần Ta muốn tập hợp con cái ngươi lại, như gà mẹ tập hợp gà con dưới cánh, mà các ngươi…”. (Mt 23,37)","a":"Từ chối","b":"Bỏ ngoài tai","c":"Không chịu","d":"Chẳng đoái hoài","ans":"C"},{"n":436,"q":"“Thật vậy, Ta nói cho các ngươi hay, từ nay các ngươi sẽ không còn thấy Ta nữa, cho đến khi các ngươi nói: Chúc tụng Đấng ngự đến…!” (Mt 23,39)","a":"Nhân danh Chúa","b":"Trên cõi trời cao","c":"Từ trời cao thẳm","d":"Nhân danh Đức Chúa","ans":"D"},{"n":437,"q":"“Anh em hãy coi chừng, đừng để ai lừa gạt anh em, vì sẽ có nhiều kẻ mạo danh Thầy đến nói rằng: ‘Chính Ta đây là..., và họ sẽ lừa gạt được nhiều người”. (Mt 24,4-5)","a":"Đấng Cứu Thế","b":"Đấng giải thoát ngươi","c":"Đấng Ki-tô","d":"Thiên Chúa thật","ans":"C"},{"n":438,"q":"“Anh em sẽ nghe có giặc giã và tin đồn giặc giã; coi chừng,…, vì những việc đó phải xảy ra, nhưng chưa phải là tận cùng”. (Mt 24,6)","a":"Đừng khiếp sợ","b":"Đừng sợ hãi","c":"Đừng có tin","d":"Đừng quá lo lắng","ans":"A"},{"n":439,"q":"“Sẽ có những cơn đói kém, và những trận động đất ở nhiều nơi. Nhưng tất cả những sự việc ấy chỉ là khởi đầu…”. (Mt 24,7-8)","a":"Mà thôi","b":"Của ngày tận thế","c":"Các cơn đau đớn","d":"Của ngày chung thẩm","ans":"C"},{"n":440,"q":"“Bấy giờ, người ta sẽ nộp anh em, khiến anh em phải khốn quẫn, và người ta sẽ giết anh em; anh em sẽ bị mọi dân tộc thù ghét vì…”. (Mt 24,9)","a":"Sống công chính","b":"Sống theo lời Thầy","c":"Đã tin vào Thầy","d":"Danh Thầy","ans":"D"},{"n":441,"q":"“Bấy giờ sẽ có nhiều người vấp ngã. Người ta sẽ nộp nhau và thù ghét nhau. Sẽ có nhiều… xuất hiện và lừa gạt được nhiều người”. (Mt 24,10-11)","a":"Ngôn sứ","b":"Ngôn sứ giả","c":"Ki-tô giả","d":"Tiên tri giả","ans":"B"},{"n":442,"q":"“Vì tội ác gia tăng, nên lòng yêu mến của nhiều người sẽ nguội đi. Nhưng kẻ nào…, kẻ ấy sẽ được cứu thoát”. (Mt 24,12-13)","a":"Bền đỗ đến cùng","b":"Kiên tâm chịu đựng","c":"Bền chí đến cùng","d":"Tin vào danh Thầy","ans":"C"},{"n":443,"q":"“Tin Mừng này về Vương Quốc sẽ được loan báo trên khắp thế giới, để làm chứng cho... Và bấy giờ sẽ là tận cùng.” (Mt 24,14)","a":"Mọi dân tộc được biết","b":"Muôn dân được biết","c":"Mọi người được biết","d":"Hết thảy mọi người","ans":"A"},{"n":444,"q":"“Bấy giờ, nếu có ai bảo anh em: ‘Này, Đấng Ki-tô ở đây’ hoặc ‘ở đó’, thì anh em…”. (Mt 24,23)","a":"Cứ tin","b":"Hãy tin","c":"Chớ có tin","d":"Đừng tin","ans":"D"},{"n":445,"q":"“Thật vậy, sẽ có những Ki-tô giả và ngôn sứ giả xuất hiện, đưa ra những dấu lạ lớn lao và những điềm thiêng, đến nỗi chúng… cả những người đã được tuyển chọn, nếu có thể”. (Mt 24,24)","a":"Uy hiếp","b":"Lừa gạt","c":"Đe dọa","d":"Dụ dỗ","ans":"B"},{"n":446,"q":"“Vậy, nếu người ta bảo anh em ‘Này, Người ở trong hoang địa’, anh em chớ ra đó; ‘Kìa, Người ở trong phòng kín’, anh em cũng…”. (Mt 24,26)","a":"Đừng đi theo","b":"Chớ có vào","c":"Đừng tin","d":"Đừng đi xem","ans":"C"},{"n":447,"q":"“Vì, như chớp loé ra từ phương đông và chiếu sáng đến phương tây thế nào, thì… của Con Người cũng sẽ như vậy”. (Mt 24,27)","a":"Ngày quang lâm","b":"Giờ","c":"Ngày","d":"Cuộc quang lâm","ans":"D"},{"n":448,"q":"“Bấy giờ mọi chi tộc trên mặt đất sẽ đấm ngực và sẽ thấy Con Người rất… ngự giá mây trời mà đến”. (Mt 24,30)","a":"Uy nghi vinh hiển","b":"Oai hùng","c":"Uy hùng","d":"Oai phong vinh hiển","ans":"A"},{"n":449,"q":"“Cũng vậy, khi thấy tất cả những điều đó, anh em hãy biết là Con Người đã đến gần,…”. (Mt 24,33)","a":"Ngài ở ngay bên","b":"Ở ngay ngoài cửa rồi","c":"Ngài đang ở đây rồi","d":"Hãy tin như vậy","ans":"B"},{"n":450,"q":"“Trời đất sẽ qua đi, nhưng… sẽ chẳng qua đâu”. (Mt 24,35)","a":"Lời Thầy","b":"Điều Thầy nói","c":"Lời Thầy truyền dạy","d":"Những lời Thầy nói","ans":"D"},{"n":451,"q":"“Còn về ngày và giờ đó thì không ai biết được, ngay cả các thiên sứ trên trời hay cả người Con cũng không; … Chúa Cha biết mà thôi”. (Mt 24,36)","a":"Duy chỉ có","b":"Chỉ mình","c":"Chỉ một mình","d":"Chỉ có","ans":"C"},{"n":452,"q":"“Vậy anh em hãy…, vì anh em không biết ngày nào Chúa của anh em đến”. (Mt 24,42)","a":"Tỉnh thức","b":"Canh thức","c":"Sẵn sàng","d":"Cả A và C","ans":"B"},{"n":453,"q":"“Anh em hãy biết điều này: nếu chủ nhà biết… kẻ trộm sẽ đến, hẳn ông đã thức, không để nó khoét vách nhà mình đâu”. (Mt 24,43)","a":"Vào canh nào","b":"Lúc nào","c":"Khi nào","d":"Chắc khi nào","ans":"A"},{"n":454,"q":"“Cho nên anh em cũng vậy, anh em hãy sẵn sàng, vì chính giờ phút anh em…, thì Con Người sẽ đến”. (Mt 24,44)","a":"Đang ngủ","b":"Coi thường","c":"Không ngờ","d":"Lơ là","ans":"C"},{"n":455,"q":"“Vậy anh em hãy…, vì anh em không biết ngày nào, giờ nào”. (Mt 25,13)","a":"Tỉnh thức","b":"Canh thức","c":"Sẵn sàng","d":"Cả A và C","ans":"B"},{"n":456,"q":"“Vì phàm ai đã có, thì được cho thêm và…; còn ai không có, thì ngay cái đang có, cũng sẽ bị lấy đi”. (Mt 25,29)","a":"Nhiều thêm mãi","b":"Được dư thừa","c":"Được dư dật","d":"Sẽ có dư thừa","ans":"D"},{"n":457,"q":"“‘Ta bảo thật các ngươi: mỗi lần các ngươi làm như thế cho một trong những …của Ta đây, là các ngươi đã làm cho chính Ta vậy.’ (Mt 25,40)","a":"Người anh em","b":"Anh em bé nhỏ nhất","c":"Người bé mọn","d":"Người bé mọn nhất","ans":"B"},{"n":458,"q":"“Người nghèo thì lúc nào anh em cũng có với anh em; còn Thầy, thì không phải lúc nào…!” (Mt 26,11)","a":"Anh em cũng có đâu","b":"Cũng ở bên anh em đâu","c":"Anh em cũng gặp đâu","d":"Anh em cũng thấy đâu","ans":"A"},{"n":459,"q":"“Các anh đi vào thành, đến nhà một người kia và nói với ông ấy: ‘Thầy nhắn:…, Thầy sẽ đến nhà ông để ăn mừng lễ Vượt Qua với các môn đệ của Thầy.’” (Mt 26,18)","a":"Này ông","b":"Này đây","c":"Thời của Thầy đã gần tới","d":"Nội trong hôm nay","ans":"C"},{"n":460,"q":"“Đang bữa ăn, Người nói: “Thầy bảo thật anh em, một người trong anh em sẽ...” (Mt 26,21)","a":"Bán đứng Thầy","b":"Nộp Thầy","c":"Phản bội Thầy","d":"Phản Thầy","ans":"B"},{"n":461,"q":"“Cũng trong bữa ăn, Đức Giê-su cầm lấy bánh,…, rồi bẻ ra, trao cho môn đệ và nói: “Anh em cầm lấy mà ăn, đây là mình Thầy.” (Mt 26,26)","a":"Dâng lời tạ ơn","b":"Ngước mắt lên trời","c":"Dâng lời chúc tụng","d":"Chúc tụng Thiên Chúa","ans":"C"},{"n":462,"q":"“Tất cả anh em hãy uống chén này, vì đây là máu Thầy, máu Giao Ước, đổ ra cho… được tha tội”. (Mt 26,27-28)","a":"Nhiều người","b":"Hết mọi người","c":"Muôn dân","d":"Muôn người","ans":"D"},{"n":463,"q":"“Thầy bảo cho anh em biết: từ nay, Thầy không còn uống thứ sản phẩm này của cây nho, cho đến ngày Thầy cùng anh em uống thứ rượu mới trong ...” (Mt 26,29)","a":"Nước Thiên Chúa","b":"Nước của Cha Thầy","c":"Nước Trời","d":"Vương quốc của Cha Thầy","ans":"B"},{"n":464,"q":"“Đêm nay tất cả anh em sẽ vấp ngã vì Thầy. Vì có lời đã chép: Ta sẽ đánh người chăn chiên, và… sẽ tan tác”. (Mt 26,31)","a":"Đàn chiên","b":"Cả đàn chiên","c":"Cả chủ chiên và chiên","d":"Chúng","ans":"A"},{"n":465,"q":"“Ông Phê-rô liền thưa: “Dầu tất cả có vấp ngã vì Thầy đi nữa, thì con đây cũng… vấp ngã.” (Mt 26,33)","a":"Không bao giờ","b":"Chẳng bao giờ","c":"Không đời nào","d":"Chẳng khi nào","ans":"B"},{"n":466,"q":"“Đức Giê-su bảo ông: “Thầy bảo thật anh: nội đêm nay,…, thì anh đã chối Thầy ba lần.” (Mt 26,34)","a":"Khi gà chưa gáy","b":"Gà chưa gáy lần thứ ba","c":"Gà gáy lần thứ ba","d":"Gà chưa kịp gáy","ans":"D"},{"n":467,"q":"“Bấy giờ Người nói với các ông: “Tâm hồn Thầy buồn đến chết được. Anh em ở lại đây mà… với Thầy.” (Mt 26,38)","a":"Thức","b":"Cùng cầu nguyện","c":"Canh thức","d":"Cùng canh thức","ans":"C"},{"n":468,"q":"“Lạy Cha, nếu có thể được, xin cho con khỏi phải uống chén này. Tuy vậy,…, mà xin theo ý Cha.” (Mt 26,39)","a":"Đừng theo ý con","b":"Xin đừng theo ý con","c":"Xin Cha đừng theo ý con","d":"Con không xin theo ý con","ans":"B"},{"n":469,"q":"“Thế ra anh em không thể… với Thầy một giờ sao?” (Mt 26,40)","a":"Canh thức nổi","b":"Canh thức","c":"Thức nổi","d":"Thức","ans":"A"},{"n":470,"q":"“Anh em hãy canh thức và cầu nguyện, để khỏi lâm vào cơn cám dỗ. Vì tinh thần thì…, nhưng thể xác lại...” (Mt 26,41)","a":"Hăng say/ yếu hèn","b":"Hăng hái/ yếu đuối","c":"Mạnh mẽ/ yếu hèn","d":"Hăng say/ yếu đuối","ans":"A"},{"n":471,"q":"“Này, đến giờ Con Người bị nộp vào tay... Đứng dậy, ta đi nào! Kìa kẻ nộp Thầy đã tới !” (Mt 26,45-46)","a":"Quân tội lỗi","b":"Bọn người tội lỗi","c":"Những kẻ tội lỗi","d":"Người đời","ans":"C"},{"n":472,"q":"“Đức Giê-su bảo người ấy: “Hãy xỏ gươm vào vỏ, vì tất cả những ai cầm gươm sẽ…”. (Mt 26,52)","a":"Bị chết vì gươm","b":"Chết vì gươm","c":"Chịu chết vì gươm","d":"Mất mạng vì gươm","ans":"B"},{"n":473,"q":"“Từ nay, các ông sẽ thấy Con Người ngự bên hữu… và ngự giá mây trời mà đến.” (Mt 26,64)","a":"Thiên Chúa","b":"Chúa Cha","c":"Đức Vua","d":"Đấng Toàn Năng","ans":"D"},{"n":474,"q":"“Ông Phê-rô sực nhớ lời Đức Giê-su đã nói: “…thì anh đã chối Thầy ba lần.” Ông ra ngoài, khóc lóc thảm thiết”. (Mt 26,75)","a":"Trước khi gà gáy","b":"Khi gà gáy lần thứ ba","c":"Gà chưa kịp gáy","d":"Khi gà chưa gáy lần thứ ba","ans":"C"},{"n":475,"q":"“Phía trên đầu Người, chúng đặt bản án xử tội viết rằng: “Người này là Giê-su,…” (Mt 27,37)","a":"Vua Do-thái","b":"Vua dân Do-thái","c":"Vua người Do-thái","d":"Đức vua dân Do-thái","ans":"B"},{"n":476,"q":"“Này các bà, các bà đừng sợ! Tôi biết các bà tìm Đức Giê-su, Đấng bị đóng đinh. Người không có ở đây, vì… như Người đã nói”. (Mt 28,5-6)","a":"Người đã trỗi dậy","b":"Người đã lên trời","c":"Người đã sống lại","d":"Người đã phục sinh","ans":"A"},{"n":477,"q":"“Người đã trỗi dậy từ cõi chết, và Người đi Ga-li-lê trước các ông. Ở đó, các ông sẽ được…”. (Mt 28,7)","a":"Thấy Người","b":"Thấy mặt Người","c":"Gặp Người","d":"Gặp lại Người","ans":"A"},{"n":478,"q":"“Bấy giờ, Đức Giê-su nói với các bà: “… Về báo cho anh em của Thầy để họ đến Ga-li-lê. Họ sẽ được thấy Thầy ở đó.” (Mt 28,10)","a":"Này chị em","b":"Đừng sợ","c":"Chị em đừng sợ!","d":"Này, chị em đừng sợ!","ans":"C"},{"n":479,"q":"“Mười một môn đệ đi tới miền Ga-li-lê, đến ngọn núi Đức Giê-su đã truyền cho các ông đến. Khi thấy Người,…, nhưng có mấy ông lại hoài nghi”. (Mt 28,16-17)","a":"Họ rất đỗi vui mừng","b":"Các ông bái lạy","c":"Họ vô cùng vui sướng","d":"Các ông ngạc nhiên","ans":"B"},{"n":480,"q":"“Đức Giê-su đến gần, nói với các ông: “Thầy đã được… trên trời dưới đất”. (Mt 28,18)","a":"Ban toàn quyền","b":"Ban mọi quyền hành","c":"Trao toàn quyền","d":"Trao mọi quyền hành","ans":"C"}];

const QUESTIONS_P5 = [{"n":1,"q":"Ai là người đã sinh ra Giu-se, chồng của bà Ma-ri-a? (x. Mt 1,16)","a":"Rơ-kháp-am","b":"E-la-da","c":"Gia-cóp","d":"Dơ-rúp-ba-ven","ans":"C"},{"n":2,"q":"“Khi Đức Giê-su ra đời tại Bê-lem, miền Giu-đê, thời vua Hê-rô-đê trị vì, có mấy nhà chiêm tinh đến Giê-ru-sa-lem. Họ từ đâu đến? (x. Mt 2,1)","a":"Ga-li-lê","b":"Phương Đông","c":"Phương Tây","d":"Tia và Xi-đôn","ans":"B"},{"n":3,"q":"“Xin quý ngài đi dò hỏi tường tận về Hài Nhi, và khi đã tìm thấy, xin báo lại cho tôi, để tôi cũng đến bái lạy Người.” Ai đã nói câu này? (x. Mt 2,8)","a":"Quan Phi-la-tô","b":"Vua Hê-rô-đê","c":"Thượng tế Cai-pha","d":"Tất cả đều đúng.","ans":"B"},{"n":4,"q":"“Ông ở đó cho đến khi vua Hê-rô-đê băng hà, để ứng nghiệm lời Chúa phán xưa qua miệng ngôn sứ: Ta đã gọi con Ta ra khỏi Ai-cập”. Ông là ai? (x. Mt 2,14-15)","a":"Gio-an Tẩy Giả","b":"Giu-se","c":"Si-môn Phê-rô","d":"Tất cả đều đúng.","ans":"B"},{"n":5,"q":"“Anh em hãy sám hối, vì Nước Trời đã đến gần”. Ai đã nói câu này? (x. Mt 3,1-2)","a":"Đức Giê-su","b":"Gio-an Tẩy Giả","c":"Ngôn sứ I-sai-a","d":"Tất cả đều đúng.","ans":"B"},{"n":6,"q":"“Tôi, tôi làm phép rửa cho các anh trong nước để giục lòng các anh sám hối. Còn Đấng đến sau tôi thì quyền thế hơn tôi, tôi không đáng xách dép cho Người”. Ông Gio-an nói lời này về ai? (x. Mt 3,1-17)","a":"Vua Hê-rô-đê","b":"Tổng trấn Phi-la-tô","c":"Đức Giê-su","d":"Qui-ri-ni-ô","ans":"C"},{"n":7,"q":"“Chính tôi mới cần được Ngài làm phép rửa, thế mà Ngài lại đến với tôi!” Ai đã nói câu này? (x. Mt 3,14)","a":"Đức Giê-su","b":"Ông Phê-rô","c":"Ông trưởng hội đường","d":"Gio-an Tẩy Giả","ans":"D"},{"n":8,"q":"“Bây giờ cứ thế đã. Vì chúng ta nên làm như vậy để giữ trọn đức công chính” Ai đã nói câu này? (x. Mt 3,15)","a":"Gio-an Tẩy Giả","b":"Đức Giê-su","c":"Ông Si-môn cùi","d":"Ông trưởng hội đường","ans":"B"},{"n":9,"q":"“Đoàn dân đang ngồi trong cảnh tối tăm đã thấy một ánh sáng huy hoàng, những kẻ đang ngồi trong vùng bóng tối của tử thần nay được ánh sáng bừng lên chiếu rọi”. Ngôn sứ nào đã nói câu này? (x. Mt 4,12-16)","a":"Giê-rê-mi-a","b":"Ê-li-a","c":"Mi-kha","d":"I-sai-a","ans":"D"},{"n":10,"q":"“Người bảo các ông: “Các anh hãy theo tôi, tôi sẽ làm cho các anh thành những kẻ lưới người như lưới cá.” Đức Giê-su nói câu này với ai? (x. Mt 4,18-19)","a":"Si-môn và An-rê","b":"Gia-cô-bê và Gio-an","c":"Si-môn và Gio-an","d":"Gia-cô-bê và An-rê","ans":"A"},{"n":11,"q":"Hai anh em Gia-cô-bê và Gio-an là con của ai? (x. Mt 4,21-22)","a":"Si-môn Ky-rê-nê","b":"Gia-ia","c":"Da-ca-ri-a","d":"Dê-bê-đê","ans":"D"},{"n":12,"q":"Đức Giê-su cảnh báo các môn đệ hãy coi chừng hạng người “đội lốt chiên mà đến với anh em; nhưng bên trong, họ là sói dữ tham mồi”. Hạng người này là ai? (x. Mt 7,15)","a":"Ngôn sứ giả","b":"Người Pha-ri-sêu","c":"Các Kinh sư","d":"Cả B và C","ans":"A"},{"n":13,"q":"Đức Giê-su nói: “Vậy ai nghe những lời Thầy nói đây mà đem ra thực hành”, thì ví được như hạng người nào? (x. Mt 7,24)","a":"Người ngu dại xây nhà trên cát","b":"Người khôn xây nhà trên đá","c":"Kẻ đạo đức giả","d":"Kẻ giả hình","ans":"B"},{"n":14,"q":"Đức Giê-su nói: “Còn ai nghe những lời Thầy nói đây, mà chẳng đem ra thực hành”, thì ví được như hạng người nào? (x. Mt 7,26)","a":"Kẻ đạo đức giả","b":"Người khôn xây nhà trên đá","c":"Người ngu dại xây nhà trên cát","d":"Kẻ giả hình","ans":"C"},{"n":15,"q":"“Người giơ tay đụng vào anh và bảo: “Tôi muốn, anh sạch đi.” Đức Giê-su nói lời này với ai? (x. Mt 8,3)","a":"Một người mắc bệnh phong","b":"Người bị thần ô uế ám","c":"Mười người phong cùi","d":"Tất cả đều sai","ans":"A"},{"n":16,"q":"“Ông cứ về đi! Ông tin thế nào thì được như vậy!” Đức Giê-su nói lời này với ai? (x. Mt 8,13)","a":"Ông trưởng hội đường","b":"Người bại liệt","c":"Người bị quỷ ám","d":"Viên đại đội trưởng","ans":"D"},{"n":17,"q":"“Thưa Thầy, Thầy đi đâu, tôi cũng xin đi theo.” Ai đã nói câu này? (x. Mt 8,19)","a":"Người thanh niên giàu có","b":"Một kinh sư","c":"Người bị quỷ ám","d":"Anh mù từ khi mới sinh","ans":"B"},{"n":18,"q":"“Anh hãy đi theo tôi, cứ để kẻ chết chôn kẻ chết của họ.” Đức Giê-su nói câu này với ai? (x. Mt 8,22)","a":"Một kinh sư","b":"Người thanh niên giàu có","c":"Một môn đệ khác","d":"Người bị quỷ ám","ans":"C"},{"n":19,"q":"“Sao nhát thế, hỡi những người kém lòng tin!” Đức Giê-su nói câu này với ai? (x. Mt 8,23-26)","a":"Si-môn và An-rê","b":"Các môn đệ","c":"Gia-cô-bê và Gio-an","d":"Những người Pha-ri-sêu","ans":"B"},{"n":20,"q":"Đức Giê-su chữa hai người bị quỷ ám ở đâu? (x. Mt 8,28)","a":"Ghen-nê-xa-rét","b":"Ga-đa-ra","c":"Ca-phác-na-um","d":"Xê-da-rê Phi-líp-phê","ans":"B"},{"n":21,"q":"Sau phép lạ Đức Giê-su trừ quỷ ở Ga-đa-ra, cả thành ra đón Đức Giê-su. Khi gặp Người, họ đã xin Người điều gì? (x. Mt 8,34)","a":"Ở lại với họ","b":"Giảng cho họ nghe","c":"Rời khỏi vùng đất của họ","d":"Chữa lành bệnh tật","ans":"C"},{"n":22,"q":"‘Đứng dậy, vác giường đi về nhà!’” Đức Giê-su nói câu này với ai? (x. Mt 9,6)","a":"Người bị quỷ ám","b":"Người bại liệt","c":"Người bị thần ô uế ám","d":"Một vị thủ lãnh","ans":"B"},{"n":23,"q":"“Anh hãy theo tôi!” Đức Giê-su nói câu này với ai? (x. Mt 9,9)","a":"Si-môn và An-rê","b":"Gia-cô-bê và Gio-an","c":"Mát-thêu","d":"Người bại liệt","ans":"C"},{"n":24,"q":"“Tôi chỉ cần sờ được vào áo của Người thôi là sẽ được cứu!” Ai đã nghĩ bụng như vậy? (x. Mt 9,20-21)","a":"Người bại liệt","b":"Anh mù Ba-ti-mê","c":"Người đàn bà bị rong huyết","d":"Anh mù từ khi mới sinh","ans":"C"},{"n":25,"q":"“Lạy Con vua Đa-vít, xin thương xót chúng tôi!” Ai đã nói câu này? (x. Mt 9,27)","a":"Hai người mù","b":"Anh mù Ba-ti-mê","c":"10 người phong cùi","d":"2 người bị quỷ ám","ans":"A"},{"n":26,"q":"“Anh em đừng đi về phía các dân ngoại, cũng đừng vào thành nào của dân Sa-ma-ri. Tốt hơn là hãy đến với các con chiên lạc nhà Ít-ra-en”. Đức Giê-su nói câu này với ai? (x. Mt 10,1-6)","a":"72 môn đệ","b":"12 Tông Đồ","c":"72 người khác","d":"10 người phong cùi","ans":"B"},{"n":27,"q":"Khi sai 12 Tông Đồ đi rao giảng, Ngài khuyên bảo họ phải có thái độ đơn sơ như con vật nào? (x. Mt 10,16)","a":"Chiên","b":"Sói","c":"Rắn","d":"Bồ câu","ans":"D"},{"n":28,"q":"Khi dạy các môn đệ bài học về “Hãy nói giữa ban ngày, đừng có sợ”, Đức Giê-su đã ví họ với con vật nào? (x. Mt 10,28-31)","a":"Bồ câu","b":"Rắn","c":"Chim sẻ","d":"Con chiên","ans":"C"},{"n":29,"q":"“Thưa Thầy, Thầy có thật là Đấng phải đến không, hay là chúng tôi còn phải đợi ai khác?” Ai đã sai môn đệ đến hỏi Đức Giê-su câu này? (x. Mt 11,2-3)","a":"Viên sĩ quan ngoại giáo","b":"Ông trưởng hội đường","c":"Gioan Tẩy Giả","d":"Tổng trấn Phi-la-tô","ans":"C"},{"n":30,"q":"“Thưa Thầy, Thầy có thật là Đấng phải đến không, hay là chúng tôi còn phải đợi ai khác ?” Khi sai môn đệ đến hỏi Đức Giê-su câu này, lúc ấy ông Gioan đang ở đâu? (x. Mt 11,2-3)","a":"Hoang địa","b":"Sông Gio-đan","c":"Trong tù","d":"Trong rừng vắng","ans":"C"},{"n":31,"q":"“Chính ông là người Kinh Thánh đã nói tới khi chép rằng: Này Ta sai sứ giả của Ta đi trước mặt Con, người sẽ dọn đường cho Con đến”. Đức Giê-su nói về ai? (x. Mt 11,7-10)","a":"Giô-na","b":"Gioan Tẩy Giả","c":"Phi-líp-phê","d":"Gio-an Tông Đồ","ans":"B"},{"n":32,"q":"“Đây là Người Tôi Tớ Ta đã tuyển chọn, đây là người Ta yêu dấu: Ta hài lòng về Người. Ta cho Thần Khí Ta ngự trên Người. Người sẽ loan báo công lý trước muôn dân’. Ngôn sứ nào đã nói câu này? (x. Mt 12,17-18)","a":"Giô-na","b":"Mi-kha","c":"I-sai-a","d":"Giê-rê-mi-a","ans":"C"},{"n":33,"q":"“Ông này trừ được quỷ chỉ là nhờ dựa thế quỷ vương Bê-en-dê-bun.” Ai đã nói câu này? (x. Mt 12,24)","a":"Các kinh sư","b":"Các người Do-thái","c":"Người Pha-ri-sêu","d":"Cả A và C","ans":"C"},{"n":34,"q":"Khi kể về câu chuyện ông Gio-na, Đức Giê-su đã nhắc đến tên của thành nào trong Cựu Ước? (x. Mt 12,41)","a":"Xơ-đôm","b":"Thành Ni-ni-vê","c":"Gô-mô-ra","d":"Kho-ra-din","ans":"B"},{"n":35,"q":"Những hạt giống khi gieo xuống bị chim chóc đến ăn mất, đó là loại hạt giống rơi vào đâu? (x. Mt 13,4)","a":"Rơi trên sỏi đá","b":"Rơi xuống vệ đường","c":"Rơi vào bụi gai","d":"Rơi trên đất tốt","ans":"B"},{"n":36,"q":"Những hạt giống khi gieo xuống thì nó mọc ngay vì đất không sâu, đó là loại hạt giống rơi vào đâu? (x. Mt 13,5)","a":"Bụi gai","b":"Vệ đường","c":"Đất tốt","d":"Sỏi đá","ans":"D"},{"n":37,"q":"Những hạt giống khi gieo xuống bị chim chóc đến ăn mất là loại hạt giống rơi vào đâu? (x. Mt 13,4)","a":"Vệ đường","b":"Trên sỏi đá","c":"Bụi gai","d":"Đất tốt","ans":"A"},{"n":38,"q":"“Các ngươi có lắng tai nghe cũng chẳng hiểu, có trố mắt nhìn cũng chẳng thấy; vì lòng dân này đã ra chai đá”. Ngôn sứ nào đã nói câu này? (x. Mt 13,14-15)","a":"Giô-na","b":"Mi-kha","c":"I-sai-a","d":"Giê-rê-mi-a","ans":"C"},{"n":39,"q":"Kẻ nghe Lời và hiểu, thì tất nhiên sinh hoa kết quả và làm ra, kẻ được gấp trăm, kẻ được sáu chục, kẻ được ba chục.” Đó là kẻ được gieo vào đâu? (x. Mt 13,23)","a":"Vệ đường","b":"Sỏi đá","c":"Đất tốt","d":"Bụi gai","ans":"C"},{"n":40,"q":"“Tuy nó là loại nhỏ nhất trong tất cả các hạt giống, nhưng khi lớn lên, thì lại là thứ lớn nhất; nó trở thành cây, đến nỗi chim trời tới làm tổ trên cành được.” Đức Giê-su nói về loại hạt nào? (x. Mt 13,31-32)","a":"Hạt ớt","b":"Hạt cải","c":"Hạt vừng","d":"Hạt tiêu","ans":"B"},{"n":41,"q":"“Xin Thầy giải nghĩa dụ ngôn cỏ lùng trong ruộng cho chúng con nghe.” Ai đã nói câu này? (x. Mt 13,36)","a":"Đám đông dân chúng","b":"Người Pha-ri-sêu","c":"Các môn đệ","d":"Các kinh sư","ans":"C"},{"n":42,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su nói kẻ gieo giống tốt là ai? (x. Mt 13,37)","a":"Con Người","b":"Các Thiên Thần","c":"Ông chủ ruộng","d":"Thiên Chúa Cha","ans":"A"},{"n":43,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví ruộng với ai? (x. Mt 13,38)","a":"Các môn đệ","b":"Nước Trời","c":"Thế gian","d":"Thế giới của Ác Thần","ans":"C"},{"n":44,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví hạt giống tốt với ai? (x. Mt 13,38)","a":"Con cái thế gian","b":"Con cái Nước Trời","c":"Con cái Ác Thần","d":"Con cái sự sáng","ans":"B"},{"n":45,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví cỏ lùng với ai? (x. Mt 13,38)","a":"Con cái thế gian","b":"Con cái Nước Trời","c":"Con cái Ác Thần","d":"Con cái sự sáng","ans":"C"},{"n":46,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví kẻ thù đã gieo cỏ lùng với ai? (x. Mt 13,39)","a":"Những kẻ không nghe lời","b":"Các Thần dữ","c":"Ác Thần","d":"Ma quỷ","ans":"D"},{"n":47,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví mùa gặt với cái gì? (x. Mt 13,39)","a":"Ngày Chúa đến","b":"Ngày Chúa quang lâm","c":"Ngày tận thế","d":"Ngày cánh chung","ans":"C"},{"n":48,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví thợ gặt với ai? (x. Mt 13,39)","a":"Chúa Thánh Thần","b":"Các thiên thần","c":"Các môn đệ","d":"Các Tông đồ","ans":"B"},{"n":49,"q":"“Ngôn sứ có bị rẻ rúng, thì cũng chỉ là ở chính quê hương mình và trong gia đình mình mà thôi.” Ai đã nói câu này? (x. Mt 13,57)","a":"I-sai-a","b":"Mấy người Pha-ri-sêu","c":"Đức Giê-su","d":"Các kinh sư","ans":"C"},{"n":50,"q":"Khi về thăm Na-da-rét, tại sao Đức Giê-su lại không làm nhiều phép lạ tại đó?","a":"Vì họ nhất tề bịt tai lại","b":"Vì họ không tin","c":"Vì họ phản đối","d":"Vì họ đồng loạt bỏ đi","ans":"B"},{"n":51,"q":"“Nơi đây hoang vắng, và đã muộn rồi, vậy xin Thầy cho dân chúng về, để họ vào các làng mạc mua lấy thức ăn.” Ai đã nói câu này? (x. Mt 14,15)","a":"Phi-líp-phê","b":"Phê-rô và Gio-an","c":"Các môn đệ","d":"Cả A và B","ans":"C"},{"n":52,"q":"“Họ không cần phải đi đâu cả, chính anh em hãy cho họ ăn.” Ai đã nói câu này? (x. Mt 14,16)","a":"Các môn đệ","b":"Đức Giê-su","c":"Si-môn Phê-rô","d":"Phi-líp-phê","ans":"B"},{"n":53,"q":"Trong phép lạ Đức Giê-su hóa bánh ra nhiều lần thứ nhất, những mẩu bánh còn thừa, người ta thu lại được bao nhiêu giỏ đầy? (x. Mt 14,20)","a":"7 giỏ","b":"5 giỏ","c":"12 giỏ","d":"4 giỏ","ans":"C"},{"n":54,"q":"“Thưa Ngài, nếu quả là Ngài, thì xin truyền cho con đi trên mặt nước mà đến với Ngài.” Ai đã nói câu này? (x. Mt 14,28)","a":"Ông Tô-ma","b":"Ông Phê-rô","c":"Ông Gia-cô-bê","d":"Người môn đệ Chúa yêu","ans":"B"},{"n":55,"q":"“Dân này tôn kính Ta bằng môi bằng miệng, còn lòng chúng thì lại xa Ta. Chúng có thờ phượng Ta thì cũng vô ích, vì giáo lý chúng giảng dạy chỉ là giới luật phàm nhân.” Ngôn sứ nào đã nói câu này? (x. Mt 15,7-9)","a":"Giê-rê-mi-a","b":"I-sai-a","c":"Da-ca-ri-a","d":"Mi-kha","ans":"B"},{"n":56,"q":"“Lạy Ngài là Con vua Đa-vít, xin rủ lòng thương tôi!” Ai đã nói câu này? (x. Mt 15,21-22)","a":"Người đàn bà Ca-na-an","b":"Anh mù Ba-ti-mê","c":"Người bị bại tay","d":"Người đàn bà bị băng huyết","ans":"A"},{"n":57,"q":"Cảnh sắc bầu trời thì các ông biết cắt nghĩa, còn thời điềm thì các ông lại không cắt nghĩa nổi”. Đức Giê-su đã nói lời này với ai? (x. Mt 16,1-3)","a":"Những người Pha-ri-sêu","b":"Nhóm Xa-đốc","c":"Mấy kinh sư","d":"Cả A và B","ans":"D"},{"n":58,"q":"“Thầy là Đấng Ki-tô, Con Thiên Chúa hằng sống.” Ông Phê-rô tuyên xưng những lời này ở đâu? (x. Mt 16,13-16)","a":"Xê-da-rê Phi-líp-phê","b":"Ca-phác-na-um","c":"Bết-sai-đa","d":"Vùng bên kia sông Gio-đan","ans":"A"},{"n":59,"q":"“Xa-tan, lui lại đằng sau Thầy! Anh cản lối Thầy, vì tư tưởng của anh không phải là tư tưởng của Thiên Chúa, mà là của loài người.” Đức Giê-su nói lời này với ai? (x. Mt 16,23)","a":"Tô-ma","b":"Giu-đa Ít-ca-ri-ốt","c":"Phê-rô","d":"Phi-líp-phê","ans":"C"},{"n":60,"q":"Trong sự kiện hiển dung, Đức Giê-su đã mang những ai đi theo mình? (x. Mt 17,1)","a":"Phê-rô, Gia-cô-bê và An-rê","b":"Phê-rô, Gia-cô-bê và Gio-an","c":"Phê-rô, Gio-an và An-rê","d":"Phê-rô, An-rê và Ta-đê-ô","ans":"B"},{"n":61,"q":"Trong sự kiện Đức Giê-su hiển dung, những nhân vật nào đã hiện ra đàm đạo với Người? (x. Mt 17,3)","a":"Hô-sê và Ê-li-a","b":"Hô-sê và Ê-li-sa","c":"Mô-sê và Ê-li-sa","d":"Mô-sê và Ê-li-a","ans":"D"},{"n":62,"q":"“Lạy Ngài, chúng con ở đây, thật là hay! Nếu Ngài muốn, con xin dựng tại đây ba cái lều, một cho Ngài, một cho ông Mô-sê, và một cho ông Ê-li-a”. Ai đã nói câu này? (x. Mt 17,4)","a":"Gia-cô-bê","b":"Phê-rô","c":"Gio-an","d":"Các môn đệ","ans":"B"},{"n":63,"q":"Về bài học “Anh em tha thứ cho nhau”, Đức Giê-su dạy phải tha đến mấy lần? (x. Mt 18,22)","a":"Bảy mươi bảy lần","b":"Bảy lần bảy","c":"Bảy mươi lần bảy","d":"Mười bảy lần bảy","ans":"C"},{"n":64,"q":"“Nếu anh muốn nên hoàn thiện, thì hãy đi bán tài sản của anh và đem cho người nghèo, anh sẽ được một kho tàng trên trời. Rồi hãy đến theo tôi.” Sau khi nghe lời này, người thanh niên đã làm gì? (x. Mt 19,21-22)","a":"Anh lập tức quay về nhà","b":"Anh đứng dậy đi theo Người","c":"Anh buồn rầu bỏ đi","d":"Anh bỏ mọi sự mà theo Người","ans":"C"},{"n":65,"q":"‘Mấy người sau chót này chỉ làm có một giờ, thế mà ông lại coi họ ngang hàng với chúng tôi là những người đã phải làm việc nặng nhọc cả ngày, lại còn bị nắng nôi thiêu đốt.’ Ai đã cằn nhằn với gia chủ như thế? (x. Mt 20,10-12)","a":"Nhóm người làm giờ thứ Sáu","b":"Nhóm người làm giờ thứ Chín","c":"Những người vào làm trước nhất","d":"Nhóm người làm giờ thứ Mười một","ans":"C"},{"n":66,"q":"“Lạy Ngài, lạy Con vua Đa-vít, xin rủ lòng thương chúng tôi!” Ai đã nói câu này? (x. Mt 20,30)","a":"Anh mù Ba-ti-mê","b":"Hai người mù","c":"Mười người phong cùi","d":"Người ăn xin bên vệ đường","ans":"B"},{"n":67,"q":"“Các anh đi vào làng trước mặt kia, và sẽ thấy ngay một con lừa mẹ đang cột sẵn đó, có con lừa con bên cạnh. Các anh cởi dây ra và dắt về cho Thầy”. Đức Giê-su nói lời này với ai? (x. Mt 21,1-2)","a":"Nhóm Mười Hai","b":"Hai môn đệ","c":"Những người Do-thái","d":"Các tá điền","ans":"B"},{"n":68,"q":"Sau khi đuổi những người đang mua bán trong Đền Thờ, Đức Giê-su đã đi đâu? (x. Mt 21,17)","a":"Bê-ta-ni-a","b":"Ca-phác-na-um","c":"Ga-li-lê","d":"Giê-ru-sa-lem","ans":"A"},{"n":69,"q":"“Ông lấy quyền nào mà làm các điều ấy? Ai đã cho ông quyền ấy?” Ai đã hỏi Đức Giê-su câu này? (x. Mt 21,23)","a":"Các Thượng tế","b":"Các kỳ mục","c":"Người Pha-ri-sêu","d":"Cả A và B","ans":"D"},{"n":70,"q":"“Đứa thừa tự đây rồi! Nào ta giết quách nó đi, và đoạt lấy gia tài nó!” Ai đã nói câu này? (x. Mt 21,38)","a":"Các kinh sư","b":"Người Pha-ri-sêu","c":"Bọn tá điền","d":"Đám đông dân chúng","ans":"C"},{"n":71,"q":"‘Trói chân tay nó lại, quăng nó ra chỗ tối tăm bên ngoài, ở đó người ta sẽ phải khóc lóc nghiến răng!’ Lời này dành cho ai? (x. Mt 22,11-13)","a":"Các quan khách","b":"Bọn tá điền","c":"Những người vào làm trước nhất","d":"Người không mặc y phục lễ cưới","ans":"D"},{"n":72,"q":"“Vì kẻ được gọi thì nhiều, mà người được chọn thì ít”. Câu này được nói trong Dụ ngôn nào? (x. Mt 22,1-14)","a":"Dụ ngôn tá điền sát nhân","b":"Dụ ngôn tiệc cưới","c":"Dụ ngôn thợ làm vườn nho","d":"Tất cả đều sai","ans":"B"},{"n":73,"q":"“Đã bao lần Ta muốn tập hợp con cái ngươi lại, như gà mẹ tập hợp gà con dưới cánh, mà các ngươi không chịu”. Đức Giê-su nói về nơi nào? (x. Mt 23,37)","a":"Gô-mô-ra","b":"Giê-ru-sa-lem","c":"Ca-phác-na-um","d":"Xơ-đôm","ans":"B"},{"n":74,"q":"“Anh em nhìn thấy tất cả những cái đó, phải không? Thầy bảo thật anh em: tại đây, sẽ không còn tảng đá nào trên tảng đá nào; tất cả đều sẽ bị phá đổ.” Đức Giê-su nói về nơi nào? (x. Mt 24,1-2)","a":"Ca-phác-na-um","b":"Xơ-đôm","c":"Gô-mô-ra","d":"Đền thờ Giê-ru-sa-lem","ans":"D"},{"n":75,"q":"Trong “Dụ ngôn những yến bạc”, người đã lãnh được năm yến đã làm gì? (x. Mt 25,16)","a":"Gây lời được hai yến khác","b":"Đào lỗ, chôn giấu số bạc của chủ","c":"Gây lời được năm yến khác","d":"Gây lời được mười yến khác","ans":"C"},{"n":76,"q":"Trong “Dụ ngôn những yến bạc”, người đã lãnh được một yến đã làm gì? (x. Mt 25,18)","a":"Gây lời được một yến khác","b":"Gây lời được năm yến khác","c":"Đào lỗ, chôn giấu số bạc của chủ","d":"Gây lời được hai yến khác","ans":"C"},{"n":77,"q":"“Ông chủ nói với người ấy: ‘Khá lắm! Hỡi đầy tớ tài giỏi và trung thành! Được giao ít mà anh đã trung thành, thì tôi sẽ giao nhiều cho anh. Hãy vào mà hưởng niềm vui của chủ anh!’ Đây là lời ông chủ nói với ai? (x. Mt 25,21-23)","a":"Người đã lãnh 5 yến","b":"Người đã lãnh 2 yến","c":"Người đã lãnh 1 yến","d":"Cả A và B","ans":"D"},{"n":78,"q":"‘Thưa ông chủ, tôi biết ông là người hà khắc, gặt chỗ không gieo, thu nơi không vãi. Vì thế, tôi đâm sợ, mới đem chôn giấu yến bạc của ông dưới đất. Của ông đây, ông cầm lấy!’ Ai đã nói với ông chủ câu này? (x. Mt 25,24-25)","a":"Người đã lãnh 5 yến","b":"Người đã lãnh 2 yến","c":"Người đã lãnh 1 yến","d":"Cả A và B","ans":"C"},{"n":79,"q":"“Sao lại phí của như thế? Dầu đó có thể bán được nhiều tiền mà cho người nghèo.” Ai đã nói câu này? (x. Mt 26,8-9)","a":"Các môn đệ","b":"Giu-đa Ít-ca-ri-ốt","c":"Các kinh sư","d":"Mấy người Pha-ri-sêu","ans":"A"},{"n":80,"q":"“Tôi nộp ông ấy cho quý vị, thì quý vị muốn cho tôi bao nhiêu?” Ai đã nói câu này? (x. Mt 26,14-15)","a":"Thầy Thượng Tế","b":"Giu-đa Ít-ca-ri-ốt","c":"Các kinh sư","d":"Mấy người Pha-ri-sêu","ans":"B"},{"n":81,"q":"“Thầy muốn chúng con dọn cho Thầy ăn lễ Vượt Qua ở đâu?” Ai đã nói câu này? (x. Mt 26,17)","a":"Các kinh sư","b":"Si-mon Phê-rô","c":"Mấy người Pha-ri-sêu","d":"Các môn đệ","ans":"D"},{"n":82,"q":"“Ráp-bi, chẳng lẽ con sao?” Ai đã hỏi Đức Giê-su câu này? (x. Mt 26,25)","a":"Giu-đa Ít-ca-ri-ốt","b":"Si-mon Phê-rô","c":"Tất cả Nhóm Mười Hai","d":"Các môn đệ","ans":"A"},{"n":83,"q":"Trong sự kiện “Đức Giê-su tiên báo ông Phê-rô sẽ chối Thầy”, hát Thánh Vịnh xong, Đức Giê-su và các môn đệ đã đi đâu? (x. Mt 26,30)","a":"Đền thờ","b":"Hội đường","c":"Núi Ô-liu","d":"Suối Kít-rôn","ans":"C"},{"n":84,"q":"“Dầu tất cả có vấp ngã vì Thầy đi nữa, thì con đây cũng chẳng bao giờ vấp ngã.” Ai đã nói câu này? (x. Mt 26,33)","a":"Các môn đệ","b":"Ông Phê-rô","c":"Giu-đa Ít-ca-ri-ốt","d":"Phi-líp-phê","ans":"B"},{"n":85,"q":"Khi Đức Giê-su cầu nguyện tại vườn Ghết-sê-ma-ni, Ngài đã đưa những ai đi theo mình? (x. Mt 26,36-37)","a":"Ông Phê-rô","b":"Hai người con ông Dê-bê-đê","c":"Ông Phê-rô, An-rê và Gio-an","d":"Cả A và B","ans":"D"},{"n":86,"q":"“Thế ra anh em không thể canh thức nổi với Thầy một giờ sao?” Đức Giê-su đã nói những lời này với ai? (x. Mt 26,40)","a":"Các môn đệ","b":"Hai người con ông Dê-bê-đê","c":"Ông Phê-rô","d":"Ông Phê-rô, An-rê và Gio-an","ans":"C"},{"n":87,"q":"Sau khi cầu nguyện lần thứ hai, Đức Giê-su trở lại, thấy các môn đệ vẫn đang ngủ, vì mắt họ nặng trĩu. Người đã làm gì? (x. Mt 26,43-44)","a":"Người nổi giận với các ông","b":"Người để mặc các ông","c":"Người đánh thức các ông","d":"Người ngồi xuống bên các ông","ans":"B"},{"n":88,"q":"Cùng đi với Giu-đa Ít-ca-ri-ốt, có cả một đám người đông đảo mang gươm giáo gậy gộc. Họ đã được ai sai đến? (x. Mt 26,47)","a":"Các thượng tế","b":"Các kỳ mục","c":"Tổng trấn Phi-la-tô","d":"Cả A và B","ans":"D"},{"n":89,"q":"“Này bạn, bạn đến đây làm gì thì cứ làm đi!” Đức Giê-su nói lời này với ai? (x. Mt 26,49-50)","a":"Viên sĩ quan cận vệ","b":"Đám lính","c":"Đám thuộc hạ","d":"Giu-đa Ít-ca-ri-ốt","ans":"D"},{"n":90,"q":"Ngay sau khi Đức Giê-su bị bắt, họ đã điệu Người đến đâu? (x. Mt 26,57)","a":"Dinh Phi-la-tô","b":"Thượng tế Cai-pha","c":"Dinh vua Hê-rô-đê","d":"Đền thờ Giê-ru-sa-lem","ans":"B"},{"n":91,"q":"“Nhân danh Thiên Chúa hằng sống, tôi truyền cho ông phải nói cho chúng tôi biết: ông có phải là Đấng Ki-tô Con Thiên Chúa không?” Ai đã hỏi Đức Giê-su câu này? (x. Mt 26,63)","a":"Vị thượng tế","b":"Các thủ lãnh Do-thái","c":"Vua Hê-rô-đê","d":"Tổng trấn Phi-la-tô","ans":"A"},{"n":92,"q":"“Hắn nói phạm thượng! Chúng ta cần gì nhân chứng nữa? Đấy, quý vị vừa nghe hắn nói phạm đến Thiên Chúa, quý vị nghĩ sao?” Ai đã nói câu này? (x. Mt 26,65-66)","a":"Đám đông dân chúng","b":"Vị thượng tế","c":"Tổng trấn Phi-la-tô","d":"Các thủ lãnh Do-thái","ans":"B"},{"n":93,"q":"“Cả bác nữa, bác cũng đã ở với ông Giê-su, người Ga-li-lê đó chứ gì?” Ai đã nói với ông Phê-rô những lời này? (x. Mt 26,69)","a":"Một người trong đám đông","b":"Người đầy tớ gái","c":"Những người đứng đó","d":"Tên lính gác cổng","ans":"B"},{"n":94,"q":"“Tôi đã phạm tội nộp người vô tội, khiến Người phải chết oan.” Ai đã nói lời này? (x. Mt 27,3-4)","a":"Phi-la-tô","b":"Giu-đa Ít-ca-ri-ốt","c":"Vợ của Phi-la-tô","d":"Hê-rô-đê","ans":"B"},{"n":95,"q":"“Họ đã lượm lấy ba mươi đồng bạc, tức là cái giá mà một số con cái Ít-ra-en đã đặt khi đánh giá Người. Và họ lấy số bạc đó mà mua ‘Thửa Ruộng Ông Thợ Gốm’, theo những điều Đức Chúa đã truyền cho tôi .” Ngôn sứ nào đã nói câu này? (x. Mt 27,9-10)","a":"I-sai-a","b":"Ê-dê-ki-en","c":"Giê-rê-mi-a","d":"Đa-ni-en","ans":"C"},{"n":96,"q":"“Ông là vua dân Do-thái sao?” Ai đã hỏi Đức Giê-su câu này? (x. Mt 27,11)","a":"Tổng trấn Phi-la-tô","b":"Thượng tế Cai-pha","c":"Vua Hê-rô-đê","d":"Các kỳ lão","ans":"A"},{"n":97,"q":"“Ta vô can trong vụ đổ máu người này. Mặc các người liệu lấy!” Trước khi nói những lời này, tổng trấn Phi-la-tô đã làm gì? (x. Mt 27,24)","a":"Bỏ vào nhà","b":"Truyền đánh đòn Đức Giê-su","c":"Lấy nước rửa tay","d":"Phóng thích Ba-ra-ba","ans":"C"},{"n":98,"q":"“Chúng lột áo Người ra, khoác cho Người một tấm áo choàng đỏ, rồi kết một vòng gai làm vương miện đặt lên đầu Người, và trao vào tay mặt Người một cây sậy”. Ai đã làm điều này? (x. Mt 27,27-29)","a":"Lính của các thượng tế","b":"Lính của tổng trấn","c":"Lính của Hê-rô-đê","d":"Các kinh sư và Pha-ri-sêu","ans":"B"},{"n":99,"q":"“Hắn cứu được thiên hạ, mà chẳng cứu nổi mình. Hắn là vua Ít-ra-en! Hắn cứ xuống khỏi thập giá ngay bây giờ đi, chúng ta tin hắn liền!”. Ai đã chế giễu Đức Giê-su như vậy? (x. Mt 27,41-42)","a":"Thượng tế","b":"Kinh sư","c":"Kỳ mục","d":"Cả A, B và C","ans":"D"},{"n":100,"q":"“Này các bà, các bà đừng sợ! Tôi biết các bà tìm Đức Giê-su, Đấng bị đóng đinh. Người không có ở đây, vì Người đã trỗi dậy như Người đã nói”. Ai đã nói câu này? (x. Mt 28,5-6)","a":"Thiên thần","b":"Người làm vườn","c":"Đức Giê-su phục sinh","d":"Viên đại đội trưởng","ans":"A"},{"n":101,"q":"“Đây là gia phả Đức Giê-su Ki-tô, con cháu…, con cháu tổ phụ Áp-ra-ham” (Mt 1,1)","a":"Ông Gia-cóp","b":"Vua Đa-vít","c":"Ông Giu-se","d":"Vua Sa-lô-môn","ans":"B"},{"n":102,"q":"“Ông Áp-ra-ham sinh I-xa-ác; I-xa-ác sinh Gia-cóp; Gia-cóp sinh … và các anh em ông này” (Mt 1,2)","a":"Giu-se","b":"E-xau","c":"Giu-đa","d":"Rưu-vên","ans":"C"},{"n":103,"q":"“Gia-cóp sinh Giu-se, chồng của bà Ma-ri-a, bà là mẹ Đức Giê-su cũng gọi là…”. (Mt 1,16)","a":"Đấng Cứu Thế","b":"Con bác thợ mộc Giu-se","c":"Đấng Ki-tô","d":"Tất cả đều đúng","ans":"C"},{"n":104,"q":"“Ông Giu-se, chồng bà, là người… và không muốn tố giác bà, nên mới định tâm bỏ bà cách kín đáo”. (Mt 1,19)","a":"Nóng tính","b":"Công chính","c":"Thuộc dòng dõi Đa-vít","d":"Tất cả đều đúng.","ans":"B"},{"n":105,"q":"“Này ông Giu-se,…, đừng ngại đón bà Ma-ri-a vợ ông về, vì người con bà cưu mang là do quyền năng Chúa Thánh Thần”. (Mt 1,20)","a":"Con vua Đa-vít","b":"Con cháu Gia-cóp","c":"Con cháu Đa-vít","d":"Dòng dõi Đa-vít","ans":"C"},{"n":106,"q":"“Bà sẽ sinh con trai và ông phải đặt tên cho con trẻ là Giê-su, vì chính Người sẽ… khỏi tội lỗi của họ.” (Mt 1,21)","a":"Cứu dân Người","b":"Giải thoát dân Người","c":"Cứu muôn người","d":"Tất cả đều sai","ans":"A"},{"n":107,"q":"“Khi Đức Giê-su ra đời tại Bê-lem, miền Giu-đê, thời … trị vì, có mấy nhà chiêm tinh từ Phương Đông đến Giê-ru-sa-lem” (Mt 2,1)","a":"Quan Phi-la-tô","b":"Tổng trấn Qui-ri-ni-ô","c":"Vua Hê-rô-đê","d":"Hoàng đế Xê-da-rê","ans":"C"},{"n":108,"q":"“… mới sinh, hiện ở đâu? Chúng tôi đã thấy vì sao của Người xuất hiện bên Phương Đông, nên chúng tôi đến bái lạy Người.” (Mt 2,2)","a":"Đức Vua dân Do-thái","b":"Vua Do-thái","c":"Vị vua Do-thái","d":"Đức vua","ans":"A"},{"n":109,"q":"“Nhà vua liền triệu tập tất cả các thượng tế và kinh sư trong dân lại, rồi hỏi cho biết… phải sinh ra ở đâu”. (Mt 2,4)","a":"Đấng Ki-tô","b":"Đức vua dân Do-thái","c":"Đấng Cứu Thế","d":"Tất cả đều đúng.","ans":"A"},{"n":110,"q":"Phần ngươi, hỡi Bê-lem, miền đất Giu-đa, ngươi đâu phải là thành nhỏ nhất của Giu-đa, vì ngươi là nơi… chăn dắt Ít-ra-en dân Ta sẽ ra đời.” (Mt 2,6)","a":"Vị vua","b":"Vị lãnh tụ","c":"Vị Cứu Thế","d":"Tất cả đều đúng.","ans":"B"},{"n":111,"q":"Rồi vua phái các vị ấy đi Bê-lem và dặn rằng: “Xin quý ngài đi dò hỏi tường tận về Hài Nhi, và khi đã tìm thấy, xin báo lại cho tôi, để tôi cũng…” (Mt 2,8)","a":"Đến thờ lạy Người","b":"Đến để thờ lạy Người","c":"Đến bái lạy Người","d":"Đến triều bái Người","ans":"C"},{"n":112,"q":"“Nghe nhà vua nói thế, họ ra đi. Bấy giờ ngôi sao họ đã thấy ở Phương Đông, lại… cho họ đến tận nơi Hài Nhi ở, mới dừng lại”. (Mt 2,9)","a":"Dẫn đường","b":"Chỉ đường","c":"Soi đường","d":"Dẫn lối","ans":"A"},{"n":113,"q":"“Họ vào nhà, thấy Hài Nhi với thân mẫu là bà Ma-ri-a, liền… Người”. (Mt 2,11)","a":"Lấy lễ vật tiến dâng","b":"Sấp mình thờ lạy","c":"Dâng các bảo vật lên","d":"Tất cả đều đúng.","ans":"B"},{"n":114,"q":"“Này ông, dậy… và mẹ Người trốn sang Ai-cập, và cứ ở đó cho đến khi tôi báo lại, vì vua Hê-rô-đê sắp tìm giết Hài Nhi đấy!” (Mt 2,13)","a":"Đem Hài Nhi","b":"Đem Con trẻ","c":"Đưa Hài Nhi mới sinh","d":"Tất cả đều đúng","ans":"A"},{"n":115,"q":"“Ông ở đó cho đến khi vua Hê-rô-đê băng hà, để ứng nghiệm lời Chúa phán xưa qua miệng ngôn sứ:… ra khỏi Ai-cập”. (Mt 2,15)","a":"Ta đã gọi con Ta","b":"Ta đã đưa con Ta","c":"Ta truyền cho con Ta","d":"Tất cả đều đúng.","ans":"A"},{"n":116,"q":"“Này ông, dậy đem Hài Nhi và mẹ Người…, vì những kẻ tìm giết Hài Nhi đã chết rồi” (Mt 2,19-20)","a":"Trốn sang Ai-cập","b":"Về Na-da-rét","c":"Về đất Ít-ra-en","d":"Trở về quê cũ","ans":"C"},{"n":117,"q":"“Ông liền trỗi dậy đưa Hài Nhi và mẹ Người về đất Ít-ra-en. Nhưng vì nghe biết Ác-khê-lao đã kế vị vua cha là Hê-rô-đê, cai trị miền Giu-đê, nên ông sợ…”. (Mt 2,21-22)","a":"Không dám về đó","b":"Trốn đi nơi khác","c":"Bỏ sang thành khác","d":"Tất cả đều đúng","ans":"A"},{"n":118,"q":"“Rồi sau khi được báo mộng, ông lui về miền Ga-li-lê, và đến ở tại một thành kia gọi là …”. (Mt 2,22-23)","a":"Bê-lem","b":"Na-da-rét","c":"Ga-li-lê","d":"Sa-ma-ri","ans":"B"},{"n":119,"q":"“Có tiếng người hô trong hoang địa: Hãy dọn sẵn con đường cho Đức Chúa,…để Người đi”. (Mt 3,3)","a":"Sửa lối cho thẳng","b":"Hãy nắn cho thẳng","c":"Chỉnh lối cho thẳng","d":"Bạt mọi núi đồi","ans":"A"},{"n":120,"q":"“Bấy giờ, người ta từ Giê-ru-sa-lem và khắp miền Giu-đê, cùng khắp vùng ven sông Gio-đan, kéo đến với ông. Họ thú tội, và ông… cho họ trong sông Gio-đan”. (Mt 3,5-6)","a":"Giảng dạy","b":"Làm phép rửa","c":"Rửa tội","d":"Rao giảng","ans":"B"},{"n":121,"q":"“Các anh hãy… để chứng tỏ lòng sám hối”. (Mt 3,8)","a":"Sinh hoa quả","b":"Khóc lóc kêu than","c":"Đấm ngực ăn năn","d":"Tất cả đều đúng","ans":"A"},{"n":122,"q":"“Đừng tưởng có thể bảo mình rằng: ‘Chúng ta đã có...’ Vì, tôi nói cho các anh hay, Thiên Chúa có thể làm cho những hòn đá này trở nên con cháu ông Áp-ra-ham”. (Mt 3,9)","a":"Mô-sê","b":"Tổ phụ Áp-ra-ham","c":"Giê-ru-sa-lem","d":"Đền thờ","ans":"B"},{"n":123,"q":"“Cái rìu đã đặt sát gốc cây: bất cứ cây nào… đều bị chặt đi và quăng vào lửa”. (Mt 3,10)","a":"Không sinh trái tốt","b":"Sinh trái tốt","c":"Không sinh quả tốt","d":"Không sinh hoa trái","ans":"C"},{"n":124,"q":"“Còn Đấng đến sau tôi thì quyền thế hơn tôi, tôi không đáng xách dép cho Người. Người sẽ làm phép rửa cho các anh trong…”. (Mt 3,11)","a":"Thánh Thần","b":"Nước","c":"Nước và Thánh Thần","d":"Thánh Thần và lửa","ans":"D"},{"n":125,"q":"“Tay Người cầm nia, Người sẽ rê sạch lúa trong sân: thóc mẩy thì thu vào kho lẫm, còn thóc lép thì bỏ vào… mà đốt đi .” (Mt 3,12)","a":"Lửa không hề tắt","b":"Lửa","c":"Lò lửa","d":"Trong lò lửa","ans":"A"},{"n":126,"q":"“Bấy giờ Đức Giê-su được… dẫn vào hoang địa, để chịu quỷ cám dỗ”. (Mt 4,1)","a":"Thánh Thần","b":"Các Thiên Thần","c":"Thần Khí","d":"Thần sứ","ans":"C"},{"n":127,"q":"“Khi ấy tên cám dỗ đến gần Người và nói: “Nếu ông là…, thì truyền cho những hòn đá này hoá bánh đi!” (Mt 4,3)","a":"Con Một Thiên Chúa","b":"Con Thiên Chúa","c":"Thiên Chúa","d":"Đấng Ki-tô","ans":"B"},{"n":128,"q":"“Nếu ông là…, thì gieo mình xuống đi! Vì đã có lời chép rằng: Thiên Chúa sẽ truyền cho thiên sứ lo cho bạn, và thiên sứ sẽ tay đỡ tay nâng, cho bạn khỏi vấp chân vào đá.” (Mt 4,6)","a":"Con Một Thiên Chúa","b":"Con Thiên Chúa","c":"Thiên Chúa","d":"Đấng Ki-tô","ans":"B"},{"n":129,"q":"“Đức Giê-su đáp: “Nhưng cũng đã có lời chép rằng: Ngươi chớ… Đức Chúa là Thiên Chúa của ngươi.” (Mt 4,7)","a":"Thách thức","b":"Thử lòng","c":"Thử thách","d":"Khinh thường","ans":"C"},{"n":130,"q":"“Tôi sẽ cho ông tất cả những thứ đó, nếu ông… tôi.” (Mt 4,9)","a":"Bái lạy","b":"Thờ lạy","c":"Sấp mình dưới chân","d":"Sấp mình bái lạy","ans":"D"},{"n":131,"q":"“Đức Giê-su liền nói: “Xa-tan kia, xéo đi! Vì đã có lời chép rằng: Ngươi phải bái lạy Đức Chúa là Thiên Chúa của ngươi, và phải… một mình Người mà thôi.” (Mt 4,10)","a":"Thờ lạy","b":"Tôn thờ","c":"Sấp mình bái lạy","d":"Thờ phượng","ans":"D"},{"n":132,"q":"“Từ lúc đó, Đức Giê-su bắt đầu rao giảng và nói rằng: “Anh em hãy…, vì Nước Trời đã đến gần.” (Mt 4,17)","a":"Thối hối","b":"Trở về","c":"Ăn năn thống hối","d":"Sám hối","ans":"D"},{"n":133,"q":"“Từ miền Ga-li-lê, vùng Thập Tỉnh, thành Giê-ru-sa-lem, miền Giu-đê và vùng bên kia sông Gio-đan, dân chúng lũ lượt kéo đến…”. (Mt 4,25)","a":"Đi theo Người","b":"Nghe Người giảng","c":"Để nghe Người giảng dạy","d":"Để nghe lời Người","ans":"A"},{"n":134,"q":"“Phúc thay ai có… nghèo khó, vì Nước Trời là của họ”. (Mt 5,3)","a":"Tinh thần","b":"Tâm hồn","c":"Lòng","d":"Đời sống","ans":"B"},{"n":135,"q":"“Phúc thay ai hiền lành, vì họ sẽ được… làm gia nghiệp”. (Mt 5,4)","a":"Nước Trời","b":"Chính Chúa","c":"Đất Hứa","d":"Tất cả đều đúng","ans":"C"},{"n":136,"q":"“Phúc thay ai…, vì họ sẽ được Thiên Chúa ủi an”. (Mt 5,5)","a":"Sầu khổ","b":"Khóc lóc","c":"Than khóc","d":"Buồn khổ","ans":"A"},{"n":137,"q":"“Phúc thay ai khát khao…, vì họ sẽ được Thiên Chúa cho thoả lòng”. (Mt 5,6)","a":"Nên hoàn thiện","b":"Nên người hoàn thiện","c":"Nên người công chính","d":"Nên người giàu có","ans":"C"},{"n":138,"q":"“Phúc thay ai…, vì họ sẽ được Thiên Chúa xót thương”. (Mt 5,7)","a":"Biết xót thương người","b":"Yêu mến người","c":"Thương xót người","d":"Xót thương người","ans":"D"},{"n":139,"q":"“Phúc thay ai…, vì họ sẽ được gọi là con Thiên Chúa”. (Mt 5,9)","a":"Có tâm hồn trong sạch","b":"Xót thương người","c":"Làm cho người hòa thuận","d":"Xây dựng hoà bình","ans":"D"},{"n":140,"q":"“Phúc thay ai bị bách hại vì…, vì Nước Trời là của họ”. (Mt 5,10)","a":"Sống công chính","b":"Ở công chính","c":"Sống ngay lành","d":"Danh Thầy","ans":"A"},{"n":141,"q":"“Phúc thay anh em khi… mà bị người ta sỉ vả, bách hại và vu khống đủ điều xấu xa. (Mt 5,11)","a":"Vì Thầy","b":"Vì Danh Thầy","c":"Vì Tin Mừng","d":"Tất cả đều đúng","ans":"A"},{"n":142,"q":"“Anh em hãy…, vì phần thưởng dành cho anh em ở trên trời thật lớn lao”. (Mt 5,12)","a":"Vui mừng","b":"Kiên tâm chịu đựng","c":"Vui mừng hớn hở","d":"Kiên tâm bền chí","ans":"C"},{"n":143,"q":"“Chính anh em là muối cho đời. Nhưng muối mà…, thì lấy gì muối nó cho mặn lại?” (Mt 5,13)","a":"Không còn mặn","b":"Nhạt đi","c":"Ra nhạt","d":"Hết mặn","ans":"B"},{"n":144,"q":"“Chính anh em là ánh sáng cho... Một thành xây trên núi không tài nào che giấu được”. (Mt 5,14)","a":"Trần gian","b":"Thế gian","c":"Đời","d":"Thế gian này","ans":"A"},{"n":145,"q":"“Cũng chẳng có ai thắp đèn rồi lại để dưới cái thùng, nhưng…, và đèn soi chiếu cho mọi người trong nhà”. (Mt 5,15)","a":"Đặt trên đế","b":"Đặt trên giá","c":"Treo trên giá","d":"Treo trên tường","ans":"A"},{"n":146,"q":"“Anh em đừng tưởng Thầy đến để bãi bỏ Luật Mô-sê hoặc lời các ngôn sứ. Thầy đến không phải là để bãi bỏ, nhưng là để …”. (Mt 5,17)","a":"Làm cho hoàn thiện","b":"Làm cho kiện toàn","c":"Hoàn thiện","d":"Kiện toàn","ans":"D"},{"n":147,"q":"“Anh em đã nghe Luật dạy người xưa rằng: Chớ giết người; ai giết người, thì đáng bị đưa ra toà. Còn Thầy, Thầy bảo cho anh em biết: Ai…, thì đáng bị đưa ra toà”. (Mt 5,21-22)","a":"Chửi rủa anh em mình","b":"Nguyền rủa anh em mình","c":"Đánh đập anh em mình","d":"Giận anh em mình","ans":"D"},{"n":148,"q":"“Ai mắng anh em mình là đồ ngốc, thì đáng bị đưa ra trước…”. (Mt 5,22)","a":"Thượng Hội Đồng","b":"Quan Tòa","c":"Tòa Án","d":"Hội Đồng","ans":"A"},{"n":149,"q":"“Vậy, nếu khi anh sắp dâng lễ vật trước bàn thờ, mà sực nhớ có người anh em đang có chuyện bất bình với anh, thì hãy để của lễ lại đó trước bàn thờ,… với người anh em ấy đã, rồi trở lại dâng lễ vật của mình”. (Mt 5,23-24)","a":"Về cầu hòa","b":"Đi giải hòa","c":"Đi làm hoà","d":"Về hòa giải","ans":"C"},{"n":150,"q":"“Anh em đã nghe Luật dạy rằng: Chớ ngoại tình. Còn Thầy, Thầy bảo cho anh em biết: ai nhìn người phụ nữ mà thèm muốn, thì… đã ngoại tình với người ấy rồi”. (Mt 5,27-28)","a":"Trong lòng mình","b":"Tâm hồn mình","c":"Tâm trí mình","d":"Trong lòng","ans":"D"},{"n":151,"q":"“Anh em còn nghe Luật dạy người xưa rằng: Chớ bội thề, nhưng hãy trọn lời thề với Đức Chúa. Còn Thầy, Thầy bảo cho anh em biết: …”. (Mt 5,33-34)","a":"Đừng thề chi cả","b":"Chỉ thề khi cần thiết thôi","c":"Không nên thề chi cả","d":"Chớ thề thốt","ans":"A"},{"n":152,"q":"“Nếu ai muốn kiện anh để lấy áo trong của anh, thì hãy để cho nó… Nếu có người bắt anh đi một dặm, thì hãy đi với người ấy hai dặm”. (Mt 5,40-41)","a":"Lấy","b":"Lấy cả áo ngoài","c":"Làm như vậy","d":"Làm theo ý nó","ans":"B"},{"n":153,"q":"“Anh em đã nghe Luật dạy rằng: Hãy yêu đồng loại và hãy ghét kẻ thù. Còn Thầy, Thầy bảo anh em: … và cầu nguyện cho những kẻ ngược đãi anh em”. (Mt 5,43-44)","a":"Hãy thương xót","b":"Hãy yêu kẻ thù","c":"Hãy tha thứ","d":"Hãy yêu kẻ ác","ans":"B"},{"n":154,"q":"“Vì nếu anh em yêu thương…, thì anh em nào có công chi? Ngay cả những người thu thuế cũng chẳng làm như thế sao?” (Mt 5,46)","a":"Kẻ yêu thương mình","b":"Người đồng loại","c":"Người thân cận","d":"Người anh em","ans":"A"},{"n":155,"q":"“Vậy anh em hãy nên hoàn thiện, như… là Đấng hoàn thiện.” (Mt 5,48)","a":"Thiên Chúa Cha","b":"Thiên Chúa","c":"Cha anh em trên trời","d":"Cha trên trời","ans":"C"},{"n":156,"q":"“Khi làm việc lành phúc đức, anh em phải coi chừng, … cho thiên hạ thấy. Bằng không, anh em sẽ chẳng được Cha của anh em, Đấng ngự trên trời, ban thưởng”. (Mt 6,1)","a":"Đừng","b":"Đừng để","c":"Đừng làm để","d":"Chớ có phô trương","ans":"D"},{"n":157,"q":"“Còn anh, khi bố thí, đừng cho tay trái biết việc tay phải làm, để việc anh bố thí được kín đáo. Và Cha của anh, … những gì kín đáo, sẽ trả lại cho anh”. (Mt 6,3-4)","a":"Đấng biết","b":"Đấng thấu suốt","c":"Đấng biết rõ","d":"Đấng nắm rõ","ans":"B"},{"n":158,"q":"“Còn anh, khi cầu nguyện, hãy vào phòng, đóng cửa lại, và cầu nguyện cùng Cha của anh, … nơi kín đáo. Và Cha của anh, Đấng thấu suốt những gì kín đáo, sẽ trả lại cho anh”. (Mt 6,6)","a":"Đấng đang ngự","b":"Đấng đang ở","c":"Đấng hiện diện","d":"Đấng biết những gì","ans":"C"},{"n":159,"q":"“Khi cầu nguyện, anh em đừng lải nhải như dân ngoại; họ nghĩ rằng: cứ nói nhiều là được nhậm lời. Đừng bắt chước họ, vì Cha anh em đã… anh em cần gì, trước khi anh em cầu xin”. (Mt 6,7-8)","a":"Biết rõ","b":"Thừa biết","c":"Biết","d":"Ngầm biết","ans":"A"},{"n":160,"q":"“Còn anh, khi ăn chay, nên rửa mặt cho sạch, chải đầu cho thơm, để không ai thấy là anh ăn chay ngoại trừ…, Đấng hiện diện nơi kín đáo”. (Mt 6,17-18)","a":"Thiên Chúa","b":"Cha của anh","c":"Thiên Chúa Cha","d":"Con Người","ans":"B"},{"n":161,"q":"“Anh em… cho mình những kho tàng dưới đất, nơi mối mọt làm hư nát, và kẻ trộm khoét vách lấy đi”. (Mt 6,19)","a":"Đừng tích trữ","b":"Đừng gom góp","c":"Đừng tích lũy","d":"Đừng tìm kiếm","ans":"A"},{"n":162,"q":"“Đèn của thân thể là con mắt. Vậy nếu mắt anh sáng, thì … sẽ sáng”. (Mt 6,22)","a":"Thân thể","b":"Thân thể của anh","c":"Toàn thân anh","d":"Toàn con người anh","ans":"C"},{"n":163,"q":"“Còn nếu mắt anh xấu, thì toàn thân anh sẽ tối. Vậy nếu ánh sáng nơi anh…, thì tối biết chừng nào!” (Mt 6,23)","a":"Lại thành bóng tối","b":"Trở thành bóng tối","c":"Ra tối tăm","d":"Không tỏa sáng","ans":"A"},{"n":164,"q":"“Không ai có thể làm tôi hai chủ, vì hoặc sẽ ghét chủ này mà yêu chủ kia, hoặc sẽ… với chủ này mà khinh dể chủ nọ. Anh em không thể vừa làm tôi Thiên Chúa vừa làm tôi Tiền Của được”. (Mt 6,24)","a":"Gắn kết","b":"Yêu mến","c":"Trung thành","d":"Gắn bó","ans":"D"},{"n":165,"q":"“Hỏi có ai trong anh em, …, mà kéo dài đời mình thêm được dù chỉ một gang tay?” (Mt 6,27)","a":"Nhờ lo lắng","b":"Nhờ khôn khéo","c":"Nhờ khôn ngoan","d":"Nhờ tài đức","ans":"A"},{"n":166,"q":"“Trước hết hãy tìm kiếm Nước Thiên Chúa và… của Người, còn tất cả những thứ kia, Người sẽ thêm cho”. (Mt 6,33)","a":"Sự công chính","b":"Vương Quốc","c":"Đức công chính","d":"Triều Đại","ans":"C"},{"n":167,"q":"“Vậy, anh em đừng lo lắng…: ngày mai, cứ để ngày mai lo. Ngày nào có cái khổ của ngày ấy.” (Mt 6,34)","a":"Cho tương lai","b":"Gì cả","c":"Bất cứ điều gì","d":"Về ngày mai","ans":"D"},{"n":168,"q":"“Hỡi…! Lấy cái xà ra khỏi mắt anh trước đã, rồi anh sẽ thấy rõ, để lấy cái rác ra khỏi mắt người anh em”. (Mt 7,5)","a":"Kẻ giả hình","b":"Bọn giả hình","c":"Quân tội lỗi","d":"Kẻ đạo đức giả","ans":"D"},{"n":169,"q":"“…, đừng quăng cho chó; ngọc trai, chớ liệng cho heo, kẻo chúng giày đạp dưới chân, rồi còn quay lại cắn xé anh em”. (Mt 7,6)","a":"Miếng ngon","b":"Của ngon","c":"Của thánh","d":"Vàng bạc","ans":"C"},{"n":170,"q":"“Hãy qua cửa hẹp mà vào, vì cửa rộng và đường thênh thang thì…, mà nhiều người lại đi qua đó”. (Mt 7,13)","a":"Dẫn đến diệt vọng","b":"Dẫn đến hư vong","c":"Đưa đến diệt vong","d":"Tất cả đều sai","ans":"C"},{"n":171,"q":"“Cây nào không sinh quả tốt, thì bị chặt đi và quăng vào lửa. Vậy, cứ xem họ…, thì biết họ là ai”. (Mt 7,19-20)","a":"Sống như thế nào","b":"Sống ra sao","c":"Sinh hoa quả nào","d":"Sinh trái nào","ans":"C"},{"n":172,"q":"“Không phải bất cứ ai thưa với Thầy: ‘Lạy Chúa! Lạy Chúa!’ là được vào Nước Trời cả đâu! Nhưng chỉ ai… ý muốn của Cha Thầy là Đấng ngự trên trời, mới được vào mà thôi”. (Mt 7,21)","a":"Thi hành","b":"Làm theo","c":"Thực hành","d":"Mau mắn thi hành","ans":"A"},{"n":173,"q":"“Và bấy giờ Thầy sẽ tuyên bố với họ:… các ngươi; xéo đi cho khuất mắt Ta, hỡi bọn làm điều gian ác!” (Mt 7,23)","a":"Ta không biết","b":"Tất cả","c":"Tất cả lũ khốn","d":"Ta không hề biết","ans":"D"},{"n":174,"q":"“Vậy ai nghe những lời Thầy nói đây mà…, thì ví được như người khôn xây nhà trên đá”. (Mt 7,24)","a":"Làm theo","b":"Đem ra thực hành","c":"Mau mắn thi hành","d":"Ghi nhớ trong lòng","ans":"B"},{"n":175,"q":"“Còn ai nghe những lời Thầy nói đây, mà chẳng đem ra thực hành, thì ví được như… xây nhà trên cát.” (Mt 7,26)","a":"Người ngu","b":"Người khờ dại","c":"Người kia","d":"Người ngu dại","ans":"D"},{"n":176,"q":"“Người giơ tay đụng vào anh và bảo: “…, anh sạch đi.” (Mt 8,3)","a":"Tội anh đã được tha","b":"Này anh","c":"Lòng tin của anh cứu chữa anh","d":"Tôi muốn","ans":"D"},{"n":177,"q":"“Rồi Đức Giê-su bảo anh: “Coi chừng, đừng nói với ai cả, nhưng hãy đi trình diện tư tế và dâng của lễ, như ông Mô-sê đã truyền, để… cho người ta biết.” (Mt 8,4)","a":"Làm chứng","b":"Loan truyền","c":"Công bố","d":"Loan báo","ans":"A"},{"n":178,"q":"“Đức Giê-su bảo: “Anh hãy…, cứ để kẻ chết chôn kẻ chết của họ.” (Mt 8,22)","a":"Đi theo tôi","b":"Theo tôi","c":"Làm môn đệ tôi","d":"Đi loan báo Tin Mừng","ans":"A"},{"n":179,"q":"“Các ông lại gần đánh thức Người và nói: “Thưa Ngài, …, chúng con chết mất!” (Mt 8,25)","a":"Xin cứu giúp con","b":"Xin cứu chúng con","c":"Xin hãy ra tay","d":"Xin thương xót chúng con","ans":"B"},{"n":180,"q":"“Người ta ngạc nhiên và nói: “Ông này là người thế nào mà cả đến gió và biển cũng…?” (Mt 8,27)","a":"Phải khiếp sợ","b":"Kinh khiếp","c":"Phải kinh sợ","d":"Tuân lệnh","ans":"D"},{"n":181,"q":"“Hãy về học cho biết ý nghĩa của câu này: Ta muốn… chứ đâu cần lễ tế. Vì tôi không đến để kêu gọi người công chính, mà để kêu gọi người tội lỗi.” (Mt 9,13)","a":"Tấm lòng","b":"Lòng yêu mến","c":"Lòng nhân","d":"Lòng khiêm nhường","ans":"C"},{"n":182,"q":"“Đức Giê-su trả lời: “Chẳng lẽ khách dự tiệc cưới lại có thể than khóc, khi chàng rể còn ở với họ? Nhưng khi tới ngày chàng rể…, bấy giờ họ mới ăn chay”. (Mt 9,15)","a":"Được đem đi rồi","b":"Bị đem đi rồi","c":"Đã đi khỏi rồi","d":"Đã ra đi rồi","ans":"B"},{"n":183,"q":"“Đang khi Đức Giê-su ra khỏi nơi đó, thì có hai người mù đi theo kêu lên rằng: “Lạy Con vua Đa-vít,… chúng tôi!” (Mt 9,27)","a":"Xin rủ lòng thương","b":"Xin thương","c":"Xin thương đến","d":"Xin thương xót","ans":"D"},{"n":184,"q":"“Đức Giê-su thấy đám đông thì…, vì họ lầm than vất vưởng, như bầy chiên không người chăn dắt”. (Mt 9,36)","a":"Chạnh lòng thương","b":"Rủ lòng thương","c":"Cảm thương","d":"Liền chạnh lòng thương","ans":"A"},{"n":185,"q":"“Bấy giờ, Người nói với môn đệ rằng: “Lúa chín đầy đồng, mà thợ gặt lại ít. Vậy anh em hãy… sai thợ ra gặt lúa về.” (Mt 9,37-38)","a":"Ra đi","b":"Cầu xin chủ ruộng","c":"Xin chủ mùa gặt","d":"Xin Thiên Chúa","ans":"C"},{"n":186,"q":"“Vào nhà nào, anh em hãy… cho nhà ấy. Nếu nhà ấy xứng đáng, thì bình an của anh em sẽ đến với họ; còn nếu nhà ấy không xứng đáng, thì bình an của anh em sẽ trở về với anh em”. (Mt 10,12-13)","a":"Chúc bình an","b":"Chào chúc bình an","c":"Chúc lành","d":"Chúc phúc lành","ans":"B"},{"n":187,"q":"“Và anh em sẽ bị điệu ra trước mặt vua chúa quan quyền vì Thầy… cho họ và các dân ngoại được biết”. (Mt 10,18)","a":"Để làm gương","b":"Để chứng tỏ","c":"Để làm chứng","d":"Để nói","ans":"C"},{"n":188,"q":"“… anh em sẽ bị mọi người thù ghét. Nhưng kẻ nào bền chí đến cùng, kẻ ấy sẽ được cứu thoát”. (Mt 10,22)","a":"Vì Thầy","b":"Vì Tin Mừng","c":"Vì Ta","d":"Vì danh Thầy","ans":"D"},{"n":189,"q":"“Trò không hơn thầy, tớ không hơn chủ. Trò được như thầy, tớ được như chủ, đã là khá lắm rồi. Chủ nhà mà người ta còn gọi là…, huống chi là người nhà”. (Mt 10,24-25)","a":"Ma quỷ","b":"Tướng quỷ","c":"Đồ mất trí","d":"Bê-en-dê-bun","ans":"D"},{"n":190,"q":"“Anh em… những kẻ giết thân xác mà không giết được linh hồn. Đúng hơn, anh em hãy sợ Đấng có thể tiêu diệt cả hồn lẫn xác trong hoả ngục”. (Mt 10,28)","a":"Chớ có sợ","b":"Đừng nể sợ","c":"Đừng sợ","d":"Đừng khiếp sợ","ans":"C"},{"n":191,"q":"“Vậy anh em đừng sợ, anh em còn… muôn vàn chim sẻ”.","a":"Quý giá hơn","b":"Có giá hơn","c":"Giá trị hơn","d":"Quý trọng hơn","ans":"A"},{"n":192,"q":"“Phàm ai tuyên bố… trước mặt thiên hạ, thì Thầy cũng sẽ tuyên bố nhận người ấy trước mặt Cha Thầy, Đấng ngự trên trời”. (Mt 10,32)","a":"Tin vào Thầy","b":"Nhận Thầy","c":"Làm môn đệ Thầy","d":"Tin nhận Thầy","ans":"B"},{"n":193,"q":"“Ai không… mà theo Thầy, thì không xứng với Thầy”. (Mt 10,38)","a":"Từ bỏ mọi sự","b":"Vác thập giá mình","c":"Từ bỏ chính mình","d":"Từ chối mọi sự","ans":"B"},{"n":194,"q":"“Ai đón tiếp anh em là đón tiếp Thầy, và ai đón tiếp Thầy là đón tiếp…”. (Mt 10,40)","a":"Chính Cha của Thầy","b":"Đấng đã sai Thầy","c":"Cha của Thầy","d":"Chính Đấng sai Thầy","ans":"B"},{"n":195,"q":"“Các anh cứ về thuật lại cho ông Gio-an những điều mắt thấy tai nghe: Người mù xem thấy, kẻ què được đi, người phong được sạch, kẻ điếc được nghe, người chết sống lại, kẻ nghèo…” (Mt 11,4-5)","a":"Được ăn uống no nê","b":"An ủi vỗ về","c":"Được nghe Tin Mừng","d":"Thỏa thuê cơm bánh","ans":"C"},{"n":196,"q":"“Lạy Cha là Chúa Tể trời đất, con xin ngợi khen Cha, vì Cha đã giấu không cho bậc khôn ngoan thông thái biết những điều này, nhưng lại mặc khải cho…”. (Mt 11,25)","a":"Những kẻ bé mọn","b":"Những kẻ khó nghèo","c":"Những người bé mọn","d":"Những kẻ nghèo hèn","ans":"C"},{"n":197,"q":"“Cha tôi đã giao phó mọi sự cho tôi. Và không ai biết rõ người Con, trừ Chúa Cha ; cũng như không ai biết rõ Chúa Cha, trừ người Con và kẻ mà… muốn mặc khải cho”. (Mt 11,27)","a":"Người Con","b":"Chúa Cha","c":"Cha tôi","d":"Con Người","ans":"A"},{"n":198,"q":"“Anh em hãy mang lấy ách của tôi, và hãy học với tôi, vì tôi có lòng... Tâm hồn anh em sẽ được nghỉ ngơi bồi dưỡng. (Mt 11,29)","a":"Hiền hậu","b":"Nhân từ","c":"Khiêm nhường","d":"Cả A và C","ans":"D"},{"n":199,"q":"“Vì… tôi êm ái, và… tôi nhẹ nhàng.” (Mt 11,30)","a":"Gánh / ách","b":"Ách / gánh","c":"Ách / tiếng","d":"Gánh / tiếng","ans":"B"},{"n":200,"q":"“Cây lau bị giập, Người…, tim đèn leo lét, chẳng nỡ tắt đi, cho đến khi Người đưa công lý đến toàn thắng, và muôn dân đặt niềm hy vọng nơi danh Người”. (Mt 12,20-21)","a":"Không bẻ gãy","b":"Không đành đụng tới","c":"Không đành bẻ gãy","d":"Chẳng cần bẻ gãy","ans":"C"},{"n":201,"q":"“Còn nếu tôi dựa vào Thần Khí của Thiên Chúa mà trừ quỷ, thì quả là … đã đến giữa các ông”. (Mt 12,28)","a":"Nước Thiên Chúa","b":"Con Người","c":"Nước Trời","d":"Triều đại Thiên Chúa","ans":"D"},{"n":202,"q":"“Ai…, là chống lại tôi; và ai không cùng tôi thu góp, là phân tán”. (Mt 12,30)","a":"Không đi với tôi","b":"Cùng phe với tôi","c":"Không thuộc về tôi","d":"Không thần phục tôi","ans":"A"},{"n":203,"q":"“Vì phàm ai… của Cha tôi, Đấng ngự trên trời, người ấy là anh chị em tôi, là mẹ tôi.” (Mt 12,50)","a":"Làm theo ý","b":"Tuân hành theo ý","c":"Tuân hành ý muốn","d":"Thi hành ý muốn","ans":"D"},{"n":204,"q":"“Có những hạt rơi…, chỗ đất không có nhiều; nó mọc ngay, vì đất không sâu; nhưng khi nắng lên, nó liền bị cháy, và vì thiếu rễ nên bị chết khô”. (Mt 13,5-6)","a":"Trên vệ đường","b":"Vào bụi gai","c":"Trên nơi sỏi đá","d":"Rơi trên đất khô cằn","ans":"C"},{"n":205,"q":"“Có những hạt rơi vào bụi gai, gai mọc lên làm nó…”. (Mt 13,7)","a":"Chết nghẹt","b":"Bị héo khô","c":"Bị chết khô","d":"Bị chết nghẹt","ans":"A"},{"n":206,"q":"“Có những hạt lại rơi nhằm đất tốt, nên…: hạt được gấp trăm, hạt được sáu chục, hạt được ba chục”. (Mt 13,8)","a":"Sinh nhiều hoa trái","b":"Sinh hoa trái","c":"Liền mọc lên","d":"Sinh hoa kết quả","ans":"D"},{"n":207,"q":"“Ai đã có thì được cho thêm, và…; còn ai không có, thì ngay cái đang có, cũng sẽ bị lấy mất”. (Mt 13,12)","a":"Được dư giả","b":"Sẽ có dư thừa","c":"Được dư dật","d":"Sẽ được dư giả","ans":"B"},{"n":208,"q":"“Bởi thế, nếu Thầy dùng dụ ngôn mà nói với họ, là vì họ nhìn mà không nhìn, nghe mà…”. (Mt 13,13)","a":"Không nghe","b":"Không hiểu","c":"Chẳng hiểu","d":"Cả A và B","ans":"D"},{"n":209,"q":"“Còn anh em, mắt anh em thật có phúc vì…, tai anh em thật có phúc, vì được nghe”. (Mt 13,16)","a":"Được xem thấy","b":"Được trông thấy","c":"Được thấy","d":"Được nhìn thấy","ans":"C"},{"n":210,"q":"“Quả thế, Thầy bảo thật anh em, nhiều ngôn sứ và nhiều người công chính đã mong mỏi thấy điều anh em…, mà không
