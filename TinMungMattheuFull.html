được thấy, nghe điều anh em đang nghe, mà không được nghe”. (Mt 13,17)","a":"Đang thấy","b":"Đang thấy đây","c":"Đã thấy","d":"Đã từng thấy","ans":"A"},{"n":211,"q":"“Nước Trời lại còn giống như chuyện chiếc lưới thả xuống biển, gom được đủ thứ cá. Khi lưới đầy, người ta kéo lên bãi, rồi ngồi nhặt… cho vào giỏ, còn cá xấu thì vứt ra ngoài”. (Mt 13,47-48)","a":"Cá tốt","b":"Cá lớn","c":"Con nào tốt","d":"Con cá nào tốt","ans":"A"},{"n":212,"q":"“Bởi vậy, bất cứ kinh sư nào đã được học hỏi về Nước Trời, thì cũng giống như chủ nhà kia lấy ra từ trong… cả cái mới lẫn cái cũ.” (Mt 13,52)","a":"Ngân hàng của mình","b":"Kho tàng của mình","c":"Kho của nhà mình","d":"Kho lẫm của mình","ans":"B"},{"n":213,"q":"“Ngôn sứ có bị rẻ rúng, thì cũng chỉ là ở… và trong gia đình mình mà thôi.” (Mt 13,57)","a":"Quê hương","b":"Chính quê hương mình","c":"Ngay chính quê hương","d":"Ngay tại quê hương mình","ans":"B"},{"n":214,"q":"“Người không làm nhiều phép lạ tại đó, vì…”. (Mt 13,58)","a":"Họ không có lòng tin","b":"Chẳng có tin","c":"Họ phản đối Người","d":"Họ không tin","ans":"D"},{"n":215,"q":"“Đức Giê-su bảo: “Họ không cần phải đi đâu cả,… hãy cho họ ăn.” (Mt 14,16)","a":"Anh em","b":"Các con","c":"Chính anh em","d":"Chính các con","ans":"C"},{"n":216,"q":"“Khi thầy trò đã lên thuyền, thì gió lặng ngay. Những kẻ ở trong thuyền bái lạy Người và nói: “Quả thật Ngài là …!” (Mt 14,32-33)","a":"Con Thiên Chúa","b":"Đấng Thánh","c":"Con Đấng Tối Cao","d":"Thiên Chúa","ans":"A"},{"n":217,"q":"“Dân này tôn kính Ta bằng môi bằng miệng, còn… thì lại xa Ta”. (Mt 15,8)","a":"Lòng dạ","b":"Lòng chúng","c":"Lòng dạ của chúng","d":"Tâm hồn chúng","ans":"B"},{"n":218,"q":"“Chúng có thờ phượng Ta thì cũng vô ích, vì giáo lý chúng giảng dạy chỉ là...” (Mt 15,9)","a":"Giới luật phàm nhân","b":"Giáo huấn của người phàm","c":"Giáo huấn của phàm nhân","d":"Lời lẽ phàm nhân","ans":"A"},{"n":219,"q":"“Đức Giê-su gọi các môn đệ lại mà nói: “Thầy … đám đông, vì họ ở luôn với Thầy đã ba ngày rồi và họ không có gì ăn”. (Mt 15,32)","a":"Thương","b":"Cảm thấy thương","c":"Lo cho","d":"Chạnh lòng thương","ans":"D"},{"n":220,"q":"“Này anh Si-môn con ông Giô-na, anh thật là người có phúc, vì không phải phàm nhân mặc khải cho anh điều ấy, nhưng là…, Đấng ngự trên trời”. (Mt 16,17)","a":"Cha của Thầy","b":"Cha Thầy","c":"Thiên Chúa Cha","d":"Thiên Chúa","ans":"A"},{"n":221,"q":"“Thầy sẽ trao cho anh…: dưới đất, anh cầm buộc điều gì, trên trời cũng sẽ cầm buộc như vậy; dưới đất, anh tháo cởi điều gì, trên trời cũng sẽ tháo cởi như vậy.” (Mt 16,19)","a":"Chìa khoá Nước Trời","b":"Quyền trên các thần ô uế","c":"Mọi quyền năng","d":"Chìa khóa cửa trời","ans":"A"},{"n":222,"q":"“Quả vậy, ai muốn cứu mạng sống mình, thì sẽ mất; … mạng sống mình vì Thầy, thì sẽ tìm được mạng sống ấy”. (Mt 16,25)","a":"Ai đành mất","b":"Còn ai liều mất","c":"Ai chấp nhận mất","d":"Còn ai chịu mất","ans":"B"},{"n":223,"q":"“Vì Con Người sẽ ngự đến trong vinh quang của Cha Người, cùng với các thiên thần của Người, và bấy giờ, Người sẽ thưởng phạt ai nấy…”. (Mt 16,27)","a":"Xứng việc họ làm","b":"Tùy theo việc họ làm","c":"Tùy việc họ làm","d":"Xứng với việc họ làm","ans":"A"},{"n":224,"q":"“Đức Giê-su đến gần, nói với các ông: “Thầy đã được… trên trời dưới đất”. (Mt 28,18)","a":"Ban toàn quyền","b":"Ban mọi quyền hành","c":"Trao toàn quyền","d":"Trao mọi quyền hành","ans":"C"},{"n":225,"q":"“Đây là Con yêu dấu của Ta, Ta hài lòng về Người. Các ngươi hãy…!” (Mt 17,5)","a":"Nghe lời Người","b":"Vâng lời Người","c":"Vâng nghe lời Người","d":"Tuân lệnh Người","ans":"C"},{"n":226,"q":"“Thầy bảo thật anh em: nếu anh em không trở lại mà…, thì sẽ chẳng được vào Nước Trời”. (Mt 18,3)","a":"Thay đổi đời sống","b":"Ăn năn thống hối","c":"Nên như trẻ nhỏ","d":"Ăn chay khóc lóc","ans":"C"},{"n":227,"q":"“Nếu mắt anh làm cớ cho anh sa ngã, thì hãy móc mà ném đi; thà chột mắt mà …, còn hơn là có đủ hai mắt mà bị ném vào lửa hoả ngục”. (Mt 18,9)","a":"Được vào Nước Trời","b":"Được vào thiên đàng","c":"Được vào cõi sống","d":"Được vào Nước Thiên Chúa","ans":"C"},{"n":228,"q":"“Anh em hãy coi chừng, …trong những kẻ bé mọn này; quả thật, Thầy nói cho anh em biết: các thiên thần của họ ở trên trời không ngừng chiêm ngưỡng nhan Cha Thầy, Đấng ngự trên trời”. (Mt 18,10)","a":"Chớ khinh một ai","b":"Đừng ức hiếp một ai","c":"Chớ bát nạt một ai","d":"Đừng coi thường một ai","ans":"A"},{"n":229,"q":"“Cũng vậy, Cha của anh em, Đấng ngự trên trời, không muốn cho một ai trong những kẻ bé mọn này…”. (Mt 18,14)","a":"Phải tiêu vong","b":"Bị diệt vong","c":"Phải hư mất","d":"Phải bị diệt vong","ans":"C"},{"n":230,"q":"“Thầy còn bảo thật anh em: Nếu ở dưới đất, hai người trong anh em… bất cứ điều gì, thì Cha Thầy, Đấng ngự trên trời, sẽ ban cho”. (Mt 18,19)","a":"Cùng xin","b":"Hợp lời cầu xin","c":"Cầu xin","d":"Cùng cầu xin","ans":"B"},{"n":231,"q":"“Vì ở đâu có hai ba người họp lại…, thì có Thầy ở đấy, giữa họ.” (Mt 18,20)","a":"Nhân danh Cha Thầy","b":"Nhân danh Cha của Thầy","c":"Nhân danh Thầy","d":"Nhân danh Chúa Cha","ans":"C"},{"n":232,"q":"“Ấy vậy, Cha của Thầy ở trên trời cũng sẽ đối xử với anh em như thế, nếu mỗi người trong anh em không… cho anh em mình.” (Mt 18,35)","a":"Hết lòng tha thứ","b":"Tha thứ","c":"Chấp nhận tha thứ","d":"Bằng lòng tha thứ","ans":"A"},{"n":233,"q":"‘Thuở ban đầu, Đấng Tạo Hoá đã làm ra con người có nam có nữ’, và Người đã phán: ‘Vì thế, người ta sẽ lìa cha mẹ mà gắn bó với vợ mình, và cả hai sẽ thành...’ (Mt 19,4-5)","a":"Một gia đình","b":"Một xương một thịt","c":"Một cặp vợ chồng","d":"Một đôi vợ chồng","ans":"B"},{"n":234,"q":"Vậy, sự gì Thiên Chúa đã phối hợp, loài người...” (Mt 19,6)","a":"Không được phép phân ly","b":"Không tự ý phân ly","c":"Không được phân ly","d":"Không được chia lìa","ans":"C"},{"n":235,"q":"“Vì các ông lòng chai dạ đá, nên ông Mô-sê đã cho phép các ông rẫy vợ, chứ thuở ban đầu,…”. (Mt 19,8)","a":"Không có thế đâu","b":"Không như vậy","c":"Không được phân ly","d":"Không được phép","ans":"A"},{"n":236,"q":"“Tôi nói cho các ông biết: Ngoại trừ trường hợp hôn nhân bất hợp pháp, ai rẫy vợ mà cưới vợ khác là...” (Mt 19,9)","a":"Kẻ ngoại tình","b":"Mắc tội ngoại tình","c":"Đi ngoại tình","d":"Phạm tội ngoại tình","ans":"D"},{"n":237,"q":"“Cứ để trẻ em đến với Thầy, …, vì Nước Trời là của những ai giống như chúng.” (Mt 19,14)","a":"Đừng ngăn cấm chúng","b":"Đừng cản chúng","c":"Đừng xua đuổi chúng","d":"Đừng đe dọa chúng","ans":"A"},{"n":238,"q":"“Nhiều kẻ đứng đầu sẽ phải xuống hàng chót, và… sẽ được lên hàng đầu.” (Mt 19,30)","a":"Nhiều kẻ đứng chót","b":"Kẻ đứng chót","c":"Kẻ sau hết","d":"Kẻ đứng rốt hết","ans":"A"},{"n":239,"q":"“Thế là những kẻ đứng chót sẽ được…, còn những kẻ đứng đầu sẽ phải xuống hàng chót”. (Mt 20,16)","a":"Đứng hàng đầu","b":"Ngồi lên hàng đầu","c":"Đứng lên hàng đầu","d":"Lên hàng đầu","ans":"D"},{"n":240,"q":"“Anh em biết: thủ lãnh các dân thì dùng uy mà…, những người làm lớn thì lấy quyền mà cai quản dân”. (Mt 20,25)","a":"Thống trị dân","b":"Cai quản dân","c":"Cai trị dân","d":"Đe dọa dân","ans":"A"},{"n":241,"q":"“Giữa anh em thì không được như vậy: Ai muốn làm lớn giữa anh em, thì phải… anh em”. (Mt 20,26)","a":"Phục vụ","b":"Hầu hạ","c":"Làm người phục vụ","d":"Trở nên người hầu hạ","ans":"C"},{"n":242,"q":"“Và ai muốn làm đầu anh em thì phải… anh em”. (Mt 20,27)","a":"Trở nên người phục vụ","b":"Làm đầy tớ","c":"Phục vụ","d":"Hầu hạ","ans":"B"},{"n":243,"q":"“Lạy Ngài, lạy Con vua Đa-vít,… chúng tôi !” (Mt 20,31)","a":"Xin thương xót","b":"Xin rủ lòng thương","c":"Hãy rủ lòng thương","d":"Xin thương","ans":"B"},{"n":244,"q":"“Hãy bảo thiếu nữ Xi-on: Kìa… đang đến với ngươi hiền hậu ngồi trên lưng lừa, lưng lừa con, là con của một con vật chở đồ”. (Mt 21,5)","a":"Đức Vua của ngươi","b":"Đức vua dân Do-thái","c":"Vua dân Do-thái","d":"Vua của ngươi","ans":"A"},{"n":245,"q":"“Đã có lời chép rằng:… sẽ được gọi là nhà cầu nguyện, thế mà các ngươi lại biến thành sào huyệt của bọn cướp.” (Mt 21,13)","a":"Nhà Ta","b":"Nhà Cha Ta","c":"Nhà của Ta","d":"Nhà của Cha Ta","ans":"A"},{"n":246,"q":"“Kinh Thánh có câu: Tảng đá thợ xây nhà loại bỏ lại trở nên... Đó chính là công trình của Chúa, công trình kỳ diệu trước mắt chúng ta”. (Mt 21,42)","a":"Viên đá góc tường","b":"Tảng đá góc tường","c":"Đá tảng góc tường","d":"Viên đá góc","ans":"C"},{"n":247,"q":"“Bởi đó, tôi nói cho các ông hay: Nước Thiên Chúa, Thiên Chúa sẽ lấy đi không cho các ông nữa, mà ban cho một dân biết làm cho Nước ấy…”. (Mt 21,43)","a":"Sinh hoa kết trái","b":"Ngày càng thịnh vượng","c":"Sinh nhiều hoa trái","d":"Sinh hoa lợi","ans":"D"},{"n":248,"q":"“Quả thế, trong ngày sống lại, người ta chẳng lấy vợ lấy chồng, nhưng sẽ giống như… trên trời”. (Mt 22,30)","a":"Các phẩm thiên thần","b":"Các thiên thần","c":"Thiên thần","d":"Các thần thánh","ans":"B"},{"n":249,"q":"“Người phán: Ta là Thiên Chúa của Áp-ra-ham, Thiên Chúa của I-xa-ác và Thiên Chúa của Gia-cóp. Người không phải là Thiên Chúa của kẻ chết, nhưng là...” (Mt 22,32)","a":"Đấng Hằng Sống","b":"Thiên Chúa của kẻ sống","c":"Của kẻ sống","d":"Chủ của sự sống","ans":"C"},{"n":250,"q":"“Đức Giê-su đáp: “Ngươi phải yêu mến Đức Chúa, Thiên Chúa của ngươi, hết lòng, hết linh hồn và hết trí khôn ngươi. Đó là điều răn quan trọng nhất và…”. (Mt 22,37-38)","a":"Là điều răn đứng đầu","b":"Là điều răn hàng đầu","c":"Ý nghĩa nhất","d":"Điều răn thứ nhất","ans":"D"},{"n":251,"q":"“Còn điều răn thứ hai, cũng giống điều răn ấy, là: ngươi phải… như chính mình”. (Mt 22,39)","a":"Yêu tha nhân","b":"Yêu người thân cận","c":"Yêu anh em","d":"Yêu hết mọi người","ans":"B"},{"n":252,"q":"“Vậy, tất cả những gì họ nói, anh em hãy làm, hãy giữ, còn những việc họ làm, thì…, vì họ nói mà không làm”. (Mt 23,3)","a":"Chớ có làm theo","b":"Đừng có làm theo","c":"Đừng làm theo họ","d":"Chớ làm theo","ans":"B"},{"n":253,"q":"“Họ bó những gánh nặng mà chất lên vai người ta, nhưng chính họ thì lại không buồn…”. (Mt 23,4)","a":"Đếm xỉa tới","b":"Đụng tới","c":"Chạm tay vào","d":"Động ngón tay vào","ans":"D"},{"n":254,"q":"“Phần anh em, thì đừng để ai gọi mình là ‘ráp-bi’, nghĩa là thầy, vì anh em chỉ có một Thầy; còn tất cả anh em đều là…”. (Mt 23,8)","a":"Con cùng một Cha","b":"Con của Cha trên trời","c":"Anh em với nhau","d":"Anh em cùng một Cha","ans":"C"},{"n":255,"q":"“Anh em cũng đừng gọi ai dưới đất này là cha của anh em, vì anh em chỉ có một Cha là…”. (Mt 23,9)","a":"Cha trên trời","b":"Đấng ngự trên trời","c":"Chúa tể trời đất","d":"Thiên Chúa","ans":"A"},{"n":256,"q":"“Anh em cũng đừng để ai gọi mình là người lãnh đạo, vì anh em chỉ có một vị lãnh đạo, là…”. (Mt 23,10)","a":"Đấng tạo thành","b":"Đức Ki-tô","c":"Thiên Chúa Cha","d":"Cha của Thầy","ans":"B"},{"n":257,"q":"“Trong anh em, người làm lớn hơn cả, phải làm người…”. (Mt 23,11)","a":"Phục vụ anh em","b":"Đầy tớ của anh em","c":"Nhỏ nhất trong anh em","d":"Hầu hạ anh em","ans":"A"},{"n":258,"q":"“Ai tôn mình lên, sẽ bị hạ xuống; còn ai…, sẽ được tôn lên”. (Mt 23,12)","a":"Tự hạ mình xuống","b":"Khiêm nhường","c":"Hạ mình xuống","d":"Khiêm tốn","ans":"C"},{"n":259,"q":"“Các người nộp thuế thập phân về bạc hà, thì là, rau húng, mà bỏ những điều quan trọng nhất trong Lề Luật là công lý, lòng nhân và…”. (Mt 23,23)","a":"Sự thành tín","b":"Lòng thành tín","c":"Sự chân thành","d":"Thành tín","ans":"D"},{"n":260,"q":"“Quân dẫn đường mù quáng! Các người lọc con muỗi, nhưng lại…”. (Mt 23,24)","a":"Nuốt chửng con lạc đà","b":"Nuốt con lạc đà","c":"Bỏ qua con lạc đà","d":"Ăn thịt con lạc đà","ans":"B"},{"n":261,"q":"“Các người cũng vậy, bên ngoài thì có vẻ công chính trước mặt thiên hạ, nhưng bên trong toàn là… và gian ác!” (Mt 23,28)","a":"Thối tha","b":"Giả hình","c":"Xấu xa","d":"Những việc xấu xa","ans":"B"},{"n":262,"q":"“Đã bao lần Ta muốn tập hợp con cái ngươi lại, như gà mẹ tập hợp gà con dưới cánh, mà các ngươi…”. (Mt 23,37)","a":"Từ chối","b":"Bỏ ngoài tai","c":"Không chịu","d":"Chẳng đoái hoài","ans":"C"},{"n":263,"q":"“Thật vậy, Ta nói cho các ngươi hay, từ nay các ngươi sẽ không còn thấy Ta nữa, cho đến khi các ngươi nói: Chúc tụng Đấng ngự đến…!” (Mt 23,39)","a":"Nhân danh Chúa","b":"Trên cõi trời cao","c":"Từ trời cao thẳm","d":"Nhân danh Đức Chúa","ans":"D"},{"n":264,"q":"“Anh em hãy coi chừng, đừng để ai lừa gạt anh em, vì sẽ có nhiều kẻ mạo danh Thầy đến nói rằng: ‘Chính Ta đây là..., và họ sẽ lừa gạt được nhiều người”. (Mt 24,4-5)","a":"Đấng Cứu Thế","b":"Đấng giải thoát ngươi","c":"Đấng Ki-tô","d":"Thiên Chúa thật","ans":"C"},{"n":265,"q":"“Sẽ có những cơn đói kém, và những trận động đất ở nhiều nơi. Nhưng tất cả những sự việc ấy chỉ là khởi đầu…”. (Mt 24,7-8)","a":"Mà thôi","b":"Của ngày tận thế","c":"Các cơn đau đớn","d":"Của ngày chung thẩm","ans":"C"},{"n":266,"q":"“Bấy giờ, người ta sẽ nộp anh em, khiến anh em phải khốn quẫn, và người ta sẽ giết anh em; anh em sẽ bị mọi dân tộc thù ghét vì…”. (Mt 24,9)","a":"Sống công chính","b":"Sống theo lời Thầy","c":"Đã tin vào Thầy","d":"Danh Thầy","ans":"D"},{"n":267,"q":"“Bấy giờ sẽ có nhiều người vấp ngã. Người ta sẽ nộp nhau và thù ghét nhau. Sẽ có nhiều… xuất hiện và lừa gạt được nhiều người”. (Mt 24,10-11)","a":"Ngôn sứ","b":"Ngôn sứ giả","c":"Ki-tô giả","d":"Tiên tri giả","ans":"B"},{"n":268,"q":"“Bấy giờ, nếu có ai bảo anh em: ‘Này, Đấng Ki-tô ở đây’ hoặc ‘ở đó’, thì anh em…”. (Mt 24,23)","a":"Cứ tin","b":"Hãy tin","c":"Chớ có tin","d":"Đừng tin","ans":"D"},{"n":269,"q":"“Thật vậy, sẽ có những Ki-tô giả và ngôn sứ giả xuất hiện, đưa ra những dấu lạ lớn lao và những điềm thiêng, đến nỗi chúng… cả những người đã được tuyển chọn, nếu có thể”. (Mt 24,24)","a":"Uy hiếp","b":"Lừa gạt","c":"Đe dọa","d":"Dụ dỗ","ans":"B"},{"n":270,"q":"“Vậy, nếu người ta bảo anh em ‘Này, Người ở trong hoang địa’, anh em chớ ra đó; ‘Kìa, Người ở trong phòng kín’, anh em cũng…”. (Mt 24,26)","a":"Đừng đi theo","b":"Chớ có vào","c":"Đừng tin","d":"Đừng đi xem","ans":"C"},{"n":271,"q":"“Bấy giờ mọi chi tộc trên mặt đất sẽ đấm ngực và sẽ thấy Con Người rất… ngự giá mây trời mà đến”. (Mt 24,30)","a":"Uy nghi vinh hiển","b":"Oai hùng","c":"Uy hùng","d":"Oai phong vinh hiển","ans":"A"},{"n":272,"q":"“Trời đất sẽ qua đi, nhưng… sẽ chẳng qua đâu”. (Mt 24,35)","a":"Lời Thầy","b":"Điều Thầy nói","c":"Lời Thầy truyền dạy","d":"Những lời Thầy nói","ans":"D"},{"n":273,"q":"“Còn về ngày và giờ đó thì không ai biết được, ngay cả các thiên sứ trên trời hay cả người Con cũng không; … Chúa Cha biết mà thôi”. (Mt 24,36)","a":"Duy chỉ có","b":"Chỉ mình","c":"Chỉ một mình","d":"Chỉ có","ans":"C"},{"n":274,"q":"“Vậy anh em hãy…, vì anh em không biết ngày nào Chúa của anh em đến”. (Mt 24,42)","a":"Tỉnh thức","b":"Canh thức","c":"Sẵn sàng","d":"Cả A và C","ans":"B"},{"n":275,"q":"“Anh em hãy biết điều này: nếu chủ nhà biết… kẻ trộm sẽ đến, hẳn ông đã thức, không để nó khoét vách nhà mình đâu”. (Mt 24,43)","a":"Vào canh nào","b":"Lúc nào","c":"Khi nào","d":"Chắc khi nào","ans":"A"},{"n":276,"q":"“Cho nên anh em cũng vậy, anh em hãy sẵn sàng, vì chính giờ phút anh em…, thì Con Người sẽ đến”. (Mt 24,44)","a":"Đang ngủ","b":"Coi thường","c":"Không ngờ","d":"Lơ là","ans":"C"},{"n":277,"q":"“Vậy anh em hãy…, vì anh em không biết ngày nào, giờ nào”. (Mt 25,13)","a":"Tỉnh thức","b":"Canh thức","c":"Sẵn sàng","d":"Cả A và C","ans":"B"},{"n":278,"q":"“Vì phàm ai đã có, thì được cho thêm và…; còn ai không có, thì ngay cái đang có, cũng sẽ bị lấy đi”. (Mt 25,29)","a":"Nhiều thêm mãi","b":"Được dư thừa","c":"Được dư dật","d":"Sẽ có dư thừa","ans":"D"},{"n":279,"q":"“Người nghèo thì lúc nào anh em cũng có với anh em; còn Thầy, thì không phải lúc nào…!” (Mt 26,11)","a":"Anh em cũng có đâu","b":"Cũng ở bên anh em đâu","c":"Anh em cũng gặp đâu","d":"Anh em cũng thấy đâu","ans":"A"},{"n":280,"q":"“Các anh đi vào thành, đến nhà một người kia và nói với ông ấy: ‘Thầy nhắn:…, Thầy sẽ đến nhà ông để ăn mừng lễ Vượt Qua với các môn đệ của Thầy.’” (Mt 26,18)","a":"Này ông","b":"Này đây","c":"Thời của Thầy đã gần tới","d":"Nội trong hôm nay","ans":"C"},{"n":281,"q":"“Đang bữa ăn, Người nói: “Thầy bảo thật anh em, một người trong anh em sẽ...” (Mt 26,21)","a":"Bán đứng Thầy","b":"Nộp Thầy","c":"Phản bội Thầy","d":"Phản Thầy","ans":"B"},{"n":282,"q":"“Cũng trong bữa ăn, Đức Giê-su cầm lấy bánh,…, rồi bẻ ra, trao cho môn đệ và nói: “Anh em cầm lấy mà ăn, đây là mình Thầy.” (Mt 26,26)","a":"Dâng lời tạ ơn","b":"Ngước mắt lên trời","c":"Dâng lời chúc tụng","d":"Chúc tụng Thiên Chúa","ans":"C"},{"n":283,"q":"“Tất cả anh em hãy uống chén này, vì đây là máu Thầy, máu Giao Ước, đổ ra cho… được tha tội”. (Mt 26,27-28)","a":"Nhiều người","b":"Hết mọi người","c":"Muôn dân","d":"Muôn người","ans":"D"},{"n":284,"q":"“Thầy bảo cho anh em biết: từ nay, Thầy không còn uống thứ sản phẩm này của cây nho, cho đến ngày Thầy cùng anh em uống thứ rượu mới trong ...” (Mt 26,29)","a":"Nước Thiên Chúa","b":"Nước của Cha Thầy","c":"Nước Trời","d":"Vương quốc của Cha Thầy","ans":"B"},{"n":285,"q":"“Đêm nay tất cả anh em sẽ vấp ngã vì Thầy. Vì có lời đã chép: Ta sẽ đánh người chăn chiên, và… sẽ tan tác”. (Mt 26,31)","a":"Đàn chiên","b":"Cả đàn chiên","c":"Cả chủ chiên và chiên","d":"Chúng","ans":"A"},{"n":286,"q":"“Ông Phê-rô liền thưa: “Dầu tất cả có vấp ngã vì Thầy đi nữa, thì con đây cũng… vấp ngã.” (Mt 26,33)","a":"Không bao giờ","b":"Chẳng bao giờ","c":"Không đời nào","d":"Chẳng khi nào","ans":"B"},{"n":287,"q":"“Đức Giê-su bảo ông: “Thầy bảo thật anh: nội đêm nay,…, thì anh đã chối Thầy ba lần.” (Mt 26,34)","a":"Khi gà chưa gáy","b":"Gà chưa gáy lần thứ ba","c":"Gà gáy lần thứ ba","d":"Gà chưa kịp gáy","ans":"D"},{"n":288,"q":"“Bấy giờ Người nói với các ông: “Tâm hồn Thầy buồn đến chết được. Anh em ở lại đây mà… với Thầy.” (Mt 26,38)","a":"Thức","b":"Cùng cầu nguyện","c":"Canh thức","d":"Cùng canh thức","ans":"C"},{"n":289,"q":"“Lạy Cha, nếu có thể được, xin cho con khỏi phải uống chén này. Tuy vậy,…, mà xin theo ý Cha.” (Mt 26,39)","a":"Đừng theo ý con","b":"Xin đừng theo ý con","c":"Xin Cha đừng theo ý con","d":"Con không xin theo ý con","ans":"B"},{"n":290,"q":"“Thế ra anh em không thể… với Thầy một giờ sao?” (Mt 26,40)","a":"Canh thức nổi","b":"Canh thức","c":"Thức nổi","d":"Thức","ans":"A"},{"n":291,"q":"“Anh em hãy canh thức và cầu nguyện, để khỏi lâm vào cơn cám dỗ. Vì tinh thần thì…, nhưng thể xác lại...” (Mt 26,41)","a":"Hăng say/ yếu hèn","b":"Hăng hái/ yếu đuối","c":"Mạnh mẽ/ yếu hèn","d":"Hăng say/ yếu đuối","ans":"A"},{"n":292,"q":"“Này, đến giờ Con Người bị nộp vào tay... Đứng dậy, ta đi nào! Kìa kẻ nộp Thầy đã tới !” (Mt 26,45-46)","a":"Quân tội lỗi","b":"Bọn người tội lỗi","c":"Những kẻ tội lỗi","d":"Người đời","ans":"C"},{"n":293,"q":"“Đức Giê-su bảo người ấy: “Hãy xỏ gươm vào vỏ, vì tất cả những ai cầm gươm sẽ…”. (Mt 26,52)","a":"Bị chết vì gươm","b":"Chết vì gươm","c":"Chịu chết vì gươm","d":"Mất mạng vì gươm","ans":"B"},{"n":294,"q":"“Từ nay, các ông sẽ thấy Con Người ngự bên hữu… và ngự giá mây trời mà đến.” (Mt 26,64)","a":"Thiên Chúa","b":"Chúa Cha","c":"Đức Vua","d":"Đấng Toàn Năng","ans":"D"},{"n":295,"q":"“Ông Phê-rô sực nhớ lời Đức Giê-su đã nói: “…thì anh đã chối Thầy ba lần.” Ông ra ngoài, khóc lóc thảm thiết”. (Mt 26,75)","a":"Trước khi gà gáy","b":"Khi gà gáy lần thứ ba","c":"Gà chưa kịp gáy","d":"Khi gà chưa gáy lần thứ ba","ans":"C"},{"n":296,"q":"“Phía trên đầu Người, chúng đặt bản án xử tội viết rằng: “Người này là Giê-su,…” (Mt 27,37)","a":"Vua Do-thái","b":"Vua dân Do-thái","c":"Vua người Do-thái","d":"Đức vua dân Do-thái","ans":"B"},{"n":297,"q":"“Này các bà, các bà đừng sợ! Tôi biết các bà tìm Đức Giê-su, Đấng bị đóng đinh. Người không có ở đây, vì… như Người đã nói”. (Mt 28,5-6)","a":"Người đã trỗi dậy","b":"Người đã lên trời","c":"Người đã sống lại","d":"Người đã phục sinh","ans":"A"},{"n":298,"q":"“Người đã trỗi dậy từ cõi chết, và Người đi Ga-li-lê trước các ông. Ở đó, các ông sẽ được…”. (Mt 28,7)","a":"Thấy Người","b":"Thấy mặt Người","c":"Gặp Người","d":"Gặp lại Người","ans":"A"},{"n":299,"q":"“Bấy giờ, Đức Giê-su nói với các bà: “… Về báo cho anh em của Thầy để họ đến Ga-li-lê. Họ sẽ được thấy Thầy ở đó.” (Mt 28,10)","a":"Này chị em","b":"Đừng sợ","c":"Chị em đừng sợ!","d":"Này, chị em đừng sợ!","ans":"C"},{"n":300,"q":"“Mười một môn đệ đi tới miền Ga-li-lê, đến ngọn núi Đức Giê-su đã truyền cho các ông đến. Khi thấy Người,…, nhưng có mấy ông lại hoài nghi”. (Mt 28,16-17)","a":"Họ rất đỗi vui mừng","b":"Các ông bái lạy","c":"Họ vô cùng vui sướng","d":"Các ông ngạc nhiên","ans":"B"}];

let QUESTIONS = QUESTIONS_P1;
let currentPart = 1;

const LETTERS = ['a','b','c','d'];
const LABELS = ['A','B','C','D'];
const GROUP_SIZE = 30;
// NUM_GROUPS computed dynamically in renderGroups() to support variable-length sets

let currentGroupIndex = 0;
let groupCorrect = 0;
let groupAnswered = 0;
let groupTotal = 0;


const groupScoresP1 = {};
const groupScoresP2 = {};
const groupScoresP3 = {};
const groupScoresP4 = {};
const groupScoresP5 = {};

function selectPart(part) {
  currentPart = part;
  QUESTIONS = [QUESTIONS_P1,QUESTIONS_P2,QUESTIONS_P3,QUESTIONS_P4,QUESTIONS_P5][part-1];
  [1,2,3,4,5].forEach(p => document.getElementById('tabP'+p).classList.toggle('active', p === part));
  const total = QUESTIONS.length;
  const groups = Math.ceil(total / GROUP_SIZE);
  const labels = [
    `Trắc nghiệm · ${total} câu · ${groups} phần`,
    `Hoàn tất câu KT · ${total} câu · ${groups} phần`,
    `Lịch Sử Giáo Phận · ${total} câu · ${groups} phần`,
    `Giới Trẻ & Thiếu Nhi · ${total} câu · ${groups} phần`,
    `Gia Trưởng & Hiền Mẫu · ${total} câu · ${groups} phần`,
  ];
  const desc = labels[part - 1] || '';
  document.getElementById('totalBadge').textContent = desc;
  renderGroups();
}

function getGroupScores() {
  return [groupScoresP1,groupScoresP2,groupScoresP3,groupScoresP4,groupScoresP5][currentPart-1];
}

// Track completion per group: { groupIndex: score }

function showScreen(id) {
  ['screen-home','screen-quiz','screen-results'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'block';
  document.getElementById('btnHome').style.display =
    (id === 'screen-home') ? 'none' : 'block';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function goHome() {
  renderGroups();
  showScreen('screen-home');
}

function renderGroups() {
  const grid = document.getElementById('groupsGrid');
  grid.innerHTML = '';
  const numGroups = Math.ceil(QUESTIONS.length / GROUP_SIZE);
  for (let i = 0; i < numGroups; i++) {
    const start = i * GROUP_SIZE + 1;
    const end = Math.min((i + 1) * GROUP_SIZE, QUESTIONS.length);
    const card = document.createElement('div');
    card.className = 'group-card';
    const doneHtml = getGroupScores()[i] !== undefined
      ? `<div class="group-done-badge">${getGroupScores()[i]}/${end - start + 1}</div>` : '';
    card.innerHTML = `
      ${doneHtml}
      <div class="group-num">Phần ${i + 1}</div>
      <div class="group-label">Câu ${start} – ${end}</div>
    `;
    card.onclick = () => startGroup(i);
    grid.appendChild(card);
  }
}

function startGroup(groupIdx) {
  currentGroupIndex = groupIdx;
  groupCorrect = 0;
  groupAnswered = 0;

  const start = groupIdx * GROUP_SIZE;
  const end = Math.min(start + GROUP_SIZE, QUESTIONS.length);
  const qs = QUESTIONS.slice(start, end);
  groupTotal = qs.length;

  const startNum = start + 1;
  const endNum = end;
  const partLabel = currentPart === 2 ? ' (Phần II)' : '';
  document.getElementById('quizRangeLabel').textContent =
    `Phần ${groupIdx + 1}${partLabel}: Câu ${startNum} – ${endNum}`;
  document.getElementById('scoreCorrect').textContent = '0';
  document.getElementById('scoreAnswered').textContent = '0';
  document.getElementById('progressBar').style.width = '0%';

  const container = document.getElementById('quizCards');
  container.innerHTML = '';

  qs.forEach((q) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="q-badge">Câu ${q.n}</div>
      <div class="q-text">${q.q}</div>
    `;

    LETTERS.forEach((letter, idx) => {
      const option = document.createElement('div');
      option.className = 'option';
      option.setAttribute('role', 'button');
      option.innerHTML = `
        <div class="option-letter">${LABELS[idx]}</div>
        <div>${q[letter]}</div>
      `;
      option.onclick = () => {
        if (card.dataset.answered) return;
        card.dataset.answered = 'true';
        groupAnswered++;

        const allOptions = card.querySelectorAll('.option');
        allOptions.forEach((el, i) => {
          el.style.pointerEvents = 'none';
          const l = LETTERS[i];
          if (l.toUpperCase() === q.ans) el.classList.add('correct');
          if (l === letter && l.toUpperCase() !== q.ans) el.classList.add('wrong');
        });

        const isCorrect = letter.toUpperCase() === q.ans;
        if (isCorrect) groupCorrect++;

        const result = document.createElement('div');
        if (isCorrect) {
          result.className = 'result correct';
          result.innerHTML = `✅ <strong>Chính xác!</strong> Đáp án đúng là <strong>${q.ans}</strong>`;
        } else {
          result.className = 'result wrong';
          result.innerHTML = `❌ <strong>Sai rồi!</strong> Đáp án đúng là <strong>${q.ans}: ${q[q.ans.toLowerCase()]}</strong>`;
        }
        result.style.display = 'block';
        card.appendChild(result);

        // Update progress
        document.getElementById('scoreCorrect').textContent = groupCorrect;
        document.getElementById('scoreAnswered').textContent = groupAnswered;
        document.getElementById('progressBar').style.width =
          (groupAnswered / groupTotal * 100) + '%';

        if (groupAnswered === groupTotal) {
          setTimeout(() => showResults(), 600);
        }
      };
      card.appendChild(option);
    });

    container.appendChild(card);
  });

  showScreen('screen-quiz');
}

function showResults() {
  getGroupScores()[currentGroupIndex] = groupCorrect;

  const start = currentGroupIndex * GROUP_SIZE + 1;
  const end = Math.min((currentGroupIndex + 1) * GROUP_SIZE, QUESTIONS.length);
  const pct = Math.round(groupCorrect / groupTotal * 100);

  document.getElementById('resultsRange').textContent =
    `Phần ${currentGroupIndex + 1} · Câu ${start} – ${end}`;
  document.getElementById('resultsBig').textContent = groupCorrect;
  document.getElementById('resultsTotal').textContent = `/ ${groupTotal} câu đúng`;
  document.getElementById('resultsBar').style.width = '0%';
  document.getElementById('resultsBar').style.background =
    pct >= 80 ? 'linear-gradient(90deg,#4caf6e,#7dd8a0)' :
    pct >= 50 ? 'linear-gradient(90deg,#c9a84c,#e8c76a)' :
    'linear-gradient(90deg,#e05a5a,#f08080)';

  let msg = '';
  if (pct === 100) msg = 'Xuất sắc! Bạn trả lời đúng tất cả.';
  else if (pct >= 80) msg = 'Rất tốt! Bạn nắm vững Lời Chúa.';
  else if (pct >= 60) msg = 'Khá tốt! Hãy ôn lại những câu sai.';
  else if (pct >= 40) msg = 'Cần cố gắng thêm. Hãy đọc lại Tin Mừng.';
  else msg = 'Hãy kiên nhẫn ôn luyện thêm nhé!';

  document.getElementById('resultsMsg').textContent = msg;
  showScreen('screen-results');
  setTimeout(() => {
    document.getElementById('resultsBar').style.width = pct + '%';
  }, 100);
}

function retakeGroup() {
  startGroup(currentGroupIndex);
}

// Init
renderGroups();
showScreen('screen-home');
</script>
</body>
</html>
