a, sửa lối cho thẳng để Người đi”. Ngôn sứ đã nói câu này về ai? (x. Mt 3,1-3)","a":"Đức Giê-su","b":"Gio-an Tẩy Giả","c":"Đức Maria","d":"Tất cả đều đúng.","ans":"B"},{"n":10,"q":"“Ông mặc áo lông lạc đà, thắt lưng bằng dây da, lấy châu chấu và mật ong rừng làm thức ăn”. Ông là ai? (x. Mt 3,1-4)","a":"Gio-an Tông đồ","b":"An-rê","c":"Si-môn Phê-rô","d":"Gio-an Tẩy Giả","ans":"D"},{"n":11,"q":"“Nòi rắn độc kia, ai đã chỉ cho các anh cách trốn cơn thịnh nộ của Thiên Chúa sắp giáng xuống vậy?” Ông Gio-an nói lời này với ai? (x. Mt 3,7)","a":"Người thuộc phái Pha-ri-sêu","b":"Người thuộc phái Xa-đốc","c":"Các kinh sư","d":"Cả A và B","ans":"D"},{"n":12,"q":"“Các anh hãy sinh hoa quả để chứng tỏ lòng sám hối”. Ông Gio-an nói lời này với ai? (x. Mt 3,7-8)","a":"Người thuộc phái Pha-ri-sêu","b":"Người thuộc phái Xa-đốc","c":"Các kinh sư","d":"Cả A và B","ans":"D"},{"n":13,"q":"“Tôi, tôi làm phép rửa cho các anh trong nước để giục lòng các anh sám hối. Còn Đấng đến sau tôi thì quyền thế hơn tôi, tôi không đáng xách dép cho Người”. Ông Gio-an nói lời này về ai? (x. Mt 3,1-17)","a":"Vua Hê-rô-đê","b":"Tổng trấn Phi-la-tô","c":"Đức Giê-su","d":"Qui-ri-ni-ô","ans":"C"},{"n":14,"q":"“Tay Người cầm nia, Người sẽ rê sạch lúa trong sân: thóc mẩy thì thu vào kho lẫm, còn thóc lép thì bỏ vào lửa không hề tắt mà đốt đi.” Ông Gio-an nói lời này về ai? (x. Mt 3,1-17)","a":"Đức Giê-su","b":"Qui-ri-ni-ô","c":"Tổng lãnh thiên thần","d":"Hoàng đế Au-gút-tô","ans":"A"},{"n":15,"q":"Bấy giờ, Đức Giê-su từ miền Ga-li-lê đến sông Gio-đan, gặp ông Gio-an để làm gì? (x. Mt 3,13)","a":"Xin ông rửa tội cho mình","b":"Mời ông cộng tác với mình","c":"Xin ông làm phép rửa cho mình","d":"Xin ông rời đi chỗ khác","ans":"C"},{"n":16,"q":"“Chính tôi mới cần được Ngài làm phép rửa, thế mà Ngài lại đến với tôi!” Ai đã nói câu này? (x. Mt 3,14)","a":"Đức Giê-su","b":"Ông Phê-rô","c":"Ông trưởng hội đường","d":"Gio-an Tẩy Giả","ans":"D"},{"n":17,"q":"“Chính tôi mới cần được Ngài làm phép rửa, thế mà Ngài lại đến với tôi!” Ông Gio-an đã nói câu này với ai? (x. Mt 3,13-14)","a":"Đức Giê-su","b":"Vua Hê-rô-đê","c":"Phi-la-tô","d":"Thầy thượng tế","ans":"A"},{"n":18,"q":"“Bây giờ cứ thế đã. Vì chúng ta nên làm như vậy để giữ trọn đức công chính” Ai đã nói câu này? (x. Mt 3,15)","a":"Gio-an Tẩy Giả","b":"Đức Giê-su","c":"Ông Si-môn cùi","d":"Ông trưởng hội đường","ans":"B"},{"n":19,"q":"“Đây là Con yêu dấu của Ta, Ta hài lòng về Người.” Ai đã nói câu này? (x. Mt 3,17)","a":"Chúa Thánh Thần","b":"Thánh Giu-se","c":"Đức Maria","d":"Tiếng từ trời","ans":"D"},{"n":20,"q":"Ai đã dẫn Đức Giê-su vào hoang địa để chịu quỷ cám dỗ? (x. Mt 4,1)","a":"Đức Chúa Cha","b":"Các Thiên Thần","c":"Thần Khí","d":"Tất cả đều sai","ans":"C"},{"n":21,"q":"“Khi ấy tên cám dỗ đến gần Người và nói: “Nếu ông là Con Thiên Chúa, thì truyền cho những hòn đá này hoá bánh đi!” Đây là cơn cám dỗ thứ mấy? (x. Mt 4,3-4)","a":"Thứ nhất","b":"Thứ hai","c":"Thứ ba","d":"Tất cả đều sai","ans":"A"},{"n":22,"q":"“Nếu ông là Con Thiên Chúa, thì gieo mình xuống đi! Vì đã có lời chép rằng: Thiên Chúa sẽ truyền cho thiên sứ lo cho bạn, và thiên sứ sẽ tay đỡ tay nâng, cho bạn khỏi vấp chân vào đá.” Đây là cơn cám dỗ thứ mấy? (x. Mt 4,5-7)","a":"Thứ nhất","b":"Thứ hai","c":"Thứ ba","d":"Tất cả đều sai","ans":"B"},{"n":23,"q":"“Tôi sẽ cho ông tất cả những thứ đó, nếu ông sấp mình bái lạy tôi.” Đây là cơn cám dỗ thứ mấy? (x. Mt 4,8-10)","a":"Thứ nhất","b":"Thứ hai","c":"Thứ ba","d":"Tất cả đều sai","ans":"C"},{"n":24,"q":"Khi Đức Giê-su nghe tin ông Gio-an đã bị nộp, Người lánh qua miền Ga-li-lê. Rồi Người bỏ Na-da-rét, đến ở một thành ven biển hồ Ga-li-lê, thuộc địa hạt Dơ-vu-lun và Náp-ta-li. Thành đó là thành nào? (x. Mt 4,12-13)","a":"Bét-sai-đa","b":"Khô-ra-din","c":"Xê-xa-rê Phi-líp-phê","d":"Ca-phác-na-um","ans":"D"},{"n":25,"q":"“Đoàn dân đang ngồi trong cảnh tối tăm đã thấy một ánh sáng huy hoàng, những kẻ đang ngồi trong vùng bóng tối của tử thần nay được ánh sáng bừng lên chiếu rọi”. Ngôn sứ nào đã nói câu này? (x. Mt 4,12-16)","a":"Giê-rê-mi-a","b":"Ê-li-a","c":"Mi-kha","d":"I-sai-a","ans":"D"},{"n":26,"q":"Khi Đức Giê-su gọi hai anh em Si-môn và An-rê, các ông đang làm gì? (x. Mt 4,18-20)","a":"Đang vá lưới trên thuyền","b":"Đang ngồi ở bàn thu thuế","c":"Đang ở nhà","d":"Đang quăng chài xuống biển","ans":"D"},{"n":27,"q":"“Người bảo các ông: “Các anh hãy theo tôi, tôi sẽ làm cho các anh thành những kẻ lưới người như lưới cá.” Đức Giê-su nói câu này với ai? (x. Mt 4,18-19)","a":"Si-môn và An-rê","b":"Gia-cô-bê và Gio-an","c":"Si-môn và Gio-an","d":"Gia-cô-bê và An-rê","ans":"A"},{"n":28,"q":"Khi Đức Giê-su gọi hai anh em Gia-cô-bê và Gio-an, các ông đang làm gì? (x. Mt 4,18-20)","a":"Đang vá lưới ở trong thuyền","b":"Đang ngồi ở bàn thu thuế","c":"Đang ở nhà","d":"Đang quăng chài xuống biển","ans":"A"},{"n":29,"q":"Hai anh em Gia-cô-bê và Gio-an là con của ai? (x. Mt 4,21-22)","a":"Si-môn Ky-rê-nê","b":"Gia-ia","c":"Da-ca-ri-a","d":"Dê-bê-đê","ans":"D"},{"n":30,"q":"“Lập tức hai ông bỏ chài lưới mà đi theo Người”. Câu này nói về cặp anh em nào? (x. Mt 4,18-20)","a":"Si-môn và Gia-cô-bê","b":"Gia-cô-bê và Gio-an","c":"Si-môn và An-rê","d":"An-rê và Gio-an","ans":"C"},{"n":31,"q":"“Lập tức, các ông bỏ thuyền, bỏ cha lại mà theo Người”. Câu này nói về cặp anh em nào? (x. Mt 4,21-22)","a":"An-rê và Gio-an","b":"Si-môn và An-rê","c":"Si-môn và Gia-cô-bê","d":"Gia-cô-bê và Gio-an","ans":"D"},{"n":32,"q":"Trong bài giảng về “Tám mối phúc”, người có tâm hồn nghèo khó sẽ được phần thưởng gì? (x. Mt 5,3)","a":"Đất Hứa làm gia nghiệp","b":"Thiên Chúa cho thỏa lòng","c":"Nước Trời là của họ","d":"Thiên Chúa ủi an","ans":"C"},{"n":33,"q":"Trong bài giảng về “Tám mối phúc”, người hiền lành sẽ được phần thưởng gì? (x. Mt 5,4)","a":"Nước Trời là của họ","b":"Đất Hứa làm gia nghiệp","c":"Thiên Chúa ủi an","d":"Thiên Chúa xót thương","ans":"B"},{"n":34,"q":"Trong bài giảng về “Tám mối phúc”, người sầu khổ sẽ được phần thưởng gì? (x. Mt 5,5)","a":"Thiên Chúa ủi an","b":"Thiên Chúa xót thương","c":"Nước Trời là của họ","d":"Nhìn thấy Thiên Chúa","ans":"A"},{"n":35,"q":"Trong bài giảng về “Tám mối phúc”, người khao khát nên người công chính sẽ được phần thưởng gì? (x. Mt 5,6)","a":"Thiên Chúa xót thương","b":"Nhìn thấy Thiên Chúa","c":"Nước Trời là của họ","d":"Thiên Chúa cho thỏa lòng","ans":"D"},{"n":36,"q":"Trong bài giảng về “Tám mối phúc”, người xót thương người sẽ được phần thưởng gì? (x. Mt 5,7)","a":"Thiên Chúa xót thương","b":"Nước Trời là của họ","c":"Đất Hứa làm gia nghiệp","d":"Nhìn thấy Thiên Chúa","ans":"A"},{"n":37,"q":"Trong bài giảng về “Tám mối phúc”, người có tâm hồn trong sạch sẽ được phần thưởng gì? (x. Mt 5,8)","a":"Nước Trời là của họ","b":"Đất Hứa làm gia nghiệp","c":"Nhìn thấy Thiên Chúa","d":"Thiên Chúa xót thương","ans":"C"},{"n":38,"q":"Trong bài giảng về “Tám mối phúc”, người xây dựng hòa bình sẽ được phần thưởng gì? (x. Mt 5,9)","a":"Được gọi là con Thiên Chúa","b":"Thiên Chúa xót thương","c":"Đất Hứa làm gia nghiệp","d":"Nước Trời là của họ","ans":"A"},{"n":39,"q":"Trong bài giảng về “Tám mối phúc”, người bị bách hại vì sống công chính sẽ được phần thưởng gì? (x. Mt 5,10)","a":"Đất Hứa làm gia nghiệp","b":"Nước Trời là của họ","c":"Thiên Chúa xót thương","d":"Được gọi là Con Thiên Chúa","ans":"B"},{"n":40,"q":"Trong bài giảng về “Đừng giận ghét”, Đức Giê-su dạy, những ai giận anh em mình, thì hậu quả sẽ ra sao? (x. Mt 5,22)","a":"Bị đưa ra trước Thượng Hội Đồng","b":"Bị đưa ra tòa","c":"Lửa hỏa ngục thiêu đốt","d":"Tất cả đều đúng","ans":"B"},{"n":41,"q":"Trong bài giảng về “Đừng giận ghét”, Đức Giê-su dạy, những ai mắng anh em mình là đồ ngốc, thì hậu quả sẽ ra sao? (x. Mt 5,22)","a":"Lửa hỏa ngục thiêu đốt","b":"Bị đưa ra tòa","c":"Bị đưa ra trước Thượng Hội Đồng","d":"Tất cả đều đúng","ans":"C"},{"n":42,"q":"Trong bài giảng về “Đừng giận ghét”, Đức Giê-su dạy, những ai chửi anh em mình là quân phản đạo, thì hậu quả sẽ ra sao? (x. Mt 5,22)","a":"Đáng bị lửa hỏa ngục thiêu đốt","b":"Bị đưa ra tòa","c":"Bị đưa ra trước Thượng Hội Đồng","d":"Tất cả đều đúng","ans":"A"},{"n":43,"q":"Đức Giê-su cảnh báo các môn đệ hãy coi chừng hạng người “đội lốt chiên mà đến với anh em; nhưng bên trong, họ là sói dữ tham mồi”. Hạng người này là ai? (x. Mt 7,15)","a":"Ngôn sứ giả","b":"Người Pha-ri-sêu","c":"Các Kinh sư","d":"Cả B và C","ans":"A"},{"n":44,"q":"Đức Giê-su nói: “Vậy ai nghe những lời Thầy nói đây mà đem ra thực hành”, thì ví được như hạng người nào? (x. Mt 7,24)","a":"Người ngu dại xây nhà trên cát","b":"Người khôn xây nhà trên đá","c":"Kẻ đạo đức giả","d":"Kẻ giả hình","ans":"B"},{"n":45,"q":"Đức Giê-su nói: “Còn ai nghe những lời Thầy nói đây, mà chẳng đem ra thực hành”, thì ví được như hạng người nào? (x. Mt 7,26)","a":"Kẻ đạo đức giả","b":"Người khôn xây nhà trên đá","c":"Người ngu dại xây nhà trên cát","d":"Kẻ giả hình","ans":"C"},{"n":46,"q":"“Thưa Ngài, nếu Ngài muốn, Ngài có thể làm cho tôi được sạch.” Ai đã nói câu này? (x. Mt 8,1-2)","a":"Người bị thần ô uế ám","b":"Người đàn bà bị rong huyết","c":"Một người mắc bệnh phong","d":"Tất cả đều sai","ans":"C"},{"n":47,"q":"“Người giơ tay đụng vào anh và bảo: “Tôi muốn, anh sạch đi.” Đức Giê-su nói lời này với ai? (x. Mt 8,3)","a":"Một người mắc bệnh phong","b":"Người bị thần ô uế ám","c":"Mười người phong cùi","d":"Tất cả đều sai","ans":"A"},{"n":48,"q":"“Thưa Ngài, tên đầy tớ của tôi bị tê bại nằm liệt ở nhà, đau đớn lắm.” Ai đã nói câu này? (x. Mt 8,5-6)","a":"Viên đại đội trưởng","b":"Ông trưởng hội đường","c":"Viên sĩ quan cận vệ","d":"Tất cả đều đúng","ans":"A"},{"n":49,"q":"“Tôi bảo thật các ông: tôi không thấy một người Ít-ra-en nào có lòng tin như thế”. Đức Giê-su nói lời này về ai? (x. Mt 8,5-10)","a":"Người phụ nữ Ca-na-an","b":"Ông trưởng hội đường","c":"Viên đại đội trưởng","d":"Người bại liệt","ans":"C"},{"n":50,"q":"“Ông cứ về đi! Ông tin thế nào thì được như vậy!” Đức Giê-su nói lời này với ai? (x. Mt 8,13)","a":"Ông trưởng hội đường","b":"Người bại liệt","c":"Người bị quỷ ám","d":"Viên đại đội trưởng","ans":"D"},{"n":51,"q":"Người đã mang lấy các tật nguyền của ta và gánh lấy các bệnh hoạn của ta”. Ngôn sứ nào đã nói câu này? (x. Mt 8,16-17)","a":"I-sai-a","b":"Giê-rê-mi-a","c":"Hô-sê","d":"Ma-la-khi","ans":"A"},{"n":52,"q":"“Thưa Thầy, Thầy đi đâu, tôi cũng xin đi theo.” Ai đã nói câu này? (x. Mt 8,19)","a":"Người thanh niên giàu có","b":"Một kinh sư","c":"Người bị quỷ ám","d":"Anh mù từ khi mới sinh","ans":"B"},{"n":53,"q":"“Con chồn có hang, chim trời có tổ, nhưng Con Người không có chỗ tựa đầu.” Đức Giê-su nói câu này với ai? (x. Mt 8,20)","a":"Ông Ni-cô-đê-mô","b":"Người phụ nữ Sa-ma-ri","c":"4 môn đệ đầu tiên","d":"Một kinh sư","ans":"D"},{"n":54,"q":"“Thưa Ngài, xin cho phép con về chôn cất cha con trước đã.” Ai đã nói câu này? (x. Mt 8,21)","a":"Một môn đệ khác","b":"Một kinh sư","c":"Người thanh niên giàu có","d":"Người bị quỷ ám","ans":"A"},{"n":55,"q":"“Anh hãy đi theo tôi, cứ để kẻ chết chôn kẻ chết của họ.” Đức Giê-su nói câu này với ai? (x. Mt 8,22)","a":"Một kinh sư","b":"Người thanh niên giàu có","c":"Một môn đệ khác","d":"Người bị quỷ ám","ans":"C"},{"n":56,"q":"“Sao nhát thế, hỡi những người kém lòng tin!” Đức Giê-su nói câu này với ai? (x. Mt 8,23-26)","a":"Si-môn và An-rê","b":"Các môn đệ","c":"Gia-cô-bê và Gio-an","d":"Những người Pha-ri-sêu","ans":"B"},{"n":57,"q":"Đức Giê-su chữa hai người bị quỷ ám ở đâu? (x. Mt 8,28)","a":"Ghen-nê-xa-rét","b":"Ga-đa-ra","c":"Ca-phác-na-um","d":"Xê-da-rê Phi-líp-phê","ans":"B"},{"n":58,"q":"Sau phép lạ Đức Giê-su trừ quỷ ở Ga-đa-ra, cả thành ra đón Đức Giê-su. Khi gặp Người, họ đã xin Người điều gì? (x. Mt 8,34)","a":"Ở lại với họ","b":"Giảng cho họ nghe","c":"Rời khỏi vùng đất của họ","d":"Chữa lành bệnh tật","ans":"C"},{"n":59,"q":"“Này con, cứ yên tâm, con đã được tha tội rồi!” Đức Giê-su nói câu này với ai? (x. Mt 9,2)","a":"Anh mù Ba-ti-mê","b":"Người đàn bà bị rong huyết","c":"Người mù từ khi mới sinh","d":"Người bại liệt","ans":"D"},{"n":60,"q":"“Sao các ông lại nghĩ xấu trong bụng như vậy? Trong hai điều: một là bảo: ‘Con đã được tha tội rồi’, hai là bảo: ‘Đứng dậy mà đi’, điều nào dễ hơn? Đức Giê-su nói câu này với ai? (x. Mt 9,4-5)","a":"Những người Do-thái","b":"Mấy kinh sư","c":"Người Pha-ri-sêu","d":"Cả A, B và C","ans":"B"},{"n":61,"q":"‘Đứng dậy, vác giường đi về nhà!’” Đức Giê-su nói câu này với ai? (x. Mt 9,6)","a":"Người bị quỷ ám","b":"Người bại liệt","c":"Người bị thần ô uế ám","d":"Một vị thủ lãnh","ans":"B"},{"n":62,"q":"“Anh hãy theo tôi!” Đức Giê-su nói câu này với ai? (x. Mt 9,9)","a":"Si-môn và An-rê","b":"Gia-cô-bê và Gio-an","c":"Mát-thêu","d":"Người bại liệt","ans":"C"},{"n":63,"q":"“Sao Thầy các anh lại ăn uống với bọn thu thuế và quân tội lỗi như vậy?” Ai đã nói lời này với các môn đệ? (x. Mt 9,11)","a":"Những người Pha-ri-sêu","b":"Các kinh sư","c":"Các thượng tế","d":"Cả B và C","ans":"A"},{"n":64,"q":"“Con gái tôi vừa mới chết. Nhưng xin Ngài đến đặt tay lên cháu, là nó sẽ sống.” Ai đã nói câu này? (x. Mt 9,18)","a":"Ông trưởng hội đường","b":"Một vị thủ lãnh","c":"Ông Gia-ia","d":"Viên sĩ quan ngoại giáo","ans":"B"},{"n":65,"q":"“Tôi chỉ cần sờ được vào áo của Người thôi là sẽ được cứu!” Ai đã nghĩ bụng như vậy? (x. Mt 9,20-21)","a":"Người bại liệt","b":"Anh mù Ba-ti-mê","c":"Người đàn bà bị rong huyết","d":"Anh mù từ khi mới sinh","ans":"C"},{"n":66,"q":"“Này con, cứ yên tâm, lòng tin của con đã cứu chữa con.” Đức Giê-su đã nói câu này với ai? (x. Mt 9,20-22)","a":"Người bại liệt","b":"Anh mù từ khi mới sinh","c":"Người bị quỷ ám","d":"Người đàn bà bị rong huyết","ans":"D"},{"n":67,"q":"“Lạy Con vua Đa-vít, xin thương xót chúng tôi!” Ai đã nói câu này? (x. Mt 9,27)","a":"Hai người mù","b":"Anh mù Ba-ti-mê","c":"10 người phong cùi","d":"2 người bị quỷ ám","ans":"A"},{"n":68,"q":"“Các anh có tin là tôi làm được điều ấy không?” Đức Giê-su đã nói câu này với ai? (x. Mt 9,27-28)","a":"Anh mù Ba-ti-mê","b":"2 người bị quỷ ám","c":"Hai người mù","d":"10 người phong cùi","ans":"C"},{"n":69,"q":"“Các anh tin thế nào thì được như vậy.” Đức Giê-su đã nói câu này với ai? (x. Mt 9,29)","a":"10 người phong cùi","b":"Hai người mù","c":"2 người bị quỷ ám","d":"Viên sĩ quan ngoại giáo","ans":"B"},{"n":70,"q":"“Ông ấy dựa thế quỷ vương mà trừ quỷ.” Ai đã nói câu này? (x. Mt 9,32-34)","a":"Các kinh sư","b":"Người Do-thái","c":"Người Pha-ri-sêu","d":"Cả A và C","ans":"C"},{"n":71,"q":"“Anh em đừng đi về phía các dân ngoại, cũng đừng vào thành nào của dân Sa-ma-ri. Tốt hơn là hãy đến với các con chiên lạc nhà Ít-ra-en”. Đức Giê-su nói câu này với ai? (x. Mt 10,1-6)","a":"72 môn đệ","b":"12 Tông Đồ","c":"72 người khác","d":"10 người phong cùi","ans":"B"},{"n":72,"q":"Khi sai 12 Tông Đồ đi rao giảng, Ngài khuyên bảo họ phải có thái độ đơn sơ như con vật nào? (x. Mt 10,16)","a":"Chiên","b":"Sói","c":"Rắn","d":"Bồ câu","ans":"D"},{"n":73,"q":"Khi dạy các môn đệ bài học về “Hãy nói giữa ban ngày, đừng có sợ”, Đức Giê-su đã ví họ với con vật nào? (x. Mt 10,28-31)","a":"Bồ câu","b":"Rắn","c":"Chim sẻ","d":"Con chiên","ans":"C"},{"n":74,"q":"“Thưa Thầy, Thầy có thật là Đấng phải đến không, hay là chúng tôi còn phải đợi ai khác?” Ai đã sai môn đệ đến hỏi Đức Giê-su câu này? (x. Mt 11,2-3)","a":"Viên sĩ quan ngoại giáo","b":"Ông trưởng hội đường","c":"Gioan Tẩy Giả","d":"Tổng trấn Phi-la-tô","ans":"C"},{"n":75,"q":"“Thưa Thầy, Thầy có thật là Đấng phải đến không, hay là chúng tôi còn phải đợi ai khác ?” Khi sai môn đệ đến hỏi Đức Giê-su câu này, lúc ấy ông Gioan đang ở đâu? (x. Mt 11,2-3)","a":"Hoang địa","b":"Sông Gio-đan","c":"Trong tù","d":"Trong rừng vắng","ans":"C"},{"n":76,"q":"“Thế thì anh em ra xem gì? Một vị ngôn sứ chăng? Đúng thế đó; mà tôi nói cho anh em biết, đây còn hơn cả ngôn sứ nữa”. Đức Giê-su nói những lời này về ai? (x. Mt 11,7-10)","a":"Gio-an Tông Đồ","b":"Giô-na","c":"Phi-líp-phê","d":"Gioan Tẩy Giả","ans":"D"},{"n":77,"q":"“Chính ông là người Kinh Thánh đã nói tới khi chép rằng: Này Ta sai sứ giả của Ta đi trước mặt Con, người sẽ dọn đường cho Con đến”. Đức Giê-su nói về ai? (x. Mt 11,7-10)","a":"Giô-na","b":"Gioan Tẩy Giả","c":"Phi-líp-phê","d":"Gio-an Tông Đồ","ans":"B"},{"n":78,"q":"“Còn ngươi nữa, ngươi tưởng sẽ được nâng lên đến tận trời ư? Ngươi sẽ phải nhào xuống tận âm phủ! Vì nếu các phép lạ đã làm nơi ngươi mà được làm tại Xơ-đôm, thì thành ấy đã tồn tại cho đến ngày nay”. Đức Giê-su nói về thành nào? (x. Mt 11,23)","a":"Kho-ra-din","b":"Bết-xai-đa","c":"Ca-phác-na-um","d":"Gô-mô-ra","ans":"C"},{"n":79,"q":"“Ông coi, các môn đệ ông làm điều không được phép làm ngày sa-bát!” Ai đã nói câu này? (x. Mt 12,2)","a":"Các kinh sư","b":"Người Pha-ri-sêu","c":"Ông Trưởng hội đường","d":"Cả A và C","ans":"B"},{"n":80,"q":"“Đây là Người Tôi Tớ Ta đã tuyển chọn, đây là người Ta yêu dấu: Ta hài lòng về Người. Ta cho Thần Khí Ta ngự trên Người. Người sẽ loan báo công lý trước muôn dân’. Ngôn sứ nào đã nói câu này? (x. Mt 12,17-18)","a":"Giô-na","b":"Mi-kha","c":"I-sai-a","d":"Giê-rê-mi-a","ans":"C"},{"n":81,"q":"“Ông này trừ được quỷ chỉ là nhờ dựa thế quỷ vương Bê-en-dê-bun.” Ai đã nói câu này? (x. Mt 12,24)","a":"Các kinh sư","b":"Các người Do-thái","c":"Người Pha-ri-sêu","d":"Cả A và C","ans":"C"},{"n":82,"q":"“Thưa Thầy, chúng tôi muốn thấy Thầy làm một dấu lạ.” Ai đã nói câu này? (x. Mt 12,38)","a":"Mấy kinh sư","b":"Mấy người Pha-ri-sêu","c":"Các người Do-thái","d":"Cả A và B","ans":"D"},{"n":83,"q":"“Thế hệ gian ác và ngoại tình này đòi dấu lạ. Nhưng chúng sẽ không được dấu lạ nào, ngoài dấu lạ ngôn sứ Giô-na. Đức Giê-su nói câu này với ai? (x. Mt 12,38-39)","a":"Mấy kinh sư","b":"Mấy người Pha-ri-sêu","c":"Các người Do-thái","d":"Cả A và B","ans":"D"},{"n":84,"q":"Khi kể về câu chuyện ông Gio-na, Đức Giê-su đã nhắc đến tên của thành nào trong Cựu Ước? (x. Mt 12,41)","a":"Xơ-đôm","b":"Thành Ni-ni-vê","c":"Gô-mô-ra","d":"Kho-ra-din","ans":"B"},{"n":85,"q":"Những hạt giống khi gieo xuống bị chim chóc đến ăn mất, đó là loại hạt giống rơi vào đâu? (x. Mt 13,4)","a":"Rơi trên sỏi đá","b":"Rơi xuống vệ đường","c":"Rơi vào bụi gai","d":"Rơi trên đất tốt","ans":"B"},{"n":86,"q":"Những hạt giống khi gieo xuống thì nó mọc ngay vì đất không sâu, đó là loại hạt giống rơi vào đâu? (x. Mt 13,5)","a":"Bụi gai","b":"Vệ đường","c":"Đất tốt","d":"Sỏi đá","ans":"D"},{"n":87,"q":"Những hạt giống khi gieo xuống bị chim chóc đến ăn mất là loại hạt giống rơi vào đâu? (x. Mt 13,4)","a":"Vệ đường","b":"Trên sỏi đá","c":"Bụi gai","d":"Đất tốt","ans":"A"},{"n":88,"q":"“Các ngươi có lắng tai nghe cũng chẳng hiểu, có trố mắt nhìn cũng chẳng thấy; vì lòng dân này đã ra chai đá”. Ngôn sứ nào đã nói câu này? (x. Mt 13,14-15)","a":"Giô-na","b":"Mi-kha","c":"I-sai-a","d":"Giê-rê-mi-a","ans":"C"},{"n":89,"q":"“Hễ ai nghe lời rao giảng Nước Trời mà không hiểu, thì quỷ dữ đến cướp đi điều đã gieo trong lòng người ấy”. Đó là kẻ đã được gieo vào đâu? (x. Mt 13,19)","a":"Sỏi đá","b":"Bụi gai","c":"Vệ đường","d":"Đất tốt","ans":"C"},{"n":90,"q":"“Kẻ nghe Lời và liền vui vẻ đón nhận. Nhưng nó không đâm rễ mà là kẻ nhất thời: khi gặp gian nan hay bị ngược đãi vì Lời, nó vấp ngã ngay”. Đó là kẻ được gieo vào đâu? (x. Mt 13,20-21)","a":"Bụi gai","b":"Vệ đường","c":"Sỏi đá","d":"Đất tốt","ans":"C"},{"n":91,"q":"Kẻ nghe Lời, nhưng nỗi lo lắng sự đời, và bả vinh hoa phú quý bóp nghẹt, khiến Lời không sinh hoa kết quả gì”. Đó là kẻ được gieo vào đâu? (x. Mt 13,22)","a":"Bụi gai","b":"Vệ đường","c":"Sỏi đá","d":"Đất tốt","ans":"A"},{"n":92,"q":"Kẻ nghe Lời và hiểu, thì tất nhiên sinh hoa kết quả và làm ra, kẻ được gấp trăm, kẻ được sáu chục, kẻ được ba chục.” Đó là kẻ được gieo vào đâu? (x. Mt 13,23)","a":"Vệ đường","b":"Sỏi đá","c":"Đất tốt","d":"Bụi gai","ans":"C"},{"n":93,"q":"“Tuy nó là loại nhỏ nhất trong tất cả các hạt giống, nhưng khi lớn lên, thì lại là thứ lớn nhất; nó trở thành cây, đến nỗi chim trời tới làm tổ trên cành được.” Đức Giê-su nói về loại hạt nào? (x. Mt 13,31-32)","a":"Hạt ớt","b":"Hạt cải","c":"Hạt vừng","d":"Hạt tiêu","ans":"B"},{"n":94,"q":"“Xin Thầy giải nghĩa dụ ngôn cỏ lùng trong ruộng cho chúng con nghe.” Ai đã nói câu này? (x. Mt 13,36)","a":"Đám đông dân chúng","b":"Người Pha-ri-sêu","c":"Các môn đệ","d":"Các kinh sư","ans":"C"},{"n":95,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su nói kẻ gieo giống tốt là ai? (x. Mt 13,37)","a":"Con Người","b":"Các Thiên Thần","c":"Ông chủ ruộng","d":"Thiên Chúa Cha","ans":"A"},{"n":96,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví ruộng với ai? (x. Mt 13,38)","a":"Các môn đệ","b":"Nước Trời","c":"Thế gian","d":"Thế giới của Ác Thần","ans":"C"},{"n":97,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví hạt giống tốt với ai? (x. Mt 13,38)","a":"Con cái thế gian","b":"Con cái Nước Trời","c":"Con cái Ác Thần","d":"Con cái sự sáng","ans":"B"},{"n":98,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví cỏ lùng với ai? (x. Mt 13,38)","a":"Con cái thế gian","b":"Con cái Nước Trời","c":"Con cái Ác Thần","d":"Con cái sự sáng","ans":"C"},{"n":99,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví kẻ thù đã gieo cỏ lùng với ai? (x. Mt 13,39)","a":"Những kẻ không nghe lời","b":"Các Thần dữ","c":"Ác Thần","d":"Ma quỷ","ans":"D"},{"n":100,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví mùa gặt với cái gì? (x. Mt 13,39)","a":"Ngày Chúa đến","b":"Ngày Chúa quang lâm","c":"Ngày tận thế","d":"Ngày cánh chung","ans":"C"},{"n":101,"q":"Khi giải nghĩa Dụ ngôn cỏ lùng, Đức Giê-su ví thợ gặt với ai? (x. Mt 13,39)","a":"Chúa Thánh Thần","b":"Các thiên thần","c":"Các môn đệ","d":"Các Tông đồ","ans":"B"},{"n":102,"q":"“Ngôn sứ có bị rẻ rúng, thì cũng chỉ là ở chính quê hương mình và trong gia đình mình mà thôi.” Ai đã nói câu này? (x. Mt 13,57)","a":"I-sai-a","b":"Mấy người Pha-ri-sêu","c":"Đức Giê-su","d":"Các kinh sư","ans":"C"},{"n":103,"q":"Khi về thăm Na-da-rét, tại sao Đức Giê-su lại không làm nhiều phép lạ tại đó?","a":"Vì họ nhất tề bịt tai lại","b":"Vì họ không tin","c":"Vì họ phản đối","d":"Vì họ đồng loạt bỏ đi","ans":"B"},{"n":104,"q":"“Đó chính là ông Gio-an Tẩy Giả; ông đã từ cõi chết trỗi dậy, nên mới có quyền năng làm phép lạ.” Ai đã nói câu này? (x. Mt 14,1-2)","a":"Đức Giê-su","b":"Tiểu vương Hê-rô-đê","c":"Phi-la-tô","d":"Thượng tế Cai-pha","ans":"B"},{"n":105,"q":"“Nơi đây hoang vắng, và đã muộn rồi, vậy xin Thầy cho dân chúng về, để họ vào các làng mạc mua lấy thức ăn.” Ai đã nói câu này? (x. Mt 14,15)","a":"Phi-líp-phê","b":"Phê-rô và Gio-an","c":"Các môn đệ","d":"Cả A và B","ans":"C"},{"n":106,"q":"“Họ không cần phải đi đâu cả, chính anh em hãy cho họ ăn.” Ai đã nói câu này? (x. Mt 14,16)","a":"Các môn đệ","b":"Đức Giê-su","c":"Si-môn Phê-rô","d":"Phi-líp-phê","ans":"B"},{"n":107,"q":"Trong phép lạ Đức Giê-su hóa bánh ra nhiều lần thứ nhất, những mẩu bánh còn thừa, người ta thu lại được bao nhiêu giỏ đầy? (x. Mt 14,20)","a":"7 giỏ","b":"5 giỏ","c":"12 giỏ","d":"4 giỏ","ans":"C"},{"n":108,"q":"“Thưa Ngài, nếu quả là Ngài, thì xin truyền cho con đi trên mặt nước mà đến với Ngài.” Ai đã nói câu này? (x. Mt 14,28)","a":"Ông Tô-ma","b":"Ông Phê-rô","c":"Ông Gia-cô-bê","d":"Người môn đệ Chúa yêu","ans":"B"},{"n":109,"q":"“Người đâu mà kém tin vậy! Sao lại hoài nghi?” Đức Giê-su nói lời này với ai? (x. Mt 14,28-31)","a":"Ông Tô-ma","b":"Ông Gia-cô-bê","c":"Ông Gio-an","d":"Ông Phê-rô","ans":"D"},{"n":110,"q":"“Dân này tôn kính Ta bằng môi bằng miệng, còn lòng chúng thì lại xa Ta. Chúng có thờ phượng Ta thì cũng vô ích, vì giáo lý chúng giảng dạy chỉ là giới luật phàm nhân.” Ngôn sứ nào đã nói câu này? (x. Mt 15,7-9)","a":"Giê-rê-mi-a","b":"I-sai-a","c":"Da-ca-ri-a","d":"Mi-kha","ans":"B"},{"n":111,"q":"“Lạy Ngài là Con vua Đa-vít, xin rủ lòng thương tôi!” Ai đã nói câu này? (x. Mt 15,21-22)","a":"Người đàn bà Ca-na-an","b":"Anh mù Ba-ti-mê","c":"Người bị bại tay","d":"Người đàn bà bị băng huyết","ans":"A"},{"n":112,"q":"“Các môn đệ lại gần xin với Người rằng: “Xin Thầy bảo bà ấy về đi, vì bà ấy cứ theo sau chúng ta mà kêu mãi!” Các môn đệ nói về ai? (x. Mt 15,21-23)","a":"Người đàn bà bị băng huyết","b":"Người đàn bà góa","c":"Người đàn bà Ca-na-an","d":"Người đàn bà bị còng lưng","ans":"C"},{"n":113,"q":"“Lạy Ngài, xin cứu giúp tôi !” Ai đã nói câu này? (x. Mt 15,21-25)","a":"Người đàn bà bị băng huyết","b":"Anh mù Ba-ti-mê","c":"Người bị bại tay","d":"Người đàn bà Ca-na-an","ans":"D"},{"n":114,"q":"“Này bà, lòng tin của bà mạnh thật. Bà muốn sao thì sẽ được vậy.” Đức Giê-su nói lời này với ai? (x. Mt 15,21-28)","a":"Người đàn bà bị băng huyết","b":"Người đàn bà góa","c":"Người đàn bà Ca-na-an","d":"Người đàn bà bị còng lưng","ans":"C"},{"n":115,"q":"Sau khi hóa bánh ra nhiều lần thứ hai, Đức Giê-su đã lên thuyền đi đến miền nào? (x. Mt 15,39)","a":"Xê-xa-rê Phi-líp-phê","b":"Ma-ga-đan","c":"Miền Thập tỉnh","d":"Ca-phác-na-um","ans":"B"},{"n":116,"q":"Cảnh sắc bầu trời thì các ông biết cắt nghĩa, còn thời điềm thì các ông lại không cắt nghĩa nổi”. Đức Giê-su đã nói lời này với ai? (x. Mt 16,1-3)","a":"Những người Pha-ri-sêu","b":"Nhóm Xa-đốc","c":"Mấy kinh sư","d":"Cả A và B","ans":"D"},{"n":117,"q":"“Thầy là Đấng Ki-tô, Con Thiên Chúa hằng sống.” Ông Phê-rô tuyên xưng những lời này ở đâu? (x. Mt 16,13-16)","a":"Xê-da-rê Phi-líp-phê","b":"Ca-phác-na-um","c":"Bết-sai-đa","d":"Vùng bên kia sông Gio-đan","ans":"A"},{"n":118,"q":"“Còn Thầy, Thầy bảo cho anh biết: anh là Phê-rô, nghĩa là Tảng Đá, trên tảng đá này, Thầy sẽ xây Hội Thánh của Thầy, và quyền lực tử thần sẽ không thắng nổi”. Đức Giê-su đã nói những lời này với Phê-rô ở đâu? (x. Mt 16,13-18)","a":"Vùng bên kia sông Gio-đan","b":"Ca-phác-na-um","c":"Bết-sai-đa","d":"Xê-da-rê Phi-líp-phê","ans":"D"},{"n":119,"q":"“Xa-tan, lui lại đằng sau Thầy! Anh cản lối Thầy, vì tư tưởng của anh không phải là tư tưởng của Thiên Chúa, mà là của loài người.” Đức Giê-su nói lời này với ai? (x. Mt 16,23)","a":"Tô-ma","b":"Giu-đa Ít-ca-ri-ốt","c":"Phê-rô","d":"Phi-líp-phê","ans":"C"},{"n":120,"q":"Trong sự kiện hiển dung, Đức Giê-su đã mang những ai đi theo mình? (x. Mt 17,1)","a":"Phê-rô, Gia-cô-bê và An-rê","b":"Phê-rô, Gia-cô-bê và Gio-an","c":"Phê-rô, Gio-an và An-rê","d":"Phê-rô, An-rê và Ta-đê-ô","ans":"B"},{"n":121,"q":"Trong sự kiện Đức Giê-su hiển dung, những nhân vật nào đã hiện ra đàm đạo với Người? (x. Mt 17,3)","a":"Hô-sê và Ê-li-a","b":"Hô-sê và Ê-li-sa","c":"Mô-sê và Ê-li-sa","d":"Mô-sê và Ê-li-a","ans":"D"},{"n":122,"q":"“Lạy Ngài, chúng con ở đây, thật là hay! Nếu Ngài muốn, con xin dựng tại đây ba cái lều, một cho Ngài, một cho ông Mô-sê, và một cho ông Ê-li-a”. Ai đã nói câu này? (x. Mt 17,4)","a":"Gia-cô-bê","b":"Phê-rô","c":"Gio-an","d":"Các môn đệ","ans":"B"},{"n":123,"q":"Về bài học “Anh em tha thứ cho nhau”, Đức Giê-su dạy phải tha đến mấy lần? (x. Mt 18,22)","a":"Bảy mươi bảy lần","b":"Bảy lần bảy","c":"Bảy mươi lần bảy","d":"Mười bảy lần bảy","ans":"C"},{"n":124,"q":"“Thưa Thầy, có được phép rẫy vợ mình vì bất cứ lý do nào không?” Ai đã hỏi câu này? (x. Mt 19,3)","a":"Nhóm Xa-đốc","b":"Người Pha-ri-sêu","c":"Mấy kinh sư","d":"Các người Do-thái","ans":"B"},{"n":125,"q":"“Nếu anh muốn nên hoàn thiện, thì hãy đi bán tài sản của anh và đem cho người nghèo, anh sẽ được một kho tàng trên trời. Rồi hãy đến theo tôi.” Sau khi nghe lời này, người thanh niên đã làm gì? (x. Mt 19,21-22)","a":"Anh lập tức quay về nhà","b":"Anh đứng dậy đi theo Người","c":"Anh buồn rầu bỏ đi","d":"Anh bỏ mọi sự mà theo Người","ans":"C"},{"n":126,"q":"‘Cả các anh nữa, hãy đi vào vườn nho, tôi sẽ trả cho các anh hợp lẽ công bằng.’ Ông chủ nói với nhóm thợ ông gặp vào giờ thứ mấy? (x. Mt 20,3)","a":"Giờ thứ Ba","b":"Giờ thứ Sáu","c":"Giờ thứ Chín","d":"Giờ thứ Mười một","ans":"A"},{"n":127,"q":"‘Sao các anh đứng đây suốt ngày không làm gì hết?’ Ông chủ nói với nhóm thợ ông gặp vào giờ thứ mấy? (x. Mt 20,6)","a":"Giờ thứ Ba","b":"Giờ thứ Sáu","c":"Giờ thứ Chín","d":"Giờ thứ Mười một","ans":"D"},{"n":128,"q":"‘Cả các anh nữa, hãy đi vào vườn nho!’ Ông chủ nói với nhóm thợ ông gặp vào giờ thứ mấy? (x. Mt 20,7)","a":"Giờ thứ Ba","b":"Giờ thứ Sáu","c":"Giờ thứ Chín","d":"Giờ thứ Mười Một","ans":"D"},{"n":129,"q":"‘Mấy người sau chót này chỉ làm có một giờ, thế mà ông lại coi họ ngang hàng với chúng tôi là những người đã phải làm việc nặng nhọc cả ngày, lại còn bị nắng nôi thiêu đốt.’ Ai đã cằn nhằn với gia chủ như thế? (x. Mt 20,10-12)","a":"Nhóm người làm giờ thứ Sáu","b":"Nhóm người làm giờ thứ Chín","c":"Những người vào làm trước nhất","d":"Nhóm người làm giờ thứ Mười một","ans":"C"},{"n":130,"q":"“Này chúng ta lên Giê-ru-sa-lem, và Con Người sẽ bị nộp cho các thượng tế và kinh sư. Họ sẽ kết án xử tử Người, sẽ nộp Người cho dân ngoại nhạo báng, đánh đòn và đóng đinh vào thập giá và, ngày thứ ba, Người sẽ trỗi dậy.” Đây là lời loan báo về cuộc thương khó lần thứ mấy? (Mt 20,17-19)","a":"Lần thứ Nhất","b":"Lần thứ Hai","c":"Lần thứ Ba","d":"Lần thứ Tư","ans":"C"},{"n":131,"q":"“Lạy Ngài, lạy Con vua Đa-vít, xin rủ lòng thương chúng tôi!” Ai đã nói câu này? (x. Mt 20,30)","a":"Anh mù Ba-ti-mê","b":"Hai người mù","c":"Mười người phong cùi","d":"Người ăn xin bên vệ đường","ans":"B"},{"n":132,"q":"“Các anh muốn tôi làm gì cho các anh?” Đức Giê-su nói lời này với ai? (x. Mt 20,29-32)","a":"Anh mù Ba-ti-mê","b":"Người ăn xin bên vệ đường","c":"Hai người mù","d":"Mười người phong cùi","ans":"C"},{"n":133,"q":"“Các anh đi vào làng trước mặt kia, và sẽ thấy ngay một con lừa mẹ đang cột sẵn đó, có con lừa con bên cạnh. Các anh cởi dây ra và dắt về cho Thầy”. Đức Giê-su nói lời này với ai? (x. Mt 21,1-2)","a":"Nhóm Mười Hai","b":"Hai môn đệ","c":"Những người Do-thái","d":"Các tá điền","ans":"B"},{"n":134,"q":"Khi các thượng tế và kinh sư thấy những việc lạ lùng Người đã làm và thấy lũ trẻ reo hò trong Đền Thờ: “Hoan hô Con vua Đa-vít!”, họ đã có thái độ như thế nào? (x. Mt 21,15)","a":"Họ giận điên lên","b":"Họ xầm xì với nhau","c":"Họ tức tối","d":"Họ la lối inh ỏi","ans":"C"},{"n":135,"q":"Sau khi đuổi những người đang mua bán trong Đền Thờ, Đức Giê-su đã đi đâu? (x. Mt 21,17)","a":"Bê-ta-ni-a","b":"Ca-phác-na-um","c":"Ga-li-lê","d":"Giê-ru-sa-lem","ans":"A"},{"n":136,"q":"“Ông lấy quyền nào mà làm các điều ấy? Ai đã cho ông quyền ấy?” Ai đã hỏi Đức Giê-su câu này? (x. Mt 21,23)","a":"Các Thượng tế","b":"Các kỳ mục","c":"Người Pha-ri-sêu","d":"Cả A và B","ans":"D"},{"n":137,"q":"“Vậy, phép rửa của ông Gio-an do đâu mà có? Do Trời hay do người ta?” Đức Giê-su đã hỏi ai câu này? (x. Mt 21,23-25)","a":"Các kỳ mục","b":"Các Thượng tế","c":"Người Pha-ri-sêu","d":"Cả A và B","ans":"D"},{"n":138,"q":"“Đứa thừa tự đây rồi! Nào ta giết quách nó đi, và đoạt lấy gia tài nó!” Ai đã nói câu này? (x. Mt 21,38)","a":"Các kinh sư","b":"Người Pha-ri-sêu","c":"Bọn tá điền","d":"Đám đông dân chúng","ans":"C"},{"n":139,"q":"“Nhà vua liền nổi cơn thịnh nộ, sai quân đi tru diệt bọn sát nhân ấy và thiêu huỷ thành phố của chúng”. Bọn sát nhân ở đây là ai? (x. Mt 22,1-8)","a":"Các quan khách","b":"Bọn tá điền","c":"Những người vào làm trước nhất","d":"Người không mặc ý phục lễ cưới","ans":"A"},{"n":140,"q":"‘Trói chân tay nó lại, quăng nó ra chỗ tối tăm bên ngoài, ở đó người ta sẽ phải khóc lóc nghiến răng!’ Lời này dành cho ai? (x. Mt 22,11-13)","a":"Các quan khách","b":"Bọn tá điền","c":"Những người vào làm trước nhất","d":"Người không mặc y phục lễ cưới","ans":"D"},{"n":141,"q":"“Vì kẻ được gọi thì nhiều, mà người được chọn thì ít”. Câu này được nói trong Dụ ngôn nào? (x. Mt 22,1-14)","a":"Dụ ngôn tá điền sát nhân","b":"Dụ ngôn tiệc cưới","c":"Dụ ngôn thợ làm vườn nho","d":"Tất cả đều sai","ans":"B"},{"n":142,"q":"“Các ông lầm, vì không biết Kinh Thánh, cũng chẳng biết quyền năng Thiên Chúa”. Đức Giê-su nói lời này với ai? (x. Mt 22,23-29)","a":"Các kinh sư","b":"Nhóm Xa-đốc","c":"Người Pha-ri-sêu","d":"Các thượng tế","ans":"B"},{"n":143,"q":"“Vậy, tất cả những gì họ nói, anh em hãy làm, hãy giữ, còn những việc họ làm, thì đừng có làm theo, vì họ nói mà không làm”. Đức Giê-su đang nói về ai? (x. Mt 23,2-3)","a":"Các kinh sư","b":"Nhóm Xa-đốc","c":"Người Pha-ri-sêu","d":"Cả A và C","ans":"D"},{"n":144,"q":"“Đã bao lần Ta muốn tập hợp con cái ngươi lại, như gà mẹ tập hợp gà con dưới cánh, mà các ngươi không chịu”. Đức Giê-su nói về nơi nào? (x. Mt 23,37)","a":"Gô-mô-ra","b":"Giê-ru-sa-lem","c":"Ca-phác-na-um","d":"Xơ-đôm","ans":"B"},{"n":145,"q":"“Anh em nhìn thấy tất cả những cái đó, phải không? Thầy bảo thật anh em: tại đây, sẽ không còn tảng đá nào trên tảng đá nào; tất cả đều sẽ bị phá đổ.” Đức Giê-su nói về nơi nào? (x. Mt 24,1-2)","a":"Ca-phác-na-um","b":"Xơ-đôm","c":"Gô-mô-ra","d":"Đền thờ Giê-ru-sa-lem","ans":"D"},{"n":146,"q":"Trong “Dụ ngôn những yến bạc”, người đã lãnh được năm yến đã làm gì? (x. Mt 25,16)","a":"Gây lời được hai yến khác","b":"Đào lỗ, chôn giấu số bạc của chủ","c":"Gây lời được năm yến khác","d":"Gây lời được mười yến khác","ans":"C"},{"n":147,"q":"Trong “Dụ ngôn những yến bạc”, người đã lãnh được một yến đã làm gì? (x. Mt 25,18)","a":"Gây lời được một yến khác","b":"Gây lời được năm yến khác","c":"Đào lỗ, chôn giấu số bạc của chủ","d":"Gây lời được hai yến khác","ans":"C"},{"n":148,"q":"“Ông chủ nói với người ấy: ‘Khá lắm! Hỡi đầy tớ tài giỏi và trung thành! Được giao ít mà anh đã trung thành, thì tôi sẽ giao nhiều cho anh. Hãy vào mà hưởng niềm vui của chủ anh!’ Đây là lời ông chủ nói với ai? (x. Mt 25,21-23)","a":"Người đã lãnh 5 yến","b":"Người đã lãnh 2 yến","c":"Người đã lãnh 1 yến","d":"Cả A và B","ans":"D"},{"n":149,"q":"‘Thưa ông chủ, tôi biết ông là người hà khắc, gặt chỗ không gieo, thu nơi không vãi. Vì thế, tôi đâm sợ, mới đem chôn giấu yến bạc của ông dưới đất. Của ông đây, ông cầm lấy!’ Ai đã nói với ông chủ câu này? (x. Mt 25,24-25)","a":"Người đã lãnh 5 yến","b":"Người đã lãnh 2 yến","c":"Người đã lãnh 1 yến","d":"Cả A và B","ans":"C"},{"n":150,"q":"“Sao lại phí của như thế? Dầu đó có thể bán được nhiều tiền mà cho người nghèo.” Ai đã nói câu này? (x. Mt 26,8-9)","a":"Các môn đệ","b":"Giu-đa Ít-ca-ri-ốt","c":"Các kinh sư","d":"Mấy người Pha-ri-sêu","ans":"A"},{"n":151,"q":"“Tôi nộp ông ấy cho quý vị, thì quý vị muốn cho tôi bao nhiêu?” Ai đã nói câu này? (x. Mt 26,14-15)","a":"Thầy Thượng Tế","b":"Giu-đa Ít-ca-ri-ốt","c":"Các kinh sư","d":"Mấy người Pha-ri-sêu","ans":"B"},{"n":152,"q":"“Thầy muốn chúng con dọn cho Thầy ăn lễ Vượt Qua ở đâu?” Ai đã nói câu này? (x. Mt 26,17)","a":"Các kinh sư","b":"Si-mon Phê-rô","c":"Mấy người Pha-ri-sêu","d":"Các môn đệ","ans":"D"},{"n":153,"q":"“Ráp-bi, chẳng lẽ con sao?” Ai đã hỏi Đức Giê-su câu này? (x. Mt 26,25)","a":"Giu-đa Ít-ca-ri-ốt","b":"Si-mon Phê-rô","c":"Tất cả Nhóm Mười Hai","d":"Các môn đệ","ans":"A"},{"n":154,"q":"Trong sự kiện “Đức Giê-su tiên báo ông Phê-rô sẽ chối Thầy”, hát Thánh Vịnh xong, Đức Giê-su và các môn đệ đã đi đâu? (x. Mt 26,30)","a":"Đền thờ","b":"Hội đường","c":"Núi Ô-liu","d":"Suối Kít-rôn","ans":"C"},{"n":155,"q":"“Dầu tất cả có vấp ngã vì Thầy đi nữa, thì con đây cũng chẳng bao giờ vấp ngã.” Ai đã nói câu này? (x. Mt 26,33)","a":"Các môn đệ","b":"Ông Phê-rô","c":"Giu-đa Ít-ca-ri-ốt","d":"Phi-líp-phê","ans":"B"},{"n":156,"q":"Khi Đức Giê-su cầu nguyện tại vườn Ghết-sê-ma-ni, Ngài đã đưa những ai đi theo mình? (x. Mt 26,36-37)","a":"Ông Phê-rô","b":"Hai người con ông Dê-bê-đê","c":"Ông Phê-rô, An-rê và Gio-an","d":"Cả A và B","ans":"D"},{"n":157,"q":"“Thế ra anh em không thể canh thức nổi với Thầy một giờ sao?” Đức Giê-su đã nói những lời này với ai? (x. Mt 26,40)","a":"Các môn đệ","b":"Hai người con ông Dê-bê-đê","c":"Ông Phê-rô","d":"Ông Phê-rô, An-rê và Gio-an","ans":"C"},{"n":158,"q":"“Lạy Cha, nếu con cứ phải uống chén này mà không sao tránh khỏi, thì xin vâng ý Cha.”. Đây là lời cầu nguyện lần thứ mấy? (x. Mt 26,42)","a":"Lần thứ 1","b":"Lần thứ 2","c":"Lần thứ 3","d":"Tất cả đều đúng","ans":"B"},{"n":159,"q":"Sau khi cầu nguyện lần thứ hai, Đức Giê-su trở lại, thấy các môn đệ vẫn đang ngủ, vì mắt họ nặng trĩu. Người đã làm gì? (x. Mt 26,43-44)","a":"Người nổi giận với các ông","b":"Người để mặc các ông","c":"Người đánh thức các ông","d":"Người ngồi xuống bên các ông","ans":"B"},{"n":160,"q":"Cùng đi với Giu-đa Ít-ca-ri-ốt, có cả một đám người đông đảo mang gươm giáo gậy gộc. Họ đã được ai sai đến? (x. Mt 26,47)","a":"Các thượng tế","b":"Các kỳ mục","c":"Tổng trấn Phi-la-tô","d":"Cả A và B","ans":"D"},{"n":161,"q":"“Này bạn, bạn đến đây làm gì thì cứ làm đi!” Đức Giê-su nói lời này với ai? (x. Mt 26,49-50)","a":"Viên sĩ quan cận vệ","b":"Đám lính","c":"Đám thuộc hạ","d":"Giu-đa Ít-ca-ri-ốt","ans":"D"},{"n":162,"q":"“Tôi là một tên cướp sao mà các ông đem gươm giáo gậy gộc đến bắt?” Đức Giê-su đã nói lời này với ai? (x. Mt 26,55)","a":"Giu-đa cùng đám thuộc hạ","b":"Đám lính","c":"Đám thuộc hạ","d":"Đám đông","ans":"D"},{"n":163,"q":"Ngay sau khi Đức Giê-su bị bắt, họ đã điệu Người đến đâu? (x. Mt 26,57)","a":"Dinh Phi-la-tô","b":"Thượng tế Cai-pha","c":"Dinh vua Hê-rô-đê","d":"Đền thờ Giê-ru-sa-lem","ans":"B"},{"n":164,"q":"“Ông không nói lại được một lời sao? Mấy người này tố cáo ông gì đó?” Ai đã hỏi Đức Giê-su câu này? (x. Mt 26,62)","a":"Tổng trấn Phi-la-tô","b":"Vị thượng tế","c":"Vua Hê-rô-đê","d":"Các thủ lãnh Do-thái","ans":"B"},{"n":165,"q":"“Nhân danh Thiên Chúa hằng sống, tôi truyền cho ông phải nói cho chúng tôi biết: ông có phải là Đấng Ki-tô Con Thiên Chúa không?” Ai đã hỏi Đức Giê-su câu này? (x. Mt 26,63)","a":"Vị thượng tế","b":"Các thủ lãnh Do-thái","c":"Vua Hê-rô-đê","d":"Tổng trấn Phi-la-tô","ans":"A"},{"n":166,"q":"“Chính ngài vừa nói. Hơn nữa, tôi nói cho các ông hay: từ nay, các ông sẽ thấy Con Người ngự bên hữu Đấng Toàn Năng và ngự giá mây trời mà đến.” Đức Giê-su nói câu này với ai? (x. Mt 26,64)","a":"Vua Hê-rô-đê","b":"Các thủ lãnh Do-thái","c":"Tổng trấn Phi-la-tô","d":"Vị thượng tế","ans":"D"},{"n":167,"q":"“Hắn nói phạm thượng! Chúng ta cần gì nhân chứng nữa? Đấy, quý vị vừa nghe hắn nói phạm đến Thiên Chúa, quý vị nghĩ sao?” Ai đã nói câu này? (x. Mt 26,65-66)","a":"Đám đông dân chúng","b":"Vị thượng tế","c":"Tổng trấn Phi-la-tô","d":"Các thủ lãnh Do-thái","ans":"B"},{"n":168,"q":"“Cả bác nữa, bác cũng đã ở với ông Giê-su, người Ga-li-lê đó chứ gì?” Ai đã nói với ông Phê-rô những lời này? (x. Mt 26,69)","a":"Một người trong đám đông","b":"Người đầy tớ gái","c":"Những người đứng đó","d":"Tên lính gác cổng","ans":"B"},{"n":169,"q":"“Đúng là bác cũng thuộc bọn họ. Cứ nghe giọng nói của bác là biết ngay” Ai đã nói với ông Phê-rô những lời này? (x. Mt 26,73)","a":"Một người trong đám đông","b":"Người đầy tớ gái","c":"Những người đứng đó","d":"Tên lính gác cổng","ans":"C"},{"n":170,"q":"“Tôi đã phạm tội nộp người vô tội, khiến Người phải chết oan.” Ai đã nói lời này? (x. Mt 27,3-4)","a":"Phi-la-tô","b":"Giu-đa Ít-ca-ri-ốt","c":"Vợ của Phi-la-tô","d":"Hê-rô-đê","ans":"B"},{"n":171,"q":"“Họ đã lượm lấy ba mươi đồng bạc, tức là cái giá mà một số con cái Ít-ra-en đã đặt khi đánh giá Người. Và họ lấy số bạc đó mà mua ‘Thửa Ruộng Ông Thợ Gốm’, theo những điều Đức Chúa đã truyền cho tôi .” Ngôn sứ nào đã nói câu này? (x. Mt 27,9-10)","a":"I-sai-a","b":"Ê-dê-ki-en","c":"Giê-rê-mi-a","d":"Đa-ni-en","ans":"C"},{"n":172,"q":"“Ông là vua dân Do-thái sao?” Ai đã hỏi Đức Giê-su câu này? (x. Mt 27,11)","a":"Tổng trấn Phi-la-tô","b":"Thượng tế Cai-pha","c":"Vua Hê-rô-đê","d":"Các kỳ lão","ans":"A"},{"n":173,"q":"“Ông không nghe bao nhiêu điều họ làm chứng chống lại ông đó sao?” Ai đã hỏi Đức Giê-su câu này? (x. Mt 27,11)","a":"Thượng tế Cai-pha","b":"Các kỳ lão","c":"Vua Hê-rô-đê","d":"Tổng trấn Phi-la-tô","ans":"D"},{"n":174,"q":"“Ta vô can trong vụ đổ máu người này. Mặc các người liệu lấy!” Trước khi nói những lời này, tổng trấn Phi-la-tô đã làm gì? (x. Mt 27,24)","a":"Bỏ vào nhà","b":"Truyền đánh đòn Đức Giê-su","c":"Lấy nước rửa tay","d":"Phóng thích Ba-ra-ba","ans":"C"},{"n":175,"q":"“Chúng lột áo Người ra, khoác cho Người một tấm áo choàng đỏ, rồi kết một vòng gai làm vương miện đặt lên đầu Người, và trao vào tay mặt Người một cây sậy”. Ai đã làm điều này? (x. Mt 27,27-29)","a":"Lính của các thượng tế","b":"Lính của tổng trấn","c":"Lính của Hê-rô-đê","d":"Các kinh sư và Pha-ri-sêu","ans":"B"},{"n":176,"q":"“Rồi chúng khạc nhổ vào Người và lấy cây sậy mà đập vào đầu Người. Chế giễu chán, chúng lột áo choàng ra, và cho Người mặc áo lại như trước, rồi điệu Người đi đóng đinh vào thập giá”. Ai đã làm điều này? (x. Mt 27,27-31)","a":"Lính của các thượng tế","b":"Các kinh sư và Pha-ri-sêu","c":"Lính của tổng trấn","d":"Lính của Hê-rô-đê","ans":"C"},{"n":177,"q":"“Mi là kẻ phá được Đền Thờ, và nội trong ba ngày xây lại được, hãy cứu lấy mình đi! Nếu mi là Con Thiên Chúa, thì xuống khỏi thập giá xem nào!” Ai đã nói những lời này? (x. Mt 27,39-40)","a":"Các thượng tế và kinh sư","b":"Kẻ qua người lại","c":"Các kỳ mục","d":"Cả A và C","ans":"B"},{"n":178,"q":"“Hắn cứu được thiên hạ, mà chẳng cứu nổi mình. Hắn là vua Ít-ra-en! Hắn cứ xuống khỏi thập giá ngay bây giờ đi, chúng ta tin hắn liền!”. Ai đã chế giễu Đức Giê-su như vậy? (x. Mt 27,41-42)","a":"Thượng tế","b":"Kinh sư","c":"Kỳ mục","d":"Cả A, B và C","ans":"D"},{"n":179,"q":"“Hắn cậy vào Thiên Chúa, thì bây giờ Người cứu hắn đi, nếu quả thật Người thương hắn! Vì hắn đã nói: Ta là Con Thiên Chúa!” Ai đã chế giễu Đức Giê-su như vậy? (x. Mt 27,41-43)","a":"Thượng tế","b":"Kinh sư","c":"Kỳ mục","d":"Cả A, B và C","ans":"D"},{"n":180,"q":"“Này các bà, các bà đừng sợ! Tôi biết các bà tìm Đức Giê-su, Đấng bị đóng đinh. Người không có ở đây, vì Người đã trỗi dậy như Người đã nói”. Ai đã nói câu này? (x. Mt 28,5-6)","a":"Thiên thần","b":"Người làm vườn","c":"Đức Giê-su phục sinh","d":"Viên đại đội trưởng","ans":"A"},{"n":181,"q":"“Đây là gia phả Đức Giê-su Ki-tô, con cháu…, con cháu tổ phụ Áp-ra-ham” (Mt 1,1)","a":"Ông Gia-cóp","b":"Vua Đa-vít","c":"Ông Giu-se","d":"Vua Sa-lô-môn","ans":"B"},{"n":182,"q":"“Ông Áp-ra-ham sinh I-xa-ác; I-xa-ác sinh Gia-cóp; Gia-cóp sinh … và các anh em ông này” (Mt 1,2)","a":"Giu-se","b":"E-xau","c":"Giu-đa","d":"Rưu-vên","ans":"C"},{"n":183,"q":"“Gia-cóp sinh Giu-se, chồng của bà Ma-ri-a, bà là mẹ Đức Giê-su cũng gọi là…”. (Mt 1,16)","a":"Đấng Cứu Thế","b":"Con bác thợ mộc Giu-se","c":"Đấng Ki-tô","d":"Tất cả đều đúng","ans":"C"},{"n":184,"q":"“Sau đây là gốc tích Đức Giê-su Ki-tô: bà Ma-ri-a, mẹ Người, đã thành hôn với ông Giu-se. Nhưng trước khi hai ông bà về chung sống, bà đã có thai …”. (Mt 1,18)","a":"Do quyền năng Chúa Thánh Thần","b":"Do quyền năng các Thiên Thần","c":"Bởi quyền năng Thánh Thần","d":"Tất cả đều đúng.","ans":"A"},{"n":185,"q":"“Ông Giu-se, chồng bà, là người… và không muốn tố giác bà, nên mới định tâm bỏ bà cách kín đáo”. (Mt 1,19)","a":"Nóng tính","b":"Công chính","c":"Thuộc dòng dõi Đa-vít","d":"Tất cả đều đúng.","ans":"B"},{"n":186,"q":"“Này ông Giu-se,…, đừng ngại đón bà Ma-ri-a vợ ông về, vì người con bà cưu mang là do quyền năng Chúa Thánh Thần”. (Mt 1,20)","a":"Con vua Đa-vít","b":"Con cháu Gia-cóp","c":"Con cháu Đa-vít","d":"Dòng dõi Đa-vít","ans":"C"},{"n":187,"q":"“Bà sẽ sinh con trai và ông phải đặt tên cho con trẻ là Giê-su, vì chính Người sẽ… khỏi tội lỗi của họ.” (Mt 1,21)","a":"Cứu dân Người","b":"Giải thoát dân Người","c":"Cứu muôn người","d":"Tất cả đều sai","ans":"A"},{"n":188,"q":"“Này đây, Trinh Nữ sẽ thụ thai và sinh hạ một con trai, người ta sẽ gọi tên con trẻ là Em-ma-nu-en, nghĩa là “...” (Mt 1,23)","a":"Chúa ở cùng chúng ta","b":"Thiên Chúa ở cùng ta","c":"Thiên Chúa ở cùng chúng ta","d":"Chúa ở cùng anh chị em.","ans":"C"},{"n":189,"q":"“Khi Đức Giê-su ra đời tại Bê-lem, miền Giu-đê, thời … trị vì, có mấy nhà chiêm tinh từ Phương Đông đến Giê-ru-sa-lem” (Mt 2,1)","a":"Quan Phi-la-tô","b":"Tổng trấn Qui-ri-ni-ô","c":"Vua Hê-rô-đê","d":"Hoàng đế Xê-da-rê","ans":"C"},{"n":190,"q":"“… mới sinh, hiện ở đâu? Chúng tôi đã thấy vì sao của Người xuất hiện bên Phương Đông, nên chúng tôi đến bái lạy Người.” (Mt 2,2)","a":"Đức Vua dân Do-thái","b":"Vua Do-thái","c":"Vị vua Do-thái","d":"Đức vua","ans":"A"},{"n":191,"q":"“Nhà vua liền triệu tập tất cả các thượng tế và kinh sư trong dân lại, rồi hỏi cho biết… phải sinh ra ở đâu”. (Mt 2,4)","a":"Đấng Ki-tô","b":"Đức vua dân Do-thái","c":"Đấng Cứu Thế","d":"Tất cả đều đúng.","ans":"A"},{"n":192,"q":"Phần ngươi, hỡi Bê-lem, miền đất Giu-đa, ngươi đâu phải là thành nhỏ nhất của Giu-đa, vì ngươi là nơi… chăn dắt Ít-ra-en dân Ta sẽ ra đời.” (Mt 2,6)","a":"Vị vua","b":"Vị lãnh tụ","c":"Vị Cứu Thế","d":"Tất cả đều đúng.","ans":"B"},{"n":193,"q":"Rồi vua phái các vị ấy đi Bê-lem và dặn rằng: “Xin quý ngài đi dò hỏi tường tận về Hài Nhi, và khi đã tìm thấy, xin báo lại cho tôi, để tôi cũng…” (Mt 2,8)","a":"Đến thờ lạy Người","b":"Đến để thờ lạy Người","c":"Đến bái lạy Người","d":"Đến triều bái Người","ans":"C"},{"n":194,"q":"“Nghe nhà vua nói thế, họ ra đi. Bấy giờ ngôi sao họ đã thấy ở Phương Đông, lại… cho họ đến tận nơi Hài Nhi ở, mới dừng lại”. (Mt 2,9)","a":"Dẫn đường","b":"Chỉ đường","c":"Soi đường","d":"Dẫn lối","ans":"A"},{"n":195,"q":"“Họ vào nhà, thấy Hài Nhi với thân mẫu là bà Ma-ri-a, liền… Người”. (Mt 2,11)","a":"Lấy lễ vật tiến dâng","b":"Sấp mình thờ lạy","c":"Dâng các bảo vật lên","d":"Tất cả đều đúng.","ans":"B"},{"n":196,"q":"“Này ông, dậy… và mẹ Người trốn sang Ai-cập, và cứ ở đó cho đến khi tôi báo lại, vì vua Hê-rô-đê sắp tìm giết Hài Nhi đấy!” (Mt 2,13)","a":"Đem Hài Nhi","b":"Đem Con trẻ","c":"Đưa Hài Nhi mới sinh","d":"Tất cả đều đúng","ans":"A"},{"n":197,"q":"“Ông ở đó cho đến khi vua Hê-rô-đê băng hà, để ứng nghiệm lời Chúa phán xưa qua miệng ngôn sứ:… ra khỏi Ai-cập”. (Mt 2,15)","a":"Ta đã gọi con Ta","b":"Ta đã đưa con Ta","c":"Ta truyền cho con Ta","d":"Tất cả đều đúng.","ans":"A"},{"n":198,"q":"“Này ông, dậy đem Hài Nhi và mẹ Người…, vì những kẻ tìm giết Hài Nhi đã chết rồi” (Mt 2,19-20)","a":"Trốn sang Ai-cập","b":"Về Na-da-rét","c":"Về đất Ít-ra-en","d":"Trở về quê cũ","ans":"C"},{"n":199,"q":"“Ông liền trỗi dậy đưa Hài Nhi và mẹ Người về đất Ít-ra-en. Nhưng vì nghe biết Ác-khê-lao đã kế vị vua cha là Hê-rô-đê, cai trị miền Giu-đê, nên ông sợ…”. (Mt 2,21-22)","a":"Không dám về đó","b":"Trốn đi nơi khác","c":"Bỏ sang thành khác","d":"Tất cả đều đúng","ans":"A"},{"n":200,"q":"“Rồi sau khi được báo mộng, ông lui về miền Ga-li-lê, và đến ở tại một thành kia gọi là …”. (Mt 2,22-23)","a":"Bê-lem","b":"Na-da-rét","c":"Ga-li-lê","d":"Sa-ma-ri","ans":"B"},{"n":201,"q":"“Hồi ấy, ông Gio-an Tẩy Giả đến rao giảng trong hoang địa miền Giu-đê rằng: “…, vì Nước Trời đã đến gần”. (Mt 3,1-2)","a":"Hãy sám hối","b":"Hãy ăn năn sám hối","c":"Anh em hãy sám hối","d":"Anh em hãy thống hối","ans":"C"},{"n":202,"q":"“Có tiếng người hô trong hoang địa: Hãy dọn sẵn con đường cho Đức Chúa,…để Người đi”. (Mt 3,3)","a":"Sửa lối cho thẳng","b":"Hãy nắn cho thẳng","c":"Chỉnh lối cho thẳng","d":"Bạt mọi núi đồi","ans":"A"},{"n":203,"q":"“Bấy giờ, người ta từ Giê-ru-sa-lem và khắp miền Giu-đê, cùng khắp vùng ven sông Gio-đan, kéo đến với ông. Họ thú tội, và ông… cho họ trong sông Gio-đan”. (Mt 3,5-6)","a":"Giảng dạy","b":"Làm phép rửa","c":"Rửa tội","d":"Rao giảng","ans":"B"},{"n":204,"q":"“Các anh hãy… để chứng tỏ lòng sám hối”. (Mt 3,8)","a":"Sinh hoa quả","b":"Khóc lóc kêu than","c":"Đấm ngực ăn năn","d":"Tất cả đều đúng","ans":"A"},{"n":205,"q":"“Đừng tưởng có thể bảo mình rằng: ‘Chúng ta đã có...’ Vì, tôi nói cho các anh hay, Thiên Chúa có thể làm cho những hòn đá này trở nên con cháu ông Áp-ra-ham”. (Mt 3,9)","a":"Mô-sê","b":"Tổ phụ Áp-ra-ham","c":"Giê-ru-sa-lem","d":"Đền thờ","ans":"B"},{"n":206,"q":"“Cái rìu đã đặt sát gốc cây: bất cứ cây nào… đều bị chặt đi và quăng vào lửa”. (Mt 3,10)","a":"Không sinh trái tốt","b":"Sinh trái tốt","c":"Không sinh quả tốt","d":"Không sinh hoa trái","ans":"C"},{"n":207,"q":"“Tôi, tôi làm phép rửa cho các anh trong nước để…”. (Mt 3,11)","a":"Tỏ lòng sám hối","b":"Giục lòng sám hối","c":"Bày tỏ lòng thống hối","d":"Giục lòng các anh sám hối","ans":"D"},{"n":208,"q":"“Còn Đấng đến sau tôi thì quyền thế hơn tôi, tôi không đáng xách dép cho Người. Người sẽ làm phép rửa cho các anh trong…”. (Mt 3,11)","a":"Thánh Thần","b":"Nước","c":"Nước và Thánh Thần","d":"Thánh Thần và lửa","ans":"D"},{"n":209,"q":"“Tay Người cầm nia, Người sẽ rê sạch lúa trong sân: thóc mẩy thì thu vào kho lẫm, còn thóc lép thì bỏ vào… mà đốt đi .” (Mt 3,12)","a":"Lửa không hề tắt","b":"Lửa","c":"Lò lửa","d":"Trong lò lửa","ans":"A"},{"n":210,"q":"“Nhưng Đức Giê-su trả lời: “Bây giờ cứ thế đã. Vì chúng ta nên làm như vậy để...” (Mt 3,15)","a":"Được nên công chính","b":"Làm cho nên công chính","c":"Trở nên công chính","d":"Giữ trọn đức công chính","ans":"D"},{"n":211,"q":"“Đây là…, Ta hài lòng về Người.” (Mt 3,17)","a":"Con Ta yêu dấu","b":"Người Con Ta yêu dấu","c":"Con yêu dấu của Ta","d":"Con yêu dấu","ans":"C"},{"n":212,"q":"“Bấy giờ Đức Giê-su được… dẫn vào hoang địa, để chịu quỷ cám dỗ”. (Mt 4,1)","a":"Thánh Thần","b":"Các Thiên Thần","c":"Thần Khí","d":"Thần sứ","ans":"C"},{"n":213,"q":"“Khi ấy tên cám dỗ đến gần Người và nói: “Nếu ông là…, thì truyền cho những hòn đá này hoá bánh đi!” (Mt 4,3)","a":"Con Một Thiên Chúa","b":"Con Thiên Chúa","c":"Thiên Chúa","d":"Đấng Ki-tô","ans":"B"},{"n":214,"q":"“Đã có lời chép rằng: Người ta sống không chỉ nhờ cơm bánh, nhưng còn nhờ mọi lời...” (Mt 4,4)","a":"Miệng Thiên Chúa phán ra","b":"Do miệng Thiên Chúa phán ra","c":"Do Thiên Chúa phán ra","d":"Bởi miệng Thiên Chúa phán ra","ans":"A"},{"n":215,"q":"“Nếu ông là…, thì gieo mình xuống đi! Vì đã có lời chép rằng: Thiên Chúa sẽ truyền cho thiên sứ lo cho bạn, và thiên sứ sẽ tay đỡ tay nâng, cho bạn khỏi vấp chân vào đá.” (Mt 4,6)","a":"Con Một Thiên Chúa","b":"Con Thiên Chúa","c":"Thiên Chúa","d":"Đấng Ki-tô","ans":"B"},{"n":216,"q":"“Đức Giê-su đáp: “Nhưng cũng đã có lời chép rằng: Ngươi chớ… Đức Chúa là Thiên Chúa của ngươi.” (Mt 4,7)","a":"Thách thức","b":"Thử lòng","c":"Thử thách","d":"Khinh thường","ans":"C"},{"n":217,"q":"“Tôi sẽ cho ông tất cả những thứ đó, nếu ông… tôi.” (Mt 4,9)","a":"Bái lạy","b":"Thờ lạy","c":"Sấp mình dưới chân","d":"Sấp mình bái lạy","ans":"D"},{"n":218,"q":"“Đức Giê-su liền nói: “Xa-tan kia, xéo đi! Vì đã có lời chép rằng: Ngươi phải bái lạy Đức Chúa là Thiên Chúa của ngươi, và phải… một mình Người mà thôi.” (Mt 4,10)","a":"Thờ lạy","b":"Tôn thờ","c":"Sấp mình bái lạy","d":"Thờ phượng","ans":"D"},{"n":219,"q":"“Đoàn dân đang ngồi trong cảnh tối tăm đã thấy..., những kẻ đang ngồi trong vùng bóng tối của tử thần nay được ánh sáng bừng lên chiếu rọi”. (Mt 4,16)","a":"Một vì sao xuất hiện","b":"Một ngôi sao xuất hiện","c":"Nguồn ánh sáng huy hoàng","d":"Một ánh sáng huy hoàng","ans":"D"},{"n":220,"q":"“Từ lúc đó, Đức Giê-su bắt đầu rao giảng và nói rằng: “Anh em hãy…, vì Nước Trời đã đến gần.” (Mt 4,17)","a":"Thối hối","b":"Trở về","c":"Ăn năn thống hối","d":"Sám hối","ans":"D"},{"n":221,"q":"“Người bảo các ông: “Các anh hãy theo tôi, tôi sẽ làm cho các anh thành những kẻ…” (Mt 4,19)","a":"Chài lưới người","b":"Lưới người như lưới cá","c":"Đi chài lưới người","d":"Chài lưới người ta","ans":"B"},{"n":222,"q":"“Thế rồi Đức Giê-su đi khắp miền Ga-li-lê, giảng dạy trong các hội đường,…, và chữa hết mọi kẻ bệnh hoạn tật nguyền trong dân”. (Mt 4,23)","a":"Rao giảng Tin Mừng","b":"Rao giảng Nước Trời","c":"Loan báo Tin Mừng Nước Trời","d":"Rao giảng Tin Mừng Nước Trời","ans":"D"},{"n":223,"q":"“Từ miền Ga-li-lê, vùng Thập Tỉnh, thành Giê-ru-sa-lem, miền Giu-đê và vùng bên kia sông Gio-đan, dân chúng lũ lượt kéo đến…”. (Mt 4,25)","a":"Đi theo Người","b":"Nghe Người giảng","c":"Để nghe Người giảng dạy","d":"Để nghe lời Người","ans":"A"},{"n":224,"q":"“Phúc thay ai có… nghèo khó, vì Nước Trời là của họ”. (Mt 5,3)","a":"Tinh thần","b":"Tâm hồn","c":"Lòng","d":"Đời sống","ans":"B"},{"n":225,"q":"“Phúc thay ai hiền lành, vì họ sẽ được… làm gia nghiệp”. (Mt 5,4)","a":"Nước Trời","b":"Chính Chúa","c":"Đất Hứa","d":"Tất cả đều đúng","ans":"C"},{"n":226,"q":"“Phúc thay ai…, vì họ sẽ được Thiên Chúa ủi an”. (Mt 5,5)","a":"Sầu khổ","b":"Khóc lóc","c":"Than khóc","d":"Buồn khổ","ans":"A"},{"n":227,"q":"“Phúc thay ai khát khao…, vì họ sẽ được Thiên Chúa cho thoả lòng”. (Mt 5,6)","a":"Nên hoàn thiện","b":"Nên người hoàn thiện","c":"Nên người công chính","d":"Nên người giàu có","ans":"C"},{"n":228,"q":"“Phúc thay ai…, vì họ sẽ được Thiên Chúa xót thương”. (Mt 5,7)","a":"Biết xót thương người","b":"Yêu mến người","c":"Thương xót người","d":"Xót thương người","ans":"D"},{"n":229,"q":"“Phúc thay ai …, vì họ sẽ được nhìn thấy Thiên Chúa”. (Mt 5,8)","a":"Hiền lành","b":"Có lòng trong sạch","c":"Sống đời trong sạch","d":"Có tâm hồn trong sạch","ans":"D"},{"n":230,"q":"“Phúc thay ai…, vì họ sẽ được gọi là con Thiên Chúa”. (Mt 5,9)","a":"Có tâm hồn trong sạch","b":"Xót thương người","c":"Làm cho người hòa thuận","d":"Xây dựng hoà bình","ans":"D"},{"n":231,"q":"“Phúc thay ai bị bách hại vì…, vì Nước Trời là của họ”. (Mt 5,10)","a":"Sống công chính","b":"Ở công chính","c":"Sống ngay lành","d":"Danh Thầy","ans":"A"},{"n":232,"q":"“Phúc thay anh em khi… mà bị người ta sỉ vả, bách hại và vu khống đủ điều xấu xa. (Mt 5,11)","a":"Vì Thầy","b":"Vì Danh Thầy","c":"Vì Tin Mừng","d":"Tất cả đều đúng","ans":"A"},{"n":233,"q":"“Anh em hãy…, vì phần thưởng dành cho anh em ở trên trời thật lớn lao”. (Mt 5,12)","a":"Vui mừng","b":"Kiên tâm chịu đựng","c":"Vui mừng hớn hở","d":"Kiên tâm bền chí","ans":"C"},{"n":234,"q":"“Chính anh em là muối cho đời. Nhưng muối mà…, thì lấy gì muối nó cho mặn lại?” (Mt 5,13)","a":"Không còn mặn","b":"Nhạt đi","c":"Ra nhạt","d":"Hết mặn","ans":"B"},{"n":235,"q":"“Chính anh em là ánh sáng cho... Một thành xây trên núi không tài nào che giấu được”. (Mt 5,14)","a":"Trần gian","b":"Thế gian","c":"Đời","d":"Thế gian này","ans":"A"},{"n":236,"q":"“Cũng chẳng có ai thắp đèn rồi lại để dưới cái thùng, nhưng…, và đèn soi chiếu cho mọi người trong nhà”. (Mt 5,15)","a":"Đặt trên đế","b":"Đặt trên giá","c":"Treo trên giá","d":"Treo trên tường","ans":"A"},{"n":237,"q":"“Cũng vậy, ánh sáng của anh em phải chiếu giãi trước mặt thiên hạ, để họ thấy những… anh em làm, mà tôn vinh Cha của anh em, Đấng ngự trên trời”. (Mt 5,16)","a":"Việc tốt đẹp","b":"Công việc tốt đẹp","c":"Việc tốt lành","d":"Việc tốt","ans":"B"},{"n":238,"q":"“Anh em đừng tưởng Thầy đến để bãi bỏ Luật Mô-sê hoặc lời các ngôn sứ. Thầy đến không phải là để bãi bỏ, nhưng là để …”. (Mt 5,17)","a":"Làm cho hoàn thiện","b":"Làm cho kiện toàn","c":"Hoàn thiện","d":"Kiện toàn","ans":"D"},{"n":239,"q":"“Vì, Thầy bảo thật anh em, trước khi trời đất qua đi, thì một chấm một phết trong Lề Luật cũng sẽ không qua đi, cho đến khi…”. (Mt 5,18)","a":"Mọi việc được hoàn tất","b":"Con Người đến","c":"Mọi sự được hoàn thành","d":"Tất cả đều sai","ans":"C"},{"n":240,"q":"“Vậy ai bãi bỏ dù chỉ là một trong những…, và dạy người ta làm như thế, thì sẽ bị gọi là kẻ nhỏ nhất trong Nước Trời.” (Mt 5,19)","a":"Điều răn nhỏ nhất ấy","b":"Điều răn ấy","c":"Giới răn này","d":"Điều Thầy nói đây","ans":"A"},{"n":241,"q":"“Vậy, Thầy bảo cho anh em biết, nếu anh em không ăn ở… các kinh sư và người Pha-ri-sêu, thì sẽ chẳng được vào Nước Trời”. (Mt 5,20)","a":"Công chính","b":"Tốt lành hơn","c":"Công chính hơn","d":"Công chính như","ans":"C"},{"n":242,"q":"“Anh em đã nghe Luật dạy người xưa rằng: Chớ giết người; ai giết người, thì đáng bị đưa ra toà. Còn Thầy, Thầy bảo cho anh em biết: Ai…, thì đáng bị đưa ra toà”. (Mt 5,21-22)","a":"Chửi rủa anh em mình","b":"Nguyền rủa anh em mình","c":"Đánh đập anh em mình","d":"Giận anh em mình","ans":"D"},{"n":243,"q":"“Ai mắng anh em mình là đồ ngốc, thì đáng bị đưa ra trước…”. (Mt 5,22)","a":"Thượng Hội Đồng","b":"Quan Tòa","c":"Tòa Án","d":"Hội Đồng","ans":"A"},{"n":244,"q":"“Còn ai chửi anh em mình là quân phản đạo, thì đáng bị…”. (Mt 5,22)","a":"Lửa thiêu đốt","b":"Đưa ra tòa","c":"Đưa ra trước Hội Đồng","d":"Lửa hoả ngục thiêu đốt","ans":"D"},{"n":245,"q":"“Vậy, nếu khi anh sắp dâng lễ vật trước bàn thờ, mà sực nhớ có người anh em đang có chuyện bất bình với anh, thì hãy để của lễ lại đó trước bàn thờ,… với người anh em ấy đã, rồi trở lại dâng lễ vật của mình”. (Mt 5,23-24)","a":"Về cầu hòa","b":"Đi giải hòa","c":"Đi làm hoà","d":"Về hòa giải","ans":"C"},{"n":246,"q":"“Anh em đã nghe Luật dạy rằng: Chớ ngoại tình. Còn Thầy, Thầy bảo cho anh em biết: ai nhìn người phụ nữ mà thèm muốn, thì… đã ngoại tình với người ấy rồi”. (Mt 5,27-28)","a":"Trong lòng mình","b":"Tâm hồn mình","c":"Tâm trí mình","d":"Trong lòng","ans":"D"},{"n":247,"q":"“Anh em còn nghe Luật dạy người xưa rằng: Chớ bội thề, nhưng hãy trọn lời thề với Đức Chúa. Còn Thầy, Thầy bảo cho anh em biết: …”. (Mt 5,33-34)","a":"Đừng thề chi cả","b":"Chỉ thề khi cần thiết thôi","c":"Không nên thề chi cả","d":"Chớ thề thốt","ans":"A"},{"n":248,"q":"“Anh em đã nghe Luật dạy rằng: Mắt đền mắt, răng đền răng. Còn Thầy, Thầy bảo anh em:…, trái lại, nếu bị ai vả má bên phải, thì hãy giơ cả má bên trái ra nữa”. (Mt 5,38-39)","a":"Đừng như bọn gian ác","b":"Đừng chống lại bọn ác","c":"Đừng như quân gian ác","d":"Đừng chống cự người ác","ans":"D"},{"n":249,"q":"“Nếu ai muốn kiện anh để lấy áo trong của anh, thì hãy để cho nó… Nếu có người bắt anh đi một dặm, thì hãy đi với người ấy hai dặm”. (Mt 5,40-41)","a":"Lấy","b":"Lấy cả áo ngoài","c":"Làm như vậy","d":"Làm theo ý nó","ans":"B"},{"n":250,"q":"“Ai xin, thì hãy cho; ai muốn vay mượn, thì…”. (Mt 5,42)","a":"Đừng đòi lại","b":"Hãy cho họ vay","c":"Đừng từ chối","d":"Đừng ngoảnh mặt đi","ans":"D"},{"n":251,"q":"“Anh em đã nghe Luật dạy rằng: Hãy yêu đồng loại và hãy ghét kẻ thù. Còn Thầy, Thầy bảo anh em: … và cầu nguyện cho những kẻ ngược đãi anh em”. (Mt 5,43-44)","a":"Hãy thương xót","b":"Hãy yêu kẻ thù","c":"Hãy tha thứ","d":"Hãy yêu kẻ ác","ans":"B"},{"n":252,"q":"“Vì nếu anh em yêu thương…, thì anh em nào có công chi? Ngay cả những người thu thuế cũng chẳng làm như thế sao?” (Mt 5,46)","a":"Kẻ yêu thương mình","b":"Người đồng loại","c":"Người thân cận","d":"Người anh em","ans":"A"},{"n":253,"q":"“Nếu anh em chỉ chào hỏi anh em mình thôi, thì anh em có…? Ngay cả người ngoại cũng chẳng làm như thế sao?” (Mt 5,47)","a":"Làm gì khác đâu","b":"Công gì đâu","c":"Hơn gì người thu thuế đâu","d":"Làm gì lạ thường đâu","ans":"D"},{"n":254,"q":"“Vậy anh em hãy nên hoàn thiện, như… là Đấng hoàn thiện.” (Mt 5,48)","a":"Thiên Chúa Cha","b":"Thiên Chúa","c":"Cha anh em trên trời","d":"Cha trên trời","ans":"C"},{"n":255,"q":"“Khi làm việc lành phúc đức, anh em phải coi chừng, … cho thiên hạ thấy. Bằng không, anh em sẽ chẳng được Cha của anh em, Đấng ngự trên trời, ban thưởng”. (Mt 6,1)","a":"Đừng","b":"Đừng để","c":"Đừng làm để","d":"Chớ có phô trương","ans":"D"},{"n":256,"q":"“Còn anh, khi bố thí, đừng cho tay trái biết việc tay phải làm, để việc anh bố thí được kín đáo. Và Cha của anh, … những gì kín đáo, sẽ trả lại cho anh”. (Mt 6,3-4)","a":"Đấng biết","b":"Đấng thấu suốt","c":"Đấng biết rõ","d":"Đấng nắm rõ","ans":"B"},{"n":257,"q":"“Còn anh, khi cầu nguyện, hãy vào phòng, đóng cửa lại, và cầu nguyện cùng Cha của anh, … nơi kín đáo. Và Cha của anh, Đấng thấu suốt những gì kín đáo, sẽ trả lại cho anh”. (Mt 6,6)","a":"Đấng đang ngự","b":"Đấng đang ở","c":"Đấng hiện diện","d":"Đấng biết những gì","ans":"C"},{"n":258,"q":"“Khi cầu nguyện, anh em đừng lải nhải như dân ngoại; họ nghĩ rằng: cứ nói nhiều là được nhậm lời. Đừng bắt chước họ, vì Cha anh em đã… anh em cần gì, trước khi anh em cầu xin”. (Mt 6,7-8)","a":"Biết rõ","b":"Thừa biết","c":"Biết","d":"Ngầm biết","ans":"A"},{"n":259,"q":"“Thật vậy, nếu anh em… cho người ta, thì Cha anh em trên trời cũng sẽ tha thứ cho anh em”. (Mt 6,14)","a":"Tha thứ","b":"Tha tội","c":"Tha nợ","d":"Tha lỗi","ans":"D"},{"n":260,"q":"“Còn anh, khi ăn chay, nên rửa mặt cho sạch, chải đầu cho thơm, để không ai thấy là anh ăn chay ngoại trừ…, Đấng hiện diện nơi kín đáo”. (Mt 6,17-18)","a":"Thiên Chúa","b":"Cha của anh","c":"Thiên Chúa Cha","d":"Con Người","ans":"B"},{"n":261,"q":"“Anh em… cho mình những kho tàng dưới đất, nơi mối mọt làm hư nát, và kẻ trộm khoét vách lấy đi”. (Mt 6,19)","a":"Đừng tích trữ","b":"Đừng gom góp","c":"Đừng tích lũy","d":"Đừng tìm kiếm","ans":"A"},{"n":262,"q":"“Đèn của thân thể là con mắt. Vậy nếu mắt anh sáng, thì … sẽ sáng”. (Mt 6,22)","a":"Thân thể","b":"Thân thể của anh","c":"Toàn thân anh","d":"Toàn con người anh","ans":"C"},{"n":263,"q":"“Còn nếu mắt anh xấu, thì toàn thân anh sẽ tối. Vậy nếu ánh sáng nơi anh…, thì tối biết chừng nào!” (Mt 6,23)","a":"Lại thành bóng tối","b":"Trở thành bóng tối","c":"Ra tối tăm","d":"Không tỏa sáng","ans":"A"},{"n":264,"q":"“Không ai có thể làm tôi hai chủ, vì hoặc sẽ ghét chủ này mà yêu chủ kia, hoặc sẽ… với chủ này mà khinh dể chủ nọ. Anh em không thể vừa làm tôi Thiên Chúa vừa làm tôi Tiền Của được”. (Mt 6,24)","a":"Gắn kết","b":"Yêu mến","c":"Trung thành","d":"Gắn bó","ans":"D"},{"n":265,"q":"“Vì vậy Thầy bảo cho anh em biết:…: lấy gì mà ăn; cũng đừng lo cho thân thể: lấy gì mà mặc. Mạng sống chẳng trọng hơn của ăn, và thân thể chẳng trọng hơn áo mặc sao?” (Mt 6,25)","a":"Đừng lo","b":"Đừng quá lo lắng","c":"Đừng băn khoăn","d":"Đừng lo cho mạng sống","ans":"D"},{"n":266,"q":"“Hỏi có ai trong anh em, …, mà kéo dài đời mình thêm được dù chỉ một gang tay?” (Mt 6,27)","a":"Nhờ lo lắng","b":"Nhờ khôn khéo","c":"Nhờ khôn ngoan","d":"Nhờ tài đức","ans":"A"},{"n":267,"q":"“Trước hết hãy tìm kiếm Nước Thiên Chúa và… của Người, còn tất cả những thứ kia, Người sẽ thêm cho”. (Mt 6,33)","a":"Sự công chính","b":"Vương Quốc","c":"Đức công chính","d":"Triều Đại","ans":"C"},{"n":268,"q":"“Vậy, anh em đừng lo lắng…: ngày mai, cứ để ngày mai lo. Ngày nào có cái khổ của ngày ấy.” (Mt 6,34)","a":"Cho tương lai","b":"Gì cả","c":"Bất cứ điều gì","d":"Về ngày mai","ans":"D"},{"n":269,"q":"“Anh em đừng xét đoán,… Thiên Chúa xét đoán, vì anh em xét đoán thế nào, thì anh em cũng sẽ bị Thiên Chúa xét đoán như vậy”. (Mt 7,1-2)","a":"Thì không bị","b":"Sẽ không bị","c":"Để khỏi bị","d":"Tất cả đều sai","ans":"C"},{"n":270,"q":"“Sao anh thấy cái rác trong con mắt của người anh em,… trong con mắt của mình thì lại không để ý tới?” (Mt 7,3)","a":"Còn cái đà","b":"Mà cái xà","c":"Còn cái xà","d":"Nhưng cái xà","ans":"B"},{"n":271,"q":"“Hỡi…! Lấy cái xà ra khỏi mắt anh trước đã, rồi anh sẽ thấy rõ, để lấy cái rác ra khỏi mắt người anh em”. (Mt 7,5)","a":"Kẻ giả hình","b":"Bọn giả hình","c":"Quân tội lỗi","d":"Kẻ đạo đức giả","ans":"D"},{"n":272,"q":"“…, đừng quăng cho chó; ngọc trai, chớ liệng cho heo, kẻo chúng giày đạp dưới chân, rồi còn quay lại cắn xé anh em”. (Mt 7,6)","a":"Miếng ngon","b":"Của ngon","c":"Của thánh","d":"Vàng bạc","ans":"C"},{"n":273,"q":"“Anh em cứ xin thì sẽ được, cứ tìm thì sẽ thấy, cứ gõ cửa thì sẽ… (Mt 7,7)","a":"Mở cho","b":"Mở ra cho","c":"Người sẽ mở cho","d":"Tất cả đều đúng","ans":"B"},{"n":274,"q":"“Vậy nếu anh em… mà còn biết cho con cái mình những của tốt lành, phương chi Cha anh em, Đấng ngự trên trời, lại không ban những của tốt lành cho những kẻ kêu xin Người sao?” (Mt 7,11)","a":"Là những người xấu","b":"Là những kẻ xấu","c":"Là kẻ xấu xa","d":"Vốn là những kẻ xấu","ans":"D"},{"n":275,"q":"“Vậy tất cả những gì anh em muốn người ta làm cho mình, thì… cũng hãy làm cho người ta, vì Luật Mô-sê và lời các ngôn sứ là thế đó”. (Mt 7,12)","a":"Chính anh em","b":"Anh em","c":"Cả anh em nữa","d":"Tất cả đều sai","ans":"A"},{"n":276,"q":"“Hãy qua cửa hẹp mà vào, vì cửa rộng và đường thênh thang thì…, mà nhiều người lại đi qua đó”. (Mt 7,13)","a":"Dẫn đến diệt vọng","b":"Dẫn đến hư vong","c":"Đưa đến diệt vong","d":"Tất cả đều sai","ans":"C"},{"n":277,"q":"“Anh em hãy coi chừng…, họ đội lốt chiên mà đến với anh em; nhưng bên trong, họ là sói dữ tham mồi”. (Mt 7,15)","a":"Các kinh sư","b":"Người Pha-ri-sêu","c":"Cả A và B","d":"Các ngôn sứ giả","ans":"D"},{"n":278,"q":"“Cây nào không sinh quả tốt, thì bị chặt đi và quăng vào lửa. Vậy, cứ xem họ…, thì biết họ là ai”. (Mt 7,19-20)","a":"Sống như thế nào","b":"Sống ra sao","c":"Sinh hoa quả nào","d":"Sinh trái nào","ans":"C"},{"n":279,"q":"“Không phải bất cứ ai thưa với Thầy: ‘Lạy Chúa! Lạy Chúa!’ là được vào Nước Trời cả đâu! Nhưng chỉ ai… ý muốn của Cha Thầy là Đấng ngự trên trời, mới được vào mà thôi”. (Mt 7,21)","a":"Thi hành","b":"Làm theo","c":"Thực hành","d":"Mau mắn thi hành","ans":"A"},{"n":280,"q":"“Và bấy giờ Thầy sẽ tuyên bố với họ:… các ngươi; xéo đi cho khuất mắt Ta, hỡi bọn làm điều gian ác!” (Mt 7,23)","a":"Ta không biết","b":"Tất cả","c":"Tất cả lũ khốn","d":"Ta không hề biết","ans":"D"},{"n":281,"q":"“Vậy ai nghe những lời Thầy nói đây mà…, thì ví được như người khôn xây nhà trên đá”. (Mt 7,24)","a":"Làm theo","b":"Đem ra thực hành","c":"Mau mắn thi hành","d":"Ghi nhớ trong lòng","ans":"B"},{"n":282,"q":"“Còn ai nghe những lời Thầy nói đây, mà chẳng đem ra thực hành, thì ví được như… xây nhà trên cát.” (Mt 7,26)","a":"Người ngu","b":"Người khờ dại","c":"Người kia","d":"Người ngu dại","ans":"D"},{"n":283,"q":"“Khi Đức Giê-su giảng dạy những điều ấy xong, dân chúng sửng sốt về lời giảng dạy của Người, vì Người giảng dạy như…, chứ không như các kinh sư của họ”. (Mt 7,28-29)","a":"Đấng có uy quyền","b":"Người có thẩm quyền","c":"Đấng đầy uy quyền","d":"Một Đấng có thẩm quyền","ans":"D"},{"n":284,"q":"“Bỗng có một người mắc bệnh phong tiến lại, bái lạy Người và nói: “Thưa Ngài, nếu Ngài muốn, Ngài có thể...” (Mt 8,2)","a":"Làm cho tôi thấy được","b":"Cho tôi được thấy","c":"Làm cho tôi được sạch","d":"Chữa tôi lành sạch","ans":"C"},{"n":285,"q":"“Người giơ tay đụng vào anh và bảo: “…, anh sạch đi.” (Mt 8,3)","a":"Tội anh đã được tha","b":"Này anh","c":"Lòng tin của anh cứu chữa anh","d":"Tôi muốn","ans":"D"},{"n":286,"q":"“Rồi Đức Giê-su bảo anh: “Coi chừng, đừng nói với ai cả, nhưng hãy đi trình diện tư tế và dâng của lễ, như ông Mô-sê đã truyền, để… cho người ta biết.” (Mt 8,4)","a":"Làm chứng","b":"Loan truyền","c":"Công bố","d":"Loan báo","ans":"A"},{"n":287,"q":"“Viên đại đội trưởng đáp: “Thưa Ngài, tôi chẳng đáng Ngài vào nhà tôi, nhưng xin Ngài chỉ nói một lời là...” (Mt 8,8)","a":"Linh hồn tôi sẽ lành mạnh","b":"Đầy tớ tôi được khỏi bệnh","c":"Linh hồn tôi sẽ được sạch","d":"Tôi tớ Ngài sẽ được khỏi","ans":"B"},{"n":288,"q":"“Đức Giê-su trả lời: “Con chồn có hang, chim trời có tổ, nhưng Con Người...” (Mt 8,20)","a":"Chẳng có nơi gối đầu","b":"Chẳng tìm được nơi tựa đầu","c":"Không có nơi gối đầu","d":"Không có chỗ tựa đầu","ans":"D"},{"n":289,"q":"“Đức Giê-su bảo: “Anh hãy…, cứ để kẻ chết chôn kẻ chết của họ.” (Mt 8,22)","a":"Đi theo tôi","b":"Theo tôi","c":"Làm môn đệ tôi","d":"Đi loan báo Tin Mừng","ans":"A"},{"n":290,"q":"“Các ông lại gần đánh thức Người và nói: “Thưa Ngài, …, chúng con chết mất!” (Mt 8,25)","a":"Xin cứu giúp con","b":"Xin cứu chúng con","c":"Xin hãy ra tay","d":"Xin thương xót chúng con","ans":"B"},{"n":291,"q":"“Đức Giê-su nói: “Sao nhát thế, hỡi những người…!” Rồi Người trỗi dậy, ngăm đe gió và biển: biển liền lặng như tờ”. (Mt 8,26)","a":"Cứng lòng","b":"Nhát đảm","c":"Kém lòng tin","d":"Cứng lòng tin","ans":"C"},{"n":292,"q":"“Người ta ngạc nhiên và nói: “Ông này là người thế nào mà cả đến gió và biển cũng…?” (Mt 8,27)","a":"Phải khiếp sợ","b":"Kinh khiếp","c":"Phải kinh sợ","d":"Tuân lệnh","ans":"D"},{"n":293,"q":"“Hỡi…, chuyện chúng tôi can gì đến ông? Chưa tới lúc mà ông đã đến đây làm khổ chúng tôi sao?” (Mt 8,29)","a":"Con Thiên Chúa","b":"Ông Giê-su","c":"Ông Giê-su Na-da-rét","d":"Tất cả đều sai","ans":"A"},{"n":294,"q":"“Thấy họ có lòng tin như vậy, Đức Giê-su bảo người bại liệt: “Này con, cứ yên tâm,…” (Mt 9,2)","a":"Con đã được tha tội rồi!","b":"Tội con đã được tha!","c":"Tội của con đã được tha!","d":"Đừng sợ","ans":"A"},{"n":295,"q":"“Hãy về học cho biết ý nghĩa của câu này: Ta muốn… chứ đâu cần lễ tế. Vì tôi không đến để kêu gọi người công chính, mà để kêu gọi người tội lỗi.” (Mt 9,13)","a":"Tấm lòng","b":"Lòng yêu mến","c":"Lòng nhân","d":"Lòng khiêm nhường","ans":"C"},{"n":296,"q":"“Đức Giê-su trả lời: “Chẳng lẽ khách dự tiệc cưới lại có thể than khóc, khi chàng rể còn ở với họ? Nhưng khi tới ngày chàng rể…, bấy giờ họ mới ăn chay”. (Mt 9,15)","a":"Được đem đi rồi","b":"Bị đem đi rồi","c":"Đã đi khỏi rồi","d":"Đã ra đi rồi","ans":"B"},{"n":297,"q":"“Đang khi Đức Giê-su ra khỏi nơi đó, thì có hai người mù đi theo kêu lên rằng: “Lạy Con vua Đa-vít,… chúng tôi!” (Mt 9,27)","a":"Xin rủ lòng thương","b":"Xin thương","c":"Xin thương đến","d":"Xin thương xót","ans":"D"},{"n":298,"q":"“Người nghiêm giọng bảo họ: “Coi chừng, đừng cho ai biết!” Nhưng vừa ra khỏi đó, họ đã… trong khắp cả vùng”. (Mt 9,30-31)","a":"Nói về Người","b":"Tung tin","c":"Loan tin vui","d":"Loan tin","ans":"A"},{"n":299,"q":"“Đức Giê-su thấy đám đông thì…, vì họ lầm than vất vưởng, như bầy chiên không người chăn dắt”. (Mt 9,36)","a":"Chạnh lòng thương","b":"Rủ lòng thương","c":"Cảm thương","d":"Liền chạnh lòng thương","ans":"A"},{"n":300,"q":"“Bấy giờ, Người nói với môn đệ rằng: “Lúa chín đầy đồng, mà thợ gặt lại ít. Vậy anh em hãy… sai thợ ra gặt lúa về.” (Mt 9,37-38)","a":"Ra đi","b":"Cầu xin chủ ruộng","c":"Xin chủ mùa gặt","d":"Xin Thiên Chúa","ans":"C"},{"n":301,"q":"“Khi anh em vào bất cứ thành nào hay làng nào, thì hãy dò hỏi xem ở đó…, và hãy ở lại đó cho đến lúc ra đi. (Mt 10,11)","a":"Ai là người xứng đáng","b":"Chỗ nào tốt nhất","c":"Chỗ nào thuận tiện","d":"Nhà nào xứng đáng","ans":"A"},{"n":302,"q":"“Vào nhà nào, anh em hãy… cho nhà ấy. Nếu nhà ấy xứng đáng, thì bình an của anh em sẽ đến với họ; còn nếu nhà ấy không xứng đáng, thì bình an của anh em sẽ trở về với anh em”. (Mt 10,12-13)","a":"Chúc bình an","b":"Chào chúc bình an","c":"Chúc lành","d":"Chúc phúc lành","ans":"B"},{"n":303,"q":"“Này, Thầy sai anh em đi như chiên đi vào giữa bầy sói. Vậy anh em phải khôn như rắn và…”. (Mt 10,16)","a":"Hiền lành như bồ câu","b":"Hiền như bồ câu","c":"Đơn sơ như bồ câu","d":"Hiền lành như chiên","ans":"C"},{"n":304,"q":"“Và anh em sẽ bị điệu ra trước mặt vua chúa quan quyền vì Thầy… cho họ và các dân ngoại được biết”. (Mt 10,18)","a":"Để làm gương","b":"Để chứng tỏ","c":"Để làm chứng","d":"Để nói","ans":"C"},{"n":305,"q":"“Khi người ta nộp anh em, thì anh em đừng lo phải nói làm sao hay phải nói gì, vì trong giờ đó,… sẽ cho anh em biết phải nói gì”.","a":"Thiên Chúa","b":"Thần Khí","c":"Thánh Thần","d":"Chính Thầy","ans":"A"},{"n":306,"q":"“… anh em sẽ bị mọi người thù ghét. Nhưng kẻ nào bền chí đến cùng, kẻ ấy sẽ được cứu thoát”. (Mt 10,22)","a":"Vì Thầy","b":"Vì Tin Mừng","c":"Vì Ta","d":"Vì danh Thầy","ans":"D"},{"n":307,"q":"“Khi người ta bách hại anh em trong thành này, thì hãy... Thầy bảo thật anh em: anh em chưa đi hết các thành của Ít-ra-en, thì Con Người đã đến”. (Mt 10,23)","a":"Đừng chống cự","b":"Trốn sang thành khác","c":"Đi sang thành khác","d":"Chạy sang thành khác","ans":"B"},{"n":308,"q":"“Trò không hơn thầy, tớ không hơn chủ. Trò được như thầy, tớ được như chủ, đã là khá lắm rồi. Chủ nhà mà người ta còn gọi là…, huống chi là người nhà”. (Mt 10,24-25)","a":"Ma quỷ","b":"Tướng quỷ","c":"Đồ mất trí","d":"Bê-en-dê-bun","ans":"D"},{"n":309,"q":"“Vậy anh em đừng sợ người ta. Thật ra,… mà sẽ không được tỏ lộ, không có gì bí mật, mà người ta sẽ không biết”. (Mt 10,26)","a":"Không có gì kín đáo","b":"Không có gì che giấu","c":"Chẳng có gì kín nhiệm","d":"Chẳng có gì kín đáo","ans":"B"},{"n":310,"q":"“Điều Thầy nói với anh em lúc đêm hôm, thì hãy nói ra giữa ban ngày; và điều anh em nghe rỉ tai, thì hãy…”. (Mt 10,27)","a":"Loan báo trên mái nhà","b":"Nói giữa chỗ đông người","c":"Nói trên mái nhà","d":"Lên mái nhà rao giảng","ans":"D"},{"n":311,"q":"“Anh em… những kẻ giết thân xác mà không giết được linh hồn. Đúng hơn, anh em hãy sợ Đấng có thể tiêu diệt cả hồn lẫn xác trong hoả ngục”. (Mt 10,28)","a":"Chớ có sợ","b":"Đừng nể sợ","c":"Đừng sợ","d":"Đừng khiếp sợ","ans":"C"},{"n":312,"q":"“Hai con chim sẻ chỉ bán được một hào phải không? Thế mà, không một con nào rơi xuống đất…”. (Mt 10,29)","a":"Ngoài ý của Cha anh em","b":"Ngoài ý Thiên Chúa","c":"Ngoài ý của Thầy","d":"Ngoài ý định của Chúa","ans":"A"},{"n":313,"q":"“Vậy anh em đừng sợ, anh em còn… muôn vàn chim sẻ”.","a":"Quý giá hơn","b":"Có giá hơn","c":"Giá trị hơn","d":"Quý trọng hơn","ans":"A"},{"n":314,"q":"“Phàm ai tuyên bố… trước mặt thiên hạ, thì Thầy cũng sẽ tuyên bố nhận người ấy trước mặt Cha Thầy, Đấng ngự trên trời”. (Mt 10,32)","a":"Tin vào Thầy","b":"Nhận Thầy","c":"Làm môn đệ Thầy","d":"Tin nhận Thầy","ans":"B"},{"n":315,"q":"“Ai không… mà theo Thầy, thì không xứng với Thầy”. (Mt 10,38)","a":"Từ bỏ mọi sự","b":"Vác thập giá mình","c":"Từ bỏ chính mình","d":"Từ chối mọi sự","ans":"B"},{"n":316,"q":"“Ai giữ lấy mạng sống mình, thì sẽ mất; còn ai liều mất mạng sống mình vì Thầy, thì sẽ…”. (Mt 10,39)","a":"Tìm thấy được","b":"Tìm lại được","c":"Giữ được mạng sống ấy","d":"Có được mạng sống ấy","ans":"A"},{"n":317,"q":"“Ai đón tiếp anh em là đón tiếp Thầy, và ai đón tiếp Thầy là đón tiếp…”. (Mt 10,40)","a":"Chính Cha của Thầy","b":"Đấng đã sai Thầy","c":"Cha của Thầy","d":"Chính Đấng sai Thầy","ans":"B"},{"n":318,"q":"“Và ai cho một trong những kẻ bé nhỏ này uống, dù chỉ một chén nước lã thôi, vì kẻ ấy là môn đệ của Thầy, thì Thầy bảo thật anh em, người đó sẽ…” (Mt 10,42)","a":"Được trọng thưởng","b":"Được phần thưởng lớn lao","c":"Được Thầy đón tiếp","d":"Không mất phần thưởng đâu","ans":"D"},{"n":319,"q":"“Các anh cứ về thuật lại cho ông Gio-an những điều mắt thấy tai nghe: Người mù xem thấy, kẻ què được đi, người phong được sạch, kẻ điếc được nghe, người chết sống lại, kẻ nghèo…” (Mt 11,4-5)","a":"Được ăn uống no nê","b":"An ủi vỗ về","c":"Được nghe Tin Mừng","d":"Thỏa thuê cơm bánh","ans":"C"},{"n":320,"q":"“Chính ông là người Kinh Thánh đã nói tới khi chép rằng: Này Ta sai sứ giả của Ta đi trước mặt Con, người sẽ…”. (Mt 11,10)","a":"Chỉ đường cho Con","b":"Dọn đường cho Con đến","c":"Sửa đường cho Con","d":"Chỉ đường cho Con đến","ans":"B"},{"n":321,"q":"“Tôi nói thật với anh em: trong số phàm nhân đã lọt lòng mẹ, chưa từng có ai cao trọng hơn... Tuy nhiên, kẻ nhỏ nhất trong Nước Trời còn cao trọng hơn ông”. (Mt 11,11)","a":"Ông Si-môn Phê-rô","b":"Ông Giô-na","c":"Ông Gio-an Tẩy Giả","d":"Tổ phụ Áp-ra-ham","ans":"C"},{"n":322,"q":"“Lạy Cha là Chúa Tể trời đất, con xin ngợi khen Cha, vì Cha đã giấu không cho bậc khôn ngoan thông thái biết những điều này, nhưng lại mặc khải cho…”. (Mt 11,25)","a":"Những kẻ bé mọn","b":"Những kẻ khó nghèo","c":"Những người bé mọn","d":"Những kẻ nghèo hèn","ans":"C"},{"n":323,"q":"“Cha tôi đã giao phó mọi sự cho tôi. Và không ai biết rõ người Con, trừ Chúa Cha ; cũng như không ai biết rõ Chúa Cha, trừ người Con và kẻ mà… muốn mặc khải cho”. (Mt 11,27)","a":"Người Con","b":"Chúa Cha","c":"Cha tôi","d":"Con Người","ans":"A"},{"n":324,"q":"“Tất cả những ai đang vất vả mang gánh nặng nề, hãy đến cùng tôi, tôi sẽ…”. (Mt 11,28)","a":"Ủi an vỗ về","b":"Cho nghỉ ngơi bồi dưỡng","c":"An ủi người ấy","d":"Ủi an kẻ ấy","ans":"B"},{"n":325,"q":"“Anh em hãy mang lấy ách của tôi, và hãy học với tôi, vì tôi có lòng... Tâm hồn anh em sẽ được nghỉ ngơi bồi dưỡng. (Mt 11,29)","a":"Hiền hậu","b":"Nhân từ","c":"Khiêm nhường","d":"Cả A và C","ans":"D"},{"n":326,"q":"“Vì… tôi êm ái, và… tôi nhẹ nhàng.” (Mt 11,30)","a":"Gánh / ách","b":"Ách / gánh","c":"Ách / tiếng","d":"Gánh / tiếng","ans":"B"},{"n":327,"q":"“Đây là Người Tôi Tớ Ta đã tuyển chọn, đây là người Ta yêu dấu: … Ta cho Thần Khí Ta ngự trên Người. Người sẽ loan báo công lý trước muôn dân”. (Mt 12,18)","a":"Ta hài lòng về Người","b":"Đẹp lòng Ta mọi đàng","c":"Hãy vâng nghe lời Người","d":"Tất cả đều đúng","ans":"A"},{"n":328,"q":"“Người sẽ…, không kêu to, chẳng ai nghe thấy Người lên tiếng giữa phố phường”. (Mt 12,19)","a":"Không cãi vã","b":"Không lớn tiếng","c":"Không nặng lời","d":"Chẳng kết án","ans":"A"},{"n":329,"q":"“Cây lau bị giập, Người…, tim đèn leo lét, chẳng nỡ tắt đi, cho đến khi Người đưa công lý đến toàn thắng, và muôn dân đặt niềm hy vọng nơi danh Người”. (Mt 12,20-21)","a":"Không bẻ gãy","b":"Không đành đụng tới","c":"Không đành bẻ gãy","d":"Chẳng cần bẻ gãy","ans":"C"},{"n":330,"q":"“Còn nếu tôi dựa vào Thần Khí của Thiên Chúa mà trừ quỷ, thì quả là … đã đến giữa các ông”. (Mt 12,28)","a":"Nước Thiên Chúa","b":"Con Người","c":"Nước Trời","d":"Triều đại Thiên Chúa","ans":"D"},{"n":331,"q":"“Ai…, là chống lại tôi; và ai không cùng tôi thu góp, là phân tán”. (Mt 12,30)","a":"Không đi với tôi","b":"Cùng phe với tôi","c":"Không thuộc về tôi","d":"Không thần phục tôi","ans":"A"},{"n":332,"q":"“Vì thế, tôi nói cho các ông hay: mọi tội, kể cả tội nói phạm thượng, cũng sẽ được tha cho loài người, chứ tội nói phạm đến… sẽ chẳng được tha”. (Mt 12,31)","a":"Thánh Thần","b":"Chúa Thánh Thần","c":"Thần Khí","d":"Chúa Cha","ans":"C"},{"n":333,"q":"“Ai nói phạm đến Con Người thì được tha; nhưng ai nói phạm đến Thánh Thần sẽ chẳng được tha,…”. (Mt 12,32)","a":"Nhưng bị lửa hỏa ngục","b":"Cả đời này lẫn đời sau","c":"Nhưng bị ném vào hỏa ngục","d":"Đến muôn đời muôn kiếp","ans":"B"},{"n":334,"q":"“Cây mà tốt thì quả cũng tốt; cây mà sâu thì quả cũng sâu, vì…”. (Mt 12,33)","a":"Cây nào sinh quả đó","b":"Cây nào sinh trái đó","c":"Có xem quả mới biết cây","d":"Xem quả thì biết cây","ans":"D"},{"n":335,"q":"“Loài rắn độc kia, xấu như các người, thì làm sao…? Vì lòng có đầy, miệng mới nói ra”. (Mt 12,34)","a":"Nói điều tốt được","b":"Có thể làm việc tốt được","c":"Làm điều tốt được","d":"Làm việc lành được","ans":"A"},{"n":336,"q":"“Tôi nói cho các người hay: đến Ngày phán xét, người ta sẽ phải trả lời về… mình đã nói”. (Mt 12,36)","a":"Mọi lời xấu xa","b":"Những điều xấu","c":"Mọi điều vô ích","d":"Những lời độc ác","ans":"C"},{"n":337,"q":"“Vì nhờ lời nói của anh mà anh sẽ được trắng án; và cũng tại lời nói của anh mà anh...” (Mt 12,37)","a":"Sẽ bị kết án","b":"Sẽ bị luận phạt","c":"Sẽ bị án phạt","d":"Sẽ bị trách phạt","ans":"A"},{"n":338,"q":"“Trong cuộc phán xét, dân thành Ni-ni-vê sẽ trỗi dậy cùng với thế hệ này và sẽ kết án họ, vì xưa dân ấy đã… khi nghe ông Giô-na rao giảng; mà đây thì còn hơn ông Giô-na nữa”. (Mt 12,41)","a":"Tỏ lòng sám hối","b":"Sám hối","c":"Tỏ lòng thống hối","d":"Ăn năn thống hối","ans":"B"},{"n":339,"q":"“Trong cuộc phán xét, nữ hoàng Phương Nam sẽ đứng lên cùng với thế hệ này, và bà sẽ kết án họ, vì xưa bà đã từ tận cùng trái đất đến nghe lời khôn ngoan của vua Sa-lô-môn; mà đây thì còn…”. (Mt 12,42)","a":"Cao trọng hơn Sa-lô-mon","b":"Hơn cả Sa-lô-mon nữa","c":"Hơn vua Sa-lô-môn nữa","d":"Hơn cả vua ấy nữa","ans":"C"},{"n":340,"q":"“Vì phàm ai… của Cha tôi, Đấng ngự trên trời, người ấy là anh chị em tôi, là mẹ tôi.” (Mt 12,50)","a":"Làm theo ý","b":"Tuân hành theo ý","c":"Tuân hành ý muốn","d":"Thi hành ý muốn","ans":"D"},{"n":341,"q":"“Người gieo giống đi ra gieo giống. Trong khi người ấy gieo, thì có những hạt rơi xuống vệ đường,…” (Mt 13,3-4)","a":"Nó liền bị cháy","b":"Chim chóc đến ăn mất","c":"Nó liền mọc ngay","d":"Nó liền bị chết khô","ans":"B"},{"n":342,"q":"“Có những hạt rơi…, chỗ đất không có nhiều; nó mọc ngay, vì đất không sâu; nhưng khi nắng lên, nó liền bị cháy, và vì thiếu rễ nên bị chết khô”. (Mt 13,5-6)","a":"Trên vệ đường","b":"Vào bụi gai","c":"Trên nơi sỏi đá","d":"Rơi trên đất khô cằn","ans":"C"},{"n":343,"q":"“Có những hạt rơi vào bụi gai, gai mọc lên làm nó…”. (Mt 13,7)","a":"Chết nghẹt","b":"Bị héo khô","c":"Bị chết khô","d":"Bị chết nghẹt","ans":"A"},{"n":344,"q":"“Có những hạt lại rơi nhằm đất tốt, nên…: hạt được gấp trăm, hạt được sáu chục, hạt được ba chục”. (Mt 13,8)","a":"Sinh nhiều hoa trái","b":"Sinh hoa trái","c":"Liền mọc lên","d":"Sinh hoa kết quả","ans":"D"},{"n":345,"q":"“Ai đã có thì được cho thêm, và…; còn ai không có, thì ngay cái đang có, cũng sẽ bị lấy mất”. (Mt 13,12)","a":"Được dư giả","b":"Sẽ có dư thừa","c":"Được dư dật","d":"Sẽ được dư giả","ans":"B"},{"n":346,"q":"“Bởi thế, nếu Thầy dùng dụ ngôn mà nói với họ, là vì họ nhìn mà không nhìn, nghe mà…”. (Mt 13,13)","a":"Không nghe","b":"Không hiểu","c":"Chẳng hiểu","d":"Cả A và B","ans":"D"},{"n":347,"q":"“Còn anh em, mắt anh em thật có phúc vì…, tai anh em thật có phúc, vì được nghe”. (Mt 13,16)","a":"Được xem thấy","b":"Được trông thấy","c":"Được thấy","d":"Được nhìn thấy","ans":"C"},{"n":348,"q":"“Quả thế, Thầy bảo thật anh em, nhiều ngôn sứ và nhiều người công chính đã mong mỏi thấy điều anh em…, mà không được thấy, nghe điều anh em đang nghe, mà không được nghe”. (Mt 13,17)","a":"Đang thấy","b":"Đang thấy đây","c":"Đã thấy","d":"Đã từng thấy","ans":"A"},{"n":349,"q":"“Cứ để cả hai cùng lớn lên cho tới mùa gặt. Đến ngày mùa, tôi sẽ bảo thợ gặt: hãy gom cỏ lùng lại, bó thành bó…, còn lúa, thì hãy thu vào kho lẫm cho tôi.’” (Mt 13,30)","a":"Mà quăng vào lửa","b":"Mà đốt
