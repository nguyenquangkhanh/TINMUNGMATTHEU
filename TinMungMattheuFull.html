<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tin Mừng Mát-thêu Quiz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0f1729;
  font-family: Georgia, serif;
  color: #e8dcc8;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #1a2744 0%, #0f1729 100%);
  border-bottom: 1px solid #c9a84c44;
  padding: 18px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-text { flex: 1; }

.logo-title {
  font-size: 20px;
  font-weight: bold;
  color: #c9a84c;
  letter-spacing: 1px;
}

.logo-sub {
  margin-top: 4px;
  font-size: 13px;
  color: #8a9ab5;
  font-style: italic;
}

.btn-home {
  display: none;
  background: #1e2a44;
  border: 1px solid #c9a84c66;
  color: #c9a84c;
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  font-family: Georgia, serif;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-home:hover { background: #243252; border-color: #c9a84c; }

.main { max-width: 850px; margin: auto; padding: 24px 16px 80px; }

/* ── HOME SCREEN ── */
#screen-home { display: block; }

.home-hero {
  text-align: center;
  padding: 40px 20px 32px;
}

.home-hero h1 {
  font-size: 28px;
  color: #c9a84c;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.home-hero p {
  color: #8a9ab5;
  font-size: 15px;
  font-style: italic;
  margin-bottom: 32px;
}

.home-hero .total-badge {
  display: inline-block;
  background: #c9a84c22;
  border: 1px solid #c9a84c44;
  color: #c9a84c;
  border-radius: 20px;
  padding: 5px 18px;
  font-size: 13px;
  margin-bottom: 40px;
}

.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.group-card {
  background: linear-gradient(135deg, #1a2234 0%, #161e30 100%);
  border: 1px solid #c9a84c33;
  border-radius: 16px;
  padding: 22px 18px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
  text-align: center;
}

.group-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #c9a84c66, transparent);
}

.group-card:hover {
  border-color: #c9a84c88;
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(201,168,76,0.15);
}

.group-num {
  font-size: 22px;
  font-weight: bold;
  color: #c9a84c;
  margin-bottom: 6px;
}

.group-label {
  font-size: 13px;
  color: #8a9ab5;
}

.group-done-badge {
  position: absolute;
  top: 10px; right: 12px;
  background: #4caf6e33;
  border: 1px solid #4caf6e66;
  color: #7dd8a0;
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 11px;
}

/* ── QUIZ SCREEN ── */
#screen-quiz { display: none; }

.quiz-header-bar {
  background: linear-gradient(135deg, #1a2234 0%, #161e30 100%);
  border: 1px solid #c9a84c33;
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.quiz-range-label {
  font-size: 16px;
  font-weight: bold;
  color: #c9a84c;
}

.score-display {
  font-size: 14px;
  color: #8a9ab5;
}

.score-display span {
  color: #c9a84c;
  font-weight: bold;
  font-size: 17px;
}

.progress-bar-wrap {
  width: 100%;
  height: 4px;
  background: #1e2a44;
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #c9a84c, #e8c76a);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}

/* Question cards */
.card {
  background: linear-gradient(135deg, #1a2234 0%, #161e30 100%);
  border: 1px solid #c9a84c33;
  border-radius: 18px;
  padding: 28px 24px;
  margin-bottom: 22px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #c9a84c66, transparent);
}

.q-badge {
  display: inline-block;
  background: #c9a84c22;
  color: #c9a84c;
  border: 1px solid #c9a84c44;
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 12px;
  margin-bottom: 16px;
}

.q-text {
  font-size: 18px;
  line-height: 1.7;
  color: #f3e8d4;
  margin-bottom: 24px;
  font-style: italic;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 15px 16px;
  margin-bottom: 12px;
  border-radius: 14px;
  background: #1e2a44;
  border: 1px solid #2a3a5a;
  color: #c4cedc;
  cursor: pointer;
  transition: all 0.25s ease;
}

.option:hover { background: #243252; border-color: #c9a84c66; transform: translateX(4px); }

.option-letter {
  width: 30px; height: 30px; min-width: 30px;
  border-radius: 50%;
  background: #2a3a5a;
  display: flex; align-items: center; justify-content: center;
  color: #c9a84c;
  font-weight: bold;
}

.correct {
  background: linear-gradient(135deg, #1a3a24, #1e4028) !important;
  border-color: #4caf6e !important;
  color: #7dd8a0 !important;
}

.wrong {
  background: #3a1a1e !important;
  border-color: #e05a5a !important;
  color: #f08080 !important;
}

.result {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  display: none;
}

.result.correct { background: #1a3a24; border: 1px solid #4caf6e44; }
.result.wrong { background: #3a1a1e; border: 1px solid #e05a5a44; }

/* ── RESULTS SCREEN ── */
#screen-results { display: none; }

.results-card {
  background: linear-gradient(135deg, #1a2234 0%, #161e30 100%);
  border: 1px solid #c9a84c55;
  border-radius: 20px;
  padding: 40px 32px;
  text-align: center;
  box-shadow: 0 6px 32px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
}

.results-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #c9a84c, transparent);
}

.results-title {
  font-size: 15px;
  color: #8a9ab5;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.score-big {
  font-size: 72px;
  font-weight: bold;
  color: #c9a84c;
  line-height: 1;
  margin-bottom: 8px;
}

.score-total {
  font-size: 18px;
  color: #8a9ab5;
  margin-bottom: 28px;
}

.score-bar-wrap {
  width: 100%;
  max-width: 320px;
  margin: 0 auto 32px;
  height: 10px;
  background: #1e2a44;
  border-radius: 5px;
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}

.score-msg {
  font-size: 17px;
  color: #e8dcc8;
  font-style: italic;
  margin-bottom: 36px;
}

.results-btn-group {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-gold {
  background: linear-gradient(135deg, #c9a84c, #e8c76a);
  color: #0f1729;
  border: none;
  padding: 13px 28px;
  border-radius: 24px;
  font-size: 15px;
  font-weight: bold;
  font-family: Georgia, serif;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.35); }

.btn-outline {
  background: transparent;
  color: #c9a84c;
  border: 1px solid #c9a84c66;
  padding: 13px 28px;
  border-radius: 24px;
  font-size: 15px;
  font-family: Georgia, serif;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-outline:hover { background: #c9a84c22; border-color: #c9a84c; }

.footer {
  text-align: center;
  margin-top: 40px;
  color: #8a9ab5;
  font-size: 13px;
}

@media (max-width: 600px) {
  .card { padding: 22px 16px; }
  .q-text { font-size: 16px; }
  .option { font-size: 14px; padding: 13px; }
  .score-big { font-size: 56px; }
  .groups-grid { grid-template-columns: 1fr 1fr; }
}

.part-tabs {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.part-tab {
  background: #1e2a44;
  border: 1px solid #c9a84c44;
  color: #8a9ab5;
  padding: 10px 22px;
  border-radius: 24px;
  font-size: 14px;
  font-family: Georgia, serif;
  cursor: pointer;
  transition: all 0.2s;
}

.part-tab:hover { border-color: #c9a84c88; color: #c9a84c; }

.part-tab.active {
  background: #c9a84c22;
  border-color: #c9a84c;
  color: #c9a84c;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-text">
    <div class="logo-title">✝ TIN MỪNG MAT-THÊU</div>
    <div class="logo-sub">Giáo phận Thái Bình – Ban Giáo Lý Đức Tin</div>
  </div>
  <button class="btn-home" id="btnHome" onclick="goHome()">Trang chủ</button>
</div>

<!-- HOME SCREEN -->
<div id="screen-home">
  <div class="main">
    <div class="home-hero">
      <h1>Trắc Nghiệm Tin Mừng</h1>
      <p>Theo Thánh Mát-thêu</p>
      <div class="total-badge" id="totalBadge">300 câu hỏi · 10 phần · 30 câu mỗi phần</div>
    </div>
    
    <div class="part-tabs">
      <button class="part-tab active" id="tabP1" onclick="selectPart(1)">Phần I — Trắc Nghiệm</button>
      <button class="part-tab" id="tabP2" onclick="selectPart(2)">Phần II — Hoàn Tất Câu KT</button>
      <button class="part-tab" id="tabP3" onclick="selectPart(3)">Phần III — Lịch Sử Giáo Phận</button>
      <button class="part-tab" id="tabP4" onclick="selectPart(4)">Giới Trẻ — Thiếu Nhi</button>
      <button class="part-tab" id="tabP5" onclick="selectPart(5)">Gia Trưởng — Hiền Mẫu</button>
    </div>
    <div class="groups-grid" id="groupsGrid"></div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz">
  <div class="main">
    <div class="quiz-header-bar">
      <div class="quiz-range-label" id="quizRangeLabel"></div>
      <div class="score-display">Đúng: <span id="scoreCorrect">0</span> / <span id="scoreAnswered">0</span></div>
      <div class="progress-bar-wrap" style="flex-basis:100%">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>
    <div id="quizCards"></div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results">
  <div class="main">
    <div class="results-card">
      <div class="results-title" id="resultsRange"></div>
      <div class="score-big" id="resultsBig">0</div>
      <div class="score-total" id="resultsTotal">/ 30 câu đúng</div>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" id="resultsBar"></div>
      </div>
      <div class="score-msg" id="resultsMsg"></div>
      <div class="results-btn-group">
        <button class="btn-outline" onclick="retakeGroup()">Làm lại phần này</button>
        <button class="btn-gold" onclick="goHome()">Trở về Trang chủ</button>
      </div>
    </div>
  </div>
</div>

<script>
const QUESTIONS_P1 = [{"n":1,"q":"Ai là người đã sinh ra Giu-se, chồng của bà Ma-ri-a? (x. Mt 1,16)","a":"Rơ-kháp-am","b":"E-la-da","c":"Gia-cóp","d":"Dơ-rúp-ba-ven","ans":"C"},{"n":2,"q":"\u201cKhi Đức Giê-su ra đời tại Bê-lem, miền Giu-đê, thời vua Hê-rô-đê trị vì, có mấy nhà chiêm tinh đến Giê-ru-sa-lem. Họ từ đâu đến? (x. Mt 2,1)","a":"Ga-li-lê","b":"Phương Đông","c":"Phương Tây","d":"Tia và Xi-đôn","ans":"B"},{"n":3,"q":"\u201cXin quý ngài đi dò hỏi tường tận về Hài Nhi, và khi đã tìm thấy, xin báo lại cho tôi, để tôi cũng đến bái lạy Người.\u201d Ai đã nói câu này? (x. Mt 2,8)","a":"Quan Phi-la-tô","b":"Vua Hê-rô-đê","c":"Thượng tế Cai-pha","d":"Tất cả đều đúng.","ans":"B"},{"n":4,"q":"\u201cHọ vào nhà, thấy Hài Nhi với thân mẫu là bà Ma-ri-a, liền sấp mình thờ lạy Người\u201d. Họ là ai? (x. Mt 2,1-12)","a":"Các mục đồng","b":"Những người chăn chiên","c":"Mấy nhà chiêm tinh","d":"Tất cả đều sai","ans":"C"},{"n":5,"q":"\u201cÔng ở đó cho đến khi vua Hê-rô-đê băng hà, để ứng nghiệm lời Chúa phán xưa qua miệng ngôn sứ: Ta đã gọi con Ta ra khỏi Ai-cập\u201d. Ông là ai? (x. Mt 2,14-15)","a":"Gio-an Tẩy Giả","b":"Giu-se","c":"Si-môn Phê-rô","d":"Tất cả đều đúng.","ans":"B"},{"n":6,"q":"\u201cRồi sau khi được báo mộng, ông lui về miền Ga-li-lê, và đến ở tại một thành kia gọi là Na-da-rét, để ứng nghiệm lời đã phán qua miệng các ngôn sứ rằng: Người sẽ được gọi là người Na-da-rét\u201d. Ông là ai? (x. Mt 2,19-23)","a":"Gio-an Tẩy Giả","b":"Si-môn Phê-rô","c":"Giu-se","d":"Tất cả đều đúng.","ans":"C"},{"n":7,"q":"\u201cAnh em hãy sám hối, vì Nước Trời đã đến gần\u201d. Ai đã nói câu này? (x. Mt 3,1-2)","a":"Đức Giê-su","b":"Gio-an Tẩy Giả","c":"Ngôn sứ I-sai-a","d":"Tất cả đều đúng.","ans":"B"},{"n":8,"q":"\u201cCó tiếng người hô trong hoang địa: Hãy dọn sẵn con đường cho Đức Chúa, sửa lối cho thẳng để Người đi\u201d. Ngôn sứ nào đã nói câu này? (x. Mt 3,3)","a":"Ngôn sứ I-sai-a","b":"Ngôn sứ Ma-la-khi","c":"Ngôn sứ A-mốt","d":"Ngôn sứ Hô-sê","ans":"A"},{"n":9,"q":"\u201cCó tiếng người hô trong hoang địa: Hãy dọn sẵn con đường cho Đức Chúa, sửa lối cho thẳng để Người đi\u201d. Ngôn sứ đã nói câu này về ai? (x. Mt 3,1-3)","a":"Đức Giê-su","b":"Gio-an Tẩy Giả","c":"Đức Maria","d":"Tất cả đều đúng.","ans":"B"},{"n":10,"q":"\u201cÔng mặc áo lông lạc đà, thắt lưng bằng dây da, lấy châu chấu và mật ong rừng làm thức ăn\u201d. Ông là ai? (x. Mt 3,1-4)","a":"Gio-an Tông đồ","b":"An-rê","c":"Si-môn Phê-rô","d":"Gio-an Tẩy Giả","ans":"D"},{"n":11,"q":"\u201cNòi rắn độc kia, ai đã chỉ cho các anh cách trốn cơn thịnh nộ của Thiên Chúa sắp giáng xuống vậy?\u201d Ông Gio-an nói lời này với ai? (x. Mt 3,7)","a":"Người thuộc phái Pha-ri-sêu","b":"Người thuộc phái Xa-đốc","c":"Các kinh sư","d":"Cả A và B","ans":"D"},{"n":12,"q":"\u201cCác anh hãy sinh hoa quả để chứng tỏ lòng sám hối\u201d. Ông Gio-an nói lời này với ai? (x. Mt 3,7-8)","a":"Người thuộc phái Pha-ri-sêu","b":"Người thuộc phái Xa-đốc","c":"Các kinh sư","d":"Cả A và B","ans":"D"},{"n":13,"q":"\u201cTôi, tôi làm phép rửa cho các anh trong nước để giục lòng các anh sám hối. Còn Đấng đến sau tôi thì quyền thế hơn tôi, tôi không đáng xách dép cho Người\u201d. Ông Gio-an nói lời này về ai? (x. Mt 3,1-17)","a":"Vua Hê-rô-đê","b":"Tổng trấn Phi-la-tô","c":"Đức Giê-su","d":"Qui-ri-ni-ô","ans":"C"},{"n":14,"q":"\u201cTay Người cầm nia, Người sẽ rê sạch lúa trong sân: thóc mẩy thì thu vào kho lẫm, còn thóc lép thì bỏ vào lửa không hề tắt mà đốt đi.\u201d Ông Gio-an nói lời này về ai? (x. Mt 3,1-17)","a":"Đức Giê-su","b":"Qui-ri-ni-ô","c":"Tổng lãnh thiên thần","d":"Hoàng đế Au-gút-tô","ans":"A"},{"n":15,"q":"Bấy giờ, Đức Giê-su từ miền Ga-li-lê đến sông Gio-đan, gặp ông Gio-an để làm gì? (x. Mt 3,13)","a":"Xin ông rửa tội cho mình","b":"Mời ông cộng tác với mình","c":"Xin ông làm phép rửa cho mình","d":"Xin ông rời đi chỗ khác","ans":"C"},{"n":16,"q":"\u201cChính tôi mới cần được Ngài làm phép rửa, thế mà Ngài lại đến với tôi!\u201d Ai đã nói câu này? (x. Mt 3,14)","a":"Đức Giê-su","b":"Ông Phê-rô","c":"Ông trưởng hội đường","d":"Gio-an Tẩy Giả","ans":"D"},{"n":17,"q":"\u201cChính tôi mới cần được Ngài làm phép rửa, thế mà Ngài lại đến với tôi!\u201d Ông Gio-an đã nói câu này với ai? (x. Mt 3,13-14)","a":"Đức Giê-su","b":"Vua Hê-rô-đê","c":"Phi-la-tô","d":"Thầy thượng tế","ans":"A"},{"n":18,"q":"\u201cBây giờ cứ thế đã. Vì chúng ta nên làm như vậy để giữ trọn đức công chính\u201d Ai đã nói câu này? (x. Mt 3,15)","a":"Gio-an Tẩy Giả","b":"Đức Giê-su","c":"Ông Si-môn cùi","d":"Ông trưởng hội đường","ans":"B"},{"n":19,"q":"\u201cĐây là Con yêu dấu của Ta, Ta hài lòng về Người.\u201d Ai đã nói câu này? (x. Mt 3,17)","a":"Chúa Thánh Thần","b":"Thánh Giu-se","c":"Đức Maria","d":"Tiếng từ trời","ans":"D"},{"n":20,"q":"Ai đã dẫn Đức Giê-su vào hoang địa để chịu quỷ cám dỗ? (x. Mt 4,1)","a":"Đức Chúa Cha","b":"Các Thiên Thần","c":"Thần Khí","d":"Tất cả đều sai","ans":"C"},{"n":21,"q":"\u201cKhi ấy tên cám dỗ đến gần Người và nói: \u201cNếu ông là Con Thiên Chúa, thì truyền cho những hòn đá này hoá bánh đi!\u201d Đây là cơn cám dỗ thứ mấy? (x. Mt 4,3-4)","a":"Thứ nhất","b":"Thứ hai","c":"Thứ ba","d":"Tất cả đều sai","ans":"A"},{"n":22,"q":"\u201cNếu ông là Con Thiên Chúa, thì gieo mình xuống đi! Vì đã có lời chép rằng: Thiên Chúa sẽ truyền cho thiên sứ lo cho bạn, và thiên sứ sẽ tay đỡ tay nâng, cho bạn khỏi vấp chân vào đá.\u201d Đây là cơn cám dỗ thứ mấy? (x. Mt 4,5-7)","a":"Thứ nhất","b":"Thứ hai","c":"Thứ ba","d":"Tất cả đều sai","ans":"B"},{"n":23,"q":"\u201cTôi sẽ cho ông tất cả những thứ đó, nếu ông sấp mình bái lạy tôi.\u201d Đây là cơn cám dỗ thứ mấy? (x. Mt 4,8-10)","a":"Thứ nhất","b":"Thứ hai","c":"Thứ ba","d":"Tất cả đều sai","ans":"C"},{"n":24,"q":"Khi Đức Giê-su nghe tin ông Gio-an đã bị nộp, Người lánh qua miền Ga-li-lê. Rồi Người bỏ Na-da-rét, đến ở một thành ven biển hồ Ga-li-lê, thuộc địa hạt Dơ-vu-lun và Náp-ta-li. Thành đó là thành nào? (x. Mt 4,12-13)","a":"Bét-sai-đa","b":"Khô-ra-din","c":"Xê-xa-rê Phi-líp-phê","d":"Ca-phác-na-um","ans":"D"},{"n":25,"q":"\u201cĐoàn dân đang ngồi trong cảnh tối tăm đã thấy một ánh sáng huy hoàng, những kẻ đang ngồi trong vùng bóng tối của tử thần nay được ánh sáng bừng lên chiếu rọi\u201d. Ngôn sứ nào đã nói câu này? (x. Mt 4,12-16)","a":"Giê-rê-mi-a","b":"Ê-li-a","c":"Mi-kha","d":"I-sai-a","ans":"D"},{"n":26,"q":"Khi Đức Giê-su gọi hai anh em Si-môn và An-rê, các ông đang làm gì? (x. Mt 4,18-20)","a":"Đang vá lưới trên thuyền","b":"Đang ngồi ở bàn thu thuế","c":"Đang ở nhà","d":"Đang quăng chài xuống biển","ans":"D"},{"n":27,"q":"\u201cNgười bảo các ông: \u201cCác anh hãy theo tôi, tôi sẽ làm cho các anh thành những kẻ lưới người như lưới cá.\u201d Đức Giê-su nói câu này với ai? (x. Mt 4,18-19)","a":"Si-môn và An-rê","b":"Gia-cô-bê và Gio-an","c":"Si-môn và Gio-an","d":"Gia-cô-bê và An-rê","ans":"A"},{"n":28,"q":"Khi Đức Giê-su gọi hai anh em Gia-cô-bê và Gio-an, các ông đang làm gì? (x. Mt 4,18-20)","a":"Đang vá lưới ở trong thuyền","b":"Đang ngồi ở bàn thu thuế","c":"Đang ở nhà","d":"Đang quăng chài xuống biển","ans":"A"},{"n":29,"q":"Hai anh em Gia-cô-bê và Gio-an là con của ai? (x. Mt 4,21-22)","a":"Si-môn Ky-rê-nê","b":"Gia-ia","c":"Da-ca-ri-a","d":"Dê-bê-đê","ans":"D"},{"n":30,"q":"\u201cLập tức hai ông bỏ chài lưới mà đi theo Người\u201d. Câu này nói về cặp anh em nào? (x. Mt 4,18-20)","a":"Si-môn và Gia-cô-bê","b":"Gia-cô-bê và Gio-an","c":"Si-môn và An-rê","d":"An-rê và Gio-an","ans":"C"},{"n":31,"q":"\u201cLập tức, các ông bỏ thuyền, bỏ cha lại mà theo Người\u201d. Câu này nói về cặp anh em nào? (x. Mt 4,21-22)","a":"An-rê và Gio-an","b":"Si-môn và An-rê","c":"Si-môn và Gia-cô-bê","d":"Gia-cô-bê và Gio-an","ans":"D"},{"n":32,"q":"Trong bài giảng về \u201cTám mối phúc\u201d, người có tâm hồn nghèo khó sẽ được phần thưởng gì? (x. Mt 5,3)","a":"Đất Hứa làm gia nghiệp","b":"Thiên Chúa cho thỏa lòng","c":"Nước Trời là của họ","d":"Thiên Chúa ủi an","ans":"C"},{"n":33,"q":"Trong bài giảng về \u201cTám mối phúc\u201d, người hiền lành sẽ được phần thưởng gì? (x. Mt 5,4)","a":"Nước Trời là của họ","b":"Đất Hứa làm gia nghiệp","c":"Thiên Chúa ủi an","d":"Thiên Chúa xót thương","ans":"B"},{"n":34,"q":"Trong bài giảng về \u201cTám mối phúc\u201d, người sầu khổ sẽ được phần thưởng gì? (x. Mt 5,5)","a":"Thiên Chúa ủi an","b":"Thiên Chúa xót thương","c":"Nước Trời là của họ","d":"Nhìn thấy Thiên Chúa","ans":"A"},{"n":35,"q":"Trong bài giảng về \u201cTám mối phúc\u201d, người khao khát nên người công chính sẽ được phần thưởng gì? (x. Mt 5,6)","a":"Thiên Chúa xót thương","b":"Nhìn thấy Thiên Chúa","c":"Nước Trời là của họ","d":"Thiên Chúa cho thỏa lòng","ans":"D"},{"n":36,"q":"Trong bài giảng về \u201cTám mối phúc\u201d, người xót thương người sẽ được phần thưởng gì? (x. Mt 5,7)","a":"Thiên Chúa xót thương","b":"Nước Trời là của họ","c":"Đất Hứa làm gia nghiệp","d":"Nhìn thấy Thiên Chúa","ans":"A"},{"n":37,"q":"Trong bài giảng về \u201cTám mối phúc\u201d, người có tâm hồn trong sạch sẽ được phần thưởng gì? (x. Mt 5,8)","a":"Nước Trời là của họ","b":"Đất Hứa làm gia nghiệp","c":"Nhìn thấy Thiên Chúa","d":"Thiên Chúa xót thương","ans":"C"},{"n":38,"q":"Trong bài giảng về \u201cTám mối phúc\u201d, người xây dựng hòa bình sẽ được phần thưởng gì? (x. Mt 5,9)","a":"Được gọi là con Thiên Chúa","b":"Thiên Chúa xót thương","c":"Đất Hứa làm gia nghiệp","d":"Nước Trời là của họ","ans":"A"},{"n":39,"q":"Trong bài giảng về \u201cTám mối phúc\u201d, người bị bách hại vì sống công chính sẽ được phần thưởng gì? (x. Mt 5,10)","a":"Đất Hứa làm gia nghiệp","b":"Nước Trời là của họ","c":"Thiên Chúa xót thương","d":"Được gọi là Con Thiên Chúa","ans":"B"},{"n":40,"q":"Trong bài giảng về \u201cĐừng giận ghét\u201d, Đức Giê-su dạy, những ai giận anh em mình, thì hậu quả sẽ ra sao? (x. Mt 5,22)","a":"Bị đưa ra trước Thượng Hội Đồng","b":"Bị đưa ra tòa","c":"Lửa hỏa ngục thiêu đốt","d":"Tất cả đều đúng","ans":"B"},{"n":41,"q":"Trong bài giảng về \u201cĐừng giận ghét\u201d, Đức Giê-su dạy, những ai mắng anh em mình là đồ ngốc, thì hậu quả sẽ ra sao? (x. Mt 5,22)","a":"Lửa hỏa ngục thiêu đốt","b":"Bị đưa ra tòa","c":"Bị đưa ra trước Thượng Hội Đồng","d":"Tất cả đều đúng","ans":"C"},{"n":42,"q":"Trong bài giảng về \u201cĐừng giận ghét\u201d, Đức Giê-su dạy, những ai chửi anh em mình là quân phản đạo, thì hậu quả sẽ ra sao? (x. Mt 5,22)","a":"Đáng bị lửa hỏa ngục thiêu đốt","b":"Bị đưa ra tòa","c":"Bị đưa ra trước Thượng Hội Đồng","d":"Tất cả đều đúng","ans":"A"},{"n":43,"q":"Đức Giê-su cảnh báo các môn đệ hãy coi chừng hạng người \u201cđội lốt chiên mà đến với anh em; nhưng bên trong, họ là sói dữ tham mồi\u201d. Hạng người này là ai? (x. Mt 7,15)","a":"Ngôn sứ giả","b":"Người Pha-ri-sêu","c":"Các Kinh sư","d":"Cả B và C","ans":"A"},{"n":44,"q":"Đức Giê-su nói: \u201cVậy ai nghe những lời Thầy nói đây mà đem ra thực hành\u201d, thì ví được như hạng người nào? (x. Mt 7,24)","a":"Người ngu dại xây nhà trên cát","b":"Người khôn xây nhà trên đá","c":"Kẻ đạo đức giả","d":"Kẻ giả hình","ans":"B"},{"n":45,"q":"Đức Giê-su nói: \u201cCòn ai nghe những lời Thầy nói đây, mà chẳng đem ra thực hành\u201d, thì ví được như hạng người nào? (x. Mt 7,26)","a":"Kẻ đạo đức giả","b":"Người khôn xây nhà trên đá","c":"Người ngu dại xây nhà trên cát","d":"Kẻ giả hình","ans":"C"},{"n":46,"q":"\u201cThưa Ngài, nếu Ngài muốn, Ngài có thể làm cho tôi được sạch.\u201d Ai đã nói câu này? (x. Mt 8,1-2)","a":"Người bị thần ô uế ám","b":"Người đàn bà bị rong huyết","c":"Một người mắc bệnh phong","d":"Tất cả đều sai","ans":"C"},{"n":47,"q":"\u201cNgười giơ tay đụng vào anh và bảo: \u201cTôi muốn, anh sạch đi.\u201d Đức Giê-su nói lời này với ai? (x. Mt 8,3)","a":"Một người mắc bệnh phong","b":"Người bị thần ô uế ám","c":"Mười người phong cùi","d":"Tất cả đều sai","ans":"A"},{"n":48,"q":"\u201cThưa Ngài, tên đầy tớ của tôi bị tê bại nằm liệt ở nhà, đau đớn lắm.\u201d Ai đã nói câu này? (x. Mt 8,5-6)","a":"Viên đại đội trưởng","b":"Ông trưởng hội đường","c":"Viên sĩ quan cận vệ","d":"Tất cả đều đúng","ans":"A"},{"n":49,"q":"\u201cTôi bảo thật các ông: tôi không thấy một người Ít-ra-en nào có lòng tin như thế\u201d. Đức Giê-su nói lời này về ai? (x. Mt 8,5-10)","a":"Người phụ nữ Ca-na-an","b":"Ông trưởng hội đường","c":"Viên đại đội trưởng","d":"Người bại liệt","ans":"C"},{"n":50,"q":"\u201cÔng cứ về đi! Ông tin thế nào thì được như vậy!\u201d Đức Giê-su nói lời này với ai? (x. Mt 8,13)","a":"Ông trưởng hội đường","b":"Người bại liệt","c":"Người bị quỷ ám","d":"Viên đại đội trưởng","ans":"D"},{"n":51,"q":"\u201cPhúc thay ai bị bách hại vì\u2026, vì Nước Trời là của họ\u201d. (Mt 5,10)","a":"Sống công chính","b":"Ở công chính","c":"Sống ngay lành","d":"Danh Thầy","ans":"A"},{"n":52,"q":"\u201cPhúc thay anh em khi\u2026 mà bị người ta sỉ vả, bách hại và vu khống đủ điều xấu xa. (Mt 5,11)","a":"Vì Thầy","b":"Vì Danh Thầy","c":"Vì Tin Mừng","d":"Tất cả đều đúng","ans":"A"},{"n":53,"q":"\u201cAnh em hãy\u2026, vì phần thưởng dành cho anh em ở trên trời thật lớn lao\u201d. (Mt 5,12)","a":"Vui mừng","b":"Kiên tâm chịu đựng","c":"Vui mừng hớn hở","d":"Kiên tâm bền chí","ans":"C"},{"n":54,"q":"\u201cChính anh em là muối cho đời. Nhưng muối mà\u2026, thì lấy gì muối nó cho mặn lại?\u201d (Mt 5,13)","a":"Không còn mặn","b":"Nhạt đi","c":"Ra nhạt","d":"Hết mặn","ans":"B"},{"n":55,"q":"\u201cChính anh em là ánh sáng cho... Một thành xây trên núi không tài nào che giấu được\u201d. (Mt 5,14)","a":"Trần gian","b":"Thế gian","c":"Đời","d":"Thế gian này","ans":"A"},{"n":56,"q":"\u201cCũng chẳng có ai thắp đèn rồi lại để dưới cái thùng, nhưng\u2026, và đèn soi chiếu cho mọi người trong nhà\u201d. (Mt 5,15)","a":"Đặt trên đế","b":"Đặt trên giá","c":"Treo trên giá","d":"Treo trên tường","ans":"A"},{"n":57,"q":"\u201cCũng vậy, ánh sáng của anh em phải chiếu giãi trước mặt thiên hạ, để họ thấy những\u2026 anh em làm, mà tôn vinh Cha của anh em, Đấng ngự trên trời\u201d. (Mt 5,16)","a":"Việc tốt đẹp","b":"Công việc tốt đẹp","c":"Việc tốt lành","d":"Việc tốt","ans":"B"},{"n":58,"q":"\u201cAnh em đừng tưởng Thầy đến để bãi bỏ Luật Mô-sê hoặc lời các ngôn sứ. Thầy đến không phải là để bãi bỏ, nhưng là để \u2026\u201d. (Mt 5,17)","a":"Làm cho hoàn thiện","b":"Làm cho kiện toàn","c":"Hoàn thiện","d":"Kiện toàn","ans":"D"},{"n":59,"q":"\u201cVì, Thầy bảo thật anh em, trước khi trời đất qua đi, thì một chấm một phết trong Lề Luật cũng sẽ không qua đi, cho đến khi\u2026\u201d. (Mt 5,18)","a":"Mọi việc được hoàn tất","b":"Con Người đến","c":"Mọi sự được hoàn thành","d":"Tất cả đều sai","ans":"C"},{"n":60,"q":"\u201cVậy ai bãi bỏ dù chỉ là một trong những\u2026, và dạy người ta làm như thế, thì sẽ bị gọi là kẻ nhỏ nhất trong Nước Trời.\u201d (Mt 5,19)","a":"Điều răn nhỏ nhất ấy","b":"Điều răn ấy","c":"Giới răn này","d":"Điều Thầy nói đây","ans":"A"},{"n":61,"q":"\u201cVậy, Thầy bảo cho anh em biết, nếu anh em không ăn ở\u2026 các kinh sư và người Pha-ri-sêu, thì sẽ chẳng được vào Nước Trời\u201d. (Mt 5,20)","a":"Công chính","b":"Tốt lành hơn","c":"Công chính hơn","d":"Công chính như","ans":"C"},{"n":62,"q":"\u201cAnh em đã nghe Luật dạy người xưa rằng: Chớ giết người; ai giết người, thì đáng bị đưa ra toà. Còn Thầy, Thầy bảo cho anh em biết: Ai\u2026, thì đáng bị đưa ra toà\u201d. (Mt 5,21-22)","a":"Chửi rủa anh em mình","b":"Nguyền rủa anh em mình","c":"Đánh đập anh em mình","d":"Giận anh em mình","ans":"D"},{"n":63,"q":"\u201cAi mắng anh em mình là đồ ngốc, thì đáng bị đưa ra trước\u2026\u201d. (Mt 5,22)","a":"Thượng Hội Đồng","b":"Quan Tòa","c":"Tòa Án","d":"Hội Đồng","ans":"A"},{"n":64,"q":"\u201cCòn ai chửi anh em mình là quân phản đạo, thì đáng bị\u2026\u201d. (Mt 5,22)","a":"Lửa thiêu đốt","b":"Đưa ra tòa","c":"Đưa ra trước Hội Đồng","d":"Lửa hoả ngục thiêu đốt","ans":"D"},{"n":65,"q":"\u201cVậy, nếu khi anh sắp dâng lễ vật trước bàn thờ, mà sực nhớ có người anh em đang có chuyện bất bình với anh, thì hãy để của lễ lại đó trước bàn thờ,\u2026 với người anh em ấy đã, rồi trở lại dâng lễ vật của mình\u201d. (Mt 5,23-24)","a":"Về cầu hòa","b":"Đi giải hòa","c":"Đi làm hoà","d":"Về hòa giải","ans":"C"},{"n":66,"q":"\u201cAnh em đã nghe Luật dạy rằng: Chớ ngoại tình. Còn Thầy, Thầy bảo cho anh em biết: ai nhìn người phụ nữ mà thèm muốn, thì\u2026 đã ngoại tình với người ấy rồi\u201d. (Mt 5,27-28)","a":"Trong lòng mình","b":"Tâm hồn mình","c":"Tâm trí mình","d":"Trong lòng","ans":"D"},{"n":67,"q":"\u201cAnh em còn nghe Luật dạy người xưa rằng: Chớ bội thề, nhưng hãy trọn lời thề với Đức Chúa. Còn Thầy, Thầy bảo cho anh em biết:\u2026\u201d. (Mt 5,33-34)","a":"Đừng thề chi cả","b":"Chỉ thề khi cần thiết thôi","c":"Không nên thề chi cả","d":"Chớ thề thốt","ans":"A"},{"n":68,"q":"\u201cAnh em đã nghe Luật dạy rằng: Mắt đền mắt, răng đền răng. Còn Thầy, Thầy bảo anh em:\u2026, trái lại, nếu bị ai vả má bên phải, thì hãy giơ cả má bên trái ra nữa\u201d. (Mt 5,38-39)","a":"Đừng như bọn gian ác","b":"Đừng chống lại bọn ác","c":"Đừng như quân gian ác","d":"Đừng chống cự người ác","ans":"D"},{"n":69,"q":"\u201cNếu ai muốn kiện anh để lấy áo trong của anh, thì hãy để cho nó\u2026 Nếu có người bắt anh đi một dặm, thì hãy đi với người ấy hai dặm\u201d. (Mt 5,40-41)","a":"Lấy","b":"Lấy cả áo ngoài","c":"Làm như vậy","d":"Làm theo ý nó","ans":"B"},{"n":70,"q":"\u201cAi xin, thì hãy cho; ai muốn vay mượn, thì\u2026\u201d. (Mt 5,42)","a":"Đừng đòi lại","b":"Hãy cho họ vay","c":"Đừng từ chối","d":"Đừng ngoảnh mặt đi","ans":"D"},{"n":71,"q":"\u201cAnh em đã nghe Luật dạy rằng: Hãy yêu đồng loại và hãy ghét kẻ thù. Còn Thầy, Thầy bảo anh em:\u2026 và cầu nguyện cho những kẻ ngược đãi anh em\u201d. (Mt 5,43-44)","a":"Hãy thương xót","b":"Hãy yêu kẻ thù","c":"Hãy tha thứ","d":"Hãy yêu kẻ ác","ans":"B"},{"n":72,"q":"\u201cVì nếu anh em yêu thương\u2026, thì anh em nào có công chi? Ngay cả những người thu thuế cũng chẳng làm như thế sao?\u201d (Mt 5,46)","a":"Kẻ yêu thương mình","b":"Người đồng loại","c":"Người thân cận","d":"Người anh em","ans":"A"},{"n":73,"q":"\u201cNếu anh em chỉ chào hỏi anh em mình thôi, thì anh em có\u2026? Ngay cả người ngoại cũng chẳng làm như thế sao?\u201d (Mt 5,47)","a":"Làm gì khác đâu","b":"Công gì đâu","c":"Hơn gì người thu thuế đâu","d":"Làm gì lạ thường đâu","ans":"D"},{"n":74,"q":"\u201cVậy anh em hãy nên hoàn thiện, như\u2026 là Đấng hoàn thiện.\u201d (Mt 5,48)","a":"Thiên Chúa Cha","b":"Thiên Chúa","c":"Cha anh em trên trời","d":"Cha trên trời","ans":"C"},{"n":75,"q":"\u201cKhi làm việc lành phúc đức, anh em phải coi chừng,\u2026 cho thiên hạ thấy. Bằng không, anh em sẽ chẳng được Cha của anh em, Đấng ngự trên trời, ban thưởng\u201d. (Mt 6,1)","a":"Đừng","b":"Đừng để","c":"Đừng làm để","d":"Chớ có phô trương","ans":"D"},{"n":76,"q":"\u201cCòn anh, khi bố thí, đừng cho tay trái biết việc tay phải làm, để việc anh bố thí được kín đáo. Và Cha của anh,\u2026 những gì kín đáo, sẽ trả lại cho anh\u201d. (Mt 6,3-4)","a":"Đấng biết","b":"Đấng thấu suốt","c":"Đấng biết rõ","d":"Đấng nắm rõ","ans":"B"},{"n":77,"q":"\u201cCòn anh, khi cầu nguyện, hãy vào phòng, đóng cửa lại, và cầu nguyện cùng Cha của anh,\u2026 nơi kín đáo. Và Cha của anh, Đấng thấu suốt những gì kín đáo, sẽ trả lại cho anh\u201d. (Mt 6,6)","a":"Đấng đang ngự","b":"Đấng đang ở","c":"Đấng hiện diện","d":"Đấng biết những gì","ans":"C"},{"n":78,"q":"\u201cKhi cầu nguyện, anh em đừng lải nhải như dân ngoại; họ nghĩ rằng: cứ nói nhiều là được nhậm lời. Đừng bắt chước họ, vì Cha anh em đã\u2026 anh em cần gì, trước khi anh em cầu xin\u201d. (Mt 6,7-8)","a":"Biết rõ","b":"Thừa biết","c":"Biết","d":"Ngầm biết","ans":"A"},{"n":79,"q":"\u201cThật vậy, nếu anh em\u2026 cho người ta, thì Cha anh em trên trời cũng sẽ tha thứ cho anh em\u201d. (Mt 6,14)","a":"Tha thứ","b":"Tha tội","c":"Tha nợ","d":"Tha lỗi","ans":"D"},{"n":80,"q":"\u201cCòn anh, khi ăn chay, nên rửa mặt cho sạch, chải đầu cho thơm, để không ai thấy là anh ăn chay ngoại trừ\u2026, Đấng hiện diện nơi kín đáo\u201d. (Mt 6,17-18)","a":"Thiên Chúa","b":"Cha của anh","c":"Thiên Chúa Cha","d":"Con Người","ans":"B"},{"n":81,"q":"\u201cAnh em\u2026 cho mình những kho tàng dưới đất, nơi mối mọt làm hư nát, và kẻ trộm khoét vách lấy đi\u201d. (Mt 6,19)","a":"Đừng tích trữ","b":"Đừng gom góp","c":"Đừng tích lũy","d":"Đừng tìm kiếm","ans":"A"},{"n":82,"q":"\u201cĐèn của thân thể là con mắt. Vậy nếu mắt anh sáng, thì\u2026 sẽ sáng\u201d. (Mt 6,22)","a":"Thân thể","b":"Thân thể của anh","c":"Toàn thân anh","d":"Toàn con người anh","ans":"C"},{"n":83,"q":"\u201cCòn nếu mắt anh xấu, thì toàn thân anh sẽ tối. Vậy nếu ánh sáng nơi anh\u2026, thì tối biết chừng nào!\u201d (Mt 6,23)","a":"Lại thành bóng tối","b":"Trở thành bóng tối","c":"Ra tối tăm","d":"Không tỏa sáng","ans":"A"},{"n":84,"q":"\u201cKhông ai có thể làm tôi hai chủ, vì hoặc sẽ ghét chủ này mà yêu chủ kia, hoặc sẽ\u2026 với chủ này mà khinh dể chủ nọ. Anh em không thể vừa làm tôi Thiên Chúa vừa làm tôi Tiền Của được\u201d. (Mt 6,24)","a":"Gắn kết","b":"Yêu mến","c":"Trung thành","d":"Gắn bó","ans":"D"},{"n":85,"q":"\u201cVì vậy Thầy bảo cho anh em biết:\u2026: lấy gì mà ăn; cũng đừng lo cho thân thể: lấy gì mà mặc. Mạng sống chẳng trọng hơn của ăn, và thân thể chẳng trọng hơn áo mặc sao?\u201d (Mt 6,25)","a":"Đừng lo","b":"Đừng quá lo lắng","c":"Đừng băn khoăn","d":"Đừng lo cho mạng sống","ans":"D"},{"n":86,"q":"\u201cHỏi có ai trong anh em,\u2026, mà kéo dài đời mình thêm được dù chỉ một gang tay?\u201d (Mt 6,27)","a":"Nhờ lo lắng","b":"Nhờ khôn khéo","c":"Nhờ khôn ngoan","d":"Nhờ tài đức","ans":"A"},{"n":87,"q":"\u201cTrước hết hãy tìm kiếm Nước Thiên Chúa và\u2026 của Người, còn tất cả những thứ kia, Người sẽ thêm cho\u201d. (Mt 6,33)","a":"Sự công chính","b":"Vương Quốc","c":"Đức công chính","d":"Triều Đại","ans":"C"},{"n":88,"q":"\u201cVậy, anh em đừng lo lắng\u2026: ngày mai, cứ để ngày mai lo. Ngày nào có cái khổ của ngày ấy.\u201d (Mt 6,34)","a":"Cho tương lai","b":"Gì cả","c":"Bất cứ điều gì","d":"Về ngày mai","ans":"D"},{"n":89,"q":"\u201cAnh em đừng xét đoán,\u2026 Thiên Chúa xét đoán, vì anh em xét đoán thế nào, thì anh em cũng sẽ bị Thiên Chúa xét đoán như vậy\u201d. (Mt 7,1-2)","a":"Thì không bị","b":"Sẽ không bị","c":"Để khỏi bị","d":"Tất cả đều sai","ans":"C"},{"n":90,"q":"\u201cSao anh thấy cái rác trong con mắt của người anh em,\u2026 trong con mắt của mình thì lại không để ý tới?\u201d (Mt 7,3)","a":"Còn cái đà","b":"Mà cái xà","c":"Còn cái xà","d":"Nhưng cái xà","ans":"B"},{"n":91,"q":"\u201cHỡi\u2026! Lấy cái xà ra khỏi mắt anh trước đã, rồi anh sẽ thấy rõ, để lấy cái rác ra khỏi mắt người anh em\u201d. (Mt 7,5)","a":"Kẻ giả hình","b":"Bọn giả hình","c":"Quân tội lỗi","d":"Kẻ đạo đức giả","ans":"D"},{"n":92,"q":"\u201c\u2026, đừng quăng cho chó; ngọc trai, chớ liệng cho heo, kẻo chúng giày đạp dưới chân, rồi còn quay lại cắn xé anh em\u201d. (Mt 7,6)","a":"Miếng ngon","b":"Của ngon","c":"Của thánh","d":"Vàng bạc","ans":"C"},{"n":93,"q":"\u201cAnh em cứ xin thì sẽ được, cứ tìm thì sẽ thấy, cứ gõ cửa thì sẽ\u2026 (Mt 7,7)","a":"Mở cho","b":"Mở ra cho","c":"Người sẽ mở cho","d":"Tất cả đều đúng","ans":"B"},{"n":94,"q":"\u201cVậy nếu anh em\u2026 mà còn biết cho con cái mình những của tốt lành, phương chi Cha anh em, Đấng ngự trên trời, lại không ban những của tốt lành cho những kẻ kêu xin Người sao?\u201d (Mt 7,11)","a":"Là những người xấu","b":"Là những kẻ xấu","c":"Là kẻ xấu xa","d":"Vốn là những kẻ xấu","ans":"D"},{"n":95,"q":"\u201cVậy tất cả những gì anh em muốn người ta làm cho mình, thì\u2026 cũng hãy làm cho người ta, vì Luật Mô-sê và lời các ngôn sứ là thế đó\u201d. (Mt 7,12)","a":"Chính anh em","b":"Anh em","c":"Cả anh em nữa","d":"Tất cả đều sai","ans":"A"},{"n":96,"q":"\u201cHãy qua cửa hẹp mà vào, vì cửa rộng và đường thênh thang thì\u2026, mà nhiều người lại đi qua đó\u201d. (Mt 7,13)","a":"Dẫn đến diệt vọng","b":"Dẫn đến hư vong","c":"Đưa đến diệt vong","d":"Tất cả đều sai","ans":"C"},{"n":97,"q":"\u201cAnh em hãy coi chừng\u2026, họ đội lốt chiên mà đến với anh em; nhưng bên trong, họ là sói dữ tham mồi\u201d. (Mt 7,15)","a":"Các kinh sư","b":"Người Pha-ri-sêu","c":"Cả A và B","d":"Các ngôn sứ giả","ans":"D"},{"n":98,"q":"\u201cCây nào không sinh quả tốt, thì bị chặt đi và quăng vào lửa. Vậy, cứ xem họ\u2026, thì biết họ là ai\u201d. (Mt 7,19-20)","a":"Sống như thế nào","b":"Sống ra sao","c":"Sinh hoa quả nào","d":"Sinh trái nào","ans":"C"},{"n":99,"q":"\u201cKhông phải bất cứ ai thưa với Thầy: 'Lạy Chúa! Lạy Chúa!' là được vào Nước Trời cả đâu! Nhưng chỉ ai\u2026 ý muốn của Cha Thầy là Đấng ngự trên trời, mới được vào mà thôi\u201d. (Mt 7,21)","a":"Thi hành","b":"Làm theo","c":"Thực hành","d":"Mau mắn thi hành","ans":"A"},{"n":100,"q":"\u201cVà bấy giờ Thầy sẽ tuyên bố với họ:\u2026 các ngươi; xéo đi cho khuất mắt Ta, hỡi bọn làm điều gian ác!\u201d (Mt 7,23)","a":"Ta không biết","b":"Tất cả","c":"Tất cả lũ khốn","d":"Ta không hề biết","ans":"D"},{"n":101,"q":"\u201cVậy ai nghe những lời Thầy nói đây mà\u2026, thì ví được như người khôn xây nhà trên đá\u201d. (Mt 7,24)","a":"Làm theo","b":"Đem ra thực hành","c":"Mau mắn thi hành","d":"Ghi nhớ trong lòng","ans":"B"},{"n":102,"q":"\u201cCòn ai nghe những lời Thầy nói đây, mà chẳng đem ra thực hành, thì ví được như\u2026 xây nhà trên cát.\u201d (Mt 7,26)","a":"Người ngu","b":"Người khờ dại","c":"Người kia","d":"Người ngu dại","ans":"D"},{"n":103,"q":"\u201cKhi Đức Giê-su giảng dạy những điều ấy xong, dân chúng sửng sốt về lời giảng dạy của Người, vì Người giảng dạy như\u2026, chứ không như các kinh sư của họ\u201d. (Mt 7,28-29)","a":"Đấng có uy quyền","b":"Người có thẩm quyền","c":"Đấng đầy uy quyền","d":"Một Đấng có thẩm quyền","ans":"D"},{"n":104,"q":"\u201cBỗng có một người mắc bệnh phong tiến lại, bái lạy Người và nói: \u201cThưa Ngài, nếu Ngài muốn, Ngài có thể...\u201d (Mt 8,2)","a":"Làm cho tôi thấy được","b":"Cho tôi được thấy","c":"Làm cho tôi được sạch","d":"Chữa tôi lành sạch","ans":"C"},{"n":105,"q":"\u201cNgười giơ tay đụng vào anh và bảo: \u201c\u2026, anh sạch đi.\u201d (Mt 8,3)","a":"Tội anh đã được tha","b":"Này anh","c":"Lòng tin của anh cứu chữa anh","d":"Tôi muốn","ans":"D"},{"n":106,"q":"\u201cRồi Đức Giê-su bảo anh: \u201cCoi chừng, đừng nói với ai cả, nhưng hãy đi trình diện tư tế và dâng của lễ, như ông Mô-sê đã truyền, để\u2026 cho người ta biết.\u201d (Mt 8,4)","a":"Làm chứng","b":"Loan truyền","c":"Công bố","d":"Loan báo","ans":"A"},{"n":107,"q":"\u201cViên đại đội trưởng đáp: \u201cThưa Ngài, tôi chẳng đáng Ngài vào nhà tôi, nhưng xin Ngài chỉ nói một lời là...\u201d (Mt 8,8)","a":"Linh hồn tôi sẽ lành mạnh","b":"Đầy tớ tôi được khỏi bệnh","c":"Linh hồn tôi sẽ được sạch","d":"Tôi tớ Ngài sẽ được khỏi","ans":"B"},{"n":108,"q":"\u201cĐức Giê-su trả lời: \u201cCon chồn có hang, chim trời có tổ, nhưng Con Người...\u201d (Mt 8,20)","a":"Chẳng có nơi gối đầu","b":"Chẳng tìm được nơi tựa đầu","c":"Không có nơi gối đầu","d":"Không có chỗ tựa đầu","ans":"D"},{"n":109,"q":"\u201cĐức Giê-su bảo: \u201cAnh hãy\u2026, cứ để kẻ chết chôn kẻ chết của họ.\u201d (Mt 8,22)","a":"Đi theo tôi","b":"Theo tôi","c":"Làm môn đệ tôi","d":"Đi loan báo Tin Mừng","ans":"A"},{"n":110,"q":"\u201cCác ông lại gần đánh thức Người và nói: \u201cThưa Ngài,\u2026, chúng con chết mất!\u201d (Mt 8,25)","a":"Xin cứu giúp con","b":"Xin cứu chúng con","c":"Xin hãy ra tay","d":"Xin thương xót chúng con","ans":"B"},{"n":111,"q":"\u201cĐức Giê-su nói: \u201cSao nhát thế, hỡi những người\u2026!\u201d Rồi Người trỗi dậy, ngăm đe gió và biển: biển liền lặng như tờ\u201d. (Mt 8,26)","a":"Cứng lòng","b":"Nhát đảm","c":"Kém lòng tin","d":"Cứng lòng tin","ans":"C"},{"n":112,"q":"\u201cNgười ta ngạc nhiên và nói: \u201cÔng này là người thế nào mà cả đến gió và biển cũng\u2026?\u201d (Mt 8,27)","a":"Phải khiếp sợ","b":"Kinh khiếp","c":"Phải kinh sợ","d":"Tuân lệnh","ans":"D"},{"n":113,"q":"\u201cHỡi\u2026, chuyện chúng tôi can gì đến ông? Chưa tới lúc mà ông đã đến đây làm khổ chúng tôi sao?\u201d (Mt 8,29)","a":"Con Thiên Chúa","b":"Ông Giê-su","c":"Ông Giê-su Na-da-rét","d":"Tất cả đều sai","ans":"A"},{"n":114,"q":"\u201cThấy họ có lòng tin như vậy, Đức Giê-su bảo người bại liệt: \u201cNày con, cứ yên tâm,\u2026\u201d (Mt 9,2)","a":"Con đã được tha tội rồi!","b":"Tội con đã được tha!","c":"Tội của con đã được tha!","d":"Đừng sợ","ans":"A"},{"n":115,"q":"\u201cHãy về học cho biết ý nghĩa của câu này: Ta muốn\u2026 chứ đâu cần lễ tế. Vì tôi không đến để kêu gọi người công chính, mà để kêu gọi người tội lỗi.\u201d (Mt 9,13)","a":"Tấm lòng","b":"Lòng yêu mến","c":"Lòng nhân","d":"Lòng khiêm nhường","ans":"C"},{"n":116,"q":"\u201cĐức Giê-su trả lời: \u201cChẳng lẽ khách dự tiệc cưới lại có thể than khóc, khi chàng rể còn ở với họ? Nhưng khi tới ngày chàng rể\u2026, bấy giờ họ mới ăn chay\u201d. (Mt 9,15)","a":"Được đem đi rồi","b":"Bị đem đi rồi","c":"Đã đi khỏi rồi","d":"Đã ra đi rồi","ans":"B"},{"n":117,"q":"\u201cĐang khi Đức Giê-su ra khỏi nơi đó, thì có hai người mù đi theo kêu lên rằng: \u201cLạy Con vua Đa-vít,\u2026 chúng tôi!\u201d (Mt 9,27)","a":"Xin rủ lòng thương","b":"Xin thương","c":"Xin thương đến","d":"Xin thương xót","ans":"D"},{"n":118,"q":"\u201cNgười nghiêm giọng bảo họ: \u201cCoi chừng, đừng cho ai biết!\u201d Nhưng vừa ra khỏi đó, họ đã\u2026 trong khắp cả vùng\u201d. (Mt 9,30-31)","a":"Nói về Người","b":"Tung tin","c":"Loan tin vui","d":"Loan tin","ans":"A"},{"n":119,"q":"\u201cĐức Giê-su thấy đám đông thì\u2026, vì họ lầm than vất vưởng, như bầy chiên không người chăn dắt\u201d. (Mt 9,36)","a":"Chạnh lòng thương","b":"Rủ lòng thương","c":"Cảm thương","d":"Liền chạnh lòng thương","ans":"A"},{"n":120,"q":"\u201cBấy giờ, Người nói với môn đệ rằng: \u201cLúa chín đầy đồng, mà thợ gặt lại ít. Vậy anh em hãy\u2026 sai thợ ra gặt lúa về.\u201d (Mt 9,37-38)","a":"Ra đi","b":"Cầu xin chủ ruộng","c":"Xin chủ mùa gặt","d":"Xin Thiên Chúa","ans":"C"},{"n":121,"q":"\u201cKhi anh em vào bất cứ thành nào hay làng nào, thì hãy dò hỏi xem ở đó\u2026, và hãy ở lại đó cho đến lúc ra đi. (Mt 10,11)","a":"Ai là người xứng đáng","b":"Chỗ nào tốt nhất","c":"Chỗ nào thuận tiện","d":"Nhà nào xứng đáng","ans":"A"},{"n":122,"q":"\u201cVào nhà nào, anh em hãy\u2026 cho nhà ấy. Nếu nhà ấy xứng đáng, thì bình an của anh em sẽ đến với họ; còn nếu nhà ấy không xứng đáng, thì bình an của anh em sẽ trở về với anh em\u201d. (Mt 10,12-13)","a":"Chúc bình an","b":"Chào chúc bình an","c":"Chúc lành","d":"Chúc phúc lành","ans":"B"},{"n":123,"q":"\u201cNày, Thầy sai anh em đi như chiên đi vào giữa bầy sói. Vậy anh em phải khôn như rắn và\u2026\u201d. (Mt 10,16)","a":"Hiền lành như bồ câu","b":"Hiền như bồ câu","c":"Đơn sơ như bồ câu","d":"Hiền lành như chiên","ans":"C"},{"n":124,"q":"\u201cVà anh em sẽ bị điệu ra trước mặt vua chúa quan quyền vì Thầy\u2026 cho họ và các dân ngoại được biết\u201d. (Mt 10,18)","a":"Để làm gương","b":"Để chứng tỏ","c":"Để làm chứng","d":"Để nói","ans":"C"},{"n":125,"q":"\u201cKhi người ta nộp anh em, thì anh em đừng lo phải nói làm sao hay phải nói gì, vì trong giờ đó,\u2026 sẽ cho anh em biết phải nói gì\u201d.","a":"Thiên Chúa","b":"Thần Khí","c":"Thánh Thần","d":"Chính Thầy","ans":"A"},{"n":126,"q":"\u201c\u2026 anh em sẽ bị mọi người thù ghét. Nhưng kẻ nào bền chí đến cùng, kẻ ấy sẽ được cứu thoát\u201d. (Mt 10,22)","a":"Vì Thầy","b":"Vì Tin Mừng","c":"Vì Ta","d":"Vì danh Thầy","ans":"D"},{"n":127,"q":"\u201cKhi người ta bách hại anh em trong thành này, thì hãy... Thầy bảo thật anh em: anh em chưa đi hết các thành của Ít-ra-en, thì Con Người đã đến\u201d. (Mt 10,23)","a":"Đừng chống cự","b":"Trốn sang thành khác","c":"Đi sang thành khác","d":"Chạy sang thành khác","ans":"B"},{"n":128,"q":"\u201cTrò không hơn thầy, tớ không hơn chủ. Trò được như thầy, tớ được như chủ, đã là khá lắm rồi. Chủ nhà mà người ta còn gọi là\u2026, huống chi là người nhà\u201d. (Mt 10,24-25)","a":"Ma quỷ","b":"Tướng quỷ","c":"Đồ mất trí","d":"Bê-en-dê-bun","ans":"D"},{"n":129,"q":"\u201cVậy anh em đừng sợ người ta. Thật ra,\u2026 mà sẽ không được tỏ lộ, không có gì bí mật, mà người ta sẽ không biết\u201d. (Mt 10,26)","a":"Không có gì kín đáo","b":"Không có gì che giấu","c":"Chẳng có gì kín nhiệm","d":"Chẳng có gì kín đáo","ans":"B"},{"n":130,"q":"\u201cĐiều Thầy nói với anh em lúc đêm hôm, thì hãy nói ra giữa ban ngày; và điều anh em nghe rỉ tai, thì hãy\u2026\u201d. (Mt 10,27)","a":"Loan báo trên mái nhà","b":"Nói giữa chỗ đông người","c":"Nói trên mái nhà","d":"Lên mái nhà rao giảng","ans":"D"},{"n":131,"q":"\u201cAnh em\u2026 những kẻ giết thân xác mà không giết được linh hồn. Đúng hơn, anh em hãy sợ Đấng có thể tiêu diệt cả hồn lẫn xác trong hoả ngục\u201d. (Mt 10,28)","a":"Chớ có sợ","b":"Đừng nể sợ","c":"Đừng sợ","d":"Đừng khiếp sợ","ans":"C"},{"n":132,"q":"\u201cHai con chim sẻ chỉ bán được một hào phải không? Thế mà, không một con nào rơi xuống đất\u2026\u201d. (Mt 10,29)","a":"Ngoài ý của Cha anh em","b":"Ngoài ý Thiên Chúa","c":"Ngoài ý của Thầy","d":"Ngoài ý định của Chúa","ans":"A"},{"n":133,"q":"\u201cVậy anh em đừng sợ, anh em còn\u2026 muôn vàn chim sẻ\u201d.","a":"Quý giá hơn","b":"Có giá hơn","c":"Giá trị hơn","d":"Quý trọng hơn","ans":"A"},{"n":134,"q":"\u201cPhàm ai tuyên bố\u2026 trước mặt thiên hạ, thì Thầy cũng sẽ tuyên bố nhận người ấy trước mặt Cha Thầy, Đấng ngự trên trời\u201d. (Mt 10,32)","a":"Tin vào Thầy","b":"Nhận Thầy","c":"Làm môn đệ Thầy","d":"Tin nhận Thầy","ans":"B"},{"n":135,"q":"\u201cAi không\u2026 mà theo Thầy, thì không xứng với Thầy\u201d. (Mt 10,38)","a":"Từ bỏ mọi sự","b":"Vác thập giá mình","c":"Từ bỏ chính mình","d":"Từ chối mọi sự","ans":"B"},{"n":136,"q":"\u201cAi giữ lấy mạng sống mình, thì sẽ mất; còn ai liều mất mạng sống mình vì Thầy, thì sẽ\u2026\u201d. (Mt 10,39)","a":"Tìm thấy được","b":"Tìm lại được","c":"Giữ được mạng sống ấy","d":"Có được mạng sống ấy","ans":"A"},{"n":137,"q":"\u201cAi đón tiếp anh em là đón tiếp Thầy, và ai đón tiếp Thầy là đón tiếp\u2026\u201d. (Mt 10,40)","a":"Chính Cha của Thầy","b":"Đấng đã sai Thầy","c":"Cha của Thầy","d":"Chính Đấng sai Thầy","ans":"B"},{"n":138,"q":"\u201cVà ai cho một trong những kẻ bé nhỏ này uống, dù chỉ một chén nước lã thôi, vì kẻ ấy là môn đệ của Thầy, thì Thầy bảo thật anh em, người đó sẽ\u2026\u201d (Mt 10,42)","a":"Được trọng thưởng","b":"Được phần thưởng lớn lao","c":"Được Thầy đón tiếp","d":"Không mất phần thưởng đâu","ans":"D"},{"n":139,"q":"\u201cCác anh cứ về thuật lại cho ông Gio-an những điều mắt thấy tai nghe: Người mù xem thấy, kẻ què được đi, người phong được sạch, kẻ điếc được nghe, người chết sống lại, kẻ nghèo\u2026\u201d (Mt 11,4-5)","a":"Được ăn uống no nê","b":"An ủi vỗ về","c":"Được nghe Tin Mừng","d":"Thỏa thuê cơm bánh","ans":"C"},{"n":140,"q":"\u201cChính ông là người Kinh Thánh đã nói tới khi chép rằng: Này Ta sai sứ giả của Ta đi trước mặt Con, người sẽ\u2026\u201d. (Mt 11,10)","a":"Chỉ đường cho Con","b":"Dọn đường cho Con đến","c":"Sửa đường cho Con","d":"Chỉ đường cho Con đến","ans":"B"},{"n":141,"q":"\u201cTôi nói thật với anh em: trong số phàm nhân đã lọt lòng mẹ, chưa từng có ai cao trọng hơn... Tuy nhiên, kẻ nhỏ nhất trong Nước Trời còn cao trọng hơn ông\u201d. (Mt 11,11)","a":"Ông Si-môn Phê-rô","b":"Ông Giô-na","c":"Ông Gio-an Tẩy Giả","d":"Tổ phụ Áp-ra-ham","ans":"C"},{"n":142,"q":"\u201cLạy Cha là Chúa Tể trời đất, con xin ngợi khen Cha, vì Cha đã giấu không cho bậc khôn ngoan thông thái biết những điều này, nhưng lại mặc khải cho\u2026\u201d. (Mt 11,25)","a":"Những kẻ bé mọn","b":"Những kẻ khó nghèo","c":"Những người bé mọn","d":"Những kẻ nghèo hèn","ans":"C"},{"n":143,"q":"\u201cCha tôi đã giao phó mọi sự cho tôi. Và không ai biết rõ người Con, trừ Chúa Cha ; cũng như không ai biết rõ Chúa Cha, trừ người Con và kẻ mà\u2026 muốn mặc khải cho\u201d. (Mt 11,27)","a":"Người Con","b":"Chúa Cha","c":"Cha tôi","d":"Con Người","ans":"A"},{"n":144,"q":"\u201cTất cả những ai đang vất vả mang gánh nặng nề, hãy đến cùng tôi, tôi sẽ\u2026\u201d. (Mt 11,28)","a":"Ủi an vỗ về","b":"Cho nghỉ ngơi bồi dưỡng","c":"An ủi người ấy","d":"Ủi an kẻ ấy","ans":"B"},{"n":145,"q":"\u201cAnh em hãy mang lấy ách của tôi, và hãy học với tôi, vì tôi có lòng... Tâm hồn anh em sẽ được nghỉ ngơi bồi dưỡng. (Mt 11,29)","a":"Hiền hậu","b":"Nhân từ","c":"Khiêm nhường","d":"Cả A và C","ans":"D"},{"n":146,"q":"\u201cVì\u2026 tôi êm ái, và\u2026 tôi nhẹ nhàng.\u201d (Mt 11,30)","a":"Gánh / ách","b":"Ách / gánh","c":"Ách / tiếng","d":"Gánh / tiếng","ans":"B"},{"n":147,"q":"\u201cĐây là Người Tôi Tớ Ta đã tuyển chọn, đây là người Ta yêu dấu:\u2026 Ta cho Thần Khí Ta ngự trên Người. Người sẽ loan báo công lý trước muôn dân\u201d. (Mt 12,18)","a":"Ta hài lòng về Người","b":"Đẹp lòng Ta mọi đàng","c":"Hãy vâng nghe lời Người","d":"Tất cả đều đúng","ans":"A"},{"n":148,"q":"\u201cNgười sẽ\u2026, không kêu to, chẳng ai nghe thấy Người lên tiếng giữa phố phường\u201d. (Mt 12,19)","a":"Không cãi vã","b":"Không lớn tiếng","c":"Không nặng lời","d":"Chẳng kết án","ans":"A"},{"n":149,"q":"\u201cCây lau bị giập, Người\u2026, tim đèn leo lét, chẳng nỡ tắt đi, cho đến khi Người đưa công lý đến toàn thắng, và muôn dân đặt niềm hy vọng nơi danh Người\u201d. (Mt 12,20-21)","a":"Không bẻ gãy","b":"Không đành đụng tới","c":"Không đành bẻ gãy","d":"Chẳng cần bẻ gãy","ans":"C"},{"n":150,"q":"\u201cCòn nếu tôi dựa vào Thần Khí của Thiên Chúa mà trừ quỷ, thì quả là\u2026 đã đến giữa các ông\u201d. (Mt 12,28)","a":"Nước Thiên Chúa","b":"Con Người","c":"Nước Trời","d":"Triều đại Thiên Chúa","ans":"D"},{"n":151,"q":"\u201cAi\u2026, là chống lại tôi; và ai không cùng tôi thu góp, là phân tán\u201d. (Mt 12,30)","a":"Không đi với tôi","b":"Cùng phe với tôi","c":"Không thuộc về tôi","d":"Không thần phục tôi","ans":"A"},{"n":152,"q":"\u201cVì thế, tôi nói cho các ông hay: mọi tội, kể cả tội nói phạm thượng, cũng sẽ được tha cho loài người, chứ tội nói phạm đến\u2026 sẽ chẳng được tha\u201d. (Mt 12,31)","a":"Thánh Thần","b":"Chúa Thánh Thần","c":"Thần Khí","d":"Chúa Cha","ans":"C"},{"n":153,"q":"\u201cAi nói phạm đến Con Người thì được tha; nhưng ai nói phạm đến Thánh Thần sẽ chẳng được tha,\u2026\u201d. (Mt 12,32)","a":"Nhưng bị lửa hỏa ngục","b":"Cả đời này lẫn đời sau","c":"Nhưng bị ném vào hỏa ngục","d":"Đến muôn đời muôn kiếp","ans":"B"},{"n":154,"q":"\u201cCây mà tốt thì quả cũng tốt; cây mà sâu thì quả cũng sâu, vì\u2026\u201d. (Mt 12,33)","a":"Cây nào sinh quả đó","b":"Cây nào sinh trái đó","c":"Có xem quả mới biết cây","d":"Xem quả thì biết cây","ans":"D"},{"n":155,"q":"\u201cLoài rắn độc kia, xấu như các người, thì làm sao\u2026? Vì lòng có đầy, miệng mới nói ra\u201d. (Mt 12,34)","a":"Nói điều tốt được","b":"Có thể làm việc tốt được","c":"Làm điều tốt được","d":"Làm việc lành được","ans":"A"},{"n":156,"q":"\u201cTôi nói cho các người hay: đến Ngày phán xét, người ta sẽ phải trả lời về\u2026 mình đã nói\u201d. (Mt 12,36)","a":"Mọi lời xấu xa","b":"Những điều xấu","c":"Mọi điều vô ích","d":"Những lời độc ác","ans":"C"},{"n":157,"q":"\u201cVì nhờ lời nói của anh mà anh sẽ được trắng án; và cũng tại lời nói của anh mà anh...\u201d (Mt 12,37)","a":"Sẽ bị kết án","b":"Sẽ bị luận phạt","c":"Sẽ bị án phạt","d":"Sẽ bị trách phạt","ans":"A"},{"n":158,"q":"\u201cTrong cuộc phán xét, dân thành Ni-ni-vê sẽ trỗi dậy cùng với thế hệ này và sẽ kết án họ, vì xưa dân ấy đã\u2026 khi nghe ông Giô-na rao giảng; mà đây thì còn hơn ông Giô-na nữa\u201d. (Mt 12,41)","a":"Tỏ lòng sám hối","b":"Sám hối","c":"Tỏ lòng thống hối","d":"Ăn năn thống hối","ans":"B"},{"n":159,"q":"\u201cTrong cuộc phán xét, nữ hoàng Phương Nam sẽ đứng lên cùng với thế hệ này, và bà sẽ kết án họ, vì xưa bà đã từ tận cùng trái đất đến nghe lời khôn ngoan của vua Sa-lô-môn; mà đây thì còn\u2026\u201d. (Mt 12,42)","a":"Cao trọng hơn Sa-lô-mon","b":"Hơn cả Sa-lô-mon nữa","c":"Hơn vua Sa-lô-môn nữa","d":"Hơn cả vua ấy nữa","ans":"C"},{"n":160,"q":"\u201cVì phàm ai\u2026 của Cha tôi, Đấng ngự trên trời, người ấy là anh chị em tôi, là mẹ tôi.\u201d (Mt 12,50)","a":"Làm theo ý","b":"Tuân hành theo ý","c":"Tuân hành ý muốn","d":"Thi hành ý muốn","ans":"D"},{"n":161,"q":"\u201cNgười gieo giống đi ra gieo giống. Trong khi người ấy gieo, thì có những hạt rơi xuống vệ đường,\u2026\u201d (Mt 13,3-4)","a":"Nó liền bị cháy","b":"Chim chóc đến ăn mất","c":"Nó liền mọc ngay","d":"Nó liền bị chết khô","ans":"B"},{"n":162,"q":"\u201cCó những hạt rơi\u2026, chỗ đất không có nhiều; nó mọc ngay, vì đất không sâu; nhưng khi nắng lên, nó liền bị cháy, và vì thiếu rễ nên bị chết khô\u201d. (Mt 13,5-6)","a":"Trên vệ đường","b":"Vào bụi gai","c":"Trên nơi sỏi đá","d":"Rơi trên đất khô cằn","ans":"C"},{"n":163,"q":"\u201cCó những hạt rơi vào bụi gai, gai mọc lên làm nó\u2026\u201d. (Mt 13,7)","a":"Chết nghẹt","b":"Bị héo khô","c":"Bị chết khô","d":"Bị chết nghẹt","ans":"A"},{"n":164,"q":"\u201cCó những hạt lại rơi nhằm đất tốt, nên\u2026: hạt được gấp trăm, hạt được sáu chục, hạt được ba chục\u201d. (Mt 13,8)","a":"Sinh nhiều hoa trái","b":"Sinh hoa trái","c":"Liền mọc lên","d":"Sinh hoa kết quả","ans":"D"},{"n":165,"q":"\u201cAi đã có thì được cho thêm, và\u2026; còn ai không có, thì ngay cái đang có, cũng sẽ bị lấy mất\u201d. (Mt 13,12)","a":"Được dư giả","b":"Sẽ có dư thừa","c":"Được dư dật","d":"Sẽ được dư giả","ans":"B"},{"n":166,"q":"\u201cBởi thế, nếu Thầy dùng dụ ngôn mà nói với họ, là vì họ nhìn mà không nhìn, nghe mà\u2026\u201d. (Mt 13,13)","a":"Không nghe","b":"Không hiểu","c":"Chẳng hiểu","d":"Cả A và B","ans":"D"},{"n":167,"q":"\u201cCòn anh em, mắt anh em thật có phúc vì\u2026, tai anh em thật có phúc, vì được nghe\u201d. (Mt 13,16)","a":"Được xem thấy","b":"Được trông thấy","c":"Được thấy","d":"Được nhìn thấy","ans":"C"},{"n":168,"q":"\u201cQuả thế, Thầy bảo thật anh em, nhiều ngôn sứ và nhiều người công chính đã mong mỏi thấy điều anh em\u2026, mà không được thấy, nghe điều anh em đang nghe, mà không được nghe\u201d. (Mt 13,17)","a":"Đang thấy","b":"Đang thấy đây","c":"Đã thấy","d":"Đã từng thấy","ans":"A"},{"n":169,"q":"\u201cCứ để cả hai cùng lớn lên cho tới mùa gặt. Đến ngày mùa, tôi sẽ bảo thợ gặt: hãy gom cỏ lùng lại, bó thành bó\u2026, còn lúa, thì hãy thu vào kho lẫm cho tôi.'\u201d (Mt 13,30)","a":"Mà quăng vào lửa","b":"Mà đốt đi","c":"Mà ném vào lửa","d":"Rồi lấy lửa đốt đi","ans":"B"},{"n":170,"q":"\u201cVậy, như người ta nhặt cỏ lùng\u2026 thế nào, thì đến ngày tận thế cũng sẽ xảy ra như vậy\u201d. (Mt 13,40)","a":"Rồi quăng vào lửa","b":"Rồi ném vào lửa","c":"Mà vứt vào lửa","d":"Rồi lấy lửa đốt đi","ans":"D"},{"n":171,"q":"\u201cCon Người sẽ sai các thiên thần của Người tập trung mọi kẻ làm gương mù gương xấu và mọi kẻ làm điều gian ác, mà\u2026, rồi quăng chúng vào lò lửa; ở đó, chúng sẽ phải khóc lóc nghiến răng\u201d. (Mt 13,41-42)","a":"Tống ra ngoài","b":"Trói lại","c":"Tống ra khỏi Nước của Người","d":"Tra tấn, đánh đập","ans":"C"},{"n":172,"q":"\u201cNước Trời giống như chuyện kho báu chôn giấu trong ruộng. Có người kia gặp được thì liền chôn giấu lại, rồi vui mừng\u2026 mà mua thửa ruộng ấy\u201d. (Mt 13,44)","a":"Bán hết tài sản của mình","b":"Đi bán tất cả những gì mình có","c":"Đem bán tất cả tài sản","d":"Đem bán tất cả gia tài","ans":"B"},{"n":173,"q":"\u201cNước Trời lại cũng giống như chuyện một thương gia đi tìm ngọc đẹp. Tìm được một viên ngọc quý, ông ta ra đi,\u2026 mà mua viên ngọc ấy\u201d. (Mt 13,45-46)","a":"Bán hết tài sản của mình","b":"Bán tất cả những gì mình có","c":"Đem bán tất cả tài sản","d":"Đem bán tất cả gia tài","ans":"B"},{"n":174,"q":"\u201cNước Trời lại còn giống như chuyện chiếc lưới thả xuống biển, gom được đủ thứ cá. Khi lưới đầy, người ta kéo lên bãi, rồi ngồi nhặt\u2026 cho vào giỏ, còn cá xấu thì vứt ra ngoài\u201d. (Mt 13,47-48)","a":"Cá tốt","b":"Cá lớn","c":"Con nào tốt","d":"Con cá nào tốt","ans":"A"},{"n":175,"q":"\u201cCác thiên thần sẽ xuất hiện và tách biệt kẻ xấu ra khỏi hàng ngũ\u2026, rồi quăng chúng vào lò lửa. Ở đó, chúng sẽ phải khóc lóc nghiến răng\u201d. (Mt 13,49-50)","a":"Các Thánh","b":"Người lành","c":"Người công chính","d":"Người tốt","ans":"C"},{"n":176,"q":"\u201cBởi vậy, bất cứ kinh sư nào đã được học hỏi về Nước Trời, thì cũng giống như chủ nhà kia lấy ra từ trong\u2026 cả cái mới lẫn cái cũ.\u201d (Mt 13,52)","a":"Ngân hàng của mình","b":"Kho tàng của mình","c":"Kho của nhà mình","d":"Kho lẫm của mình","ans":"B"},{"n":177,"q":"\u201cNgôn sứ có bị rẻ rúng, thì cũng chỉ là ở\u2026 và trong gia đình mình mà thôi.\u201d (Mt 13,57)","a":"Quê hương","b":"Chính quê hương mình","c":"Ngay chính quê hương","d":"Ngay tại quê hương mình","ans":"B"},{"n":178,"q":"\u201cNgười không làm nhiều phép lạ tại đó, vì\u2026\u201d. (Mt 13,58)","a":"Họ không có lòng tin","b":"Chẳng có tin","c":"Họ phản đối Người","d":"Họ không tin","ans":"D"},{"n":179,"q":"\u201cĐức Giê-su bảo: \u201cHọ không cần phải đi đâu cả,\u2026 hãy cho họ ăn.\u201d (Mt 14,16)","a":"Anh em","b":"Các con","c":"Chính anh em","d":"Chính các con","ans":"C"},{"n":180,"q":"\u201cNgười cầm lấy năm cái bánh và hai con cá, ngước mắt lên trời,\u2026, và bẻ ra, trao cho môn đệ. Và môn đệ trao cho dân chúng\u201d. (Mt 14,19)","a":"Tạ ơn","b":"Dâng lời chúc tụng","c":"Dâng lời tạ ơn","d":"Tạ ơn Thiên Chúa","ans":"B"},{"n":181,"q":"\u201cKhi thầy trò đã lên thuyền, thì gió lặng ngay. Những kẻ ở trong thuyền bái lạy Người và nói: \u201cQuả thật Ngài là\u2026!\u201d (Mt 14,32-33)","a":"Con Thiên Chúa","b":"Đấng Thánh","c":"Con Đấng Tối Cao","d":"Thiên Chúa","ans":"A"},{"n":182,"q":"\u201cHọ nài xin Người cho họ chỉ\u2026 thôi, và ai đã sờ vào thì đều được khỏi\u201d. (Mt 14,36)","a":"Chạm vào Người","b":"Sờ vào Người","c":"Đến gần sờ vào Người","d":"Sờ vào tua áo của Người","ans":"D"},{"n":183,"q":"\u201cQuả thế, Thiên Chúa dạy: Ngươi hãy thờ cha kính mẹ; kẻ nào nguyền rủa cha mẹ, thì\u2026\u201d. (Mt 15,4)","a":"Sẽ phải chết","b":"Sẽ bị án phạt đời đời","c":"Phải bị xử tử","d":"Thiên Chúa giáng phạt","ans":"C"},{"n":184,"q":"\u201cDân này tôn kính Ta bằng môi bằng miệng, còn\u2026 thì lại xa Ta\u201d. (Mt 15,8)","a":"Lòng dạ","b":"Lòng chúng","c":"Lòng dạ của chúng","d":"Tâm hồn chúng","ans":"B"},{"n":185,"q":"\u201cChúng có thờ phượng Ta thì cũng vô ích, vì giáo lý chúng giảng dạy chỉ là...\u201d (Mt 15,9)","a":"Giới luật phàm nhân","b":"Giáo huấn của người phàm","c":"Giáo huấn của phàm nhân","d":"Lời lẽ phàm nhân","ans":"A"},{"n":186,"q":"\u201cKhông phải cái vào miệng làm cho con người ra ô uế, nhưng\u2026, cái đó mới làm cho con người ra ô uế.\u201d (Mt 15,11)","a":"Cái từ lòng xuất ra","b":"Thứ từ lòng người xuất ra","c":"Cái từ miệng xuất ra","d":"Cái từ trong lòng","ans":"C"},{"n":187,"q":"\u201cĐức Giê-su gọi các môn đệ lại mà nói: \u201cThầy\u2026 đám đông, vì họ ở luôn với Thầy đã ba ngày rồi và họ không có gì ăn\u201d. (Mt 15,32)","a":"Thương","b":"Cảm thấy thương","c":"Lo cho","d":"Chạnh lòng thương","ans":"D"},{"n":188,"q":"\u201cĐức Giê-su lại hỏi: \u201cCòn anh em, anh em bảo Thầy là ai?\u201d Ông Si-môn Phê-rô thưa: \u201cThầy là Đấng Ki-tô,...\u201d (Mt 16,15-16)","a":"Con Thiên Chúa","b":"Con Thiên Chúa hằng sống","c":"Của Thiên Chúa","d":"Con Thiên Chúa tối cao","ans":"B"},{"n":189,"q":"\u201cNày anh Si-môn con ông Giô-na, anh thật là người có phúc, vì không phải phàm nhân mặc khải cho anh điều ấy, nhưng là\u2026, Đấng ngự trên trời\u201d. (Mt 16,17)","a":"Cha của Thầy","b":"Cha Thầy","c":"Thiên Chúa Cha","d":"Thiên Chúa","ans":"A"},{"n":190,"q":"\u201cCòn Thầy, Thầy bảo cho anh biết: anh là Phê-rô, nghĩa là Tảng Đá, trên tảng đá này, Thầy sẽ xây Hội Thánh của Thầy, và\u2026 sẽ không thắng nổi\u201d. (Mt 16,18)","a":"Cửa hỏa ngục","b":"Quyền lực Âm Phủ","c":"Quyền lực tử thần","d":"Sức mạnh của tử thần","ans":"C"},{"n":191,"q":"\u201cThầy sẽ trao cho anh\u2026: dưới đất, anh cầm buộc điều gì, trên trời cũng sẽ cầm buộc như vậy; dưới đất, anh tháo cởi điều gì, trên trời cũng sẽ tháo cởi như vậy.\u201d (Mt 16,19)","a":"Chìa khoá Nước Trời","b":"Quyền trên các thần ô uế","c":"Mọi quyền năng","d":"Chìa khóa cửa trời","ans":"A"},{"n":192,"q":"\u201cTừ lúc đó, Đức Giê-su Ki-tô bắt đầu tỏ cho các môn đệ biết: Người phải đi Giê-ru-sa-lem, phải chịu nhiều đau khổ do các kỳ mục, các thượng tế và kinh sư gây ra, rồi bị giết chết, và\u2026\u201d. (Mt 16,21)","a":"Ba ngày sau sẽ sống lại","b":"Đủ ba ngày sẽ sống lại","c":"Ngày thứ ba sẽ sống lại","d":"Khỏi ba ngày, sẽ sống lại","ans":"C"},{"n":193,"q":"\u201cXa-tan, lui lại đằng sau Thầy!\u2026, vì tư tưởng của anh không phải là tư tưởng của Thiên Chúa, mà là của loài người.\u201d (Mt 16,23)","a":"Anh cản lối Thầy","b":"Đừng cản Thầy","c":"Đừng phản đối Thầy","d":"Sao lại cản lối Thầy","ans":"A"},{"n":194,"q":"\u201cRồi Đức Giê-su nói với các môn đệ: \u201cAi muốn theo Thầy,\u2026, vác thập giá mình mà theo\u201d. (Mt 16,24)","a":"Hãy bỏ mình","b":"Hãy từ bỏ mình","c":"Phải từ bỏ mình","d":"Phải từ bỏ chính mình","ans":"D"},{"n":195,"q":"\u201cQuả vậy, ai muốn cứu mạng sống mình, thì sẽ mất;\u2026 mạng sống mình vì Thầy, thì sẽ tìm được mạng sống ấy\u201d. (Mt 16,25)","a":"Ai đành mất","b":"Còn ai liều mất","c":"Ai chấp nhận mất","d":"Còn ai chịu mất","ans":"B"},{"n":196,"q":"\u201cVì nếu người ta được cả thế giới mà phải thiệt mất mạng sống, thì\u2026? Hoặc người ta sẽ lấy gì mà đổi mạng sống mình?\u201d (Mt 16,26)","a":"Nào được ích gì","b":"Được ích gì","c":"Đâu có được ích gì","d":"Nào có lợi gì","ans":"D"},{"n":197,"q":"\u201cVì Con Người sẽ ngự đến trong vinh quang của Cha Người, cùng với các thiên thần của Người, và bấy giờ, Người sẽ thưởng phạt ai nấy\u2026\u201d. (Mt 16,27)","a":"Xứng việc họ làm","b":"Tùy theo việc họ làm","c":"Tùy việc họ làm","d":"Xứng với việc họ làm","ans":"A"},{"n":198,"q":"\u201cĐây là Con yêu dấu của Ta, Ta hài lòng về Người. Các ngươi hãy\u2026!\u201d (Mt 17,5)","a":"Nghe lời Người","b":"Vâng lời Người","c":"Vâng nghe lời Người","d":"Tuân lệnh Người","ans":"C"},{"n":199,"q":"\u201cCon Người sắp bị nộp vào tay người đời, họ sẽ giết chết Người, và ngày thứ ba...\u201d (Mt 17,22-23)","a":"Sẽ sống lại","b":"Người sẽ trỗi dậy","c":"Sẽ trỗi dậy","d":"Người sẽ sống lại","ans":"B"},{"n":200,"q":"\u201cThầy bảo thật anh em: nếu anh em không trở lại mà\u2026, thì sẽ chẳng được vào Nước Trời\u201d. (Mt 18,3)","a":"Thay đổi đời sống","b":"Ăn năn thống hối","c":"Nên như trẻ nhỏ","d":"Ăn chay khóc lóc","ans":"C"},{"n":201,"q":"\u201cVậy ai tự hạ, coi mình như em nhỏ này, người ấy sẽ là\u2026\u201d. (Mt 18,4)","a":"Người lớn nhất Nước Trời","b":"Người cao trọng trong Nước Trời","c":"Người lớn trong Nước Trời","d":"Người lớn nhất","ans":"A"},{"n":202,"q":"\u201cNhưng ai làm cớ cho một trong những kẻ bé mọn đang tin Thầy đây phải sa ngã, thì thà treo cối đá lớn vào cổ nó mà\u2026 còn hơn\u201d. (Mt 18,6)","a":"Ném xuống biển","b":"Xô xuống đáy biển","c":"Đẩy xuống biển","d":"Xô cho chìm xuống đáy biển","ans":"D"},{"n":203,"q":"\u201cNếu tay hoặc chân anh làm cớ cho anh sa ngã, thì hãy chặt mà ném đi; thà cụt tay cụt chân mà\u2026, còn hơn là có đủ hai tay hai chân mà bị ném vào lửa đời đời\u201d. (Mt 18,8)","a":"Được vào Nước Trời","b":"Được vào thiên đàng","c":"Được vào cõi sống","d":"Được vào Nước Thiên Chúa","ans":"C"},{"n":204,"q":"\u201cNếu mắt anh làm cớ cho anh sa ngã, thì hãy móc mà ném đi; thà chột mắt mà\u2026, còn hơn là có đủ hai mắt mà bị ném vào lửa hoả ngục\u201d. (Mt 18,9)","a":"Được vào Nước Trời","b":"Được vào thiên đàng","c":"Được vào cõi sống","d":"Được vào Nước Thiên Chúa","ans":"C"},{"n":205,"q":"\u201cAnh em hãy coi chừng,\u2026 trong những kẻ bé mọn này; quả thật, Thầy nói cho anh em biết: các thiên thần của họ ở trên trời không ngừng chiêm ngưỡng nhan Cha Thầy, Đấng ngự trên trời\u201d. (Mt 18,10)","a":"Chớ khinh một ai","b":"Đừng ức hiếp một ai","c":"Chớ bát nạt một ai","d":"Đừng coi thường một ai","ans":"A"},{"n":206,"q":"\u201cCũng vậy, Cha của anh em, Đấng ngự trên trời, không muốn cho một ai trong những kẻ bé mọn này\u2026\u201d. (Mt 18,14)","a":"Phải tiêu vong","b":"Bị diệt vong","c":"Phải hư mất","d":"Phải bị diệt vong","ans":"C"},{"n":207,"q":"\u201cThầy bảo thật anh em: Dưới đất, anh em cầm buộc những điều gì, trên trời cũng\u2026; dưới đất, anh em tháo cởi những điều gì, trên trời cũng tháo cởi như vậy\u201d. (Mt 18,18)","a":"Cầm buộc","b":"Cầm buộc thể ấy","c":"Cầm buộc như thế","d":"Cầm buộc như vậy","ans":"D"},{"n":208,"q":"\u201cThầy còn bảo thật anh em: Nếu ở dưới đất, hai người trong anh em\u2026 bất cứ điều gì, thì Cha Thầy, Đấng ngự trên trời, sẽ ban cho\u201d. (Mt 18,19)","a":"Cùng xin","b":"Hợp lời cầu xin","c":"Cầu xin","d":"Cùng cầu xin","ans":"B"},{"n":209,"q":"\u201cVì ở đâu có hai ba người họp lại\u2026, thì có Thầy ở đấy, giữa họ.\u201d (Mt 18,20)","a":"Nhân danh Cha Thầy","b":"Nhân danh Cha của Thầy","c":"Nhân danh Thầy","d":"Nhân danh Chúa Cha","ans":"C"},{"n":210,"q":"'Tên đầy tớ độc ác kia, ta đã tha hết số nợ ấy cho ngươi, vì ngươi đã van xin ta, thì đến lượt ngươi, ngươi không phải thương xót đồng bạn, như\u2026 ngươi sao?' (Mt 18,32-33)","a":"Ta đã thương xót","b":"Chính ta đã thương xót","c":"Chúng ta đã thương xót","d":"Đồng bạn đã thương xót","ans":"B"},{"n":211,"q":"\u201cẤy vậy, Cha của Thầy ở trên trời cũng sẽ đối xử với anh em như thế, nếu mỗi người trong anh em không\u2026 cho anh em mình.\u201d (Mt 18,35)","a":"Hết lòng tha thứ","b":"Tha thứ","c":"Chấp nhận tha thứ","d":"Bằng lòng tha thứ","ans":"A"},{"n":212,"q":"'Thuở ban đầu, Đấng Tạo Hoá đã làm ra con người có nam có nữ', và Người đã phán: 'Vì thế, người ta sẽ lìa cha mẹ mà gắn bó với vợ mình, và cả hai sẽ thành...' (Mt 19,4-5)","a":"Một gia đình","b":"Một xương một thịt","c":"Một cặp vợ chồng","d":"Một đôi vợ chồng","ans":"B"},{"n":213,"q":"Vậy, sự gì Thiên Chúa đã phối hợp, loài người...\u201d (Mt 19,6)","a":"Không được phép phân ly","b":"Không tự ý phân ly","c":"Không được phân ly","d":"Không được chia lìa","ans":"C"},{"n":214,"q":"\u201cVì các ông lòng chai dạ đá, nên ông Mô-sê đã cho phép các ông rẫy vợ, chứ thuở ban đầu,\u2026\u201d. (Mt 19,8)","a":"Không có thế đâu","b":"Không như vậy","c":"Không được phân ly","d":"Không được phép","ans":"A"},{"n":215,"q":"\u201cTôi nói cho các ông biết: Ngoại trừ trường hợp hôn nhân bất hợp pháp, ai rẫy vợ mà cưới vợ khác là...\u201d (Mt 19,9)","a":"Kẻ ngoại tình","b":"Mắc tội ngoại tình","c":"Đi ngoại tình","d":"Phạm tội ngoại tình","ans":"D"},{"n":216,"q":"\u201cCứ để trẻ em đến với Thầy,\u2026, vì Nước Trời là của những ai giống như chúng.\u201d (Mt 19,14)","a":"Đừng ngăn cấm chúng","b":"Đừng cản chúng","c":"Đừng xua đuổi chúng","d":"Đừng đe dọa chúng","ans":"A"},{"n":217,"q":"\u201cThưa Thầy, tôi\u2026 để được hưởng sự sống đời đời?\u201d (Mt 19,16)","a":"Phải làm gì","b":"Phải làm điều gì tốt","c":"Sẽ làm gì","d":"Nên làm gì","ans":"B"},{"n":218,"q":"\u201cNếu anh muốn nên hoàn thiện, thì hãy đi bán tài sản của anh và đem cho người nghèo, anh sẽ được... Rồi hãy đến theo tôi.\u201d (Mt 19,21)","a":"Thảnh thơi","b":"Thanh thỏa","c":"Một kho tàng trên trời","d":"Yên hàn","ans":"C"},{"n":219,"q":"\u201cThầy còn nói cho anh em biết: con lạc đà chui qua lỗ kim còn dễ hơn\u2026 vào Nước Thiên Chúa.\u201d (Mt 19,24)","a":"Kẻ giàu có","b":"Kẻ lắm của","c":"Người giàu có","d":"Người giàu","ans":"D"},{"n":220,"q":"\u201cVà phàm ai bỏ nhà cửa, anh em, chị em, cha mẹ, con cái hay ruộng đất, vì danh Thầy, thì sẽ được gấp bội và còn được\u2026 làm gia nghiệp\u201d. (Mt 19,29)","a":"Sự sống đời đời","b":"Sự sống vĩnh cửu","c":"Sự sống đời sau","d":"Nước Trời","ans":"B"},{"n":221,"q":"\u201cNhiều kẻ đứng đầu sẽ phải xuống hàng chót, và\u2026 sẽ được lên hàng đầu.\u201d (Mt 19,30)","a":"Nhiều kẻ đứng chót","b":"Kẻ đứng chót","c":"Kẻ sau hết","d":"Kẻ đứng rốt hết","ans":"A"},{"n":222,"q":"\u201cThế là những kẻ đứng chót sẽ được\u2026, còn những kẻ đứng đầu sẽ phải xuống hàng chót\u201d. (Mt 20,16)","a":"Đứng hàng đầu","b":"Ngồi lên hàng đầu","c":"Đứng lên hàng đầu","d":"Lên hàng đầu","ans":"D"},{"n":223,"q":"\u201cAnh em biết: thủ lãnh các dân thì dùng uy mà\u2026, những người làm lớn thì lấy quyền mà cai quản dân\u201d. (Mt 20,25)","a":"Thống trị dân","b":"Cai quản dân","c":"Cai trị dân","d":"Đe dọa dân","ans":"A"},{"n":224,"q":"\u201cGiữa anh em thì không được như vậy: Ai muốn làm lớn giữa anh em, thì phải\u2026 anh em\u201d. (Mt 20,26)","a":"Phục vụ","b":"Hầu hạ","c":"Làm người phục vụ","d":"Trở nên người hầu hạ","ans":"C"},{"n":225,"q":"\u201cVà ai muốn làm đầu anh em thì phải\u2026 anh em\u201d. (Mt 20,27)","a":"Trở nên người phục vụ","b":"Làm đầy tớ","c":"Phục vụ","d":"Hầu hạ","ans":"B"},{"n":226,"q":"\u201cCũng như Con Người đến không phải để được người ta phục vụ, nhưng là để phục vụ và\u2026 làm giá chuộc muôn người.\u201d (Mt 20,28)","a":"Hy sinh","b":"Hiến dâng thân mình","c":"Hy sinh thân mình","d":"Hiến dâng mạng sống","ans":"D"},{"n":227,"q":"\u201cLạy Ngài, lạy Con vua Đa-vít,\u2026 chúng tôi!\u201d (Mt 20,31)","a":"Xin thương xót","b":"Xin rủ lòng thương","c":"Hãy rủ lòng thương","d":"Xin thương","ans":"B"},{"n":228,"q":"\u201cHọ thưa: \u201cLạy Ngài, xin cho mắt chúng tôi\u2026!\u201d (x. Mt 20,33)","a":"Được thấy","b":"Thấy được","c":"Được mở ra","d":"Được nhìn thấy","ans":"C"},{"n":229,"q":"\u201cHãy bảo thiếu nữ Xi-on: Kìa\u2026 đang đến với ngươi hiền hậu ngồi trên lưng lừa, lưng lừa con, là con của một con vật chở đồ\u201d. (Mt 21,5)","a":"Đức Vua của ngươi","b":"Đức vua dân Do-thái","c":"Vua dân Do-thái","d":"Vua của ngươi","ans":"A"},{"n":230,"q":"\u201cDân chúng, người đi trước, kẻ theo sau, reo hò vang dậy: Hoan hô Con vua Đa-vít! Chúc tụng\u2026! Hoan hô trên các tầng trời\u201d. (Mt 21,9)","a":"Vua Ít-ra-en","b":"Đấng nhân danh Chúa mà đến","c":"Đấng ngự đến nhân danh Đức Chúa","d":"Đức vua của Ít-ra-en","ans":"C"},{"n":231,"q":"\u201cDân chúng trả lời: \u201c\u2026, người Na-da-rét, xứ Ga-li-lê đấy.\u201d (Mt 21,11)","a":"Ngôn sứ Giê-su","b":"Ông Giê-su","c":"Chính ông Giê-su","d":"Đức Giê-su","ans":"A"},{"n":232,"q":"\u201cĐã có lời chép rằng: \u2026 sẽ được gọi là nhà cầu nguyện, thế mà các ngươi lại biến thành sào huyệt của bọn cướp.\u201d (Mt 21,13)","a":"Nhà Ta","b":"Nhà Cha Ta","c":"Nhà của Ta","d":"Nhà của Cha Ta","ans":"A"},{"n":233,"q":"\u201cNgài sẽ cho miệng con thơ trẻ nhỏ\u2026\u201d (Mt 21,16)","a":"Cất tiếng ngợi khen Ngài","b":"Vang tiếng ngợi khen Ngài","c":"Ca hát ngợi khen Ngài","d":"Cất tiếng ngợi khen","ans":"D"},{"n":234,"q":"\u201cThầy bảo thật anh em, nếu anh em tin và\u2026, thì chẳng những anh em làm được điều Thầy vừa làm cho cây vả, mà hơn nữa\u201d (Mt 21,21)","a":"Chẳng chút nghi nan","b":"Xác tín như vậy","c":"Không chút nghi nan","d":"Không chút nghi ngờ","ans":"C"},{"n":235,"q":"\u201cTất cả những gì anh em\u2026 khi cầu nguyện, thì anh em sẽ được.\u201d (Mt 21,22)","a":"Tha thiết vài nài","b":"Lấy lòng tin mà xin","c":"Làm vì lòng tin","d":"Tha thiết nài xin","ans":"B"},{"n":236,"q":"\u201cKinh Thánh có câu: Tảng đá thợ xây nhà loại bỏ lại trở nên... Đó chính là công trình của Chúa, công trình kỳ diệu trước mắt chúng ta\u201d. (Mt 21,42)","a":"Viên đá góc tường","b":"Tảng đá góc tường","c":"Đá tảng góc tường","d":"Viên đá góc","ans":"C"},{"n":237,"q":"\u201cBởi đó, tôi nói cho các ông hay: Nước Thiên Chúa, Thiên Chúa sẽ lấy đi không cho các ông nữa, mà ban cho một dân biết làm cho Nước ấy\u2026\u201d. (Mt 21,43)","a":"Sinh hoa kết trái","b":"Ngày càng thịnh vượng","c":"Sinh nhiều hoa trái","d":"Sinh hoa lợi","ans":"D"},{"n":238,"q":"\u201cAi ngã xuống đá này, kẻ ấy sẽ tan xương; đá này\u2026, sẽ làm người ấy nát thịt.\u201d (Mt 21,44)","a":"Rơi trúng ai","b":"Rơi xuống ai","c":"Rơi vào ai","d":"Rơi phải người nào","ans":"A"},{"n":239,"q":"\u201cQuả thế, trong ngày sống lại, người ta chẳng lấy vợ lấy chồng, nhưng sẽ giống như\u2026 trên trời\u201d. (Mt 22,30)","a":"Các phẩm thiên thần","b":"Các thiên thần","c":"Thiên thần","d":"Các thần thánh","ans":"B"},{"n":240,"q":"\u201cNgười phán: Ta là Thiên Chúa của Áp-ra-ham, Thiên Chúa của I-xa-ác và Thiên Chúa của Gia-cóp. Người không phải là Thiên Chúa của kẻ chết, nhưng là...\u201d (Mt 22,32)","a":"Đấng Hằng Sống","b":"Thiên Chúa của kẻ sống","c":"Của kẻ sống","d":"Chủ của sự sống","ans":"C"},{"n":241,"q":"\u201cĐức Giê-su đáp: Ngươi phải yêu mến Đức Chúa, Thiên Chúa của ngươi, hết lòng, hết linh hồn và hết trí khôn ngươi. Đó là điều răn quan trọng nhất và\u2026\u201d. (Mt 22,37-38)","a":"Là điều răn đứng đầu","b":"Là điều răn hàng đầu","c":"Ý nghĩa nhất","d":"Điều răn thứ nhất","ans":"D"},{"n":242,"q":"\u201cCòn điều răn thứ hai, cũng giống điều răn ấy, là: ngươi phải\u2026 như chính mình\u201d. (Mt 22,39)","a":"Yêu tha nhân","b":"Yêu người thân cận","c":"Yêu anh em","d":"Yêu hết mọi người","ans":"B"},{"n":243,"q":"\u201cĐức Chúa phán cùng Chúa Thượng tôi: bên hữu Cha đây, Con lên ngự trị, để rồi bao địch thù, Cha sẽ\u2026?\u201d (Mt 22,44)","a":"Làm bệ dưới chân Con","b":"Đặt làm bệ dưới chân Con","c":"Bắt quy phục dưới chân Con","d":"Đặt dưới chân Con","ans":"D"},{"n":244,"q":"\u201cVậy, tất cả những gì họ nói, anh em hãy làm, hãy giữ, còn những việc họ làm, thì\u2026, vì họ nói mà không làm\u201d. (Mt 23,3)","a":"Chớ có làm theo","b":"Đừng có làm theo","c":"Đừng làm theo họ","d":"Chớ làm theo","ans":"B"},{"n":245,"q":"\u201cHọ bó những gánh nặng mà chất lên vai người ta, nhưng chính họ thì lại không buồn\u2026\u201d. (Mt 23,4)","a":"Đếm xỉa tới","b":"Đụng tới","c":"Chạm tay vào","d":"Động ngón tay vào","ans":"D"},{"n":246,"q":"\u201cPhần anh em, thì đừng để ai gọi mình là 'ráp-bi', nghĩa là thầy, vì anh em chỉ có một Thầy; còn tất cả anh em đều là\u2026\u201d. (Mt 23,8)","a":"Con cùng một Cha","b":"Con của Cha trên trời","c":"Anh em với nhau","d":"Anh em cùng một Cha","ans":"C"},{"n":247,"q":"\u201cAnh em cũng đừng gọi ai dưới đất này là cha của anh em, vì anh em chỉ có một Cha là\u2026\u201d. (Mt 23,9)","a":"Cha trên trời","b":"Đấng ngự trên trời","c":"Chúa tể trời đất","d":"Thiên Chúa","ans":"A"},{"n":248,"q":"\u201cAnh em cũng đừng để ai gọi mình là người lãnh đạo, vì anh em chỉ có một vị lãnh đạo, là\u2026\u201d. (Mt 23,10)","a":"Đấng tạo thành","b":"Đức Ki-tô","c":"Thiên Chúa Cha","d":"Cha của Thầy","ans":"B"},{"n":249,"q":"\u201cTrong anh em, người làm lớn hơn cả, phải làm người\u2026\u201d. (Mt 23,11)","a":"Phục vụ anh em","b":"Đầy tớ của anh em","c":"Nhỏ nhất trong anh em","d":"Hầu hạ anh em","ans":"A"},{"n":250,"q":"\u201cAi tôn mình lên, sẽ bị hạ xuống; còn ai\u2026, sẽ được tôn lên\u201d. (Mt 23,12)","a":"Tự hạ mình xuống","b":"Khiêm nhường","c":"Hạ mình xuống","d":"Khiêm tốn","ans":"C"},{"n":251,"q":"\u201cCác người nộp thuế thập phân về bạc hà, thì là, rau húng, mà bỏ những điều quan trọng nhất trong Lề Luật là công lý, lòng nhân và\u2026\u201d. (Mt 23,23)","a":"Sự thành tín","b":"Lòng thành tín","c":"Sự chân thành","d":"Thành tín","ans":"D"},{"n":252,"q":"\u201cQuân dẫn đường mù quáng! Các người lọc con muỗi, nhưng lại\u2026\u201d. (Mt 23,24)","a":"Nuốt chửng con lạc đà","b":"Nuốt con lạc đà","c":"Bỏ qua con lạc đà","d":"Ăn thịt con lạc đà","ans":"B"},{"n":253,"q":"\u201cCác người rửa sạch bên ngoài chén đĩa, nhưng bên trong thì đầy những chuyện cướp bóc và\u2026\u201d. (Mt 23,25)","a":"Ăn chơi vô độ","b":"Ăn chơi trác táng","c":"Lối sống vô luân","d":"Chè chén say sưa","ans":"A"},{"n":254,"q":"\u201cCác người cũng vậy, bên ngoài thì có vẻ công chính trước mặt thiên hạ, nhưng bên trong toàn là\u2026 và gian ác!\u201d (Mt 23,28)","a":"Thối tha","b":"Giả hình","c":"Xấu xa","d":"Những việc xấu xa","ans":"B"},{"n":255,"q":"\u201cĐã bao lần Ta muốn tập hợp con cái ngươi lại, như gà mẹ tập hợp gà con dưới cánh, mà các ngươi\u2026\u201d. (Mt 23,37)","a":"Từ chối","b":"Bỏ ngoài tai","c":"Không chịu","d":"Chẳng đoái hoài","ans":"C"},{"n":256,"q":"\u201cThật vậy, Ta nói cho các ngươi hay, từ nay các ngươi sẽ không còn thấy Ta nữa, cho đến khi các ngươi nói: Chúc tụng Đấng ngự đến\u2026!\u201d (Mt 23,39)","a":"Nhân danh Chúa","b":"Trên cõi trời cao","c":"Từ trời cao thẳm","d":"Nhân danh Đức Chúa","ans":"D"},{"n":257,"q":"\u201cAnh em hãy coi chừng, đừng để ai lừa gạt anh em, vì sẽ có nhiều kẻ mạo danh Thầy đến nói rằng: 'Chính Ta đây là..., và họ sẽ lừa gạt được nhiều người\u201d. (Mt 24,4-5)","a":"Đấng Cứu Thế","b":"Đấng giải thoát ngươi","c":"Đấng Ki-tô","d":"Thiên Chúa thật","ans":"C"},{"n":258,"q":"\u201cAnh em sẽ nghe có giặc giã và tin đồn giặc giã; coi chừng,\u2026, vì những việc đó phải xảy ra, nhưng chưa phải là tận cùng\u201d. (Mt 24,6)","a":"Đừng khiếp sợ","b":"Đừng sợ hãi","c":"Đừng có tin","d":"Đừng quá lo lắng","ans":"A"},{"n":259,"q":"\u201cSẽ có những cơn đói kém, và những trận động đất ở nhiều nơi. Nhưng tất cả những sự việc ấy chỉ là khởi đầu\u2026\u201d. (Mt 24,7-8)","a":"Mà thôi","b":"Của ngày tận thế","c":"Các cơn đau đớn","d":"Của ngày chung thẩm","ans":"C"},{"n":260,"q":"\u201cBấy giờ, người ta sẽ nộp anh em, khiến anh em phải khốn quẫn, và người ta sẽ giết anh em; anh em sẽ bị mọi dân tộc thù ghét vì\u2026\u201d. (Mt 24,9)","a":"Sống công chính","b":"Sống theo lời Thầy","c":"Đã tin vào Thầy","d":"Danh Thầy","ans":"D"},{"n":261,"q":"\u201cBấy giờ sẽ có nhiều người vấp ngã. Người ta sẽ nộp nhau và thù ghét nhau. Sẽ có nhiều\u2026 xuất hiện và lừa gạt được nhiều người\u201d. (Mt 24,10-11)","a":"Ngôn sứ","b":"Ngôn sứ giả","c":"Ki-tô giả","d":"Tiên tri giả","ans":"B"},{"n":262,"q":"\u201cVì tội ác gia tăng, nên lòng yêu mến của nhiều người sẽ nguội đi. Nhưng kẻ nào\u2026, kẻ ấy sẽ được cứu thoát\u201d. (Mt 24,12-13)","a":"Bền đỗ đến cùng","b":"Kiên tâm chịu đựng","c":"Bền chí đến cùng","d":"Tin vào danh Thầy","ans":"C"},{"n":263,"q":"\u201cTin Mừng này về Vương Quốc sẽ được loan báo trên khắp thế giới, để làm chứng cho... Và bấy giờ sẽ là tận cùng.\u201d (Mt 24,14)","a":"Mọi dân tộc được biết","b":"Muôn dân được biết","c":"Mọi người được biết","d":"Hết thảy mọi người","ans":"A"},{"n":264,"q":"\u201cBấy giờ, nếu có ai bảo anh em: 'Này, Đấng Ki-tô ở đây' hoặc 'ở đó', thì anh em\u2026\u201d. (Mt 24,23)","a":"Cứ tin","b":"Hãy tin","c":"Chớ có tin","d":"Đừng tin","ans":"D"},{"n":265,"q":"\u201cThật vậy, sẽ có những Ki-tô giả và ngôn sứ giả xuất hiện, đưa ra những dấu lạ lớn lao và những điềm thiêng, đến nỗi chúng\u2026 cả những người đã được tuyển chọn, nếu có thể\u201d. (Mt 24,24)","a":"Uy hiếp","b":"Lừa gạt","c":"Đe dọa","d":"Dụ dỗ","ans":"B"},{"n":266,"q":"\u201cVậy, nếu người ta bảo anh em 'Này, Người ở trong hoang địa', anh em chớ ra đó; 'Kìa, Người ở trong phòng kín', anh em cũng\u2026\u201d. (Mt 24,26)","a":"Đừng đi theo","b":"Chớ có vào","c":"Đừng tin","d":"Đừng đi xem","ans":"C"},{"n":267,"q":"\u201cVì, như chớp loé ra từ phương đông và chiếu sáng đến phương tây thế nào, thì\u2026 của Con Người cũng sẽ như vậy\u201d. (Mt 24,27)","a":"Ngày quang lâm","b":"Giờ","c":"Ngày","d":"Cuộc quang lâm","ans":"D"},{"n":268,"q":"\u201cBấy giờ mọi chi tộc trên mặt đất sẽ đấm ngực và sẽ thấy Con Người rất\u2026 ngự giá mây trời mà đến\u201d. (Mt 24,30)","a":"Uy nghi vinh hiển","b":"Oai hùng","c":"Uy hùng","d":"Oai phong vinh hiển","ans":"A"},{"n":269,"q":"\u201cCũng vậy, khi thấy tất cả những điều đó, anh em hãy biết là Con Người đã đến gần,\u2026\u201d. (Mt 24,33)","a":"Ngài ở ngay bên","b":"Ở ngay ngoài cửa rồi","c":"Ngài đang ở đây rồi","d":"Hãy tin như vậy","ans":"B"},{"n":270,"q":"\u201cTrời đất sẽ qua đi, nhưng\u2026 sẽ chẳng qua đâu\u201d. (Mt 24,35)","a":"Lời Thầy","b":"Điều Thầy nói","c":"Lời Thầy truyền dạy","d":"Những lời Thầy nói","ans":"D"},{"n":271,"q":"\u201cCòn về ngày và giờ đó thì không ai biết được, ngay cả các thiên sứ trên trời hay cả người Con cũng không;\u2026 Chúa Cha biết mà thôi\u201d. (Mt 24,36)","a":"Duy chỉ có","b":"Chỉ mình","c":"Chỉ một mình","d":"Chỉ có","ans":"C"},{"n":272,"q":"\u201cVậy anh em hãy\u2026, vì anh em không biết ngày nào Chúa của anh em đến\u201d. (Mt 24,42)","a":"Tỉnh thức","b":"Canh thức","c":"Sẵn sàng","d":"Cả A và C","ans":"B"},{"n":273,"q":"\u201cAnh em hãy biết điều này: nếu chủ nhà biết\u2026 kẻ trộm sẽ đến, hẳn ông đã thức, không để nó khoét vách nhà mình đâu\u201d. (Mt 24,43)","a":"Vào canh nào","b":"Lúc nào","c":"Khi nào","d":"Chắc khi nào","ans":"A"},{"n":274,"q":"\u201cCho nên anh em cũng vậy, anh em hãy sẵn sàng, vì chính giờ phút anh em\u2026, thì Con Người sẽ đến\u201d. (Mt 24,44)","a":"Đang ngủ","b":"Coi thường","c":"Không ngờ","d":"Lơ là","ans":"C"},{"n":275,"q":"\u201cVậy anh em hãy\u2026, vì anh em không biết ngày nào, giờ nào\u201d. (Mt 25,13)","a":"Tỉnh thức","b":"Canh thức","c":"Sẵn sàng","d":"Cả A và C","ans":"B"},{"n":276,"q":"\u201cVì phàm ai đã có, thì được cho thêm và\u2026; còn ai không có, thì ngay cái đang có, cũng sẽ bị lấy đi\u201d
